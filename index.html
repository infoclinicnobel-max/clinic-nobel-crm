<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;min-width:0}
html,body,#root{width:100%;max-width:100%;overflow-x:hidden;position:relative;overscroll-behavior-x:none}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F6FA;-webkit-font-smoothing:antialiased}
#root>div{max-width:100%;overflow-x:hidden}
img,video,canvas,svg{max-width:100%}
input,select,textarea,button{font-family:inherit;max-width:100%}
input,select,textarea{font-size:16px!important} /* Prevent zoom on iOS */
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
::-webkit-scrollbar{display:none}
* {scrollbar-width:none}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.card-enter{animation:fadeIn 0.2s ease}
.slide-up{animation:slideUp 0.3s ease}
.donut-seg{transition:opacity .2s ease, stroke-width .2s ease}
.donut-seg:hover{opacity:.82}
</style>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");</script>

// Langue courante (persistée). Défaut = français.
let CURRENT_LANG = (function(){
  try { return localStorage.getItem("cn_lang") || "fr"; } catch(e){ return "fr"; }
})();

function setLang(code){
  CURRENT_LANG = code;
  try { localStorage.setItem("cn_lang", code); } catch(e){}
}

// Correspondance code langue → locale BCP-47 pour Intl.DateTimeFormat.
// Ne modifie jamais les valeurs internes : sert uniquement au formatage d'affichage des dates.
const LOCALE_MAP = { fr:"fr-FR", en:"en-US", tr:"tr-TR", es:"es-ES" };
function localeForLang(){
  return LOCALE_MAP[CURRENT_LANG] || "fr-FR";
}

// t(key) → texte traduit. Fallback: fr, puis la clé elle-même.
function t(key){
  const dict = I18N[CURRENT_LANG] || I18N.fr;
  if (dict[key] !== undefined) return dict[key];
  if (I18N.fr[key] !== undefined) return I18N.fr[key];
  return key;
}

// Alias global stable de la fonction de traduction — utilisable même dans les
// fonctions où une variable locale nommée "t" (une tâche) masque la fonction t().
const tr = t;

// Traduit un statut pour l'AFFICHAGE seulement (la valeur interne reste inchangée)
function tStatus(internalValue){
  return t("status."+internalValue) || internalValue;
}

// Filet de sécurité : empêche tout "écran blanc figé" si un composant lève une erreur d'affichage.
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err){ return { err }; }
  componentDidCatch(err, info){ try { console.error("CRM render error:", err, info); } catch(e){} }
  reset(){ this.setState({ err: null }); }
  render(){
    if(this.state.err){
      if(this.props.fallback) return this.props.fallback(()=>this.reset());
      return (
        <div style={{padding:28,textAlign:"center",maxWidth:420,margin:"40px auto"}}>
          <div style={{fontSize:34}}>⚠️</div>
          <div style={{fontWeight:800,color:"#0B1F3A",marginTop:10,fontSize:16}}>{t("common.errorOccurred")}</div>
          <div style={{fontSize:13,color:"#7B8BA5",marginTop:6}}>Vos données sont intactes. Vous pouvez réessayer.</div>
          <button onClick={()=>this.reset()} style={{marginTop:16,padding:"10px 20px",border:"none",borderRadius:11,background:"#0B1F3A",color:"#fff",fontWeight:700,cursor:"pointer"}}>↩︎ Réessayer</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// Fusion des utilisateurs additionnels + overrides dans USERS, au chargement (avant tout rendu)
// Deux entrées désignent le même utilisateur si même email (prioritaire) OU même id
function sameUser(a,b){
  if(!a||!b) return false;
  if(a.email&&b.email&&String(a.email).toLowerCase()===String(b.email).toLowerCase()) return true;
  return String(a.id)===String(b.id);
}
// Déduplication robuste : un email = un seul utilisateur, un id = un seul utilisateur.
// Garde l'enregistrement canonique (le premier rencontré = compte d'origine), fusionne les champs,
// et réaligne le cache local (users_ext) sur l'id canonique. Aucune donnée perdue.
function dedupeUsers(){
  try{
    const result = [];
    for(const u of USERS){
      const match = result.find(r=>sameUser(r,u));
      if(match){
        Object.keys(u).forEach(k=>{
          if(k==="id") return;
          if(u[k]!==undefined && u[k]!=="" && (match[k]===undefined || match[k]==="")) match[k]=u[k];
        });
        if(!match.password && u.password) match.password = u.password;
      } else {
        result.push(u);
      }
    }
    if(result.length!==USERS.length){ USERS.length=0; result.forEach(u=>USERS.push(u)); }
    // Réaligner users_ext : un seul enregistrement par utilisateur, sur l'id canonique
    const canonByEmail = {};
    USERS.forEach(u=>{ if(u.email) canonByEmail[String(u.email).toLowerCase()] = u.id; });
    const ext = cfgStore.load("users_ext") || [];
    const seen = new Set(); const out = [];
    ext.forEach(x=>{
      const canonId = (x.email && canonByEmail[String(x.email).toLowerCase()]) || x.id;
      if(seen.has(canonId)) return;
      seen.add(canonId);
      out.push({...x, id:canonId});
    });
    cfgStore.save("users_ext", out);
  }catch(e){ console.error("dedupeUsers", e); }
}

  try {

const rolePerms = (roleId) => RBAC.roles[roleId] || DEFAULT_ROLES[roleId] || DEFAULT_ROLES.invite;
const isFullRole = (roleId) => { const r=rolePerms(roleId); return !!(r && (r.full || roleId==="admin" || roleId==="pdg")); };

function userOverride(user){ return user && RBAC.overrides ? RBAC.overrides[user.id] : null; }
function effPermsObj(user){
  const ov = userOverride(user);
  if(ov && ov.perms) return ov.perms;
  return rolePerms(user.role).perms || {};
}
// ═══ RÈGLES DURES — RÔLE CHIRURGIEN (lecture seule, données sensibles masquées) ═══
// Ces règles priment sur toute permission cochée par erreur dans la matrice RBAC.
const isSurgeon = (u) => u?.role === "chirurgien";
const canViewSensitivePatientData = (u) => !isSurgeon(u);
const SURGEON_BLOCKED_MODULES = ["finances","financesAdmin","analyses","utilisateurs","equipe","messagerie","ventes","devis","factures","paiements"];

// ═══ PERMISSION INDÉPENDANTE « ACCÈS FINANCES ADMINISTRATEUR » ═══════════════
// Donne accès aux onglets sensibles (Finances Administrateur, Paiements
// chirurgiens) SANS accorder les droits admin complets. Activable par
// utilisateur via la matrice de permissions (rôle ou override individuel) —
// ex. Ceyda : override "financesAdmin.view = oui", rôle inchangé.
function hasFinancesAdmin(user){
  if(!user) return false;
  if(isFullRole(user.role)) return true;          // admin / pdg : toujours
  if(isSurgeon(user)) return false;               // chirurgien : jamais
  const p = effPermsObj(user);
  return !!(p.financesAdmin && p.financesAdmin.view);
}

function can(user, mod, action){
  if(!user) return false;
  if(isFullRole(user.role)) return true;
  if(isSurgeon(user)){
    if(SURGEON_BLOCKED_MODULES.indexOf(mod) >= 0) return false; // jamais, même si coché par erreur
    if(action !== "view") return false;                          // lecture seule stricte
  }
  const p = effPermsObj(user);
  return !!(p[mod] && p[mod][action]);
}
function dataScope(user, mod){
  if(!user || isFullRole(user.role)) return "all";
  const ov = userOverride(user);
  const scopes = (ov && ov.scopes) ? ov.scopes : (rolePerms(user.role).scopes || {});
  return scopes[mod] || "all";
}
function editOwnOnly(user, mod){
  if(!user || isFullRole(user.role)) return false;
  const ov = userOverride(user);
  const eo = (ov && ov.editOwn) ? ov.editOwn : (rolePerms(user.role).editOwn || {});
  return !!eo[mod];
}
// Un enregistrement est-il « possédé » par l'utilisateur ?
const ownsRecord = (user, rec) => rec && (rec.creePar===user.id || rec.assigneA===user.id);
function canEditRecord(user, mod, rec){
  if(!can(user, mod, "edit")) return false;
  if(editOwnOnly(user, mod)) return isFullRole(user.role) || ownsRecord(user, rec);
  return true;
}
function canDeleteRecord(user, mod, rec){
  if(!can(user, mod, "delete")) return false;
  if(editOwnOnly(user, mod)) return isFullRole(user.role) || ownsRecord(user, rec);
  return true;
}
// Filtre un tableau selon la visibilité (own/team/all) — team≈all tant qu'aucun groupe d'équipe n'est défini
function scopeArray(arr, user, mod){
  if(!Array.isArray(arr)) return arr;
  if(isFullRole(user.role)) return arr;
  const sc = dataScope(user, mod);
  if(sc==="all" || sc==="team") return arr;
  return arr.filter(r => ownsRecord(user, r));
}

function setRoleConfig(byUserId, roleId, newRole){
  const old = rolePerms(roleId);
  // diff par module/action
  try {
    PERM_MODULES.forEach(m=>{
      PERM_ACTIONS.forEach(a=>{

        if(ov!==nv) logPerm(byUserId, "role", roleId, `${m.l} · ${a.l}`, ov?"oui":"non", nv?"oui":"non");
      });
      const os=(old.scopes&&old.scopes[m.k])||"", ns=(newRole.scopes&&newRole.scopes[m.k])||"";

// Crée / met à jour un utilisateur
function saveUserConfig(byUserId, u, isNew){
  if(isNew){
    if(!u.cree) u.cree = todayStr();
    if(!u.creePar) u.creePar = byUserId;
    const dup = USERS.find(x=>sameUser(x,u));
    if(dup){ // un email/id existant → mise à jour au lieu d'un doublon
      Object.assign(dup, u, {id:dup.id});
      u.id = dup.id;
    } else {
      USERS.push(u);
    }
    const ext = cfgStore.load("users_ext") || [];
    const i = ext.findIndex(x=>sameUser(x,u));
    if(i>=0) ext[i]=Object.assign({}, ext[i], u, {id:u.id}); else ext.push(u);
    cfgStore.save("users_ext", ext);
    dedupeUsers();
    logPerm(byUserId, "user", u.id, "Création", "—", `${u.prenom} ${u.nom} (${ROLE_LABELS[u.role]||u.role})`);
    syncUserToSheet("add", u);
  } else {
    const live = USERS.find(x=>x.id===u.id);
    const before = live ? {...live} : {};
    if(live) Object.assign(live, u);
    const ov = cfgStore.load("overrides") || {};
    ov[u.id] = { ...(ov[u.id]||{}),
      role:u.role, statut:u.statut, fonction:u.fonction, telephone:u.telephone,
      photo:u.photo, nom:u.nom, prenom:u.prenom, color:u.color,
      perms:u.permsOverride||undefined, scopes:u.scopesOverride||undefined, editOwn:u.editOwnOverride||undefined };
    cfgStore.save("overrides", ov);
    RBAC.overrides = ov;
    // si c'est un utilisateur additionnel, mettre aussi à jour la liste ext
    const ext = cfgStore.load("users_ext") || [];
    const ei = ext.findIndex(x=>x.id===u.id);
    if(ei>=0){ ext[ei] = Object.assign({}, ext[ei], u); cfgStore.save("users_ext", ext); }
    // journaliser quelques champs clés
    ["role","statut","fonction"].forEach(k=>{ if(String(before[k]||"")!==String(u[k]||"")) logPerm(byUserId,"user",u.id, k==="role"?"Rôle":k==="statut"?"Statut":"Fonction", before[k]||"—", u[k]||"—"); });
    if(u.permsOverride) logPerm(byUserId,"user",u.id,"Permissions personnalisées","—","modifiées");
    syncUserToSheet("update", live ? {...live, ...u} : u);
  }
  rbacSheetSync();
}

function deleteUserConfig(byUserId, id){
  const u = USERS.find(x=>x.id===id);

}

// Fusionne les utilisateurs renvoyés par la feuille dans USERS + overrides + cache local
function mergeServerUsers(list){
  if(!Array.isArray(list)) return 0;
  let added=0;
  const ov = cfgStore.load("overrides") || {};
  const ext = cfgStore.load("users_ext") || [];
  const parse = (v)=>{ if(v===undefined||v===null||v==="") return undefined; if(typeof v==="object") return v; try{ return JSON.parse(v); }catch(e){ return undefined; } };
  list.forEach(su=>{
    if(!su || !su.id || !su.email) return;
    const perms=parse(su.perms), scopes=parse(su.scopes), editOwn=parse(su.editOwn);
    const clean = { id:String(su.id), prenom:su.prenom||"", nom:su.nom||"", email:String(su.email),
      password: su.password!==undefined&&su.password!=="" ? String(su.password) : undefined,
      telephone:su.telephone||"", fonction:su.fonction||"", role:su.role||"invite", statut:su.statut||"Actif",
      color:su.color||ROLE_COLORS[su.role]||"#0B1F3A", photo:su.photo||"", creePar:su.creePar||"", cree:su.cree||"" };
    const live = USERS.find(x=> sameUser(x, clean));
    const canonId = live ? live.id : clean.id;
    if(live){ Object.keys(clean).forEach(k=>{ if(k!=="id" && clean[k]!==undefined && clean[k]!=="") live[k]=clean[k]; }); }
    else { USERS.push(clean); added++; }
    if(perms||scopes||editOwn){
      ov[canonId] = { ...(ov[canonId]||{}), perms, scopes, editOwn,
        role:clean.role, statut:clean.statut, fonction:clean.fonction, telephone:clean.telephone,
        photo:clean.photo, nom:clean.nom, prenom:clean.prenom, color:clean.color };
    }
    const extRec = {...clean, id:canonId, perms, scopes, editOwn};
    const ei = ext.findIndex(x=> x.id===canonId || (x.email&&clean.email&&String(x.email).toLowerCase()===String(clean.email).toLowerCase()));
    if(ei>=0) ext[ei]=extRec; else ext.push(extRec);
  });
  try{ cfgStore.save("overrides", ov); RBAC.overrides = ov; cfgStore.save("users_ext", ext); }catch(e){}
  dedupeUsers();
  return added;
}

const initials = p => p ? `${p.prenom?.[0]||""}${p.nom?.[0]||""}` : "?";
const fmtEur = n => n ? `${Number(n).toLocaleString("fr-FR")} €` : "—";
// Date du jour en HEURE LOCALE (corrige le décalage UTC : entre 00h et 03h à
// Istanbul, toISOString() renvoyait la date de la veille → CA du jour, retards
// et RDV "futurs" faussés chaque nuit).
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const uid = () => Date.now().toString() + Math.random().toString(36).slice(2,6);

// Normalise n'importe quelle valeur de date vers "YYYY-MM-DD" propre.
// Gère : "2026-10-29", "2026-10-29T...", objets Date Google Sheets ("Sat Dec 30 1899..."), ISO, etc.
const normalizeDate = (v) => {
  if(!v) return "";
  const m = String(v).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  const d = new Date(v);
  if(isNaN(d.getTime())) return "";
  if(d.getFullYear() < 2000) return "";
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
// Extrait une heure "HH:MM" depuis une valeur (gère "Sat Dec 30 1899 12:56:56" et "10:00")
const normalizeHeure = (v) => {
  if(!v) return "";
  const m = String(v).match(/(\d{1,2}):(\d{2})/);
  if(m) return `${m[1].padStart(2,"0")}:${m[2]}`;
  return "";
};

// ── SERVICE DE FORMATAGE DES DATES (UNIQUE — à utiliser dans TOUS les modules) ──
// Ne JAMAIS afficher un objet Date brut. Toute date invalide → "Date à corriger".
const MOIS_FR = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const JOURS_FR = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const fmtJour = (v) => { const d=normalizeDate(v); if(!d) return "Date à corriger"; const [Y,M,D]=d.split("-"); return `${D}/${M}/${Y}`; };          // 26/06/2026
const fmtJourCourt = (v) => { const d=normalizeDate(v); if(!d) return "—"; const [,M,D]=d.split("-"); return `${D}/${M}`; };                          // 26/06
const fmtHeure = (v) => normalizeHeure(v);                                                                                                          // 11:00
const fmtJourLong = (v) => { const d=normalizeDate(v); if(!d) return "Date à corriger"; const dt=new Date(d+"T12:00:00"); return `${JOURS_FR[dt.getDay()]} ${dt.getDate()} ${MOIS_FR[dt.getMonth()]} ${dt.getFullYear()}`; }; // vendredi 26 juin 2026
const fmtJourHeure = (v,h) => { const j=fmtJour(v); const hh=fmtHeure(h); return hh ? `${j} • ${hh}` : j; };                                         // 26/06/2026 • 11:00
// Date "valide" au sens métier : reconnue ET année comprise entre 2025 et 2035
const isCRMDateValid = (v) => { const d=normalizeDate(v); if(!d) return false; const y=+d.slice(0,4); return y>=2025 && y<=2035; };

// ── API ───────────────────────────────────────────────────────────────────────
let AUTH_TOKEN = (()=>{ try{ return localStorage.getItem("cn_token")||""; }catch(e){ return ""; } })();
const setAuthToken = (t)=>{ AUTH_TOKEN = t||""; try{ if(t) localStorage.setItem("cn_token",t); else localStorage.removeItem("cn_token"); }catch(e){} };

const api = {
  get: async (type) => {
    try {
      const r = await fetch(`${SCRIPT_URL}?type=${type}&token=${encodeURIComponent(AUTH_TOKEN)}&t=${Date.now()}`, {
        method:"GET", redirect:"follow"
      });
      const text = await r.text();
      const d = JSON.parse(text);
      return Array.isArray(d) ? d : [];
    } catch(e) { 
      console.error("GET error:", e);
      return []; 
    }
  },
  // Connexion sécurisée côté serveur (mot de passe vérifié, jeton renvoyé) — lisible (GET)
  login: async (email, password) => {
    try {
      const r = await fetch(`${SCRIPT_URL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&t=${Date.now()}`, {
        method:"GET", redirect:"follow"
      });
      return JSON.parse(await r.text());
    } catch(e) { return { ok:false }; }
  },
  post: async (type, action, record) => {
    // Écriture best-effort (no-cors), jeton inclus pour l'enforcement serveur éventuel
    const body = JSON.stringify({type, action, record, token:AUTH_TOKEN});
    const promises = [
      fetch(SCRIPT_URL, {
        method:"POST", mode:"no-cors", cache:"no-cache",
        headers:{"Content-Type":"text/plain"},
        body
      }).catch(()=>{}),
    ];
    await Promise.allSettled(promises);
    await new Promise(r=>setTimeout(r,800));
  }
};

// Local cache to persist data across reloads
const cache = {
  save: (key, data) => {
    try { localStorage.setItem("cn_cache_"+key, JSON.stringify({data, ts:Date.now()})); } catch(e){}
  },
  load: (key) => {
    try { 
      const s = localStorage.getItem("cn_cache_"+key);
      if(!s) return null;
      const {data, ts} = JSON.parse(s);
      // Cache valid for 24h
      if(Date.now()-ts < 86400000) return data;
      return null;
    } catch(e){ return null; }
  }
};

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin, lang, onLangChange}) {
  const [email,setEmail] = useState("");
  const [pass,setPass] = useState("");
  const [error,setError] = useState("");
  const [showPass,setShowPass] = useState(false);
  const handleLogin = async () => {
    const mail = email.trim();
    let user = USERS.find(u=>u.email===mail&&u.password===pass);
    // Si non trouvé localement : connexion sécurisée côté serveur (haché + jeton)
    if(!user){
      try {
        const res = await api.login(mail, pass);
        if(res && res.ok && res.user){
          setAuthToken(res.token||"");
          mergeServerUsers([{...res.user, password:pass}]); // cache local (permet reconnexion hors-ligne)
          user = USERS.find(u=>u.id===res.user.id) || res.user;
        } else if(res && res.error){
          setError(res.error==="compte désactivé"?"Ce compte est désactivé. Contactez l'administrateur.":"Email ou mot de passe incorrect.");
          return;
        }
      } catch(e){}
    }
    if(!user){ setError("Email ou mot de passe incorrect."); return; }
    if(user.statut==="Inactif"){ setError("Ce compte est désactivé. Contactez l'administrateur."); return; }
    localStorage.setItem("cn_user",JSON.stringify(user));
    onLogin(user);
  };
  const inp = {width:"100%",padding:"12px 14px",border:"1px solid #E8ECF2",borderRadius:10,fontSize:14,outline:"none",boxSizing:"border-box",background:"#F4F6FA"};
  return (
    <div style={{minHeight:"100vh",background:"#0B1F3A",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:24,padding:32,width:"100%",maxWidth:380,boxShadow:"0 24px 80px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <LanguageSelector compact onChange={onLangChange}/>
        </div>
        <div style={{textAlign:"center",marginBottom:28}}>
          <img src="https://i.ibb.co/b5k523qC/image.jpg" style={{width:100,height:100,borderRadius:20,objectFit:"contain",background:"white",padding:4,margin:"0 auto 12px",display:"block"}} alt="Clinic Nobel"/>
          <div style={{fontWeight:800,fontSize:20,color:"#0B1F3A"}}>Clinic Nobel</div>
          <div style={{fontSize:12,color:"#7B8BA5",marginTop:4}}>CRM — {t("login.title")}</div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:"#7B8BA5",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:6}}>{t("login.email")}</label>
          <input style={inp} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="votre@email.com" onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:11,fontWeight:700,color:"#7B8BA5",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:6}}>{t("login.password")}</label>
          <div style={{position:"relative"}}>
            <input style={{...inp,paddingRight:44}} type={showPass?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            <button onClick={()=>setShowPass(x=>!x)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",fontSize:16,color:"#7B8BA5"}}>{showPass?"🙈":"👁️"}</button>
          </div>

  "Arrivée":"#0B1F3A","Arrivée à Istanbul":"#0B1F3A","Arrivée Istanbul":"#0B1F3A",
  "Deuxième séjour":"#4F46E5","Relance commerciale":"#9333EA",
};
const getEvtColor = type => {
  if(!type) return C.blue;
  for(const[k,v] of Object.entries(EVT_COLORS)) if(type.toLowerCase().includes(k.toLowerCase())) return v;
  return C.blue;
};
const getEvtIcon = type => {
  if(!type) return "📅";
  const t=type.toLowerCase();
  if(t.includes("chirurgi")||t.includes("opérat")||t.includes("intervent")) return "🔬";
  if(t.includes("arrivée")) return "✈️";
  if(t.includes("départ")) return "🛫";
  if(t.includes("paiement")||t.includes("acompte")||t.includes("finance")) return "💶";
  if(t.includes("contrôle")||t.includes("suivi")) return "🩺";
  if(t.includes("whatsapp")) return "💬";
  if(t.includes("appel")) return "📞";
  if(t.includes("urgence")) return "🚨";
  if(t.includes("tâche")) return "✅";
  if(t.includes("visio")) return "🎥";
  if(t.includes("devis")) return "📄";
  if(t.includes("relance")) return "🔔";
  return "📅";
};

// ── TÂCHES ────────────────────────────────────────────────────────────────────
function Taches({user, taches, setTaches, patients, rdvs, hopitaux, syncing, setSyncing}) {
  const tt = t; // alias sûr : évite toute collision avec les variables locales "t" (tâches)
  const [tab,setTab] = useState("mes");
  const [kanban,setKanban] = useState(false);
  const [showForm,setShowForm] = useState(false);
  const [editTache,setEditTache] = useState(null);   // tâche en cours d'édition (modal complet)
  const [detailTache,setDetailTache] = useState(null); // tâche affichée en détail
  const [menu,setMenu] = useState(null);             // menu contextuel {x,y,tache}
  const [saveMsg,setSaveMsg] = useState("");
  const [q,setQ] = useState("");
  const [filterPrio,setFilterPrio] = useState("Tous");
  const [f,setF] = useState({titre:"",description:"",assigneA:user.id,priorite:"Normale",echeance:"",heure:"",statut:"En cours",categorie:"",couleur:"",patientId:""});
  const ch = (k,v) => setF(x=>({...x,[k]:v}));
  const inp = {width:"100%",padding:"9px 11px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:"none",background:C.bg,boxSizing:"border-box"};
  const lbl = {fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4};

  const patientsList = patients || [];
  const rdvsList = rdvs || [];
  const hopitauxNames = (hopitaux && hopitaux.length ? hopitaux.map(h=>h.nom) : HOPITAUX_LIST);
  const canEdit = (t) => user.role==="admin" || t.creePar===user.id || t.assigneA===user.id;

  const flash = (m) => { setSaveMsg(m); setTimeout(()=>setSaveMsg(""),2500); };

  // ── ACTIONS (toutes synchronisent état partagé + cache + Google Sheets, sans reload) ──
  const addTache = async () => {
    if(!f.titre.trim()){ alert("Le titre est obligatoire !"); return; }
    const {date} = nowParts();
    const n = {...f, id:uid(), creePar:user.id, cree:date, statut:f.statut||"En cours", historique:JSON.stringify([])};
    setTaches(ts=>{const nt=[...ts,n];cache.save("taches",nt);return nt;});
    setSyncing(true);
    try { await api.post("taches","add",n); } catch(e){ console.error("Tache add error:",e); }
    setSyncing(false);
    setShowForm(false);
    setF({titre:"",description:"",assigneA:user.id,priorite:"Normale",echeance:"",heure:"",statut:"En cours",categorie:"",couleur:"",patientId:""});
    flash("✅ Tâche créée");
  };

  // Applique un changement partiel avec historique (utilisé par toggle / reporter / réassigner)
  const applyChange = async (t, changes, msg) => {
    const updated = {...t, ...changes};
    updated.historique = buildHistorique(t, updated, user);
    setTaches(ts=>{const nt=ts.map(x=>x.id===t.id?updated:x);cache.save("taches",nt);return nt;});
    setDetailTache(d=> d&&d.id===t.id ? updated : d);
    setSyncing(true);
    try { await api.post("taches","update",updated); } catch(e){ console.error("Tache update error:",e); }
    setSyncing(false);
    if(msg) flash(msg);
    return updated;
  };

  const toggleStatut   = (t)        => applyChange(t,{statut: t.statut==="Terminée"?"En cours":"Terminée"}, t.statut==="Terminée"?"↩️ Tâche rouverte":"✅ Tâche terminée");
  const reporterTache  = (t,d,l)    => applyChange(t,{echeance: addDaysStr(t.echeance,d)}, `📅 Reportée — ${l}`);
  const reassignTache  = (t,uid2)   => applyChange(t,{assigneA: uid2}, `👤 Réassignée à ${USERS.find(u=>u.id===uid2)?.prenom||""}`);

  // Modal complet : on calcule l'historique vs la version d'origine
  const updateTache = async (updated) => {
    const orig = taches.find(x=>x.id===updated.id) || updated;
    const withHist = {...updated, historique: buildHistorique(orig, updated, user)};
    setSyncing(true);
    try {
      setTaches(ts=>{const nt=ts.map(x=>x.id===withHist.id?withHist:x);cache.save("taches",nt);return nt;});
      await api.post("taches","update",withHist);
      setEditTache(null);
      setDetailTache(d=> d&&d.id===withHist.id ? withHist : d);
      flash("✅ Tâche enregistrée");
    } catch(e) { flash("❌ Erreur lors de l'enregistrement"); }
    setSyncing(false);
  };

  const duplicateTache = async (t) => {
    const {date} = nowParts();
    const copy = {...t, id:uid(), titre:(t.titre||"Tâche")+" (copie)", statut:"En cours", creePar:user.id, cree:date, historique:JSON.stringify([])};
    setTaches(ts=>{const nt=[...ts,copy];cache.save("taches",nt);return nt;});
    setSyncing(true);
    try { await api.post("taches","add",copy); } catch(e){}
    setSyncing(false);
    setMenu(null);
    flash("📋 Tâche dupliquée");
  };

  const deleteTache = async (id, skipConfirm) => {
    if(!skipConfirm && !window.confirm("Supprimer cette tâche ?")) return;
    setTaches(ts=>{const nt=ts.filter(t=>t.id!==id);cache.save("taches",nt);return nt;});
    setSyncing(true);
    try { await api.post("taches","delete",{id}); } catch(e){}
    setSyncing(false);
    setMenu(null); setDetailTache(null); setEditTache(null);
    flash("🗑 Tâche supprimée");
  };

  const openMenu = (e, t) => {
    e.preventDefault(); e.stopPropagation();
    setMenu({x:e.clientX||e.pageX||120, y:e.clientY||e.pageY||120, tache:t});
  };

  // ── Filtrage / affichage ──
  const base = tab==="mes" ? taches.filter(t=>t.assigneA===user.id) : taches;
  const mesCount = taches.filter(t=>t.assigneA===user.id).length;
  const displayTaches = base.filter(t=>{
    const okQ = !q || `${t.titre||""} ${t.description||""} ${t.categorie||""}`.toLowerCase().includes(q.toLowerCase());
    const okP = filterPrio==="Tous" || t.priorite===filterPrio;
    return okQ && okP;
  });

  // ── Ligne de tâche (liste) avec clic = détail, double-clic = édition, clic droit = menu ──
  const TacheItem = ({t}) => {
    const clickTimer = React.useRef(null);
    const assignee = USERS.find(u=>u.id===t.assigneA);
    const patient = patientsList.find(p=>p.id===t.patientId);
    const done = t.statut==="Terminée";
    const accent = t.couleur || (t.priorite==="Haute"?C.red:t.priorite==="Basse"?C.muted:C.amber);
    const isLate = t.echeance && normalizeDate(t.echeance) && normalizeDate(t.echeance)<todayStr() && !done;

    const handleClick = () => {
      if(clickTimer.current) return;
      clickTimer.current = setTimeout(()=>{ clickTimer.current=null; setDetailTache(t); }, 230);
    };
    const handleDouble = () => {
      if(clickTimer.current){ clearTimeout(clickTimer.current); clickTimer.current=null; }
      if(canEdit(t)) setEditTache({...t});
    };

    return (
      <div onClick={handleClick} onDoubleClick={handleDouble} onContextMenu={e=>openMenu(e,t)}
        style={{display:"flex",gap:10,alignItems:"flex-start",padding:"11px 4px 11px 10px",borderBottom:`1px solid ${C.bg}`,opacity:done?0.55:1,borderLeft:`3px solid ${accent}`,borderRadius:6,cursor:"pointer",transition:"background 0.12s"}}
        onMouseEnter={e=>e.currentTarget.style.background="#fafbfd"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <button onClick={e=>{e.stopPropagation();toggleStatut(t);}} style={{width:20,height:20,borderRadius:99,border:`2px solid ${done?C.green:accent}`,background:done?C.green:"transparent",cursor:"pointer",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontSize:11}}>
          {done?"✓":""}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:13,color:C.text,textDecoration:done?"line-through":"none"}}>{t.titre}</div>
          {t.description&&<div style={{fontSize:11,color:C.muted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.description}</div>}
          <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
            {t.echeance&&<span style={{fontSize:10,color:isLate?C.red:C.muted,fontWeight:isLate?700:400}}>📅 {normalizeDate(t.echeance)||t.echeance}{t.heure?` · ${normalizeHeure(t.heure)}`:""}{isLate?" ⚠️":""}</span>}
            {t.categorie&&<span style={{fontSize:9,fontWeight:700,color:C.cyan,background:C.cyan+"15",padding:"1px 7px",borderRadius:99}}>{t.categorie}</span>}
            {patient&&<span style={{fontSize:9,fontWeight:700,color:C.purple,background:C.purple+"12",padding:"1px 7px",borderRadius:99}}>👤 {patient.prenom}</span>}
            {tab==="groupe"&&assignee&&<span style={{fontSize:10,color:assignee.color,fontWeight:700}}>· {assignee.prenom}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:2,alignItems:"center",flexShrink:0}}>
          <Badge text={priorityLabel(t.priorite||"Normale")} color={t.priorite==="Haute"?C.red:t.priorite==="Basse"?C.muted:C.amber} small/>
          {canEdit(t)&&<button onClick={e=>{e.stopPropagation();setEditTache({...t});}} style={{border:"none",background:"none",cursor:"pointer",color:C.blue,fontSize:14,padding:"2px 4px"}} title={tt("common.edit")}>✏️</button>}
          <button onClick={e=>openMenu(e,t)} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:16,padding:"2px 4px",lineHeight:1}} title="Plus d'actions">⋮</button>
        </div>
      </div>
    );
  };

  return (
    <div>
      {/* Onglets */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <button onClick={()=>setTab("mes")} style={{flex:1,padding:"9px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,background:tab==="mes"?user.color:C.bg,color:tab==="mes"?C.white:C.muted}}>
          👤 Mes ({mesCount})
        </button>
        <button onClick={()=>setTab("groupe")} style={{flex:1,padding:"9px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,background:tab==="groupe"?user.color:C.bg,color:tab==="groupe"?C.white:C.muted}}>
          👥 Équipe ({taches.length})
        </button>
        <button onClick={()=>setKanban(x=>!x)} title={kanban?"Vue liste":"Vue Kanban"} style={{padding:"9px 12px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,background:kanban?C.navy:C.bg,color:kanban?C.white:C.muted}}>
          {kanban?"📋":"🗂️"}
        </button>
      </div>

      {/* Recherche + filtre priorité */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input style={{flex:1,padding:"8px 12px",border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:C.white}} placeholder={"🔍 "+t("task.searchPlaceholder")} value={q} onChange={e=>setQ(e.target.value)}/>
        <select style={{padding:"8px 10px",border:`1px solid ${C.border}`,borderRadius:10,fontSize:12,color:C.muted,background:C.white,outline:"none"}} value={filterPrio} onChange={e=>setFilterPrio(e.target.value)}>
          {["Tous","Haute","Normale","Basse"].map(p=><option key={p}>{p}</option>)}
        </select>
      </div>

      <button onClick={()=>setShowForm(x=>!x)} style={{width:"100%",padding:"11px",border:"none",borderRadius:10,background:user.color,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13,marginBottom:14}}>
        + Nouvelle tâche
      </button>

      {/* Formulaire de création */}
      {showForm&&<Card>
        <div style={{marginBottom:12}}><label style={lbl}>Titre *</label><input style={inp} value={f.titre} onChange={e=>ch("titre",e.target.value)} placeholder={t("task.titlePlaceholder")}/></div>
        <div style={{marginBottom:12}}><label style={lbl}>Description</label><textarea style={{...inp,minHeight:56,resize:"vertical",fontFamily:"inherit"}} value={f.description} onChange={e=>ch("description",e.target.value)} placeholder={t("task.descriptionPlaceholder")}/></div>
        <div style={{marginBottom:12}}><label style={lbl}>👤 Patient lié</label>
          <select style={inp} value={f.patientId||""} onChange={e=>ch("patientId",e.target.value)}>
            <option value="">{t("task.noPatient")}</option>
            {patientsList.map(p=><option key={p.id} value={p.id}>{p.prenom} {p.nom}</option>)}
          </select>
        </div>
        {user.role==="admin"&&<div style={{marginBottom:12}}><label style={lbl}>{tt("task.assignTo")}</label>
          <select style={inp} value={f.assigneA} onChange={e=>ch("assigneA",e.target.value)}>
            {USERS.map(u=><option key={u.id} value={u.id}>{u.prenom} — {ROLE_LABELS[u.role]}</option>)}
          </select>
        </div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div><label style={lbl}>{tt("rdv.priority")}</label>
            <select style={inp} value={f.priorite} onChange={e=>ch("priorite",e.target.value)}>
              {["Haute","Normale","Basse"].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div><label style={lbl}>{tt("task.category")}</label>
            <select style={inp} value={f.categorie||""} onChange={e=>ch("categorie",e.target.value)}>
              <option value="">—</option>
              {TACHE_CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div><label style={lbl}>{tt("task.deadline")}</label><input style={inp} type="date" value={f.echeance} onChange={e=>ch("echeance",e.target.value)}/></div>
          <div><label style={lbl}>Heure</label><input style={inp} type="time" value={f.heure} onChange={e=>ch("heure",e.target.value)}/></div>
        </div>
        <div style={{marginBottom:14}}><label style={lbl}>Couleur</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {TACHE_COULEURS.map(c=>(
              <button key={c.val} onClick={()=>ch("couleur", f.couleur===c.val?"":c.val)} title={c.nom} style={{width:30,height:30,borderRadius:8,background:c.val,border:f.couleur===c.val?`3px solid ${C.text}`:`2px solid ${C.white}`,boxShadow:`0 0 0 1px ${C.border}`,cursor:"pointer"}}/>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setShowForm(false)} style={{flex:1,padding:10,border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted}}>{t("common.cancel")}</button>
          <button onClick={addTache} style={{flex:2,padding:10,border:"none",borderRadius:10,background:user.color,color:C.white,cursor:"pointer",fontWeight:800}}>{tt("task.create")}</button>
        </div>
      </Card>}

      {/* Vue Kanban */}
      {kanban?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{id:"En cours",label:"En cours",color:C.blue,icon:"⚡"},{id:"En attente",label:"Attente",color:C.amber,icon:"⏳"},{id:"Terminée",label:"Terminé",color:C.green,icon:"✅"}].map(col=>{
            const colTaches=displayTaches.filter(t=>t.statut===col.id);
            return (
              <div key={col.id}>
                <div style={{background:col.color+"15",border:`1px solid ${col.color}33`,borderRadius:10,padding:"8px 10px",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:12}}>{col.icon}</span>
                  <span style={{fontSize:11,fontWeight:700,color:col.color}}>{col.label}</span>
                  <span style={{marginLeft:"auto",background:col.color,color:C.white,borderRadius:99,minWidth:18,height:18,padding:"0 5px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{colTaches.length}</span>
                </div>
                {colTaches.map(t=>{
                  const isLate=t.echeance&&normalizeDate(t.echeance)&&normalizeDate(t.echeance)<todayStr()&&t.statut!=="Terminée";
                  const accent=t.couleur||(t.priorite==="Haute"?C.red:t.priorite==="Basse"?C.muted:C.amber);
                  return (
                    <div key={t.id} onClick={()=>setDetailTache(t)} onDoubleClick={()=>canEdit(t)&&setEditTache({...t})} onContextMenu={e=>openMenu(e,t)}
                      style={{background:C.white,borderRadius:10,padding:"10px",marginBottom:6,border:`1px solid ${C.border}`,borderLeft:`3px solid ${accent}`,cursor:"pointer"}}>
                      <div style={{fontWeight:700,fontSize:11,color:C.text,marginBottom:4,lineHeight:1.4}}>{t.titre}</div>
                      {t.echeance&&<div style={{fontSize:9,color:isLate?C.red:C.muted,marginBottom:4}}>📅 {(normalizeDate(t.echeance)||t.echeance).slice(5)}{isLate?" ⚠️":""}</div>}
                      <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>
                        {col.id!=="En cours"&&<button onClick={e=>{e.stopPropagation();applyChange(t,{statut:"En cours"});}} style={{border:"none",background:C.blue+"18",color:C.blue,borderRadius:5,padding:"2px 5px",fontSize:9,cursor:"pointer",fontWeight:700}}>▶</button>}
                        {col.id!=="Terminée"&&<button onClick={e=>{e.stopPropagation();applyChange(t,{statut:"Terminée"});}} style={{border:"none",background:C.green+"18",color:C.green,borderRadius:5,padding:"2px 5px",fontSize:9,cursor:"pointer",fontWeight:700}}>✓</button>}
                        <button onClick={e=>openMenu(e,t)} style={{border:"none",background:"none",color:C.muted,fontSize:13,cursor:"pointer",marginLeft:"auto",lineHeight:1}}>⋮</button>
                      </div>
                    </div>
                  );
                })}
                {colTaches.length===0&&<div style={{textAlign:"center",padding:"14px 4px",color:C.muted,fontSize:10}}>—</div>}
              </div>
            );
          })}
        </div>
      ):(
        <>
          {displayTaches.length===0?<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Aucune tâche {q||filterPrio!=="Tous"?"trouvée":". Créez-en une !"}</div>:
          <Card style={{padding:"6px 10px"}}>
            {displayTaches.map(t=><TacheItem key={t.id} t={t}/>)}
          </Card>}
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>{displayTaches.length} tâche(s) · 💡 clic = détail · double-clic = modifier · clic droit = menu</div>
        </>
      )}

      {/* Toast de confirmation */}
      {saveMsg&&<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:saveMsg.startsWith("❌")?C.red:C.navy,color:C.white,padding:"10px 20px",borderRadius:99,fontSize:13,fontWeight:700,zIndex:1300,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",whiteSpace:"nowrap"}}>
        {saveMsg}
      </div>}

      {/* Menu contextuel (clic droit / bouton ⋮) */}
      {menu&&<TacheActionSheet menu={menu} user={user} onClose={()=>setMenu(null)}
        onEdit={(t)=>{setMenu(null);if(canEdit(t))setEditTache({...t});}}
        onDuplicate={duplicateTache}
        onReport={(t,d,l)=>{reporterTache(t,d,l);setMenu(null);}}
        onAssign={(t,uid2)=>{reassignTache(t,uid2);setMenu(null);}}
        onToggle={(t)=>{toggleStatut(t);setMenu(null);}}
        onDelete={(t)=>deleteTache(t.id)}/>}

      {/* Détail de la tâche */}
      {detailTache&&<ModalDetailTache user={user} tache={detailTache} patients={patientsList} rdvs={rdvsList}
        onClose={()=>setDetailTache(null)}
        onEdit={(t)=>{setDetailTache(null);if(canEdit(t))setEditTache({...t});}}
        onDuplicate={(t)=>{duplicateTache(t);setDetailTache(null);}}
        onReport={(t,d,l)=>reporterTache(t,d,l)}
        onAssign={(t,uid2)=>reassignTache(t,uid2)}
        onToggle={(t)=>toggleStatut(t)}
        onDelete={(t)=>deleteTache(t.id)}/>}

      {/* Modal d'édition complet */}
      {editTache&&<ModalEditTache user={user} tache={editTache} patients={patientsList} rdvs={rdvsList} hopitauxNames={hopitauxNames}
        onSave={updateTache} onClose={()=>setEditTache(null)}
        onDuplicate={(t)=>{duplicateTache(t);setEditTache(null);}}
        onDelete={(t)=>deleteTache(t.id)}/>}
    </div>
  );
}

// ── MENU CONTEXTUEL TÂCHE (clic droit / ⋮) ───────────────────────────────────
function TacheActionSheet({menu, user, onClose, onEdit, onDuplicate, onReport, onAssign, onToggle, onDelete}) {
  const tt = tr; // alias sûr — "t" local ci-dessous est la TÂCHE, pas la fonction de traduction
  const t = menu.tache;
  const [sub,setSub] = useState(null); // "report" | "assign"
  const mobile = typeof window!=="undefined" && window.innerWidth < 560;
  const done = t.statut==="Terminée";
  const canAssign = user.role==="admin";
  useEffect(()=>{
    const onKey = e => { if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[]);
  const item = (icon,label,onClick,danger) => (
    <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 14px",border:"none",background:"none",cursor:"pointer",fontSize:14,fontWeight:600,color:danger?C.red:C.text,textAlign:"left",borderRadius:10}}
      onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background="none"}>
      <span style={{fontSize:15,width:20,textAlign:"center"}}>{icon}</span>{label}
    </button>
  );
  const cardStyle = mobile
    ? {position:"fixed",left:0,right:0,bottom:0,background:C.white,borderRadius:"18px 18px 0 0",padding:"8px 8px 22px",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)",maxHeight:"82vh",overflowY:"auto"}
    : {position:"fixed",top:Math.max(8,Math.min(menu.y,(window.innerHeight-340))),left:Math.max(8,Math.min(menu.x,(window.innerWidth-238))),width:222,background:C.white,borderRadius:14,padding:6,boxShadow:"0 12px 40px rgba(0,0,0,0.25)",border:`1px solid ${C.border}`};
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:1250,background:mobile?"rgba(11,31,58,0.4)":"transparent"}}>
      <div onClick={e=>e.stopPropagation()} className={mobile?"slide-up":"card-enter"} style={cardStyle}>
        {mobile&&<div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"8px auto 10px"}}/>}
        <div style={{padding:"4px 14px 8px",fontSize:12,fontWeight:800,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.titre}</div>
        {sub===null&&<>
          {item("✏️","Modifier",()=>onEdit(t))}
          {item("📋","Dupliquer",()=>onDuplicate(t))}
          {item("📅","Reporter…",()=>setSub("report"))}
          {canAssign&&item("👤","Affecter à…",()=>setSub("assign"))}
          {item(done?"↩️":"✅", done?"Rouvrir":"Marquer terminée",()=>onToggle(t))}
          <div style={{height:1,background:C.bg,margin:"4px 8px"}}/>
          {item("🗑","Supprimer",()=>onDelete(t),true)}
        </>}
        {sub==="report"&&<>
          {item("←","Retour",()=>setSub(null))}
          {item("📅","À demain",()=>onReport(t,1,"demain"))}
          {item("📅","Dans 3 jours",()=>onReport(t,3,"+3 jours"))}
          {item("📅","Dans 1 semaine",()=>onReport(t,7,"+1 semaine"))}
        </>}
        {sub==="assign"&&<>
          {item("←","Retour",()=>setSub(null))}
          {USERS.map(u=>item(u.prenom[0], `${u.prenom} — ${ROLE_LABELS[u.role]}`, ()=>onAssign(t,u.id)))}
        </>}
      </div>
    </div>
  );
}

// ── DÉTAIL TÂCHE (clic simple) ───────────────────────────────────────────────
function ModalDetailTache({user, tache, patients, rdvs, onClose, onEdit, onDuplicate, onReport, onAssign, onToggle, onDelete}) {
  const tt = tr; // alias sûr — "t" local ci-dessous est la TÂCHE, pas la fonction de traduction
  const t = tache;
  const [showHist,setShowHist] = useState(false);
  const [reportMode,setReportMode] = useState(false);
  const [assignMode,setAssignMode] = useState(false);
  const assignee = USERS.find(u=>u.id===t.assigneA);
  const patient = patients.find(p=>p.id===t.patientId);
  const rdv = (rdvs||[]).find(r=>r.id===t.rdvId);
  const hist = parseHist(t.historique).slice().reverse();
  const done = t.statut==="Terminée";
  const accent = t.couleur || (t.priorite==="Haute"?C.red:t.priorite==="Basse"?C.muted:C.amber);
  const canAct = user.role==="admin" || t.creePar===user.id || t.assigneA===user.id;

  const histLabel = (champ,val) => {
    if(champ==="assigneA"){const u=USERS.find(x=>x.id===val);return u?u.prenom:(val||"—");}
    if(champ==="patientId"){const p=patients.find(x=>x.id===val);return p?`${p.prenom} ${p.nom}`:(val||"—");}
    return val===""||val==null?"—":String(val);
  };
  const Row = ({icon,label,value}) => value?(
    <div style={{display:"flex",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.bg}`}}>
      <span style={{width:22,fontSize:14,textAlign:"center"}}>{icon}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.04em"}}>{label}</div>
        <div style={{fontSize:13,color:C.text,fontWeight:600,marginTop:1,wordBreak:"break-word"}}>{value}</div>
      </div>
    </div>
  ):null;
  const actBtn = {flex:1,minWidth:"30%",padding:"10px 6px",borderRadius:10,border:`1px solid ${C.border}`,background:C.white,cursor:"pointer",fontSize:12,fontWeight:700,color:C.text};

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.7)",zIndex:1100,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div onClick={e=>e.stopPropagation()} className="slide-up" style={{background:C.bg,borderRadius:"20px 20px 0 0",padding:"8px 20px 28px",width:"100%",maxWidth:520,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
        <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"12px auto 18px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,gap:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
              <span style={{width:12,height:12,borderRadius:4,background:accent,display:"inline-block"}}/>
              <Badge text={priorityLabel(t.priorite||"Normale")} color={t.priorite==="Haute"?C.red:t.priorite==="Basse"?C.muted:C.amber} small/>
              <Badge text={t.statut||"En cours"} color={done?C.green:t.statut==="En attente"?C.amber:C.blue} small/>
              {t.categorie&&<Badge text={t.categorie} color={C.cyan} small/>}
            </div>
            <div style={{fontSize:18,fontWeight:800,color:C.text,textDecoration:done?"line-through":"none"}}>{t.titre}</div>
          </div>
          <button onClick={onClose} style={{border:"none",background:C.border,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14,flexShrink:0}}>✕</button>
        </div>

        <div style={{background:C.white,borderRadius:14,padding:"6px 14px",marginBottom:12}}>
          <Row icon="📝" label="Description" value={t.description}/>
          <Row icon="👤" label="Patient lié" value={patient?`${patient.prenom} ${patient.nom}`:null}/>
          <Row icon="📅" label="RDV lié" value={rdv?`${rdv.type||"RDV"} — ${normalizeDate(rdv.date)||""} ${normalizeHeure(rdv.heure)||""}`:null}/>
          <Row icon="🩺" label="Médecin" value={t.medecin}/>
          <Row icon="🏥" label="Hôpital" value={t.hopital}/>
          <Row icon="👥" label="Responsable" value={assignee?`${assignee.prenom} — ${ROLE_LABELS[assignee.role]}`:null}/>
          <Row icon="📆" label="Échéance" value={t.echeance?`${normalizeDate(t.echeance)||t.echeance}${t.heure?` à ${normalizeHeure(t.heure)}`:""}`:null}/>
          <Row icon="🔔" label="Rappel" value={(TACHE_RAPPELS.find(r=>r.v===t.rappel)||{}).l && t.rappel ? (TACHE_RAPPELS.find(r=>r.v===t.rappel)||{}).l : null}/>
          <Row icon="🗒️" label="Notes internes" value={t.notes}/>
          <Row icon="🕐" label="Créée le" value={t.cree?normalizeDate(t.cree)||t.cree:null}/>
        </div>

        {/* Actions rapides */}
        {canAct&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
          <button style={{...actBtn,background:C.green,color:C.white,border:"none"}} onClick={()=>onToggle(t)}>{done?"↩️ Rouvrir":"✅ Terminer"}</button>
          <button style={actBtn} onClick={()=>onEdit(t)}>✏️ Modifier</button>
          <button style={actBtn} onClick={()=>onDuplicate(t)}>📋 Dupliquer</button>
          <button style={actBtn} onClick={()=>setReportMode(x=>!x)}>📅 Reporter</button>
          {user.role==="admin"&&<button style={actBtn} onClick={()=>setAssignMode(x=>!x)}>👤 Réassigner</button>}
          <button style={{...actBtn,color:C.red,borderColor:C.red+"55"}} onClick={()=>onDelete(t)}>🗑 Supprimer</button>
        </div>}

        {reportMode&&<div style={{background:C.white,borderRadius:12,padding:12,marginBottom:12,display:"flex",gap:8,flexWrap:"wrap"}}>
          {[{d:1,l:"Demain"},{d:3,l:"+3 jours"},{d:7,l:"+1 semaine"}].map(o=>(
            <button key={o.d} onClick={()=>{onReport(t,o.d,o.l.toLowerCase());setReportMode(false);}} style={{flex:1,padding:"9px",borderRadius:10,border:`1px solid ${C.blue}55`,background:C.blue+"10",color:C.blue,fontWeight:700,fontSize:12,cursor:"pointer"}}>{o.l}</button>
          ))}
        </div>}

        {assignMode&&<div style={{background:C.white,borderRadius:12,padding:12,marginBottom:12,display:"flex",gap:8}}>
          {USERS.map(u=>(
            <button key={u.id} onClick={()=>{onAssign(t,u.id);setAssignMode(false);}} style={{flex:1,padding:"9px 4px",borderRadius:10,border:`1.5px solid ${t.assigneA===u.id?u.color:C.border}`,background:t.assigneA===u.id?u.color+"12":C.white,color:t.assigneA===u.id?u.color:C.muted,fontWeight:700,fontSize:11,cursor:"pointer"}}>
              <div style={{fontWeight:800,fontSize:15}}>{u.prenom[0]}</div>{u.prenom}
            </button>
          ))}
        </div>}

        {/* Historique des modifications */}
        <div style={{background:C.white,borderRadius:14,padding:14}}>
          <button onClick={()=>setShowHist(x=>!x)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",border:"none",background:"none",cursor:"pointer",padding:0}}>
            <span style={{fontSize:13,fontWeight:800,color:C.text}}>📜 Historique des modifications</span>
            <span style={{marginLeft:"auto",background:C.bg,borderRadius:99,padding:"1px 8px",fontSize:11,fontWeight:700,color:C.muted}}>{hist.length}</span>
            <span style={{fontSize:11,color:C.muted}}>{showHist?"▲":"▼"}</span>
          </button>
          {showHist&&<div style={{marginTop:12}}>
            {hist.length===0?<div style={{fontSize:12,color:C.muted,textAlign:"center",padding:"10px 0"}}>{tt("team.noModification")}</div>:
            hist.map((h,i)=>{
              const u=USERS.find(x=>x.id===h.u);
              return (
                <div key={i} style={{display:"flex",gap:10,padding:"9px 0",borderBottom:i<hist.length-1?`1px solid ${C.bg}`:"none"}}>
                  <div style={{width:6,height:6,borderRadius:99,background:u?.color||C.muted,marginTop:6,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:C.text}}>
                      <b>{TACHE_FIELD_LABELS[h.champ]||h.champ}</b> :{" "}
                      <span style={{color:C.muted,textDecoration:"line-through"}}>{histLabel(h.champ,h.ancien)}</span>
                      {" → "}<span style={{color:C.green,fontWeight:700}}>{histLabel(h.champ,h.nouveau)}</span>
                    </div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>{u?.prenom||h.u} · {h.date} à {h.heure}</div>
                  </div>
                </div>
              );
            })}
          </div>}
        </div>
      </div>
    </div>
  );
}

// ── MODAL MODIFICATION TÂCHE (complet) ───────────────────────────────────────
function ModalEditTache({user, tache, patients, rdvs, hopitauxNames, onSave, onClose, onDuplicate, onDelete}) {
  const tt = t; // alias sûr
  const [f, setF] = useState({...tache});
  const [saving, setSaving] = useState(false);
  const [showHist,setShowHist] = useState(false);
  const ch = (k,v) => setF(x=>({...x,[k]:v}));
  const inp = {width:"100%",padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:"#F8FAFC",boxSizing:"border-box",color:C.text};
  const lbl = {fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:5};

  const rdvLabel = (r) => {
    const p = patients.find(x=>x.id===r.patientId);
    return `${r.type||"RDV"} — ${normalizeDate(r.date)||""} ${normalizeHeure(r.heure)||""}${p?` · ${p.prenom}`:""}`;
  };
  // RDV proposés : ceux du patient lié en premier, sinon tous
  const rdvOptions = (rdvs||[]).slice().sort((a,b)=> (f.patientId? ((b.patientId===f.patientId)-(a.patientId===f.patientId)) : 0) || String(normalizeDate(b.date)).localeCompare(String(normalizeDate(a.date))));
  const hist = parseHist(tache.historique).slice().reverse();
  const histLabel = (champ,val) => {
    if(champ==="assigneA"){const u=USERS.find(x=>x.id===val);return u?u.prenom:(val||"—");}
    if(champ==="patientId"){const p=patients.find(x=>x.id===val);return p?`${p.prenom} ${p.nom}`:(val||"—");}
    return val===""||val==null?"—":String(val);
  };

  const handleSave = async () => {
    if(!f.titre?.trim()){alert("Le titre est obligatoire !");return;}
    setSaving(true);
    await onSave(f);
    setSaving(false);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.7)",zIndex:1150,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div className="slide-up" style={{background:C.bg,borderRadius:"20px 20px 0 0",padding:"8px 20px 28px",width:"100%",maxWidth:520,maxHeight:"94vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
        <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"12px auto 18px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{tt("task.edit")}</div>
            <div style={{fontSize:17,fontWeight:800,color:C.text,marginTop:2}}>✏️ {tache.titre}</div>
          </div>
          <button onClick={onClose} style={{border:"none",background:C.border,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>✕</button>
        </div>

        {/* Titre + description */}
        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{marginBottom:10}}>
            <label style={lbl}>Titre *</label>
            <input style={inp} value={f.titre||""} onChange={e=>ch("titre",e.target.value)} placeholder={t("task.titlePlaceholder")}/>
          </div>
          <div>
            <label style={lbl}>Description</label>
            <textarea style={{...inp,minHeight:60,resize:"vertical",fontFamily:"inherit"}} value={f.description||""} onChange={e=>ch("description",e.target.value)} placeholder={t("task.detailsPlaceholder")}/>
          </div>
        </div>

        {/* Patient + RDV liés */}
        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{marginBottom:10}}>
            <label style={lbl}>👤 Patient lié</label>
            <select style={inp} value={f.patientId||""} onChange={e=>ch("patientId",e.target.value)}>
              <option value="">{t("task.noPatient")}</option>
              {patients.map(p=><option key={p.id} value={p.id}>{p.prenom} {p.nom}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>📅 Rendez-vous lié</label>
            <select style={inp} value={f.rdvId||""} onChange={e=>ch("rdvId",e.target.value)}>
              <option value="">{t("rdv.none")}</option>
              {rdvOptions.map(r=><option key={r.id} value={r.id}>{rdvLabel(r)}</option>)}
            </select>
          </div>
        </div>

        {/* Médecin + Hôpital */}
        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{marginBottom:10}}>

            <label style={lbl}>🏥 Hôpital</label>

            <div style={{display:"flex",gap:8}}>
              {USERS.map(u=>(

                  {s.v}

              ))}

          </div>

              {TACHE_CATEGORIES.map(c=><option key={c}>{c}</option>)}

          </div>
          <div>
            <label style={lbl}>🎨 Couleur</label>

        {/* Boutons secondaires : Dupliquer / Supprimer */}
        <div style={{display:"flex",gap:10,marginBottom:10}}>

          <button onClick={()=>onDelete(tache)} style={{flex:1,padding:11,border:`1px solid ${C.red}55`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.red,fontSize:13}}>🗑 Supprimer</button>

    </div>
  );
}

// ── FICHE PATIENT ─────────────────────────────────────────────────────────────
// ── CORRECTION DES DATES (administrateur) ────────────────────────────────────
function CorrigerDatesModal({patient, rdvs, onClose, onSavePatient, onUpdateRdv}) {
  const pRdvs = (rdvs||[]).filter(r=>String(r.patientId)===String(patient.id))
    .sort((a,b)=>(normalizeDate(a.date)||"").localeCompare(normalizeDate(b.date)||""));
  const firstRdv = pRdvs[0] || null;
  const [f,setF] = useState({
    dateArrivee: normalizeDate(patient.dateArrivee) || "",
    cree:        normalizeDate(patient.cree) || "",
    dateOperation: normalizeDate(patient.dateOperation) || "",
    dateDevis:   normalizeDate(patient.dateDevis) || "",
    rdv1:        firstRdv ? (normalizeDate(firstRdv.date) || "") : "",
  });
  const ch = (k,v)=>setF(x=>({...x,[k]:v}));
  const inp = {width:"100%",padding:"11px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:14,outline:"none",background:"#F8FAFC",boxSizing:"border-box",color:C.text};

  const champs = [
    {k:"dateArrivee", l:"✈️ Date d'arrivée", orig:patient.dateArrivee},
    {k:"cree",        l:"📅 Date de création", orig:patient.cree},
    {k:"dateOperation", l:"🔪 Date d'opération", orig:patient.dateOperation},
    {k:"rdv1",        l:"🗓️ Premier rendez-vous", orig:firstRdv?firstRdv.date:"", disabled:!firstRdv},
    {k:"dateDevis",   l:"📄 Date du devis", orig:patient.dateDevis},
  ];

  const save = () => {
    // Met à jour le patient (dates normalisées ou vidées)
    const updated = {...patient,
      dateArrivee: f.dateArrivee || "",
      cree: f.cree || "",
      dateOperation: f.dateOperation || "",
      dateDevis: f.dateDevis || "",
    };
    onSavePatient(updated);
    // Met à jour le premier RDV si la date a changé
    if(firstRdv && f.rdv1 && f.rdv1 !== normalizeDate(firstRdv.date)){
      onUpdateRdv && onUpdateRdv({...firstRdv, date:f.rdv1});
    }
    onClose();
  };

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.7)",zIndex:1300,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div onClick={e=>e.stopPropagation()} className="slide-up" style={{background:C.bg,borderRadius:"20px 20px 0 0",padding:"8px 18px 26px",width:"100%",maxWidth:480,maxHeight:"94vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
        <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"12px auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:17,fontWeight:800,color:C.text}}>🛠 Corriger les dates</div>
          <button onClick={onClose} style={{border:"none",background:C.border,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>{patient.prenom} {patient.nom} — corrigez chaque date au calendrier. Les valeurs invalides sont signalées.</div>

        <div style={{background:C.white,borderRadius:14,padding:14}}>
          {champs.map((c,i)=>{
            const needsFix = !c.disabled && c.orig && !isCRMDateValid(c.orig);
            const empty = !f[c.k];
            return (
              <div key={c.k} style={{marginBottom:i<champs.length-1?14:0}}>
                <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                  {c.l}
                  {needsFix&&<span style={{color:C.red,fontSize:10,fontWeight:800}}>⚠️ à corriger</span>}
                  {!needsFix&&empty&&!c.disabled&&<span style={{color:C.muted,fontSize:10}}>{t("common.notProvided")}</span>}
                </label>
                <input type="date" disabled={c.disabled} style={{...inp,opacity:c.disabled?0.5:1}} value={f[c.k]} onChange={e=>ch(c.k,e.target.value)}/>
                {c.disabled&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>{t("rdv.noneForPatient")}</div>}
              </div>
            );
          })}
        </div>

        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={onClose} style={{flex:1,padding:12,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted,fontSize:13}}>{t("common.cancel")}</button>
          <button onClick={save} style={{flex:2,padding:12,border:"none",borderRadius:12,background:C.green,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>✅ Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

        const autres = sorted.filter(f=>(f.methode||"")!==FIN_MODE_TRANSFER);
        const MoneyCard = ({f, showRef})=>(
          <Card key={f.id} style={{padding:"12px 14px",borderLeft:`3px solid ${f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <div style={{minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13,color:C.text}}>{f.type||"—"}</div>
                <div style={{fontSize:11,color:C.muted}}>{fmtDate(f.date)} · {f.methode||tt("finance.modeUnknown")}</div>
                {showRef&&f.notes&&<div style={{fontSize:11,color:C.navy,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🔖 {f.notes}</div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:15,color:f.type==="Remboursement"?C.red:f.statut==="Complété"?C.green:C.amber}}>{f.type==="Remboursement"?"−":""}{eurF(f.montant)}</div>
                <Badge text={finStatusLabel(f.statut)} color={f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber} small/>
              </div>
            </div>
          </Card>
        );
        return (
        <div>
          {/* Résumé financier (POSTE 1 : ligne virements — s'enrichira aux postes suivants) */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:14}}>
            <Card style={{padding:"10px 12px"}}><div style={{fontSize:10,color:C.muted,fontWeight:700}}>{tt("finance.totalAmount")}</div><div style={{fontSize:16,fontWeight:800,color:C.navy}}>{eurF(getPatientTotal(p))}</div></Card>
            <Card style={{padding:"10px 12px"}}><div style={{fontSize:10,color:C.muted,fontWeight:700}}>🏦 {tt("finance.transfersReceived")}</div><div style={{fontSize:16,fontWeight:800,color:C.green}}>{eurF(totalVirements)}</div></Card>
            <Card style={{padding:"10px 12px"}}><div style={{fontSize:10,color:C.muted,fontWeight:700}}>{tt("finance.totalReceived")}</div><div style={{fontSize:16,fontWeight:800,color:C.green}}>{eurF(totalPaye)}</div></Card>
            <Card style={{padding:"10px 12px"}}><div style={{fontSize:10,color:C.muted,fontWeight:700}}>{tt("finance.remainingBalance")}</div><div style={{fontSize:16,fontWeight:800,color:restant>0?C.amber:C.green}}>{eurF(restant)}</div></Card>
          </div>
          {/* A.1 — Virements bancaires (l'argent patient commence ici) */}
          <div style={{fontSize:13,fontWeight:800,color:C.text,margin:"4px 0 8px"}}>🏦 {tt("finance.bankTransfers")} ({virements.length})</div>
          {virements.length===0
            ? <div style={{fontSize:12,color:C.muted,padding:"6px 0 14px"}}>{tt("common.noResult")}</div>
            : virements.map(f=><MoneyCard key={f.id} f={f} showRef/>)}
          {/* Autres mouvements (espèces & co — structurés au POSTE 2) */}
          {autres.length>0&&<div style={{fontSize:13,fontWeight:800,color:C.text,margin:"12px 0 8px"}}>💶 {tt("finance.otherMovements")} ({autres.length})</div>}
          {autres.map(f=><MoneyCard key={f.id} f={f}/>)}
          {pFin.length===0&&<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>{tt("common.noResult")}</div>}
        </div>
        );
      })()}
      {tab==="taches"&&<div>
        {pTaches.length===0?<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>{tt("task.none")}</div>:
        pTaches.map(tk=>(
          <Card key={tk.id} style={{padding:"12px 14px",borderLeft:`3px solid ${tk.priorite==="Haute"?C.red:C.amber}`}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{tk.titre}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{tk.description||"—"}</div>
            <div style={{display:"flex",gap:6,marginTop:6}}>
              <Badge text={taskStatusLabel(tk.statut)} color={tk.statut==="Terminée"?C.green:C.amber} small/>
              <Badge text={priorityLabel(tk.priorite||"Normale")} color={tk.priorite==="Haute"?C.red:C.muted} small/>
            </div>
          </Card>
        ))}
      </div>}
      {fixOpen&&<CorrigerDatesModal patient={p} rdvs={rdvs} onClose={()=>setFixOpen(false)} onSavePatient={onSavePatient} onUpdateRdv={onUpdateRdv}/>}
    </div>
  );
}

// ── RENDEZ-VOUS ───────────────────────────────────────────────────────────────
// ── RDV : FEUILLE "DÉPLACER" (modification rapide date/heure) ─────────────────
function MoveRdvSheet({r, onClose, onConfirm}) {
  const [d,setD] = useState(normalizeDate(r.date)||todayStr());
  const [h,setH] = useState(normalizeHeure(r.heure)||"10:00");
  const quick = [{l:t("date.tomorrow"),days:1},{l:t("date.plus3d"),days:3},{l:t("date.plus1w"),days:7}];
  const inp = {width:"100%",padding:"11px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:14,outline:"none",background:"#F8FAFC",boxSizing:"border-box",color:C.text};
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.7)",zIndex:1400,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div onClick={e=>e.stopPropagation()} className="slide-up" style={{background:C.bg,borderRadius:"20px 20px 0 0",padding:"8px 18px 26px",width:"100%",maxWidth:460,boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
        <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"12px auto 16px"}}/>
        <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:14}}>↔️ {t("rdv.move")}</div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {quick.map(q=>(
            <button key={q.l} onClick={()=>setD(addDaysStr(d,q.days))} style={{flex:1,padding:"9px 4px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",fontSize:12,fontWeight:700,color:C.navy}}>{q.l}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,display:"block",marginBottom:5}}>📅 {t("rdv.date")}</label><input type="date" style={inp} value={d} onChange={e=>setD(e.target.value)}/></div>
          <div><label style={{fontSize:11,fontWeight:700,color:C.muted,display:"block",marginBottom:5}}>⏰ {t("rdv.time")}</label><input type="time" style={inp} value={h} onChange={e=>setH(e.target.value)}/></div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:12,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted}}>{t("common.cancel")}</button>
          <button onClick={()=>{onConfirm(d,h);onClose();}} style={{flex:2,padding:12,border:"none",borderRadius:12,background:C.blue,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>✅ {t("rdv.move")}</button>
        </div>
      </div>
    </div>
  );
}

// ── RDV : MENU CONTEXTUEL (clic droit / appui long) ──────────────────────────
function RdvActionSheet({r, patient, user, onClose, onEdit, onMove, onDuplicate, onGenerateTask, onOpenPatient, onCancelRdv, onDelete}) {
  if(isSurgeon(user)) return null; // chirurgien : aucun menu d'actions
  const canDelete = isFullRole(user.role) || r.assigneA===user.id || r.creePar===user.id;
  const item = (icon,label,fn,danger) => (
    <button onClick={()=>{onClose();fn&&fn();}} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 18px",border:"none",borderBottom:`1px solid ${C.bg}`,background:"transparent",cursor:"pointer",fontSize:15,color:danger?C.red:C.text,textAlign:"left"}}>
      <span style={{fontSize:18,width:24,textAlign:"center"}}>{icon}</span><span style={{fontWeight:600}}>{label}</span>
    </button>
  );
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.6)",zIndex:1400,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(3px)"}}>
      <div onClick={e=>e.stopPropagation()} className="slide-up" style={{background:C.white,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:460,paddingBottom:"calc(8px + env(safe-area-inset-bottom))",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)",overflow:"hidden"}}>
        <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"12px auto 6px"}}/>
        <div style={{padding:"6px 18px 12px",borderBottom:`1px solid ${C.bg}`}}>
          <div style={{fontWeight:800,fontSize:15,color:C.text}}>{patient?`${patient.prenom} ${patient.nom}`:t("nav.rdvs")}</div>
          <div style={{fontSize:12,color:C.muted}}>{rdvTypeLabel(r.type)} · {normalizeDate(r.date)} · {normalizeHeure(r.heure)}</div>
        </div>
        {item("✏️",t("common.edit"),()=>onEdit(r))}
        {item("↔️",t("rdv.move"),()=>onMove(r))}
        {item("📋",t("rdv.duplicate"),()=>onDuplicate(r))}
        {item("✅",t("rdv.createTask"),()=>onGenerateTask(r))}
        {patient&&item("👤",t("rdv.openPatientFile"),()=>onOpenPatient(r.patientId))}
        {item("🚫",t("rdv.cancelAppt"),()=>onCancelRdv(r))}
        {canDelete&&item("🗑",t("common.delete"),()=>onDelete(r.id),true)}
        <button onClick={onClose} style={{width:"100%",padding:"14px",border:"none",background:C.bg,cursor:"pointer",fontSize:15,fontWeight:700,color:C.muted,marginTop:6}}>{t("common.close")}</button>
      </div>
    </div>
  );
}
