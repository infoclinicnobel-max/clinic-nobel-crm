// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  get: async (type) => {
    try {
      const r = await fetch(`${SCRIPT_URL}?type=${type}&t=${Date.now()}`, {
        method:"GET", redirect:"follow"
      });
      const text = await r.text();
      const d = JSON.parse(text);
      return Array.isArray(d) ? d : [];
    } catch(e) { 
      console.error("GET error:", e);
      return []; 
    }
  },
  post: async (type, action, record) => {
    // Method 1: fetch no-cors with text/plain (works for writing)
    const body = JSON.stringify({type, action, record});
    const promises = [
      fetch(SCRIPT_URL, {
        method:"POST", mode:"no-cors", cache:"no-cache",
        headers:{"Content-Type":"text/plain"},
        body
      }).catch(()=>{}),
    ];
    await Promise.allSettled(promises);
    await new Promise(r=>setTimeout(r,800));
  }
};

// Local cache to persist data across reloads
const cache = {
  save: (key, data) => {
    try { localStorage.setItem("cn_cache_"+key, JSON.stringify({data, ts:Date.now()})); } catch(e){}
  },
  load: (key) => {
    try { 
      const s = localStorage.getItem("cn_cache_"+key);
      if(!s) return null;
      const {data, ts} = JSON.parse(s);
      // Cache valid for 24h
      if(Date.now()-ts < 86400000) return data;
      return null;
    } catch(e){ return null; }
  }
};

// ── TÂCHES ────────────────────────────────────────────────────────────────────
function Taches({user, taches, setTaches, syncing, setSyncing}) {
  const [tab,setTab] = useState("mes");
  const [kanban,setKanban] = useState(false);
  const [showForm,setShowForm] = useState(false);
  const [f,setF] = useState({titre:"",description:"",assigneA:user.id,priorite:"Normale",echeance:"",statut:"En cours"});
  const ch = (k,v) => setF(x=>({...x,[k]:v}));
  const inp = {width:"100%",padding:"9px 11px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:"none",background:C.bg,boxSizing:"border-box"};
  const lbl = {fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4};

  const mesTaches = taches.filter(t=>t.assigneA===user.id);
  const groupTaches = taches;

  const addTache = async () => {
    if(!f.titre.trim()) { alert("Le titre est obligatoire !"); return; }
    const n={...f,id:uid(),creePar:user.id,cree:todayStr(),statut:"En cours"};
    setTaches(ts=>{const nt=[...ts,n];cache.save("taches",nt);return nt;});
    setSyncing(true);
    try {
      await api.post("taches","add",n);
    } catch(e){ console.error("Tache add error:",e); }
    setSyncing(false);
    setShowForm(false);
    setF({titre:"",description:"",assigneA:user.id,priorite:"Normale",echeance:"",statut:"En cours"});
  };

  const toggleStatut = async (t) => {
    const newStatut = t.statut==="Terminée"?"En cours":"Terminée";
    const updated={...t,statut:newStatut};
    setTaches(ts=>{const nt=ts.map(x=>x.id===t.id?updated:x);cache.save("taches",nt);return nt;});
    setSyncing(true);
    try {
      await api.post("taches","update",updated);
    } catch(e){ console.error("Tache update error:",e); }
    setSyncing(false);
  };

  const deleteTache = async (id) => {
    if(!window.confirm("Supprimer cette tâche ?")) return;
    setTaches(ts=>{const nt=ts.filter(t=>t.id!==id);cache.save("taches",nt);return nt;});
    setSyncing(true);
    try {
      await api.post("taches","delete",{id});
    } catch(e){ console.error("Tache delete error:",e); }
    setSyncing(false);
  };

  const displayTaches = tab==="mes"?mesTaches:groupTaches;

  const TacheItem = ({t}) => {
    const assignee = USERS.find(u=>u.id===t.assigneA);
    const done = t.statut==="Terminée";
    return (
      <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 0",borderBottom:`1px solid ${C.bg}`,opacity:done?0.5:1}}>
        <button onClick={()=>toggleStatut(t)} style={{width:20,height:20,borderRadius:99,border:`2px solid ${done?C.green:user.color}`,background:done?C.green:"transparent",cursor:"pointer",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontSize:11}}>
          {done?"✓":""}
        </button>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:13,color:C.text,textDecoration:done?"line-through":"none"}}>{t.titre}</div>
          {t.description&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{t.description}</div>}
          <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
            {t.echeance&&<span style={{fontSize:10,color:C.muted}}>📅 {t.echeance}</span>}
            {tab==="groupe"&&assignee&&<Avatar p={{prenom:assignee.prenom,nom:""}} size={18} color={assignee.color}/>}
            {tab==="groupe"&&assignee&&<span style={{fontSize:10,color:assignee.color,fontWeight:700}}>{assignee.prenom}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <Badge text={t.priorite||"Normale"} color={t.priorite==="Haute"?C.red:t.priorite==="Basse"?C.muted:C.amber} small/>
          {(user.role==="admin"||t.creePar===user.id)&&<button onClick={()=>deleteTache(t.id)} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:13}}>🗑</button>}
        </div>
      </div>
    );
  };

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <button onClick={()=>setTab("mes")} style={{flex:1,padding:"9px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,background:tab==="mes"?user.color:C.bg,color:tab==="mes"?C.white:C.muted}}>
          👤 Mes ({mesTaches.length})
        </button>
        <button onClick={()=>setTab("groupe")} style={{flex:1,padding:"9px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,background:tab==="groupe"?user.color:C.bg,color:tab==="groupe"?C.white:C.muted}}>
          👥 Équipe ({groupTaches.length})
        </button>
        <button onClick={()=>setKanban(x=>!x)} style={{padding:"9px 12px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,background:kanban?C.navy:C.bg,color:kanban?C.white:C.muted}}>
          {kanban?"📋":"🗂️"}
        </button>
      </div>

      <button onClick={()=>setShowForm(x=>!x)} style={{width:"100%",padding:"11px",border:"none",borderRadius:10,background:user.color,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13,marginBottom:14}}>
        + Nouvelle tâche
      </button>

      {showForm&&<Card>
        <div style={{marginBottom:12}}><label style={lbl}>Titre</label><input style={inp} value={f.titre} onChange={e=>ch("titre",e.target.value)} placeholder="Titre de la tâche…"/></div>
        <div style={{marginBottom:12}}><label style={lbl}>Description</label><textarea style={{...inp,minHeight:60,resize:"vertical"}} value={f.description} onChange={e=>ch("description",e.target.value)} placeholder="Détails…"/></div>
        {user.role==="admin"&&<div style={{marginBottom:12}}><label style={lbl}>Assigner à</label>
          <select style={inp} value={f.assigneA} onChange={e=>ch("assigneA",e.target.value)}>
            {USERS.map(u=><option key={u.id} value={u.id}>{u.prenom} — {ROLE_LABELS[u.role]}</option>)}
          </select>
        </div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div><label style={lbl}>Priorité</label>
            <select style={inp} value={f.priorite} onChange={e=>ch("priorite",e.target.value)}>
              {["Haute","Normale","Basse"].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div><label style={lbl}>Échéance</label><input style={inp} type="date" value={f.echeance} onChange={e=>ch("echeance",e.target.value)}/></div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setShowForm(false)} style={{flex:1,padding:10,border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted}}>Annuler</button>
          <button onClick={addTache} style={{flex:2,padding:10,border:"none",borderRadius:10,background:user.color,color:C.white,cursor:"pointer",fontWeight:800}}>Créer la tâche</button>
        </div>
      </Card>}

      {kanban?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{id:"En cours",label:"En cours",color:C.blue,icon:"⚡"},{id:"En attente",label:"Attente",color:C.amber,icon:"⏳"},{id:"Terminée",label:"Terminé",color:C.green,icon:"✅"}].map(col=>{
            const colTaches=displayTaches.filter(t=>t.statut===col.id);
            const changeStatut=async(t,s)=>{
              const u={...t,statut:s};
              setTaches(ts=>{const nt=ts.map(x=>x.id===t.id?u:x);cache.save("taches",nt);return nt;});
              try{await api.post("taches","update",u);}catch(e){}
            };
            return (
              <div key={col.id}>
                <div style={{background:col.color+"15",border:`1px solid ${col.color}33`,borderRadius:10,padding:"8px 10px",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:12}}>{col.icon}</span>
                  <span style={{fontSize:11,fontWeight:700,color:col.color}}>{col.label}</span>
                  <span style={{marginLeft:"auto",background:col.color,color:C.white,borderRadius:99,width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800}}>{colTaches.length}</span>
                </div>
                {colTaches.map(t=>{
                  const assignee=USERS.find(u=>u.id===t.assigneA);
                  const isLate=t.echeance&&t.echeance<todayStr()&&t.statut!=="Terminée";
                  return (
                    <div key={t.id} style={{background:C.white,borderRadius:10,padding:"10px",marginBottom:6,border:`1px solid ${C.border}`,borderLeft:`3px solid ${t.priorite==="Haute"?C.red:t.priorite==="Basse"?C.muted:C.amber}`}}>
                      <div style={{fontWeight:700,fontSize:11,color:C.text,marginBottom:4,lineHeight:1.4}}>{t.titre}</div>
                      {t.echeance&&<div style={{fontSize:9,color:isLate?C.red:C.muted,marginBottom:4}}>📅 {t.echeance.slice(5)}</div>}
                      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                        {col.id!=="En cours"&&<button onClick={()=>changeStatut(t,"En cours")} style={{border:"none",background:C.blue+"18",color:C.blue,borderRadius:5,padding:"2px 5px",fontSize:9,cursor:"pointer",fontWeight:700}}>▶</button>}
                        {col.id!=="Terminée"&&<button onClick={()=>changeStatut(t,"Terminée")} style={{border:"none",background:C.green+"18",color:C.green,borderRadius:5,padding:"2px 5px",fontSize:9,cursor:"pointer",fontWeight:700}}>✓</button>}
                        {(user.role==="admin"||t.creePar===user.id)&&<button onClick={()=>deleteTache(t.id)} style={{border:"none",background:"none",color:C.muted,fontSize:10,cursor:"pointer",marginLeft:"auto"}}>🗑</button>}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      ):(
        <>
          {displayTaches.length===0?<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Aucune tâche. Créez-en une !</div>:
          <Card>
            {displayTaches.map(t=><TacheItem key={t.id} t={t}/>)}
          </Card>}
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>{displayTaches.length} tâche(s) · 💾 Sync Google Sheets</div>
        </>
      )}
    </div>
  );
}

// ── PATIENTS ──────────────────────────────────────────────────────────────────
function Patients({user, patients, onSelect, onAdd, onDelete}) {
  const [q,setQ] = useState("");
  const [fs,setFs] = useState("Tous");
  const sel = {padding:"8px 11px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,color:C.muted,background:C.white,outline:"none"};
  const filtered = patients.filter(p=>{
    const sq=q.toLowerCase();
    return(!q||`${p.prenom} ${p.nom} ${p.email} ${p.procedure}`.toLowerCase().includes(sq))&&(fs==="Tous"||p.stade===fs);
  });
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <input style={{flex:1,minWidth:140,padding:"9px 14px",border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:C.white}} placeholder="🔍 Rechercher…" value={q} onChange={e=>setQ(e.target.value)}/>
        <select style={sel} value={fs} onChange={e=>setFs(e.target.value)}>
          <option value="Tous">Tous</option>
          {STAGES.map(s=><option key={s}>{s}</option>)}
        </select>
        <button onClick={onAdd} style={{padding:"9px 16px",border:"none",borderRadius:10,background:user.color,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13}}>+ Ajouter</button>
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Aucun patient trouvé.</div>}
      {filtered.map(p=>(
        <Card key={p.id} style={{cursor:"pointer",padding:"14px 16px"}} onClick={()=>onSelect(p)}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <Avatar p={p} size={40}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontWeight:800,fontSize:14,color:C.text}}>{p.prenom} {p.nom}</span>
                <Badge text={p.stade} color={SC[p.stade]}/>
              </div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>{p.procedure} · {p.ville}, {p.pays}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontWeight:800,fontSize:14,color:C.green}}>{fmtEur(p.budget)}</div>
              {user.role==="admin"&&<button onClick={e=>{e.stopPropagation();onDelete(p.id)}} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:14,marginTop:4}}>🗑</button>}
            </div>
          </div>
        </Card>
      ))}
      <div style={{fontSize:12,color:C.muted,marginTop:4}}>{filtered.length} patient(s) · 💾 Sync Google Sheets</div>
    </div>
  );
}

// ── FICHE PATIENT ─────────────────────────────────────────────────────────────
function FichePatient({user, patient, patients, rdvs, finances, taches, onEdit, onDelete, onStageChange, onBack}) {
  const [tab,setTab] = useState("info");
  const p = patients.find(x=>x.id===patient.id)||patient;
  const sc = SC[p.stade]||C.muted;
  const pRdvs = (rdvs||[]).filter(r=>r.patientId===p.id).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const pFin = (finances||[]).filter(f=>f.patientId===p.id);
  const pTaches = (taches||[]).filter(t=>t.patientId===p.id||t.titre?.toLowerCase().includes(p.prenom?.toLowerCase()));
  const totalPaye = pFin.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const restant = Math.max(Number(p.budget||0)-totalPaye,0);
  const fmtDate = d=>d?new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}):"—";
  const TABS=[{id:"info",l:"Infos"},{id:"agenda",l:"📅 Agenda"},{id:"rdvs",l:`RDV (${pRdvs.length})`},{id:"finances",l:"Finances"},{id:"taches",l:`Tâches (${pTaches.length})`}];
  return (
    <div>
      <button onClick={onBack} style={{border:"none",background:"none",cursor:"pointer",color:user.color,fontWeight:700,fontSize:13,marginBottom:14,display:"flex",alignItems:"center",gap:6}}>← Retour patients</button>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.navy},#1a3a5c)`,borderRadius:20,padding:"20px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <div style={{width:52,height:52,borderRadius:14,background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:C.white,flexShrink:0}}>{initials(p)}</div>
          <div style={{flex:1}}>
            <div style={{color:C.white,fontWeight:800,fontSize:18}}>{p.prenom} {p.nom}</div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:12,marginTop:2}}>{p.procedure}</div>
            <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
              <Badge text={p.stade} color={sc}/>
              {p.source&&<Badge text={p.source} color={C.gold}/>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={onEdit} style={{width:34,height:34,borderRadius:10,border:"none",background:"rgba(255,255,255,0.15)",color:C.white,cursor:"pointer",fontSize:14}}>✏️</button>
            {user.role==="admin"&&<button onClick={onDelete} style={{width:34,height:34,borderRadius:10,border:"none",background:"rgba(220,38,38,0.3)",color:C.white,cursor:"pointer",fontSize:14}}>🗑</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{l:"Budget",v:fmtEur(p.budget),c:C.gold},{l:"Payé",v:fmtEur(totalPaye),c:"#4ade80"},{l:"Restant",v:fmtEur(restant),c:restant>0?"#fbbf24":"#4ade80"}].map(s=>(
            <div key={s.l} style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"8px",textAlign:"center"}}>
              <div style={{color:s.c,fontWeight:800,fontSize:13}}>{s.v}</div>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:9,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Statut */}
      <Card style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:8}}>Changer le statut</div>
        <select value={p.stade} onChange={e=>onStageChange(p.id,e.target.value)} style={{width:"100%",padding:"10px",border:`2px solid ${sc}55`,borderRadius:10,fontSize:13,background:sc+"11",color:sc,fontWeight:700,outline:"none"}}>
          {STAGES.map(s=><option key={s}>{s}</option>)}
        </select>
      </Card>
      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:12,background:C.bg,borderRadius:12,padding:4}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 4px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:11,background:tab===t.id?C.white:"transparent",color:tab===t.id?C.navy:C.muted,transition:"all 0.15s"}}>
            {t.l}
          </button>
        ))}
      </div>
      {tab==="agenda"&&<div>
        {/* Timeline patient */}
        {(()=>{
          const evts=[
            ...pRdvs.map(r=>({date:r.date,heure:r.heure,type:r.type,label:r.type,note:r.notes,statut:r.statut,source:"rdv",medecin:r.medecin})),
            ...pFin.map(f=>({date:f.date,heure:"",type:"Paiement",label:`${f.type||"Paiement"} — ${fmtEur(f.montant)}`,statut:f.statut,source:"finance"})),
            ...pTaches.map(t=>({date:t.echeance,heure:"",type:"Tâche",label:t.titre,note:t.description,statut:t.statut,source:"tache"})),
          ].filter(e=>e.date).sort((a,b)=>a.date?.localeCompare(b.date||"")||a.heure?.localeCompare(b.heure||""));
          if(evts.length===0) return <div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Aucun événement pour ce patient.</div>;
          let lastDate="";
          return (
            <div style={{position:"relative",paddingLeft:44}}>
              <div style={{position:"absolute",left:18,top:0,bottom:0,width:2,background:C.border,borderRadius:99}}/>
              {evts.map((e,i)=>{
                const color=e.source==="tache"?C.muted:e.source==="finance"?C.amber:getEvtColor(e.type);
                const icon=e.source==="tache"?"✅":e.source==="finance"?"💶":getEvtIcon(e.type);
                const showDate=e.date!==lastDate;
                lastDate=e.date;
                return (
                  <div key={i} style={{marginBottom:10}}>
                    {showDate&&<div style={{fontSize:10,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,marginLeft:-44,paddingLeft:44}}>{fmtDate(e.date)}</div>}
                    <div style={{position:"relative"}}>
                      <div style={{position:"absolute",left:-32,top:10,width:14,height:14,borderRadius:99,background:color,border:`2px solid ${C.white}`,boxShadow:`0 0 0 2px ${color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7}}/>
                      <div style={{background:C.white,borderRadius:10,padding:"10px 12px",border:`1px solid ${C.border}`,borderLeft:`3px solid ${color}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"space-between"}}>
                          <div>
                            <div style={{fontWeight:700,fontSize:12,color:C.text,display:"flex",alignItems:"center",gap:4}}>
                              <span>{icon}</span>
                              {e.heure&&<span style={{color,fontWeight:800}}>{e.heure}</span>}
                              {e.label}
                            </div>
                            {e.medecin&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>🩺 {e.medecin}</div>}
                            {e.note&&<div style={{fontSize:10,color:C.muted,marginTop:2,fontStyle:"italic"}}>{e.note}</div>}
                          </div>
                          {e.statut&&<span style={{background:color+"15",color,border:`1px solid ${color}33`,padding:"2px 7px",borderRadius:99,fontSize:9,fontWeight:700,flexShrink:0}}>{e.statut}</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })()}
      </div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0}}>
          {[["📧","Email",p.email||"—"],["📱","Téléphone",p.tel||"—"],["📍","Pays",p.pays||"—"],["🏙️","Ville",p.ville||"—"],["📊","Source",p.source||"—"],["✈️","Date arrivée",fmtDate(p.dateArrivee)],["👤","Créé par",USERS.find(u=>u.id===p.creePar)?.prenom||"—"],["📅","Créé le",fmtDate(p.cree)]].map(([ic,lb,vl])=>(
            <div key={lb} style={{padding:"10px 8px",borderBottom:`1px solid ${C.bg}`}}>
              <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:3}}>{ic} {lb}</div>
              <div style={{fontSize:13,color:C.text,fontWeight:500}}>{vl}</div>
            </div>
          ))}
        </div>
        {p.notes&&<div style={{marginTop:12,padding:"12px",background:C.bg,borderRadius:10}}>
          <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>📝 NOTES</div>
          <div style={{fontSize:13,color:C.text,lineHeight:1.7}}>{p.notes}</div>
        </div>}
      </Card>}
      {tab==="info"&&<Card>
        {pRdvs.length===0?<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Aucun RDV pour ce patient.</div>:
        pRdvs.map(r=>(
          <Card key={r.id} style={{padding:"12px 14px",borderLeft:`3px solid ${C.blue}`}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{r.type} — {r.heure}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>📅 {fmtDate(r.date)} · {r.medecin||"—"}</div>
            <div style={{marginTop:6}}><Badge text={r.statut||"Planifié"} color={r.statut==="Confirmé"?C.green:C.amber} small/></div>
            {r.notes&&<div style={{fontSize:11,color:C.muted,marginTop:6,fontStyle:"italic"}}>💬 {r.notes}</div>}
          </Card>
        ))}
      </div>}
      {tab==="finances"&&<div>
        {pFin.length===0?<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Aucune transaction.</div>:
        pFin.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(f=>(
          <Card key={f.id} style={{padding:"12px 14px",borderLeft:`3px solid ${f.statut==="Complété"?C.green:C.amber}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:C.text}}>{f.type}</div>
                <div style={{fontSize:11,color:C.muted}}>{fmtDate(f.date)} · {f.methode}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,fontSize:15,color:f.statut==="Complété"?C.green:C.amber}}>{fmtEur(f.montant)}</div>
                <Badge text={f.statut} color={f.statut==="Complété"?C.green:C.amber} small/>
              </div>
            </div>
          </Card>
        ))}
      </div>}
      {tab==="taches"&&<div>
        {pTaches.length===0?<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Aucune tâche liée.</div>:
        pTaches.map(t=>(
          <Card key={t.id} style={{padding:"12px 14px",borderLeft:`3px solid ${t.priorite==="Haute"?C.red:C.amber}`}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{t.titre}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{t.description||"—"}</div>
            <div style={{display:"flex",gap:6,marginTop:6}}>
              <Badge text={t.statut} color={t.statut==="Terminée"?C.green:C.amber} small/>
              <Badge text={t.priorite||"Normale"} color={t.priorite==="Haute"?C.red:C.muted} small/>
            </div>
          </Card>
        ))}
      </div>}
    </div>
  );
}

// ── RENDEZ-VOUS ───────────────────────────────────────────────────────────────
function Rdvs({user, rdvs, patients, onAdd, onDelete, onUpdate}) {
  const [view,setView] = useState("liste");
  const [filterTab,setFilterTab] = useState("tous");
  const [filterDate,setFilterDate] = useState("");
  const [search,setSearch] = useState("");
  const [calDate,setCalDate] = useState(new Date());
  const [selDay,setSelDay] = useState(todayStr());
  const today = todayStr();
  const getP = id => patients.find(p=>String(p.id)===String(id));
  const getU = id => USERS.find(u=>u.id===id);
  const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const JOURS_SHORT=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  const fmtDate = d=>d?new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}):"—";

  // Filtrage
  const allRdvs = filterTab==="mes" ? rdvs.filter(r=>r.assigneA===user.id) :
                  filterTab==="medecin" ? rdvs.filter(r=>r.medecin) : rdvs;
  const filtered = allRdvs.filter(r=>{
    const p=getP(r.patientId);
    const sq=search.toLowerCase();
    return (!search||`${p?.prenom||""} ${p?.nom||""} ${r.type||""} ${r.medecin||""}`.toLowerCase().includes(sq))
      &&(!filterDate||r.date===filterDate);
  }).sort((a,b)=>a.date?.localeCompare(b.date||"")||a.heure?.localeCompare(b.heure||""));

  // Stats
  const rdvsToday = rdvs.filter(r=>r.date===today&&(user.role==="admin"||r.assigneA===user.id));
  const rdvsWeek = rdvs.filter(r=>r.date>=today&&r.date<=new Date(Date.now()+7*86400000).toISOString().split("T")[0]);
  const rdvsConfirmes = rdvs.filter(r=>r.statut==="Confirmé");

  // Calendrier mensuel
  const year=calDate.getFullYear(), month=calDate.getMonth();
  const firstDow=(new Date(year,month,1).getDay()+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const fmtD=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const rdvsForDay=ds=>rdvs.filter(r=>r.date===ds&&(user.role==="admin"||r.assigneA===user.id));

  // Carte RDV
  const RdvCard=({r})=>{
    const p=getP(r.patientId);
    const assignee=getU(r.assigneA);
    const isPast=r.date<today;
    const statusColor=r.statut==="Confirmé"?C.green:r.statut==="Terminé"?C.muted:r.statut==="Annulé"?C.red:C.amber;
    return (
      <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,marginBottom:8,overflow:"hidden",opacity:isPast?0.72:1,borderLeft:`4px solid ${assignee?.color||C.blue}`}}>
        <div style={{padding:"12px 14px",display:"flex",gap:12,alignItems:"center"}}>
          <div style={{minWidth:52,textAlign:"center",flexShrink:0}}>
            <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"0.05em"}}>{r.date?r.date.slice(5).replace("-","/"):""}</div>
            <div style={{fontSize:17,fontWeight:800,color:assignee?.color||C.navy,lineHeight:1.1}}>{r.heure}</div>
            {r.duree&&<div style={{fontSize:9,color:C.muted}}>{r.duree}min</div>}
          </div>
          <div style={{width:1,height:40,background:C.border,flexShrink:0}}/>
          <Avatar p={p||{prenom:"?",nom:""}} size={36}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{p?`${p.prenom} ${p.nom}`:"Patient inconnu"}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>{r.type}{r.medecin?` · 🩺 ${r.medecin}`:""}</div>
            {r.hopital&&<div style={{fontSize:10,color:C.muted}}>🏥 {r.hopital}</div>}
            <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
              {assignee&&<span style={{fontSize:10,color:assignee.color,fontWeight:700,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:99,background:assignee.color,display:"inline-block"}}/>{assignee.prenom}</span>}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
            <Badge text={r.statut||"Planifié"} color={statusColor} small/>
            {r.notes&&<span style={{fontSize:9,color:C.muted}}>💬</span>}
            {(user.role==="admin"||r.assigneA===user.id)&&<button onClick={()=>onDelete(r.id)} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:12}}>🗑</button>}
          </div>
        </div>
        {r.notes&&<div style={{padding:"6px 14px 10px",fontSize:11,color:C.muted,fontStyle:"italic",borderTop:`1px solid ${C.bg}`}}>💬 {r.notes}</div>}
      </div>
    );
  };

  // Jour sélectionné (vue calendrier)
  const selRdvs=rdvsForDay(selDay).sort((a,b)=>a.heure?.localeCompare(b.heure||""));

  return (
    <div>
      {/* KPI bar */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[{ic:"📅",l:"Aujourd'hui",v:rdvsToday.length,c:C.blue},{ic:"📆",l:"Cette semaine",v:rdvsWeek.length,c:C.purple},{ic:"✅",l:"Confirmés",v:rdvsConfirmes.length,c:C.green}].map(s=>(
          <div key={s.l} style={{background:C.white,borderRadius:12,padding:"10px 8px",textAlign:"center",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:18,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:9,color:C.muted,marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Barre d'outils */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:4,background:C.bg,borderRadius:10,padding:3,flex:1}}>
          {[{id:"liste",ic:"☰"},{id:"calendrier",ic:"📅"},{id:"jour",ic:"⏰"}].map(v=>(
            <button key={v.id} onClick={()=>setView(v.id)} style={{flex:1,padding:"7px",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:11,background:view===v.id?C.white:"transparent",color:view===v.id?C.navy:C.muted,transition:"all 0.15s"}}>
              {v.ic} {v.id.charAt(0).toUpperCase()+v.id.slice(1)}
            </button>
          ))}
        </div>
        <button onClick={onAdd} style={{padding:"9px 14px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>+ RDV</button>
      </div>

      {/* Filtre par rôle */}
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
        {[{id:"tous",l:"Tous",ic:"👥"},{id:"mes",l:"Mes RDV",ic:"👤"},...(user.role==="admin"?[{id:"medecin",l:"Par médecin",ic:"🩺"}]:[])].map(t=>(
          <button key={t.id} onClick={()=>setFilterTab(t.id)} style={{padding:"7px 12px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:12,background:filterTab===t.id?user.color:C.bg,color:filterTab===t.id?C.white:C.muted,flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
            {t.ic} {t.l}
          </button>
        ))}
      </div>

      {/* VUE LISTE */}
      {view==="liste"&&<>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Patient, médecin, type…" style={{flex:1,padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:C.white}}/>
          <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{padding:"9px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:12,background:C.white,outline:"none"}}/>
          {filterDate&&<button onClick={()=>setFilterDate("")} style={{padding:"9px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",color:C.muted,fontSize:12}}>✕</button>}
        </div>
        {/* Groupé par date */}
        {(()=>{
          const groups={};
          filtered.forEach(r=>{const d=r.date||"Sans date";if(!groups[d])groups[d]=[];groups[d].push(r);});
          return Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).map(([date,rList])=>(
            <div key={date} style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:800,color:date===today?C.blue:date<today?C.muted:C.navy,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:6,height:6,borderRadius:99,background:date===today?C.blue:date<today?C.muted:C.navy}}/>
                {date===today?"Aujourd'hui":fmtDate(date)} — {rList.length} RDV
              </div>
              {rList.map(r=><RdvCard key={r.id} r={r}/>)}
            </div>
          ));
        })()}
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Aucun rendez-vous.</div>}
      </>}

      {/* VUE CALENDRIER MENSUEL */}
      {view==="calendrier"&&<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>setCalDate(new Date(year,month-1,1))} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <button onClick={()=>setCalDate(new Date(year,month+1,1))} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>
          <div style={{fontWeight:800,fontSize:15,color:C.navy}}>{MOIS[month]} {year}</div>
          <button onClick={()=>{setCalDate(new Date());setSelDay(today);}} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>Auj.</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {JOURS_SHORT.map(j=><div key={j} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,padding:"3px 0"}}>{j}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:14}}>
          {cells.map((d,i)=>{
            if(!d)return <div key={i}/>;
            const ds=fmtD(year,month,d);
            const dr=rdvsForDay(ds);
            const isToday=ds===today;
            const isSel=ds===selDay;
            return (
              <div key={i} onClick={()=>{setSelDay(ds);setView("jour");}} style={{minHeight:44,borderRadius:9,padding:"4px 2px",cursor:"pointer",textAlign:"center",background:isSel?C.navy:isToday?"#EFF6FF":C.white,border:`1px solid ${isSel?C.navy:isToday?C.blue:C.border}`,transition:"all 0.15s"}}>
                <div style={{fontSize:11,fontWeight:isToday||isSel?800:400,color:isSel?C.white:isToday?C.blue:C.text,marginBottom:2}}>{d}</div>
                {dr.slice(0,2).map((r,i)=>{
                  const a=getU(r.assigneA);
                  return <div key={i} style={{width:"80%",height:3,borderRadius:99,background:a?.color||C.blue,margin:"1px auto"}}/>;
                })}
                {dr.length>2&&<div style={{fontSize:7,color:isSel?"rgba(255,255,255,0.7)":C.muted,fontWeight:700}}>+{dr.length-2}</div>}
              </div>
            );
          })}
        </div>
        {/* RDV du jour sélectionné */}
        {selDay&&<div>
          <div style={{fontSize:12,fontWeight:800,color:C.navy,marginBottom:8}}>📅 {fmtDate(selDay)} — {rdvsForDay(selDay).length} RDV</div>
          {rdvsForDay(selDay).length===0?<div style={{background:C.white,borderRadius:12,padding:16,textAlign:"center",color:C.muted,fontSize:13,border:`1px solid ${C.border}`}}>Aucun RDV ce jour 🎉</div>:
          rdvsForDay(selDay).sort((a,b)=>a.heure?.localeCompare(b.heure||"")).map(r=><RdvCard key={r.id} r={r}/>)}
        </div>}
      </>}

      {/* VUE JOUR (timeline) */}
      {view==="jour"&&<>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <button onClick={()=>{const d=new Date(selDay+"T12:00:00");d.setDate(d.getDate()-1);setSelDay(d.toISOString().split("T")[0]);}} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontWeight:800,fontSize:14,color:C.navy}}>{selDay===today?"📅 Aujourd'hui":fmtDate(selDay)}</div>
            <div style={{fontSize:11,color:C.muted}}>{selRdvs.length} rendez-vous</div>
          </div>
          <button onClick={()=>{const d=new Date(selDay+"T12:00:00");d.setDate(d.getDate()+1);setSelDay(d.toISOString().split("T")[0]);}} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <input type="date" value={selDay} onChange={e=>setSelDay(e.target.value)} style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:C.white,marginBottom:12,boxSizing:"border-box"}}/>
        {/* Timeline */}
        <div style={{position:"relative",paddingLeft:48}}>
          <div style={{position:"absolute",left:20,top:0,bottom:0,width:2,background:C.border,borderRadius:99}}/>
          {selRdvs.length===0?<div style={{background:C.white,borderRadius:12,padding:20,textAlign:"center",color:C.muted,fontSize:13,border:`1px solid ${C.border}`,marginLeft:-48}}>Aucun RDV ce jour 🎉</div>:
          selRdvs.map(r=>{
            const p=getP(r.patientId);
            const a=getU(r.assigneA);
            return (
              <div key={r.id} style={{position:"relative",marginBottom:14}}>
                <div style={{position:"absolute",left:-35,top:8,width:14,height:14,borderRadius:99,background:a?.color||C.blue,border:`2px solid ${C.white}`,boxShadow:`0 0 0 2px ${a?.color||C.blue}44`}}/>
                <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,padding:"12px 14px",borderLeft:`3px solid ${a?.color||C.blue}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:14,color:C.navy}}>{r.heure}{r.duree?` · ${r.duree}min`:""}</div>
                      <div style={{fontWeight:600,fontSize:13,color:C.text,marginTop:2}}>{p?`${p.prenom} ${p.nom}`:"—"}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>{r.type}{r.medecin?` · ${r.medecin}`:""}</div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <Badge text={r.statut||"Planifié"} color={r.statut==="Confirmé"?C.green:C.amber} small/>
                      {(user.role==="admin"||r.assigneA===user.id)&&<button onClick={()=>onDelete(r.id)} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:12}}>🗑</button>}
                    </div>
                  </div>
                  {r.notes&&<div style={{fontSize:11,color:C.muted,marginTop:6,fontStyle:"italic"}}>💬 {r.notes}</div>}
                  {/* Actions rapides */}
                  <div style={{display:"flex",gap:6,marginTop:8}}>
                    {p?.tel&&<a href={`https://wa.me/${p.tel.replace(/\D/g,"")}`} target="_blank" style={{fontSize:10,background:"#25D366"+"18",color:"#25D366",padding:"3px 8px",borderRadius:6,fontWeight:700,textDecoration:"none"}}>📲 WhatsApp</a>}
                    {p?.email&&<a href={`mailto:${p.email}?subject=Confirmation RDV ${r.date} ${r.heure}`} style={{fontSize:10,background:C.blue+"18",color:C.blue,padding:"3px 8px",borderRadius:6,fontWeight:700,textDecoration:"none"}}>📧 Email</a>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </>}

      {/* Plannings spéciaux (admin) */}
      {user.role==="admin"&&view==="liste"&&<div style={{marginTop:16}}>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>PLANNINGS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {["Dr Anvar Ahmedov","Dr Azar Zeynalov","Dr Akin Ünal","Dr Smile Clinic"].map(medecin=>{
            const mRdvs=rdvs.filter(r=>r.medecin===medecin&&r.date>=today);
            return (
              <div key={medecin} style={{background:C.white,borderRadius:12,padding:12,border:`1px solid ${C.border}`}}>
                <div style={{fontWeight:700,fontSize:11,color:C.text,marginBottom:4}}>{medecin.replace("Dr ","Dr ")}</div>
                <div style={{fontSize:18,fontWeight:800,color:C.blue}}>{mRdvs.length}</div>
                <div style={{fontSize:9,color:C.muted}}>RDV à venir</div>
              </div>
            );
          })}
        </div>
      </div>}
    </div>
  );
}

// ── FINANCES PREMIUM ──────────────────────────────────────────────────────────
function Finances({user, finances, patients, onAdd, onDelete, onUpdate}) {
  const [tab, setTab] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [filterPeriod, setFilterPeriod] = useState("tout");
  const [filterUser, setFilterUser] = useState("tous");
  const [filterStatut, setFilterStatut] = useState("tous");
  const [filterDevise, setFilterDevise] = useState("tous");
  const [selectedPatient, setSelectedPatient] = useState(null);

  const DEVISES = ["€","$","£","CHF","TRY","AED"];
  const getP = id => patients.find(p=>String(p.id)===String(id));
  const getU = id => USERS.find(u=>u.id===id);

  const today = todayStr();
  const thisWeekStart = (() => { const d=new Date(); d.setDate(d.getDate()-(d.getDay()||7)+1); return d.toISOString().split("T")[0]; })();
  const thisMonthStart = today.slice(0,7)+"-01";
  const thisYearStart = today.slice(0,4)+"-01-01";

  const inPeriod = (date) => {
    if(filterPeriod==="tout") return true;
    if(filterPeriod==="today") return date===today;
    if(filterPeriod==="week") return date>=thisWeekStart;
    if(filterPeriod==="month") return date>=thisMonthStart;
    if(filterPeriod==="year") return date>=thisYearStart;
    return true;
  };

  const filtered = finances.filter(f => {
    const p = getP(f.patientId);
    const sq = search.toLowerCase();
    const matchSearch = !search || 
      (p && `${p.prenom} ${p.nom}`.toLowerCase().includes(sq)) ||
      (f.procedure||"").toLowerCase().includes(sq) ||
      (f.montant||"").toString().includes(sq);
    const matchPeriod = inPeriod(f.date||"");
    const matchUser = filterUser==="tous" || f.creePar===filterUser;
    const matchStatut = filterStatut==="tous" || f.statut===filterStatut;
    const matchDevise = filterDevise==="tous" || (f.methode||"")===filterDevise;
    return matchSearch && matchPeriod && matchUser && matchStatut;
  });

  // Calculs
  const total = filtered.reduce((a,f)=>a+Number(f.montant||0),0);
  const recus = filtered.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const attente = filtered.filter(f=>f.statut==="En attente").reduce((a,f)=>a+Number(f.montant||0),0);
  const acomptes = filtered.filter(f=>f.type==="Acompte").reduce((a,f)=>a+Number(f.montant||0),0);
  const nAcomptes = filtered.filter(f=>f.type==="Acompte").length;
  const rembours = filtered.filter(f=>f.type==="Remboursement").reduce((a,f)=>a+Number(f.montant||0),0);
  const todayRecus = finances.filter(f=>f.date===today&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const weekRecus = finances.filter(f=>f.date>=thisWeekStart&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const monthRecus = finances.filter(f=>f.date>=thisMonthStart&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const panierMoyen = patients.filter(p=>p.budget).length ? Math.round(patients.filter(p=>p.budget).reduce((a,p)=>a+Number(p.budget||0),0)/patients.filter(p=>p.budget).length) : 0;
  const tauxConv = patients.length ? Math.round((patients.filter(p=>["Confirmé","Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade)).length/patients.length)*100) : 0;
  const patientsValides = patients.filter(p=>["Confirmé","Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade));
  const patientsOperes = patients.filter(p=>["Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade));

  // CA par mois (6 derniers mois)
  const caParMois = Array.from({length:6},(_,i)=>{
    const d = new Date(); d.setMonth(d.getMonth()-5+i);
    const key = d.toISOString().slice(0,7);
    const moisNom = d.toLocaleDateString("fr-FR",{month:"short"});
    const ca = finances.filter(f=>f.date&&f.date.startsWith(key)&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
    return {mois:moisNom, ca};
  });
  const maxCA = Math.max(...caParMois.map(m=>m.ca),1);

  // CA par coordinateur
  const caParUser = USERS.map(u=>({
    u, ca: finances.filter(f=>f.creePar===u.id&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0),
    nb: finances.filter(f=>f.creePar===u.id).length
  })).sort((a,b)=>b.ca-a.ca);

  // Alertes
  const alertes = [
    ...finances.filter(f=>f.statut==="En attente"&&f.date<today).map(f=>({type:"retard",msg:`Paiement en retard — ${getP(f.patientId)?.prenom||"?"} ${fmtEur(f.montant)}`,color:C.red})),
    ...finances.filter(f=>f.date===today&&f.statut==="Complété").map(f=>({type:"recu",msg:`✅ Paiement reçu aujourd'hui — ${fmtEur(f.montant)}`,color:C.green})),
    ...patients.filter(p=>p.stade==="Confirmé"&&!finances.some(f=>f.patientId===p.id&&f.type==="Acompte")).map(p=>({type:"acompte",msg:`⚠️ Acompte manquant — ${p.prenom} ${p.nom}`,color:C.amber})),
  ].slice(0,5);

  const TABS = [
    {id:"dashboard",label:"Dashboard",icon:"📊"},
    {id:"transactions",label:"Transactions",icon:"💳"},
    {id:"patients",label:"Patients",icon:"👥"},
    {id:"perf",label:"Performance",icon:"🏆"},
    {id:"stats",label:"Statistiques",icon:"📈"},
  ];

  const StatCard = ({icon,label,value,color=C.navy,sub}) => (
    <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:42,height:42,borderRadius:12,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{icon}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:18,fontWeight:800,color:C.text,lineHeight:1}}>{value}</div>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>{label}</div>
        {sub&&<div style={{fontSize:10,color,fontWeight:700,marginTop:1}}>{sub}</div>}
      </div>
    </div>
  );

  if(selectedPatient) {
    const p = getP(selectedPatient);
    const pFinances = finances.filter(f=>f.patientId===selectedPatient).sort((a,b)=>b.date?.localeCompare(a.date||"")||0);
    const totalPaye = pFinances.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
    const restant = Number(p?.budget||0) - totalPaye;
    return (
      <div>
        <button onClick={()=>setSelectedPatient(null)} style={{border:"none",background:"none",cursor:"pointer",color:C.blue,fontWeight:700,fontSize:13,marginBottom:14,display:"flex",alignItems:"center",gap:6}}>← Retour Finance</button>
        <Card style={{background:`linear-gradient(135deg,${C.navy},#1a3a5c)`,border:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <Avatar p={p||{prenom:"?",nom:""}} size={48}/>
            <div>
              <div style={{color:C.white,fontWeight:800,fontSize:16}}>{p?.prenom} {p?.nom}</div>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{p?.procedure} · {p?.pays}</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:14}}>
            {[
              {label:"Budget total",value:fmtEur(p?.budget),color:C.gold},
              {label:"Total payé",value:fmtEur(totalPaye),color:"#4ade80"},
              {label:"Restant",value:fmtEur(Math.max(restant,0)),color:restant>0?"#fbbf24":"#4ade80"},
            ].map(s=>(
              <div key={s.label} style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                <div style={{color:s.color,fontWeight:800,fontSize:14}}>{s.value}</div>
                <div style={{color:"rgba(255,255,255,0.6)",fontSize:9,marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
        </Card>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
          <button onClick={onAdd} style={{padding:"9px 16px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13}}>+ Paiement</button>
        </div>
        {pFinances.length===0 ? <div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Aucune transaction pour ce patient.</div> :
        pFinances.map(f=>(
          <Card key={f.id} style={{padding:"12px 16px",borderLeft:`3px solid ${f.statut==="Complété"?C.green:C.amber}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13,color:C.text}}>{f.type} — {f.procedure||"—"}</div>
                <div style={{fontSize:11,color:C.muted}}>📅 {f.date} · {f.methode} · {getU(f.creePar)?.prenom||"—"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800,fontSize:15,color:f.statut==="Complété"?C.green:C.amber}}>{fmtEur(f.montant)}</div>
                <Badge text={f.statut} color={f.statut==="Complété"?C.green:C.amber} small/>
              </div>
              {user.role==="admin"&&<button onClick={()=>onDelete(f.id)} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:13}}>🗑</button>}
            </div>
          </Card>
        ))}
      </div>
    );
  }

  return (
    <div>
      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 12px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:11,background:tab===t.id?C.navy:C.bg,color:tab===t.id?C.white:C.muted,flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
            <span>{t.icon}</span><span>{t.label}</span>
          </button>
        ))}
      </div>

      {/* DASHBOARD */}
      {tab==="dashboard" && <>
        {/* Alertes */}
        {alertes.length>0&&<div style={{marginBottom:12}}>
          {alertes.map((a,i)=>(
            <div key={i} style={{background:a.color+"12",border:`1px solid ${a.color}33`,borderRadius:10,padding:"8px 12px",marginBottom:6,fontSize:12,color:a.color,fontWeight:600}}>{a.msg}</div>
          ))}
        </div>}

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <StatCard icon="💶" label="Total encaissé" value={fmtEur(recus)} color={C.green} sub={`+${fmtEur(todayRecus)} aujourd'hui`}/>
          <StatCard icon="⏳" label="En attente" value={fmtEur(attente)} color={C.amber}/>
          <StatCard icon="📥" label="Acomptes reçus" value={fmtEur(acomptes)} color={C.blue} sub={`${nAcomptes} transactions`}/>
          <StatCard icon="📅" label="Ce mois" value={fmtEur(monthRecus)} color={C.purple} sub={`Semaine: ${fmtEur(weekRecus)}`}/>
          <StatCard icon="🎯" label="Panier moyen" value={fmtEur(panierMoyen)} color={C.cyan}/>
          <StatCard icon="📊" label="Taux conversion" value={`${tauxConv}%`} color={C.green}/>
          <StatCard icon="✅" label="Patients validés" value={patientsValides.length} color={C.navy}/>
          <StatCard icon="🏥" label="Patients opérés" value={patientsOperes.length} color={C.blue}/>
        </div>

        {/* CA par mois */}
        <Card>
          <SecTitle icon="📈">Chiffre d'affaires — 6 derniers mois</SecTitle>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
            {caParMois.map((m,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{fontSize:9,fontWeight:700,color:C.navy}}>{m.ca>0?`${Math.round(m.ca/1000)}k`:""}</div>
                <div style={{width:"100%",borderRadius:"4px 4px 0 0",background:i===5?C.gold:C.navy+"44",height:`${maxCA>0?(m.ca/maxCA)*60:4}px`,minHeight:4,transition:"height 0.3s"}}/>
                <div style={{fontSize:9,color:C.muted,fontWeight:600}}>{m.mois}</div>
              </div>
            ))}
          </div>
        </Card>

        {/* Top coordinateurs */}
        <Card>
          <SecTitle icon="🏆">Performance équipe</SecTitle>
          {caParUser.map((x,i)=>(
            <div key={x.u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<caParUser.length-1?`1px solid ${C.bg}`:"none"}}>
              <div style={{width:24,height:24,borderRadius:99,background:i===0?C.gold+"33":C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:i===0?C.gold:C.muted}}>{i+1}</div>
              <Avatar p={{prenom:x.u.prenom,nom:""}} size={32} color={x.u.color}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13,color:C.text}}>{x.u.prenom}</div>
                <div style={{fontSize:11,color:C.muted}}>{x.nb} transactions</div>
              </div>
              <div style={{fontWeight:800,fontSize:14,color:C.green}}>{fmtEur(x.ca)}</div>
            </div>
          ))}
        </Card>
      </>}

      {/* TRANSACTIONS */}
      {tab==="transactions" && <>
        {/* Filtres */}
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher…" style={{flex:1,minWidth:120,padding:"8px 10px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,outline:"none",background:C.white}}/>
          <select value={filterPeriod} onChange={e=>setFilterPeriod(e.target.value)} style={{padding:"8px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,background:C.white,outline:"none"}}>
            <option value="tout">Tout</option>
            <option value="today">Aujourd'hui</option>
            <option value="week">Cette semaine</option>
            <option value="month">Ce mois</option>
            <option value="year">Cette année</option>
          </select>
          <select value={filterStatut} onChange={e=>setFilterStatut(e.target.value)} style={{padding:"8px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,background:C.white,outline:"none"}}>
            <option value="tous">Tous statuts</option>
            <option value="Complété">Complété</option>
            <option value="En attente">En attente</option>
            <option value="Annulé">Annulé</option>
          </select>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,color:C.muted}}>{filtered.length} transaction(s) · <span style={{color:C.green,fontWeight:700}}>{fmtEur(recus)}</span> encaissé</div>
          <button onClick={onAdd} style={{padding:"8px 14px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:12}}>+ Transaction</button>
        </div>
        {filtered.length===0?<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Aucune transaction.</div>:
        filtered.sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(f=>{
          const p=getP(f.patientId);
          const createdBy=getU(f.creePar);
          return (
            <Card key={f.id} style={{padding:"12px 16px",borderLeft:`3px solid ${f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Avatar p={p||{prenom:"?",nom:""}} size={36}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.text,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    {p?`${p.prenom} ${p.nom}`:"—"}
                    <Badge text={f.type} color={f.type==="Acompte"?C.blue:f.type==="Remboursement"?C.red:C.green} small/>
                  </div>
                  <div style={{fontSize:11,color:C.muted}}>📅 {f.date} · {f.methode} · {createdBy?.prenom||"—"}</div>
                  {f.procedure&&<div style={{fontSize:11,color:C.muted}}>{f.procedure}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontWeight:800,fontSize:15,color:f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber}}>{fmtEur(f.montant)}</div>
                  <Badge text={f.statut} color={f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber} small/>
                </div>
                {user.role==="admin"&&<button onClick={()=>onDelete(f.id)} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:13,marginLeft:4}}>🗑</button>}
              </div>
            </Card>
          );
        })}
      </>}

      {/* PATIENTS FINANCIERS */}
      {tab==="patients" && <>
        <div style={{marginBottom:10,fontSize:12,color:C.muted}}>{patients.length} patients · Cliquez pour voir le détail</div>
        {patients.filter(p=>{
          if(!search) return true;
          return `${p.prenom} ${p.nom} ${p.procedure}`.toLowerCase().includes(search.toLowerCase());
        }).map(p=>{
          const pFin = finances.filter(f=>f.patientId===p.id);
          const totalPaye = pFin.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
          const restant = Math.max(Number(p.budget||0)-totalPaye,0);
          const pct = p.budget ? Math.round((totalPaye/Number(p.budget))*100) : 0;
          return (
            <Card key={p.id} style={{padding:"12px 16px",cursor:"pointer"}} onClick={()=>setSelectedPatient(p.id)}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Avatar p={p} size={38}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.text}}>{p.prenom} {p.nom}</div>
                  <div style={{fontSize:11,color:C.muted}}>{p.procedure} · {p.pays}</div>
                  <div style={{marginTop:6,background:C.bg,borderRadius:99,height:5}}>
                    <div style={{background:pct>=100?C.green:pct>50?C.amber:C.red,borderRadius:99,height:5,width:`${Math.min(pct,100)}%`,transition:"width 0.3s"}}/>
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.green}}>{fmtEur(totalPaye)}</div>
                  {restant>0&&<div style={{fontSize:11,color:C.red,fontWeight:600}}>-{fmtEur(restant)}</div>}
                  <div style={{fontSize:10,color:C.muted}}>{pct}%</div>
                </div>
              </div>
            </Card>
          );
        })}
      </>}

      {/* PERFORMANCE */}
      {tab==="perf" && <>
        <Card style={{overflowX:"auto"}}>
          <SecTitle icon="🏆">Performance par coordinateur</SecTitle>
          {USERS.map((u,i)=>{
            const uFin = finances.filter(f=>f.creePar===u.id);
            const uCA = uFin.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
            const uAcomptes = uFin.filter(f=>f.type==="Acompte").reduce((a,f)=>a+Number(f.montant||0),0);
            const uPatients = patients.filter(p=>p.creePar===u.id);
            const uOperes = uPatients.filter(p=>["Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade));
            const objectif = 50000;
            const prog = Math.min(Math.round((uCA/objectif)*100),100);
            return (
              <div key={u.id} style={{padding:"14px 0",borderBottom:i<USERS.length-1?`1px solid ${C.bg}`:"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <Avatar p={{prenom:u.prenom,nom:""}} size={36} color={u.color}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:13,color:C.text}}>{u.prenom}</div>
                    <div style={{fontSize:11,color:u.color,fontWeight:600}}>{ROLE_LABELS[u.role]}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:800,fontSize:15,color:C.green}}>{fmtEur(uCA)}</div>
                    <div style={{fontSize:10,color:C.muted}}>{prog}% objectif</div>
                  </div>
                </div>
                <div style={{background:C.bg,borderRadius:99,height:6,marginBottom:8}}>
                  <div style={{background:prog>=100?C.green:prog>50?u.color:C.amber,borderRadius:99,height:6,width:`${prog}%`,transition:"width 0.5s"}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                  {[
                    {label:"Patients",value:uPatients.length},
                    {label:"Opérés",value:uOperes.length},
                    {label:"Acomptes",value:fmtEur(uAcomptes)},
                    {label:"Transactions",value:uFin.length},
                  ].map(s=>(
                    <div key={s.label} style={{background:C.bg,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
                      <div style={{fontWeight:800,fontSize:12,color:C.text}}>{s.value}</div>
                      <div style={{fontSize:9,color:C.muted}}>{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </Card>
      </>}

      {/* STATISTIQUES */}
      {tab==="stats" && <>
        <Card>
          <SecTitle icon="📊">Répartition des paiements</SecTitle>
          {["Acompte","Paiement total","Remboursement","Devis"].map(type=>{
            const n = finances.filter(f=>f.type===type).length;
            const pct = finances.length ? Math.round((n/finances.length)*100) : 0;
            const colors = {"Acompte":C.blue,"Paiement total":C.green,"Remboursement":C.red,"Devis":C.amber};
            return (
              <div key={type} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                  <span style={{color:C.text,fontWeight:600}}>{type}</span>
                  <span style={{color:C.muted}}>{n} · {pct}%</span>
                </div>
                <div style={{background:C.bg,borderRadius:99,height:8}}>
                  <div style={{background:colors[type],borderRadius:99,height:8,width:`${pct}%`}}/>
                </div>
              </div>
            );
          })}
        </Card>
        <Card>
          <SecTitle icon="💳">Modes de paiement</SecTitle>
          {["Virement","Carte bancaire","Espèces","PayPal"].map(m=>{
            const n = finances.filter(f=>f.methode===m).length;
            const pct = finances.length ? Math.round((n/finances.length)*100) : 0;
            return (
              <div key={m} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.bg}`}}>
                <span style={{fontSize:13,color:C.text}}>{m}</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:60,background:C.bg,borderRadius:99,height:6}}>
                    <div style={{background:C.navy,borderRadius:99,height:6,width:`${pct}%`}}/>
                  </div>
                  <span style={{fontSize:12,color:C.muted,width:30,textAlign:"right"}}>{n}</span>
                </div>
              </div>
            );
          })}
        </Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <StatCard icon="🔄" label="Remboursements" value={fmtEur(rembours)} color={C.red}/>
          <StatCard icon="📋" label="Devis envoyés" value={finances.filter(f=>f.type==="Devis").length} color={C.purple}/>
          <StatCard icon="⚡" label="Paiements en attente" value={finances.filter(f=>f.statut==="En attente").length} color={C.amber}/>
          <StatCard icon="✅" label="Paiements complets" value={finances.filter(f=>f.statut==="Complété").length} color={C.green}/>
        </div>
      </>}
    </div>
  );
}

// ── ANALYSES ──────────────────────────────────────────────────────────────────
function Analyses({patients, finances}) {
  const byProc = PROCEDURES.map(p=>({name:p,n:patients.filter(x=>x.procedure===p).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n).slice(0,6);
  const bySrc = SOURCES.map(s=>({name:s,n:patients.filter(x=>x.source===s).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const taux = patients.length?Math.round((patients.filter(p=>p.stade==="Clôturé ✓").length/patients.length)*100):0;
  const bMoy = patients.filter(p=>p.budget).length?Math.round(patients.filter(p=>p.budget).reduce((a,p)=>a+Number(p.budget),0)/patients.filter(p=>p.budget).length):0;
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        {[
          {icon:"📈",label:"Conversion",value:`${taux}%`,color:C.green},
          {icon:"💶",label:"Budget moyen",value:fmtEur(bMoy),color:C.blue},
          {icon:"🌍",label:"Pays",value:[...new Set(patients.map(p=>p.pays))].filter(Boolean).length,color:C.purple},
          {icon:"⭐",label:"Satisfaction",value:"98%",color:C.amber},
        ].map(s=>(
          <Card key={s.label} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:10,background:s.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{s.icon}</div>
            <div><div style={{fontSize:18,fontWeight:800,color:C.text}}>{s.value}</div><div style={{fontSize:11,color:C.muted}}>{s.label}</div></div>
          </Card>
        ))}
      </div>
      <Card>
        <SecTitle icon="🏥">Top procédures</SecTitle>
        {byProc.length===0?<div style={{color:C.muted,fontSize:13}}>Aucune donnée.</div>:byProc.map(x=>(
          <div key={x.name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:3}}><span>{x.name}</span><span style={{fontWeight:700,color:C.text}}>{x.n}</span></div>
            <div style={{background:C.bg,borderRadius:99,height:6}}><div style={{background:C.blue,borderRadius:99,height:6,width:`${patients.length?(x.n/patients.length)*100:0}%`}}/></div>
          </div>
        ))}
      </Card>
      <Card>
        <SecTitle icon="📊">Canaux d'acquisition</SecTitle>
        {bySrc.length===0?<div style={{color:C.muted,fontSize:13}}>Aucune donnée.</div>:bySrc.map(x=>(
          <div key={x.name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:3}}><span>{x.name}</span><span style={{fontWeight:700,color:C.text}}>{x.n}</span></div>
            <div style={{background:C.bg,borderRadius:99,height:6}}><div style={{background:C.purple,borderRadius:99,height:6,width:`${patients.length?(x.n/patients.length)*100:0}%`}}/></div>
          </div>
        ))}
      </Card>
    </div>
  );
}

                {saving?"💾 Création…":"✅ Créer le dossier patient"}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );

  const inp = {width:"100%",padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:"#F8FAFC",boxSizing:"border-box",color:C.text};
  const lbl = {fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:5};

  const saveHopital = async () => {
    if(!form.nom.trim()){alert("Nom obligatoire !");return;}
    setSaving(true);
    const isNew = !form.id;
    const record = isNew ? {...form, id:"h"+uid()} : {...form};
    const newList = isNew ? [...list, record] : list.map(h=>h.id===record.id?record:h);
    setHopitaux(newList);
    cache.save("hopitaux", newList);
    setSyncing(true);
    try { await api.post("hopitaux", isNew?"add":"update", record); } catch(e){}
    setSyncing(false);
    setSaving(false);
    setView("detail");
    setSelected(record.id);
  };

  const deleteHopital = async (id) => {
    if(!window.confirm("Supprimer cet hôpital ?")) return;
    const newList = list.filter(h=>h.id!==id);
    setHopitaux(newList);
    cache.save("hopitaux", newList);

  // Vue DÉTAIL
  if(view==="detail" && selected){

          <div style={{flex:1}}/>

          <SecTitle icon="📋" children="Informations"/>

  // Vue EDIT / ADD
  if(view==="edit"||view==="add"){
    const isNew = view==="add";
    return (
      <div>
        <button onClick={()=>setView(isNew?"liste":"detail")} style={{border:"none",background:"none",cursor:"pointer",color:C.blue,fontWeight:700,fontSize:13,marginBottom:14,display:"flex",alignItems:"center",gap:6,padding:0}}>← Retour</button>
        <div style={{background:`linear-gradient(135deg,${form.color||C.navy},${form.color||C.navy}cc)`,borderRadius:16,padding:"16px 20px",marginBottom:14}}>
          <div style={{fontSize:36,marginBottom:6}}>{form.icon||"🏥"}</div>
          <div style={{color:C.white,fontSize:16,fontWeight:800}}>{form.nom||"Nouvel hôpital"}</div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:12,marginTop:2}}>{form.ville||"Istanbul"}</div>

        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>

            {ICONS.map(ic=>(

                {ic}

          </div>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>COULEUR</div>

            {COLORS.map(col=>(
