        </div>

        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{marginBottom:10}}><label style={lbl}>🏥 Nom *</label><input style={inp} value={form.nom} onChange={e=>ch("nom",e.target.value)} placeholder="Medicana International"/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={lbl}>🏙️ Ville</label><input style={inp} value={form.ville} onChange={e=>ch("ville",e.target.value)} placeholder="Istanbul"/></div>
            <div><label style={lbl}>🏥 Salles</label><input style={inp} type="number" value={form.salles} onChange={e=>ch("salles",e.target.value)} placeholder="12"/></div>
          </div>
          <div style={{marginBottom:10}}><label style={lbl}>📍 Adresse</label><input style={inp} value={form.adresse} onChange={e=>ch("adresse",e.target.value)} placeholder="Beylikdüzü, Istanbul"/></div>
        </div>

        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{marginBottom:10}}><label style={lbl}>📱 Téléphone</label><input style={inp} value={form.tel} onChange={e=>ch("tel",e.target.value)} placeholder="+90 212 000 0000"/></div>
          <div style={{marginBottom:10}}><label style={lbl}>📧 Email</label><input style={inp} type="email" value={form.email} onChange={e=>ch("email",e.target.value)} placeholder="info@hopital.com"/></div>
          <div style={{marginBottom:0}}><label style={lbl}>🌐 Site web</label><input style={inp} value={form.site} onChange={e=>ch("site",e.target.value)} placeholder="www.hopital.com"/></div>
        </div>

        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{marginBottom:10}}><label style={lbl}>🩺 Médecins associés (séparés par virgule)</label><input style={inp} value={form.medecins} onChange={e=>ch("medecins",e.target.value)} placeholder="Dr Anvar Ahmedov, Dr Azar Zeynalov"/></div>
          <div><label style={lbl}>📝 Note</label><textarea style={{...inp,minHeight:60,resize:"vertical",fontFamily:"inherit"}} value={form.note} onChange={e=>ch("note",e.target.value)} placeholder="Informations complémentaires…"/></div>
        </div>

        <div style={{display:"flex",gap:10,marginTop:4}}>
          <button onClick={()=>setView(isNew?"liste":"detail")} style={{flex:1,padding:12,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted}}>Annuler</button>
          <button onClick={saveHopital} disabled={saving} style={{flex:2,padding:12,border:"none",borderRadius:12,background:saving?"#94a3b8":C.green,color:C.white,cursor:saving?"not-allowed":"pointer",fontWeight:800,fontSize:14}}>
            {saving?"💾 Sauvegarde…":`✅ ${isNew?"Ajouter l'hôpital":"Enregistrer"}`}
          </button>
        </div>
      </div>
    );
  }

  // Vue LISTE
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontSize:13,color:C.muted}}>{list.length} hôpital(ux) partenaire(s)</div>
        {user?.role==="admin"&&<button onClick={()=>{setForm(emptyH);setView("add");}} style={{padding:"9px 14px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13}}>+ Ajouter</button>}
      </div>
      {list.map(h=>{
        const hRdvs=(rdvs||[]).filter(r=>r.hopital===h.nom||(h.medecins&&r.medecin&&h.medecins.includes(r.medecin)));
        return (
          <Card key={h.id} onClick={()=>{setSelected(h.id);setView("detail");}} style={{borderLeft:`4px solid ${h.color}`}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:52,height:52,borderRadius:14,background:h.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{h.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:14,color:C.text,marginBottom:4}}>{h.nom}</div>
                <div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {h.adresse}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:2}}>🏥 {h.salles||"?"} salles · 📱 {h.tel||"—"}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:16,color:h.color}}>{hRdvs.length}</div>
                <div style={{fontSize:9,color:C.muted}}>RDV</div>
                {user?.role==="admin"&&<button onClick={e=>{e.stopPropagation();setForm({...h});setView("edit");setSelected(h.id);}} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:12,marginTop:4}}>✏️</button>}
              </div>
            </div>
            {h.note&&<div style={{marginTop:8,fontSize:11,color:C.muted,fontStyle:"italic",borderTop:`1px solid ${C.bg}`,paddingTop:8}}>{h.note}</div>}
          </Card>
        );
      })}
    </div>
  );
}

// ── AGENDA CALENDRIER ─────────────────────────────────────────────────────────
// ── COULEURS ÉVÉNEMENTS ───────────────────────────────────────────────────────
const EVT_COLORS = {
  "Consultation":"#1D73C9","Consultation vidéo":"#1D73C9","Visioconférence":"#1D73C9",
  "Opération":"#16A34A","Chirurgie":"#16A34A","Intervention":"#16A34A",
  "Paiement":"#D97706","Acompte":"#D97706","Finance":"#D97706",
  "Contrôle":"#7C3AED","Suivi post-op":"#7C3AED","Suivi":"#7C3AED","Pré-opératoire":"#7C3AED",
  "Appel":"#CA8A04","Appel téléphonique":"#CA8A04",
  "WhatsApp":"#E11D48","Message WhatsApp":"#E11D48",
  "Urgence":"#DC2626",
  "Tâche":"#64748B",
  "Départ":"#0891B2","Départ Istanbul":"#0891B2",
  "Arrivée":"#0B1F3A","Arrivée à Istanbul":"#0B1F3A","Arrivée Istanbul":"#0B1F3A",
  "Deuxième séjour":"#4F46E5","Relance commerciale":"#9333EA",
};
const getEvtColor = type => {
  if(!type) return C.blue;
  for(const[k,v] of Object.entries(EVT_COLORS)) if(type.toLowerCase().includes(k.toLowerCase())) return v;
  return C.blue;
};
const getEvtIcon = type => {
  if(!type) return "📅";
  const t=type.toLowerCase();
  if(t.includes("chirurgi")||t.includes("opérat")||t.includes("intervent")) return "🔬";
  if(t.includes("arrivée")) return "✈️";
  if(t.includes("départ")) return "🛫";
  if(t.includes("paiement")||t.includes("acompte")||t.includes("finance")) return "💶";
  if(t.includes("contrôle")||t.includes("suivi")) return "🩺";
  if(t.includes("whatsapp")) return "💬";
  if(t.includes("appel")) return "📞";
  if(t.includes("urgence")) return "🚨";
  if(t.includes("tâche")) return "✅";
  if(t.includes("visio")) return "🎥";
  if(t.includes("devis")) return "📄";
  if(t.includes("relance")) return "🔔";
  return "📅";
};

function Agenda({user, rdvs, taches, patients, finances, onAddRdv, onSelectPatient}) {
  const [currentDate, setCurrentDate] = useState(new Date());
  const [viewMode, setViewMode] = useState("mois");
  const [selectedDay, setSelectedDay] = useState(todayStr());
  const [filterUser, setFilterUser] = useState("mon");
  const [filterType, setFilterType] = useState("tous");
  const [search, setSearch] = useState("");
  const [selEvent, setSelEvent] = useState(null);
  const [showPlanning, setShowPlanning] = useState(false);

  const today = todayStr();
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const JOURS = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  const fmtD = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const fmtDate = d => d ? new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}) : "—";
  const fmtDateShort = d => d ? new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}) : "—";

  const getP = id => patients.find(p=>String(p.id)===String(id));
  const getU = id => USERS.find(u=>u.id===id);

  // ── Construire tous les événements (RDV + Tâches + Finances) ──────────────
  const allEvents = [
    ...rdvs.map(r => ({
      id:"rdv_"+r.id, source:"rdv", raw:r,
      date:r.date, heure:r.heure||"", type:r.type||"Consultation",
      patientId:r.patientId, assigneA:r.assigneA,
      medecin:r.medecin, hopital:r.hopital, statut:r.statut,
      notes:r.notes, duree:r.duree,
    })),
    ...taches.filter(t=>t.echeance&&t.statut!=="Terminée").map(t => ({
      id:"tache_"+t.id, source:"tache", raw:t,
      date:t.echeance, heure:"", type:"Tâche",
      patientId:t.patientId||"", assigneA:t.assigneA,
      titre:t.titre, statut:t.statut, priorite:t.priorite,
    })),
    ...finances.filter(f=>f.date).map(f => ({
      id:"fin_"+f.id, source:"finance", raw:f,
      date:f.date, heure:"", type:"Paiement",
      patientId:f.patientId, assigneA:f.creePar,
      montant:f.montant, finType:f.type, statut:f.statut,
    })),
  ];

  // ── Filtre selon rôle & paramètres ────────────────────────────────────────
  const filtered = allEvents.filter(e => {
    // Filtre utilisateur
    if(filterUser==="mon"){
      if(user.role==="coordinatrice") {
        const allowedTypes=["Arrivée","Départ","Opération","Chirurgie","Intervention","Contrôle"];
        if(!allowedTypes.some(t=>e.type?.includes(t))) return false;
      } else if(user.role==="commerciale") {
        if(e.assigneA!==user.id&&e.source!=="finance") return false;
      } else {
        if(e.assigneA!==user.id&&e.source==="rdv") {}
      }
    }
    // Filtre type
    if(filterType!=="tous"){
      const typeMap={rdvs:"rdv",taches:"tache",finances:"finance",chirurgies:"rdv",arrivees:"rdv",departs:"rdv"};
      if(filterType==="chirurgies"&&!["Opération","Chirurgie","Intervention"].some(t=>e.type?.includes(t))) return false;
      else if(filterType==="arrivees"&&!e.type?.toLowerCase().includes("arrivée")) return false;
      else if(filterType==="departs"&&!e.type?.toLowerCase().includes("départ")) return false;
      else if(["rdvs","taches","finances"].includes(filterType)&&e.source!==typeMap[filterType]) return false;
    }
    // Filtre recherche
    if(search){
      const p=getP(e.patientId);
      const sq=search.toLowerCase();
      if(!`${p?.prenom||""} ${p?.nom||""} ${e.type||""} ${e.medecin||""} ${e.hopital||""} ${e.titre||""}`.toLowerCase().includes(sq)) return false;
    }
    return true;
  });

  const getEventsForDay = ds => filtered.filter(e=>e.date===ds).sort((a,b)=>(a.heure||"").localeCompare(b.heure||""));

  // ── Statistiques du jour ───────────────────────────────────────────────────
  const todayEvts = allEvents.filter(e=>e.date===today);
  const stats = {
    consults: todayEvts.filter(e=>e.type?.toLowerCase().includes("consult")).length,
    chirurgies: todayEvts.filter(e=>["Opération","Chirurgie","Intervention"].some(t=>e.type?.includes(t))).length,
    arrivees: todayEvts.filter(e=>e.type?.toLowerCase().includes("arrivée")).length,
    departs: todayEvts.filter(e=>e.type?.toLowerCase().includes("départ")).length,
    paiements: todayEvts.filter(e=>e.source==="finance"&&e.statut==="Complété").reduce((a,e)=>a+Number(e.montant||0),0),
    taches: todayEvts.filter(e=>e.source==="tache").length,
  };

  // ── Grille calendrier ─────────────────────────────────────────────────────
  const firstDow = (new Date(year,month,1).getDay()+6)%7;
  const daysInMonth = new Date(year,month+1,0).getDate();
  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  // ── Semaine ───────────────────────────────────────────────────────────────
  const getWeekDays = () => {
    const ref = selectedDay ? new Date(selectedDay+"T12:00:00") : new Date();
    const dow = (ref.getDay()+6)%7;
    const mon = new Date(ref); mon.setDate(ref.getDate()-dow);
    return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return fmtD(d.getFullYear(),d.getMonth(),d.getDate());});
  };

  // ── Mini carte événement ───────────────────────────────────────────────────
  const EventCard = ({e, compact=false}) => {
    const p = getP(e.patientId);
    const a = getU(e.assigneA);
    const color = e.source==="tache"?C.muted:e.source==="finance"?C.amber:getEvtColor(e.type);
    const icon = e.source==="tache"?"✅":e.source==="finance"?"💶":getEvtIcon(e.type);
    const statColor = e.statut==="Confirmé"?C.green:e.statut==="Terminé"?C.muted:e.statut==="Annulé"?C.red:C.amber;
    return (
      <div onClick={()=>setSelEvent(e)} style={{background:C.white,borderRadius:12,padding:compact?"8px 10px":"12px 14px",marginBottom:6,border:`1px solid ${C.border}`,borderLeft:`4px solid ${color}`,cursor:"pointer",transition:"box-shadow 0.15s"}}
        onMouseEnter={el=>el.currentTarget.style.boxShadow="0 3px 12px rgba(0,0,0,0.08)"}
        onMouseLeave={el=>el.currentTarget.style.boxShadow="none"}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:compact?14:16,flexShrink:0}}>{icon}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:compact?11:13,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              {e.heure&&<span style={{color,fontWeight:800,marginRight:4}}>{e.heure}</span>}
              {e.source==="tache"?e.titre:e.source==="finance"?`${e.finType||"Paiement"} — ${fmtEur(e.montant)}`:e.type}
            </div>
            {p&&<div style={{fontSize:10,color:C.muted,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.prenom} {p.nom}{e.medecin?` · ${e.medecin}`:""}</div>}
          </div>
          {!compact&&e.statut&&<span style={{background:statColor+"18",color:statColor,padding:"2px 7px",borderRadius:99,fontSize:9,fontWeight:700,flexShrink:0}}>{e.statut}</span>}
          {!compact&&a&&<div style={{width:20,height:20,borderRadius:99,background:a.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:a.color,flexShrink:0}}>{a.prenom[0]}</div>}
        </div>
      </div>
    );
  };

  // ── Modal événement ────────────────────────────────────────────────────────
  const EventModal = ({e, onClose}) => {
    if(!e) return null;
    const p = getP(e.patientId);
    const a = getU(e.assigneA);
    const color = e.source==="tache"?C.muted:e.source==="finance"?C.amber:getEvtColor(e.type);
    const icon = e.source==="tache"?"✅":e.source==="finance"?"💶":getEvtIcon(e.type);
    const pFinances = finances.filter(f=>f.patientId===e.patientId);
    const totalPaye = pFinances.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
    return (
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.7)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:C.bg,borderRadius:"20px 20px 0 0",padding:"8px 0 32px",width:"100%",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
          <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"12px auto 0"}}/>
          {/* Header coloré */}
          <div style={{background:`linear-gradient(135deg,${color},${color}cc)`,padding:"16px 20px 20px",margin:"12px 0 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:28,marginBottom:6}}>{icon}</div>
                <div style={{color:C.white,fontWeight:800,fontSize:17}}>{e.source==="tache"?e.titre:e.source==="finance"?`${e.finType} — ${fmtEur(e.montant)}`:e.type}</div>
                <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,marginTop:3}}>
                  {fmtDate(e.date)}{e.heure?` à ${e.heure}`:""}
                  {e.duree?` · ${e.duree} min`:""}
                </div>
              </div>
              <button onClick={onClose} style={{border:"none",background:"rgba(255,255,255,0.2)",color:C.white,width:32,height:32,borderRadius:9,cursor:"pointer",fontSize:14}}>✕</button>
            </div>
          </div>
          <div style={{padding:"16px 20px"}}>
            {/* Patient */}
            {p&&<div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <Avatar p={p} size={46}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:15,color:C.text}}>{p.prenom} {p.nom}</div>
                  <div style={{fontSize:12,color:C.muted}}>{p.procedure} · {p.pays}</div>
                  <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                    <Badge text={p.stade} color={SC[p.stade]||C.muted} small/>
                    {e.source!=="finance"&&<Badge text={e.statut||"Planifié"} color={e.statut==="Confirmé"?C.green:e.statut==="Annulé"?C.red:C.amber} small/>}
                  </div>
                </div>
              </div>
            </div>}
            {/* Détails */}
            <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0}}>
                {[
                  e.medecin&&["🩺","Médecin",e.medecin],
                  e.hopital&&["🏥","Hôpital",e.hopital],
                  e.salle&&["🚪","Salle",e.salle],
                  a&&["👤","Assigné à",a.prenom],
                  e.duree&&["⏱️","Durée",e.duree+" min"],
                  e.priorite&&["🎯","Priorité",e.priorite],
                ].filter(Boolean).map(([ic,lb,vl])=>(
                  <div key={lb} style={{padding:"8px 8px",borderBottom:`1px solid ${C.bg}`}}>
                    <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:2}}>{ic} {lb}</div>
                    <div style={{fontSize:12,color:C.text,fontWeight:600}}>{vl}</div>
                  </div>
                ))}
              </div>
            </div>
            {/* Finance patient */}
            {p&&pFinances.length>0&&<div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:8}}>💶 FINANCES PATIENT</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[{l:"Budget",v:fmtEur(p.budget),c:C.gold},{l:"Payé",v:fmtEur(totalPaye),c:C.green},{l:"Restant",v:fmtEur(Math.max(Number(p.budget||0)-totalPaye,0)),c:C.red}].map(s=>(
                  <div key={s.l} style={{background:s.c+"08",borderRadius:8,padding:"8px",textAlign:"center",border:`1px solid ${s.c}22`}}>
                    <div style={{fontWeight:800,fontSize:13,color:s.c}}>{s.v}</div>
                    <div style={{fontSize:9,color:C.muted,marginTop:2}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>}
            {e.notes&&<div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6}}>📝 NOTES</div>
              <div style={{fontSize:13,color:C.text,lineHeight:1.6}}>{e.notes}</div>
            </div>}
            {/* Actions */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {p?.tel&&<a href={`https://wa.me/${p.tel.replace(/\D/g,"")}`} target="_blank" style={{padding:"10px",background:"#25D366"+"18",color:"#25D366",border:`1px solid #25D36633`,borderRadius:11,textDecoration:"none",textAlign:"center",fontWeight:700,fontSize:12}}>📲 WhatsApp</a>}
              {p?.tel&&<a href={`tel:${p.tel}`} style={{padding:"10px",background:C.blue+"12",color:C.blue,border:`1px solid ${C.blue}33`,borderRadius:11,textDecoration:"none",textAlign:"center",fontWeight:700,fontSize:12}}>📞 Appeler</a>}
              {p?.email&&<a href={`mailto:${p.email}`} style={{padding:"10px",background:C.purple+"12",color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:11,textDecoration:"none",textAlign:"center",fontWeight:700,fontSize:12}}>📧 Email</a>}
              {p&&onSelectPatient&&<button onClick={()=>{onClose();onSelectPatient(p);}} style={{padding:"10px",background:C.navy,color:C.white,border:"none",borderRadius:11,cursor:"pointer",fontWeight:700,fontSize:12}}>👤 Fiche patient</button>}
            </div>
          </div>
        </div>
      </div>
    );
  };

  // ── Vue Planning chirurgies ────────────────────────────────────────────────
  const PlanningChirurgies = () => {
    const chirurgies = allEvents.filter(e=>["Opération","Chirurgie","Intervention"].some(t=>e.type?.includes(t))).sort((a,b)=>a.date?.localeCompare(b.date||"")||a.heure?.localeCompare(b.heure||""));
    const STATUS_COLORS = {"Prévu":C.muted,"Confirmé":C.green,"En cours":C.blue,"Terminé":"#64748b","Annulé":C.red,"Reporté":C.amber};
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <button onClick={()=>setShowPlanning(false)} style={{border:"none",background:"none",cursor:"pointer",color:C.blue,fontWeight:700,fontSize:13,padding:0}}>← Agenda</button>
          <div style={{flex:1,fontWeight:800,fontSize:15,color:C.navy}}>🔬 Planning opératoire</div>
          <Badge text={chirurgies.length+" chirurgies"} color={C.green} small/>
        </div>
        {chirurgies.length===0?<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Aucune chirurgie planifiée</div>:
        chirurgies.map(e=>{
          const p=getP(e.patientId);
          const color=getEvtColor(e.type);
          const statColor=STATUS_COLORS[e.statut]||C.muted;
          return (
            <div key={e.id} onClick={()=>setSelEvent(e)} style={{background:C.white,borderRadius:14,padding:"14px 16px",marginBottom:8,border:`1px solid ${C.border}`,borderLeft:`4px solid ${color}`,cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{minWidth:52,textAlign:"center",background:C.bg,borderRadius:10,padding:"6px 4px",flexShrink:0}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.muted}}>{e.date?.slice(5).replace("-","/")||""}</div>
                  <div style={{fontSize:15,fontWeight:800,color:color}}>{e.heure||"—"}</div>
                  {e.duree&&<div style={{fontSize:9,color:C.muted}}>{e.duree}min</div>}
                </div>
                <Avatar p={p||{prenom:"?",nom:""}} size={38}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:13,color:C.text}}>{p?`${p.prenom} ${p.nom}`:"—"}</div>
                  <div style={{fontSize:11,color:C.muted}}>{p?.procedure}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{e.medecin?`🩺 ${e.medecin}`:""}{e.hopital?` · 🏥 ${e.hopital}`:""}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{background:statColor+"18",color:statColor,border:`1px solid ${statColor}33`,padding:"3px 8px",borderRadius:99,fontSize:10,fontWeight:700}}>{e.statut||"Prévu"}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  if(showPlanning) return <PlanningChirurgies/>;

  const selEvents = getEventsForDay(selectedDay);
  const weekDays = getWeekDays();

  return (
    <div>
      {/* ── KPI du jour ── */}
      <div style={{background:`linear-gradient(135deg,${C.navy},#1a3a5c)`,borderRadius:16,padding:"14px 16px",marginBottom:12}}>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:10,fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Aujourd'hui · {new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
          {[
            {l:"Consultations",v:stats.consults,c:"#60a5fa"},
            {l:"Chirurgies",v:stats.chirurgies,c:"#4ade80"},
            {l:"Arrivées",v:stats.arrivees,c:"#a78bfa"},
            {l:"Départs",v:stats.departs,c:"#67e8f9"},
            {l:"Tâches",v:stats.taches,c:"#fbbf24"},
            {l:"Encaissé",v:fmtEur(stats.paiements),c:C.gold},
          ].map(s=>(
            <div key={s.l} style={{background:"rgba(255,255,255,0.08)",borderRadius:9,padding:"8px 6px",textAlign:"center"}}>
              <div style={{color:s.c,fontWeight:800,fontSize:s.l==="Encaissé"?11:16,lineHeight:1}}>{s.v}</div>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:8,marginTop:3}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Barre d'outils ── */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:3,background:C.bg,borderRadius:10,padding:3,flex:1}}>
          {[{id:"mois",l:"Mois"},{id:"semaine",l:"Sem."},{id:"jour",l:"Jour"},{id:"liste",l:"Liste"}].map(v=>(
            <button key={v.id} onClick={()=>setViewMode(v.id)} style={{flex:1,padding:"6px 4px",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:10,background:viewMode===v.id?C.white:"transparent",color:viewMode===v.id?C.navy:C.muted,transition:"all 0.15s"}}>
              {v.l}
            </button>
          ))}
        </div>
        <button onClick={()=>setShowPlanning(true)} style={{padding:"8px 10px",border:"none",borderRadius:10,background:C.green+"18",color:C.green,cursor:"pointer",fontWeight:700,fontSize:11,flexShrink:0}}>🔬 Bloc op.</button>
        {onAddRdv&&<button onClick={onAddRdv} style={{padding:"8px 12px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:12,flexShrink:0}}>+ Événement</button>}
      </div>

      {/* ── Filtres ── */}
      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
        {[
          {id:"mon",l:"👤 Mon agenda"},
          ...(user.role==="admin"?[{id:"equipe",l:"👥 Équipe"},{id:"tous",l:"🌐 Tout"}]:[]),
        ].map(f=>(
          <button key={f.id} onClick={()=>setFilterUser(f.id)} style={{padding:"6px 10px",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:11,background:filterUser===f.id?user.color:C.bg,color:filterUser===f.id?C.white:C.muted,flexShrink:0,whiteSpace:"nowrap"}}>
            {f.l}
          </button>
        ))}
        <div style={{width:1,background:C.border,flexShrink:0}}/>
        {[{id:"tous",l:"Tous"},{id:"rdvs",l:"RDV"},{id:"chirurgies",l:"Chirurgies"},{id:"taches",l:"Tâches"},{id:"finances",l:"Paiements"},{id:"arrivees",l:"Arrivées"},{id:"departs",l:"Départs"}].map(f=>(
          <button key={f.id} onClick={()=>setFilterType(f.id)} style={{padding:"6px 10px",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:10,background:filterType===f.id?C.navy:"transparent",color:filterType===f.id?C.white:C.muted,flexShrink:0,whiteSpace:"nowrap"}}>
            {f.l}
          </button>
        ))}
      </div>

      {/* ── Recherche ── */}
      <div style={{position:"relative",marginBottom:12}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Patient, médecin, hôpital, intervention…" style={{width:"100%",padding:"9px 12px 9px 36px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:12,outline:"none",background:C.white,boxSizing:"border-box"}}/>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:C.muted}}>🔍</span>
        {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:14}}>✕</button>}
      </div>

      {/* ── Navigation date ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setCurrentDate(new Date(year,month-1,1))} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <button onClick={()=>setCurrentDate(new Date(year,month+1,1))} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <div style={{fontWeight:800,fontSize:14,color:C.navy}}>{MOIS[month]} {year}</div>
        <button onClick={()=>{setCurrentDate(new Date());setSelectedDay(today);}} style={{border:`1px solid ${C.border}`,background:today===selectedDay?C.navy:C.white,color:today===selectedDay?C.white:C.navy,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>Auj.</button>
      </div>

      {/* ── VUE MOIS ── */}
      {viewMode==="mois"&&<>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {JOURS.map(j=><div key={j} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,padding:"3px 0"}}>{j}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:12}}>
          {cells.map((d,i)=>{
            if(!d) return <div key={i}/>;
            const ds=fmtD(year,month,d);
            const evts=getEventsForDay(ds);
            const isToday=ds===today;
            const isSel=ds===selectedDay;
            // Couleurs multiples
            const colors=[...new Set(evts.map(e=>e.source==="tache"?C.muted:e.source==="finance"?C.amber:getEvtColor(e.type)))].slice(0,3);
            return (
              <div key={i} onClick={()=>setSelectedDay(isSel&&viewMode==="mois"?null:ds)} style={{minHeight:48,borderRadius:9,padding:"4px 2px",cursor:"pointer",textAlign:"center",background:isSel?C.navy:isToday?"#EFF6FF":C.white,border:`1px solid ${isSel?C.navy:isToday?C.blue:C.border}`,transition:"all 0.15s",position:"relative"}}>
                <div style={{fontSize:11,fontWeight:isToday||isSel?800:400,color:isSel?C.white:isToday?C.blue:C.text,marginBottom:2}}>{d}</div>
                <div style={{display:"flex",justifyContent:"center",gap:2,flexWrap:"wrap"}}>
                  {colors.map((col,ci)=><div key={ci} style={{width:5,height:5,borderRadius:99,background:isSel?"rgba(255,255,255,0.8)":col}}/>)}
                </div>
                {evts.length>2&&<div style={{fontSize:7,color:isSel?"rgba(255,255,255,0.7)":C.muted,fontWeight:700,marginTop:1}}>{evts.length}</div>}
              </div>
            );
          })}
        </div>
        {/* Légende */}
        <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
          {[["#1D73C9","Consultation"],["#16A34A","Chirurgie"],["#D97706","Paiement"],["#7C3AED","Contrôle"],["#0B1F3A","Arrivée"],["#0891B2","Départ"],["#64748B","Tâche"]].map(([col,lb])=>(
            <div key={lb} style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:C.muted}}>
              <div style={{width:7,height:7,borderRadius:99,background:col}}/>{lb}
            </div>
          ))}
        </div>
      </>}

      {/* ── VUE SEMAINE ── */}
      {viewMode==="semaine"&&<>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:12}}>
          {weekDays.map((ds,i)=>{
            const d=new Date(ds+"T12:00:00").getDate();
            const evts=getEventsForDay(ds);
            const isToday=ds===today;
            const isSel=ds===selectedDay;
            return (
              <div key={i} onClick={()=>setSelectedDay(ds)} style={{borderRadius:10,padding:"7px 3px",cursor:"pointer",textAlign:"center",background:isSel?C.navy:isToday?"#EFF6FF":C.white,border:`1px solid ${isSel?C.navy:isToday?C.blue:C.border}`}}>
                <div style={{fontSize:9,fontWeight:700,color:isSel?C.white:C.muted,marginBottom:2}}>{JOURS[i]}</div>
                <div style={{fontSize:14,fontWeight:800,color:isSel?C.white:isToday?C.blue:C.text,marginBottom:3}}>{d}</div>
                {evts.slice(0,2).map((e,ei)=>(
                  <div key={ei} style={{width:"85%",height:3,borderRadius:99,background:isSel?"rgba(255,255,255,0.7)":getEvtColor(e.type),margin:"1px auto"}}/>
                ))}
                {evts.length>0&&<div style={{fontSize:8,color:isSel?"rgba(255,255,255,0.7)":C.muted,marginTop:2,fontWeight:700}}>{evts.length}</div>}
              </div>
            );
          })}
        </div>
      </>}

      {/* ── VUE LISTE ── */}
      {viewMode==="liste"&&<>
        {(()=>{
          const groups={};
          filtered.sort((a,b)=>a.date?.localeCompare(b.date||"")||a.heure?.localeCompare(b.heure||"")).forEach(e=>{
            const d=e.date||"Sans date";
            if(!groups[d]) groups[d]=[];
            groups[d].push(e);
          });
          return Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).slice(0,20).map(([date,evts])=>(
            <div key={date} style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:800,color:date===today?C.blue:date<today?C.muted:C.navy,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:6,height:6,borderRadius:99,background:date===today?C.blue:date<today?C.muted:C.navy}}/>
                {date===today?"Aujourd'hui":fmtDateShort(date)} — {evts.length} événement(s)
              </div>
              {evts.map(e=><EventCard key={e.id} e={e}/>)}
            </div>
          ));
        })()}
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Aucun événement{search?` pour "${search}"`:""}.</div>}
      </>}

      {/* ── Détail du jour sélectionné (modes mois/semaine/jour) ── */}
      {(viewMode==="mois"||viewMode==="semaine"||viewMode==="jour")&&selectedDay&&<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:800,color:C.navy}}>{fmtDate(selectedDay)}</div>
          <Badge text={selEvents.length+" événement(s)"} color={selEvents.length>0?C.blue:C.muted} small/>
        </div>
        {selEvents.length===0?(
          <div style={{background:C.white,borderRadius:12,padding:20,textAlign:"center",color:C.muted,fontSize:13,border:`1px solid ${C.border}`}}>
            Aucun événement ce jour 🎉
            {onAddRdv&&<div style={{marginTop:10}}><button onClick={onAddRdv} style={{padding:"8px 14px",border:"none",borderRadius:9,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:12}}>+ Ajouter un événement</button></div>}
          </div>
        ):selEvents.map(e=><EventCard key={e.id} e={e}/>)}
      </>}

      {/* ── Modal événement ── */}
      {selEvent&&<EventModal e={selEvent} onClose={()=>setSelEvent(null)}/>}
    </div>
  );
}

// ── VUE ÉQUIPE (ADMIN SEULEMENT) ──────────────────────────────────────────────
function VueEquipe({patients, rdvs, taches, finances}) {
  const [membre, setMembre] = useState("all");
  const today = todayStr();

  const membres = USERS.filter(u=>u.role!=="admin");
  const selectedUser = membre==="all" ? null : USERS.find(u=>u.id===membre);

  const filterByUser = (arr, key="assigneA") => 
    membre==="all" ? arr : arr.filter(x=>x[key]===membre||x.creePar===membre);

  const displayRdvs = filterByUser(rdvs).sort((a,b)=>a.date.localeCompare(b.date));
  const displayTaches = filterByUser(taches);
  const displayPatients = membre==="all" ? patients : patients.filter(p=>p.creePar===membre);
  const displayFinances = filterByUser(finances,"creePar");

  const getP = id => patients.find(p=>String(p.id)===String(id));
  const getU = id => USERS.find(u=>u.id===id);

  const recus = displayFinances.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);

        <div style={{color:"#C9A84C",fontSize:20,fontWeight:800}}>Veys Turan</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12,marginTop:2}}>Vue complète de l'équipe Clinic Nobel Istanbul</div>
        <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",flex:1,textAlign:"center",minWidth:80}}>
            <div style={{color:"white",fontSize:20,fontWeight:800}}>{patients.length}</div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:10}}>Patients total</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",flex:1,textAlign:"center",minWidth:80}}>
            <div style={{color:"white",fontSize:20,fontWeight:800}}>{rdvs.filter(r=>r.date===today).length}</div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:10}}>RDV aujourd'hui</div>
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",flex:1,textAlign:"center",minWidth:80}}>
            <div style={{color:"#C9A84C",fontSize:18,fontWeight:800}}>{fmtEur(finances.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0))}</div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:10}}>Revenus totaux</div>
          </div>
        </div>
      </Card>

      {/* Filtres membres */}
      <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setMembre("all")} style={{padding:"8px 16px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,background:membre==="all"?"#0B1F3A":C.bg,color:membre==="all"?C.white:C.muted,flexShrink:0}}>
          👥 Toute l'équipe
        </button>
        {membres.map(u=>(
          <button key={u.id} onClick={()=>setMembre(u.id)} style={{padding:"8px 16px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,background:membre===u.id?u.color:C.bg,color:membre===u.id?C.white:C.muted,flexShrink:0,display:"flex",alignItems:"center",gap:6}}>

          <Avatar p={{prenom:selectedUser.prenom,nom:""}} size={44} color={selectedUser.color}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:16,color:C.text}}>{selectedUser.prenom}</div>
            <div style={{fontSize:12,color:selectedUser.color,fontWeight:600}}>{ROLE_LABELS[selectedUser.role]}</div>

          <div style={{display:"flex",gap:8}}>

        displayTaches.map(t=>{

          const done=t.statut==="Terminée";

            <div key={t.id} style={{display:"flex",gap:10,alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.bg}`,opacity:done?0.5:1}}>
              <div style={{width:16,height:16,borderRadius:99,border:`2px solid ${done?C.green:assignee?.color||C.blue}`,background:done?C.green:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontSize:10}}>{done?"✓":""}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13,color:C.text,textDecoration:done?"line-through":"none"}}>{t.titre}</div>
                {t.echeance&&<div style={{fontSize:10,color:C.muted}}>📅 {t.echeance}</div>}
              </div>
              {membre==="all"&&assignee&&<div style={{display:"flex",alignItems:"center",gap:4}}>
                <Avatar p={{prenom:assignee.prenom,nom:""}} size={22} color={assignee.color}/>

              </div>}

      {/* Finances */}
      {displayFinances.length>0&&<Card>
        <SecTitle icon="💶">Finances {membre==="all"?"équipe":selectedUser?.prenom}</SecTitle>
        {displayFinances.slice(0,5).map(f=>{
          const p=getP(f.patientId);
          return (
            <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.bg}`}}>
              <div style={{flex:1}}>

                <div style={{fontWeight:800,fontSize:14,color:f.statut==="Complété"?C.green:C.amber}}>{fmtEur(f.montant)}</div>

              </div>
            </div>
          );
        })}
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:C.muted,fontWeight:600}}>Total encaissé</span>

        </div>
      </Card>}
    </div>
  );
}

// ── MESSAGERIE ────────────────────────────────────────────────────────────────
function Messagerie({user,patients}){
  const [selUser,setSelUser]=useState(null);
  const [msg,setMsg]=useState("");
  const [messages,setMessages]=useState(()=>{try{return JSON.parse(localStorage.getItem("cn_messages")||"{}");}catch(e){return{};}});
  const autres=USERS.filter(u=>u.id!==user.id);
  const getThread=(uid)=>messages[`${[user.id,uid].sort().join("_")}`]||[];
  const sendMsg=()=>{
    if(!msg.trim()||!selUser)return;
    const key=[user.id,selUser.id].sort().join("_");
    const newMsg={id:uid(),from:user.id,text:msg.trim(),ts:Date.now()};
    const updated={...messages,[key]:[...getThread(selUser.id),newMsg]};
    setMessages(updated);
    localStorage.setItem("cn_messages",JSON.stringify(updated));
    setMsg("");
  };
  const thread=selUser?getThread(selUser.id):[];
  if(selUser){
    return (
      <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 160px)"}}>
        <button onClick={()=>setSelUser(null)} style={{border:"none",background:"none",cursor:"pointer",color:C.blue,fontWeight:700,fontSize:13,marginBottom:12,display:"flex",alignItems:"center",gap:6,padding:0}}>← Messagerie</button>
        <div style={{background:`linear-gradient(135deg,${selUser.color},${selUser.color}cc)`,borderRadius:14,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
          <Avatar p={{prenom:selUser.prenom,nom:selUser.nom}} size={40} color={selUser.color} style={{background:"rgba(255,255,255,0.2)"}}/>
          <div>
            <div style={{color:C.white,fontWeight:800,fontSize:14}}>{selUser.prenom} {selUser.nom}</div>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{ROLE_LABELS[selUser.role]} · En ligne</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 0 8px"}}>
          {thread.length===0&&<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Démarrez la conversation 💬</div>}
          {thread.map(m=>{
            const isMine=m.from===user.id;
            const sender=USERS.find(u=>u.id===m.from);
            return (
              <div key={m.id} style={{display:"flex",justifyContent:isMine?"flex-end":"flex-start",marginBottom:8}}>
                {!isMine&&<Avatar p={{prenom:sender?.prenom||"?",nom:""}} size={28} color={sender?.color} style={{marginRight:8,alignSelf:"flex-end",flexShrink:0}}/>}
                <div style={{maxWidth:"75%"}}>
                  <div style={{background:isMine?C.navy:C.white,color:isMine?C.white:C.text,borderRadius:isMine?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 14px",fontSize:13,border:isMine?"none":`1px solid ${C.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                    {m.text}
                  </div>
                  <div style={{fontSize:9,color:C.muted,marginTop:3,textAlign:isMine?"right":"left"}}>{new Date(m.ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
          <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()} placeholder="Écrire un message…" style={{flex:1,padding:"11px 14px",border:`1.5px solid ${C.border}`,borderRadius:12,fontSize:13,outline:"none",background:C.white}}/>
          <button onClick={sendMsg} style={{width:44,height:44,border:"none",borderRadius:12,background:C.navy,color:C.white,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>➤</button>
        </div>
      </div>
    );
  }
  return (
    <div>
      <div style={{fontSize:13,color:C.muted,marginBottom:14}}>Messagerie interne Clinic Nobel</div>
      {autres.map(u=>{
        const thread=getThread(u.id);
        const lastMsg=thread[thread.length-1];
        const unread=thread.filter(m=>m.from!==user.id).length;
        return (
          <div key={u.id} onClick={()=>setSelUser(u)} style={{background:C.white,borderRadius:14,padding:"14px 16px",marginBottom:8,cursor:"pointer",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
            <div style={{position:"relative"}}>
              <Avatar p={{prenom:u.prenom,nom:u.nom}} size={44} color={u.color}/>
              <div style={{position:"absolute",bottom:0,right:0,width:10,height:10,borderRadius:99,background:C.green,border:`2px solid ${C.white}`}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,color:C.text}}>{u.prenom} {u.nom}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{lastMsg?lastMsg.text.slice(0,40)+"…":"Aucun message"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              {unread>0&&<div style={{width:20,height:20,borderRadius:99,background:C.blue,color:C.white,fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</div>}
              {lastMsg&&<div style={{fontSize:9,color:C.muted,marginTop:4}}>{new Date(lastMsg.ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function Notifications({user,patients,rdvs,taches,finances}){
  const today=todayStr();
  const notifs=[
    ...rdvs.filter(r=>r.date===today&&(user.role==="admin"||r.assigneA===user.id)).map(r=>{
      const p=patients.find(x=>String(x.id)===String(r.patientId));
      return {id:"rdv_"+r.id,ic:"📅",title:"RDV aujourd'hui",desc:`${p?.prenom||"?"} ${p?.nom||""} à ${r.heure}`,color:C.blue,ts:r.heure};
    }),
    ...taches.filter(t=>t.echeance===today&&t.statut!=="Terminée"&&(user.role==="admin"||t.assigneA===user.id)).map(t=>({
      id:"tache_"+t.id,ic:"✅",title:"Tâche échue aujourd'hui",desc:t.titre,color:C.amber,ts:"now"
    })),
    ...taches.filter(t=>t.echeance<today&&t.statut!=="Terminée"&&(user.role==="admin"||t.assigneA===user.id)).map(t=>({
      id:"late_"+t.id,ic:"⚠️",title:"Tâche en retard",desc:`${t.titre} — échue le ${t.echeance}`,color:C.red,ts:t.echeance
    })),
    ...finances.filter(f=>f.date===today&&f.statut==="Complété").map(f=>{
      const p=patients.find(x=>String(x.id)===String(f.patientId));
      return {id:"fin_"+f.id,ic:"💶",title:"Paiement reçu",desc:`${p?.prenom||"?"} — ${fmtEur(f.montant)}`,color:C.green,ts:f.date};
    }),
    ...finances.filter(f=>f.statut==="En attente"&&f.date<today).map(f=>{
      const p=patients.find(x=>String(x.id)===String(f.patientId));
      return {id:"debt_"+f.id,ic:"🔴",title:"Paiement en retard",desc:`${p?.prenom||"?"} — ${fmtEur(f.montant)} dû`,color:C.red,ts:f.date};
    }),
    ...patients.filter(p=>p.cree===today).map(p=>({
      id:"pat_"+p.id,ic:"👤",title:"Nouveau patient",desc:`${p.prenom} ${p.nom} — ${p.procedure}`,color:C.purple,ts:"now"
    })),
    ...patients.filter(p=>p.stade==="Confirmé"&&!finances.some(f=>f.patientId===p.id&&f.type==="Acompte")).map(p=>({
      id:"acc_"+p.id,ic:"💰",title:"Acompte manquant",desc:`${p.prenom} ${p.nom} — dossier confirmé sans acompte`,color:C.amber,ts:"action"
    })),
  ];
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontSize:13,color:C.muted}}>{notifs.length} notification(s)</div>
        <div style={{background:C.red,color:C.white,borderRadius:99,padding:"2px 10px",fontSize:11,fontWeight:700}}>{notifs.length}</div>
      </div>
      {notifs.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Aucune notification 🎉</div>}
      {notifs.map(n=>(
        <div key={n.id} style={{background:C.white,borderRadius:14,padding:"14px 16px",marginBottom:8,border:`1px solid ${C.border}`,borderLeft:`4px solid ${n.color}`,display:"flex",alignItems:"flex-start",gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:n.color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{n.ic}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{n.title}</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{n.desc}</div>
          </div>
          <div style={{width:8,height:8,borderRadius:99,background:n.color,flexShrink:0,marginTop:6}}/>
        </div>
      ))}
    </div>
  );
}

// ── RECHERCHE GLOBALE ─────────────────────────────────────────────────────────
function RechercheGlobale({patients,rdvs,taches,finances,onSelectPatient}){
  const [q,setQ]=useState("");
  const [cat,setCat]=useState("tous");
  const sq=q.toLowerCase().trim();
  const results=sq.length<2?[]:([
    ...(cat==="tous"||cat==="patients"?patients.filter(p=>`${p.prenom} ${p.nom} ${p.email||""} ${p.tel||""} ${p.procedure||""}`.toLowerCase().includes(sq)).map(p=>({type:"patient",ic:"👤",title:`${p.prenom} ${p.nom}`,sub:`${p.procedure} · ${p.pays}`,color:C.blue,data:p})):[]),
    ...(cat==="tous"||cat==="rdvs"?rdvs.filter(r=>{const p=patients.find(x=>String(x.id)===String(r.patientId));return `${p?.prenom||""} ${p?.nom||""} ${r.type||""} ${r.medecin||""}`.toLowerCase().includes(sq);}).map(r=>{const p=patients.find(x=>String(x.id)===String(r.patientId));return{type:"rdv",ic:"📅",title:`${p?.prenom||"?"} ${p?.nom||""} — ${r.type}`,sub:`${r.date} à ${r.heure}`,color:C.purple,data:r};}):[]),
    ...(cat==="tous"||cat==="taches"?taches.filter(t=>`${t.titre} ${t.description||""}`.toLowerCase().includes(sq)).map(t=>({type:"tache",ic:"✅",title:t.titre,sub:t.description||"—",color:C.amber,data:t})):[]),
    ...(cat==="tous"||cat==="finances"?finances.filter(f=>{const p=patients.find(x=>String(x.id)===String(f.patientId));return `${p?.prenom||""} ${p?.nom||""} ${f.procedure||""}`.toLowerCase().includes(sq);}).map(f=>{const p=patients.find(x=>String(x.id)===String(f.patientId));return{type:"finance",ic:"💶",title:`${p?.prenom||"?"} — ${f.type}`,sub:`${fmtEur(f.montant)} · ${f.date}`,color:C.green,data:f};}):[]),
  ]).slice(0,20);
  return (
    <div>
      <div style={{background:`linear-gradient(135deg,${C.navy},#1a3a5c)`,borderRadius:16,padding:"16px",marginBottom:14}}>
        <div style={{position:"relative"}}>
          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Rechercher patients, RDV, tâches, finances…" style={{width:"100%",padding:"12px 16px 12px 44px",border:"none",borderRadius:12,fontSize:14,outline:"none",background:"rgba(255,255,255,0.95)",boxSizing:"border-box"}}/>
          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18}}>🔍</span>
          {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:16}}>✕</button>}
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {[{id:"tous",l:"Tout"},{id:"patients",l:"👤 Patients"},{id:"rdvs",l:"📅 RDV"},{id:"taches",l:"✅ Tâches"},{id:"finances",l:"💶 Finances"}].map(c=>(
          <button key={c.id} onClick={()=>setCat(c.id)} style={{padding:"7px 12px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:11,background:cat===c.id?C.navy:C.bg,color:cat===c.id?C.white:C.muted,flexShrink:0,whiteSpace:"nowrap"}}>
            {c.l}
          </button>
        ))}
      </div>
      {q.length>=2&&results.length===0&&<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:14}}>Aucun résultat pour "{q}"</div>}
      {q.length<2&&<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Tapez au moins 2 caractères pour rechercher…</div>}
      {results.map((r,i)=>(
        <div key={i} onClick={r.type==="patient"?()=>onSelectPatient(r.data):undefined} style={{background:C.white,borderRadius:12,padding:"12px 14px",marginBottom:6,border:`1px solid ${C.border}`,borderLeft:`3px solid ${r.color}`,cursor:r.type==="patient"?"pointer":"default",display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:9,background:r.color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{r.ic}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{r.title}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>{r.sub}</div>
          </div>
          <Badge text={r.type} color={r.color} small/>
        </div>
      ))}
      {results.length>0&&<div style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:8}}>{results.length} résultat(s)</div>}
    </div>
  );
}
function App() {
  const [user,setUser] = useState(()=>{
    try{ const s=localStorage.getItem("cn_user"); return s?JSON.parse(s):null; }catch(e){return null;}
  });
  const [view,setView] = useState("dashboard");
  const [patients,setPatients] = useState(()=>cache.load("patients")||[]);
  const [rdvs,setRdvs] = useState(()=>cache.load("rdvs")||[]);
  const [finances,setFinances] = useState(()=>cache.load("finances")||[]);
  const [taches,setTaches] = useState(()=>cache.load("taches")||[]);
  const [hopitaux,setHopitaux] = useState(()=>cache.load("hopitaux")||[]);
  // Don't show loading if we have cached data
  const [loading,setLoading] = useState(()=>!(cache.load("patients")));
  const [syncing,setSyncing] = useState(false);
  const [saveStatus,setSaveStatus] = useState("saved"); // "saved" | "saving" | "unsaved"
  const [pendingSaves,setPendingSaves] = useState([]);
  const [modal,setModal] = useState(null);
  const [selected,setSelected] = useState(null);
  const [menuOpen,setMenuOpen] = useState(false);

  useEffect(()=>{ if(user) loadAll(); },[user]);

  const loadAll = async (showLoad=true) => {
    if(showLoad) setLoading(true);
    try {
      const [p,r,f,t] = await Promise.all([
        api.get("patients"), api.get("rdvs"), api.get("finances"), api.get("taches")
      ]);
      const patients_data = p.filter(x=>x.prenom);
      const rdvs_data = r.filter(x=>x.type);
      const finances_data = f.filter(x=>x.type);
      const taches_data = t.filter(x=>x.titre);
      setPatients(patients_data);
      setRdvs(rdvs_data);
      setFinances(finances_data);
      setTaches(taches_data);
      cache.save("patients", patients_data);
      cache.save("rdvs", rdvs_data);
      cache.save("finances", finances_data);
      cache.save("taches", taches_data);
    } catch(e) {
      console.log("Network error, keeping cache data");
    }
    if(showLoad) setLoading(false);
  };

  const syncPost = async (type, action, record) => {
    setSyncing(true);
    setSaveStatus("saving");
    try {
      await api.post(type, action, record);
      setSaveStatus("saved");
    } catch(e) {
      console.error("Sync error:", e);
      setSaveStatus("unsaved");
    }
    setSyncing(false);
    setTimeout(()=>setSaveStatus("saved"), 5000);
  };

  // Manual sync - reload from Google Sheets
  const manualSave = async () => {
    setSaveStatus("saving");
    setSyncing(true);
    try {
      await loadAll(false);
      setSaveStatus("saved");
      alert("✅ Données synchronisées avec Google Sheets !");
    } catch(e) {
      setSaveStatus("unsaved");
      alert("❌ Erreur réseau. Les données locales sont préservées.");
    }
    setSyncing(false);
  };

  // Force sync - vide le cache local et recharge tout depuis Google Sheets
  const forceSync = async () => {
    if(!window.confirm("Vider le cache local et recharger toutes les données depuis Google Sheets ?")) return;
    ["patients","rdvs","finances","taches"].forEach(k => {
      try { localStorage.removeItem("cn_cache_"+k); } catch(e){}
    });
    setPatients([]); setRdvs([]); setFinances([]); setTaches([]);
    setSaveStatus("saving");
    setSyncing(true);
    setLoading(true);
    try {
      const [p,r,f,t] = await Promise.all([
        api.get("patients"), api.get("rdvs"), api.get("finances"), api.get("taches")
      ]);
      const pd = p.filter(x=>x.prenom);
      const rd = r.filter(x=>x.type);
      const fd = f.filter(x=>x.type);
      const td = t.filter(x=>x.titre);
      setPatients(pd); setRdvs(rd); setFinances(fd); setTaches(td);
      cache.save("patients",pd); cache.save("rdvs",rd);
      cache.save("finances",fd); cache.save("taches",td);
      setSaveStatus("saved");
      alert(`✅ Synchronisation complète !\n${pd.length} patients · ${rd.length} RDV · ${td.length} tâches`);
    } catch(e) {
      setSaveStatus("unsaved");
      alert("❌ Erreur réseau. Vérifiez votre connexion.");
    }
    setSyncing(false);
    setLoading(false);
  };

  const savePatient = async (f) => {
    if(f.id){
      const updated = {...f,dernierContact:todayStr()};
      setPatients(ps=>{
        const newPs = ps.map(p=>p.id===f.id?{...p,...updated}:p);
        cache.save("patients", newPs);
        return newPs;
      });
      await syncPost("patients","update",updated);
    } else {
      const n={...f,id:uid(),cree:todayStr(),dernierContact:todayStr(),creePar:user.id};
      setPatients(ps=>{
        const newPs=[...ps,n];
        cache.save("patients", newPs);
        return newPs;
      });
      await syncPost("patients","add",n);
    }
    setModal(null);
  };
  const deletePatient = async (id) => {
    setPatients(ps=>{const np=ps.filter(p=>p.id!==id);cache.save("patients",np);return np;});
    await syncPost("patients","delete",{id});
    setSelected(null); setView("patients");
  };
  const changeStage = async (id,stade) => {
    const p=patients.find(x=>x.id===id); if(!p) return;
    const u={...p,stade,dernierContact:todayStr()};
    setPatients(ps=>{const np=ps.map(x=>x.id===id?u:x);cache.save("patients",np);return np;});
    await syncPost("patients","update",u);
  };
  const saveRdv = async (f) => {
    if(!f.patientId||!f.date||!f.heure) { alert("Patient, date et heure obligatoires !"); return; }
    const n={...f,id:uid(),creePar:user.id};
    setRdvs(rs=>{const nr=[...rs,n];cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","add",n);
    setModal(null);
  };
  const updateRdv = async (f) => {
    setRdvs(rs=>{const nr=rs.map(r=>r.id===f.id?{...r,...f}:r);cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","update",f);
    setModal(null);
  };
  const deleteRdv = async (id) => {
    if(!window.confirm("Supprimer ce rendez-vous ?")) return;
    setRdvs(rs=>{const nr=rs.filter(r=>r.id!==id);cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","delete",{id});
  };
  const saveFinance = async (f) => {
    if(!f.montant) { alert("Montant obligatoire !"); return; }
    const n={...f,id:uid(),creePar:user.id};
    setFinances(fs=>{const nf=[...fs,n];cache.save("finances",nf);return nf;});
    await syncPost("finances","add",n);
    setModal(null);
  };
  const updateFinance = async (f) => {
    setFinances(fs=>{const nf=fs.map(x=>x.id===f.id?{...x,...f}:x);cache.save("finances",nf);return nf;});
    await syncPost("finances","update",f);
    setModal(null);
  };
  const deleteFinance = async (id) => {
    if(!window.confirm("Supprimer cette transaction ?")) return;
    setFinances(fs=>{const nf=fs.filter(f=>f.id!==id);cache.save("finances",nf);return nf;});
    await syncPost("finances","delete",{id});
  };

  const NAV_ITEMS = [

    {id:"patients",label:"Les patients",icon:"👥",roles:["admin","commerciale","coordinatrice"]},
    {id:"rdvs",label:"Rendez-vous",icon:"📅",roles:["admin","commerciale","coordinatrice"]},
    {id:"taches",label:"Tâches",icon:"✅",roles:["admin","commerciale","coordinatrice"]},
    {id:"agenda",label:"Agenda",icon:"🗓️",roles:["admin","commerciale","coordinatrice"]},
    {id:"finances",label:"Finances",icon:"💳",roles:["admin","commerciale"]},
    {id:"analyses",label:"Analyses",icon:"📈",roles:["admin","commerciale"]},
    {id:"messagerie",label:"Messagerie",icon:"💬",roles:["admin","commerciale","coordinatrice"]},
    {id:"notifications",label:"Notifications",icon:"🔔",roles:["admin","commerciale","coordinatrice"]},
    {id:"recherche",label:"Recherche",icon:"🔍",roles:["admin","commerciale","coordinatrice"]},
    {id:"hopitaux",label:"Hôpitaux",icon:"🏥",roles:["admin"]},
    {id:"medecins",label:"Médecins",icon:"🩺",roles:["admin","commerciale","coordinatrice"]},
  ].filter(n=>!user||n.roles.includes(user.role));

  const goTo = v => { setView(v); setSelected(null); setMenuOpen(false); };
  const logout = () => { localStorage.removeItem("cn_user"); setUser(null); };
  const activeView = selected?"fiche":view;
  const TITLES = {dashboard:"Mon espace",equipe:"Vue équipe — Veys Turan PDG",patients:"Les patients",rdvs:"Rendez-vous",taches:"Tâches",agenda:"Agenda",analyses:"Analyses",finances:"Finances",hopitaux:"Hôpitaux partenaires",medecins:"Médecins",messagerie:"Messagerie",notifications:"Notifications",recherche:"Recherche globale"};

  if(!user) return <LoginScreen onLogin={u=>{const full=USERS.find(x=>x.id===u.id)||u; setUser(full);}} />;

  const userFull = USERS.find(u2=>u2.id===user.id)||user;

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* TOP BAR MOBILE */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"0 12px",height:56,display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(11,31,58,0.08)"}}>
        <button onClick={()=>setMenuOpen(x=>!x)} style={{border:"none",background:"none",cursor:"pointer",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,flexShrink:0}}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <div style={{width:20,height:2,background:C.navy,borderRadius:99}}/>
            <div style={{width:14,height:2,background:C.navy,borderRadius:99}}/>
            <div style={{width:20,height:2,background:C.navy,borderRadius:99}}/>
          </div>
        </button>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
          <img src="https://i.ibb.co/b5k523qC/image.jpg" style={{width:30,height:30,borderRadius:8,objectFit:"contain"}} alt="CN"/>
          <span style={{fontWeight:800,fontSize:15,color:C.navy}}>Clinic Nobel</span>
        </div>
        <button onClick={manualSave} style={{border:"none",borderRadius:20,cursor:"pointer",fontSize:11,padding:"6px 10px",background:saveStatus==="saved"?C.green+"18":saveStatus==="saving"?C.amber+"18":"#fee2e2",color:saveStatus==="saved"?C.green:saveStatus==="saving"?C.amber:C.red,fontWeight:700,display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          <span style={{fontSize:12}}>{saveStatus==="saving"?"⏳":saveStatus==="saved"?"✅":"💾"}</span>
          <span style={{display:"none",fontSize:11}}>{saveStatus==="saving"?"Sync…":saveStatus==="saved"?"OK":"Sauv."}</span>
        </button>
        <button onClick={()=>goTo("recherche")} style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>🔍</button>
        <button onClick={()=>goTo("notifications")} style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,position:"relative"}}>
          🔔
          {(taches.filter(t=>t.echeance<=todayStr()&&t.statut!=="Terminée"&&(userFull.role==="admin"||t.assigneA===userFull.id)).length+rdvs.filter(r=>r.date===todayStr()).length)>0&&
            <div style={{position:"absolute",top:4,right:4,width:8,height:8,borderRadius:99,background:C.red,border:`2px solid ${C.white}`}}/>}
        </button>
        <button onClick={forceSync} title="Forcer la synchronisation" style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🔄</button>
        <div onClick={()=>setMenuOpen(true)} style={{width:36,height:36,borderRadius:99,background:`linear-gradient(135deg,${userFull.color},${userFull.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontWeight:800,fontSize:13,cursor:"pointer",flexShrink:0}}>

      </div>

      {/* Floating sync indicator */}
      {syncing&&<div style={{position:"fixed",bottom:76,left:"50%",transform:"translateX(-50%)",background:C.navy,color:C.white,padding:"8px 18px",borderRadius:99,fontSize:12,fontWeight:700,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
        <span style={{fontSize:14}}>⏳</span> Sync Google Sheets…
      </div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
