              {e.cible && <span style={{fontSize:11,color:C.muted}}>· 🎯 {e.cible}</span>}
            </div>
            {e.champ && e.champ!=="—" && <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{tt("aiact.dataAffected")}: <b style={{color:C.text}}>{e.champ}</b></div>}
            {e.raison && <div style={{fontSize:12,color:C.muted,fontStyle:"italic",marginBottom:6}}>“{e.raison}”</div>}
            {(e.ancien||e.nouveau) && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={{background:"#FAFAFA",borderRadius:8,padding:"6px 9px"}}>
                  <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>{tt("aiact.before")}</div>
                  <div style={{fontSize:12,color:C.muted,whiteSpace:"pre-wrap"}}>{e.ancien||"—"}</div>
                </div>
                <div style={{background:"#F0FDF4",borderRadius:8,padding:"6px 9px"}}>
                  <div style={{fontSize:10,color:C.green,fontWeight:700,textTransform:"uppercase"}}>{tt("aiact.after")}</div>
                  <div style={{fontSize:12,color:C.text,whiteSpace:"pre-wrap"}}>{e.nouveau||"—"}</div>
                </div>
              </div>
            )}
          </div>
        ))}
    </div>
  );
}

// ── ÉCRAN DE VALIDATION D'UNE PROPOSITION IA (Modifier / Annuler / Confirmer) ──
// Reçoit :
//  • proposal : objet inerte produit par aiProposeAction
//  • user : utilisateur connecté (pour le contrôle de permission)
//  • executors : fonctions d'écriture RÉELLES du CRM (savePatient, addTacheFromAI, saveRdvFromAI)
//    → appelées UNIQUEMENT dans onClick de « Confirmer », jamais au rendu.
//  • onClose
function AIActionReview({ proposal, user, executors, onClose }){
  const tt = tr;
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState(proposal ? proposal.nouveau : "");
  const [done, setDone] = React.useState(null); // "confirmed" | "cancelled"
  const [working, setWorking] = React.useState(false);

  if(!proposal) return null;

  // Contrôle de permission : Confirmer n'est possible que si l'utilisateur a le droit.
  const allowed = can(user, proposal.module, proposal.permAction);
  const copyOnly = !!proposal.copyOnly;
  // Garde-fous médicaux (Phase 8) calculés sur le DRAFT courant (éditable) :
  const medLevel = medicalGuard(draft + " " + (proposal.raison||""));  // "urgent"|"medical"|"none"
  const forbiddenClaim = detectForbiddenClaim(draft);                    // promesse/garantie détectée ?
  const blockedByClaim = !!forbiddenClaim;                               // bloque Confirmer si présent

  const cancel = () => {
    logIA(user.id, "cancelled", proposal.kind, proposal.cibleType, proposal.cible, proposal.champ, proposal.ancien, draft, proposal.raison);
    setDone("cancelled");
    setTimeout(onClose, 700);
  };

  const confirm = async () => {
    if(!allowed) return;            // double verrou : jamais d'exécution sans droit
    if(blockedByClaim) return;      // Phase 8 : promesse/garantie détectée → confirmation bloquée
    if(copyOnly){                    // brouillon message : aucune écriture CRM
      try{ navigator.clipboard.writeText(draft); }catch(e){}
      logIA(user.id, "confirmed", proposal.kind, proposal.cibleType, proposal.cible, proposal.champ, proposal.ancien, draft, proposal.raison);
      setDone("confirmed"); setTimeout(onClose, 900); return;
    }
    setWorking(true);
    try {
      // On passe par les fonctions d'écriture EXISTANTES du CRM (mêmes contrôles que la saisie manuelle).
      if(proposal.kind==="note" || proposal.kind==="relance"){
        await executors.updatePatientField(proposal.cibleId, "notes", draft);
      } else if(proposal.kind==="updatePatient" && proposal.fieldKey){
        await executors.updatePatientField(proposal.cibleId, proposal.fieldKey, draft);
      } else if(proposal.kind==="tache"){
        await executors.addTache({ ...proposal.taskObj, id:undefined });
      } else if(proposal.kind==="rdv"){
        await executors.addRdv(proposal.rdvObj);
      }
      logIA(user.id, "confirmed", proposal.kind, proposal.cibleType, proposal.cible, proposal.champ, proposal.ancien, draft, proposal.raison);
      setDone("confirmed");
      setTimeout(onClose, 900);
    } catch(e){
      setWorking(false);
    }
  };

  const box = { background:C.white, borderRadius:12, padding:"10px 12px", fontSize:13, color:C.text, whiteSpace:"pre-wrap", lineHeight:1.5, boxShadow:`inset 0 0 0 1px ${C.border}` };

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.6)",zIndex:1300,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(3px)"}}>
      <div onClick={e=>e.stopPropagation()} className="slide-up cn-scroll" style={{background:C.bg,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:540,maxHeight:"94vh",overflowY:"auto",WebkitOverflowScrolling:"touch",boxShadow:"0 -8px 40px rgba(0,0,0,0.3)"}}>
        {/* En-tête */}
        <div style={{background:`linear-gradient(135deg,${C.navy},#12325C)`,padding:"18px 20px 16px",position:"sticky",top:0,zIndex:2}}>
          <div style={{width:36,height:4,borderRadius:99,background:"rgba(255,255,255,0.5)",margin:"0 auto 12px"}}/>
          <div style={{color:"rgba(255,255,255,0.75)",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>🤖 {tt("aiact.reviewTitle")}</div>
          <div style={{color:C.white,fontSize:18,fontWeight:800,marginTop:3}}>{proposal.titre}</div>
        </div>

        <div style={{padding:16}}>
          {done==="confirmed" && <div style={{textAlign:"center",padding:24,color:C.green,fontWeight:800,fontSize:15}}>✓ {tt("aiact.confirmed")}</div>}
          {done==="cancelled" && <div style={{textAlign:"center",padding:24,color:C.muted,fontWeight:800,fontSize:15}}>✕ {tt("aiact.cancelled")}</div>}

          {!done && (
          <div>
            {/* Garde-fous médicaux gradués (Phase 8) */}
            {medLevel==="urgent" && (
              <div style={{background:"#FEE2E2",border:`2px solid ${C.red}`,borderRadius:10,padding:"11px 13px",marginBottom:12,fontSize:12.5,color:"#7F1D1D",fontWeight:700}}>
                🚨 {tt("med.urgentWarning")}
              </div>
            )}
            {medLevel==="medical" && (
              <div style={{background:"#FEF2F2",border:`1px solid ${C.red}44`,borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:12,color:"#991B1B",fontWeight:600}}>
                ⚕️ {tt("ai.medicalWarning")}
              </div>
            )}
            {/* Promesse / garantie interdite détectée → confirmation bloquée */}
            {blockedByClaim && (
              <div style={{background:"#FEF3C7",border:`2px solid ${C.amber}`,borderRadius:10,padding:"11px 13px",marginBottom:12,fontSize:12,color:"#7C4A02",fontWeight:700}}>
                ⛔ {tt("med.forbiddenClaim")} <span style={{fontWeight:600}}>« {forbiddenClaim} »</span>
              </div>
            )}

            {/* Ce que l'IA veut faire + pourquoi */}
            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:4}}>{tt("aiact.whatWillDo")}</div>
            <div style={{...box, marginBottom:10}}>{proposal.titre}{proposal.cible?` — ${proposal.cible}`:""}</div>

            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:4}}>{tt("aiact.dataAffected")}</div>
            <div style={{...box, marginBottom:10}}>{proposal.champ || "—"}</div>

            <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:4}}>{tt("aiact.why")}</div>
            <div style={{...box, marginBottom:10, color:C.muted, fontStyle:"italic"}}>{proposal.raison || "—"}</div>

            {/* Avant / Après */}
            {!copyOnly && proposal.ancien!=="—" && (
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:4}}>{tt("aiact.before")}</div>
                <div style={{...box, background:"#FafafA", color:C.muted}}>{proposal.ancien || tt("aiact.empty")}</div>
              </div>
            )}
            <div style={{fontSize:11,fontWeight:700,color:C.navy,textTransform:"uppercase",marginBottom:4}}>{copyOnly?tt("aiact.draftContent"):tt("aiact.after")}</div>
            {editing
              ? <textarea value={draft} onChange={e=>setDraft(e.target.value)} rows={5} style={{width:"100%",boxSizing:"border-box",borderRadius:12,border:`1px solid ${C.blue}`,padding:12,fontSize:13,fontFamily:"inherit",resize:"vertical"}}/>
              : <div style={{...box, border:`1px solid ${C.navy}22`}}>{draft}</div>}

            {/* Bandeau permission */}
            {!allowed && !copyOnly && (
              <div style={{background:"#FEF2F2",border:`1px solid ${C.red}44`,borderRadius:10,padding:"10px 12px",marginTop:12,fontSize:12,color:"#991B1B",fontWeight:600}}>
                🔒 {tt("aiact.noPermission")}
              </div>
            )}

            {/* Boutons : Modifier / Annuler / Confirmer */}
            <div style={{display:"flex",gap:8,marginTop:16}}>
              <button onClick={()=>setEditing(e=>!e)} style={{flex:1,padding:"12px",border:`1px solid ${C.border}`,borderRadius:11,background:C.white,color:C.text,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                ✏️ {tt("aiact.modify")}
              </button>
              <button onClick={cancel} style={{flex:1,padding:"12px",border:"none",borderRadius:11,background:"#F1F5F9",color:C.red,fontWeight:800,fontSize:13,cursor:"pointer"}}>
                ✕ {tt("aiact.cancel")}
              </button>
              {(allowed || copyOnly)
                ? <button onClick={confirm} disabled={working||blockedByClaim} style={{flex:1.4,padding:"12px",border:"none",borderRadius:11,background:(working||blockedByClaim)?C.muted:C.navy,color:C.white,fontWeight:800,fontSize:13,cursor:(working||blockedByClaim)?"not-allowed":"pointer"}}>
                    {working ? "⏳" : blockedByClaim ? ("⛔ "+tt("aiact.confirm")) : (copyOnly ? ("📋 "+tt("aiact.copyConfirm")) : ("✓ "+tt("aiact.confirm")))}
                  </button>
                : <button disabled style={{flex:1.4,padding:"12px",border:"none",borderRadius:11,background:"#E2E8F0",color:C.muted,fontWeight:800,fontSize:13,cursor:"not-allowed"}}>
                    🔒 {tt("aiact.confirm")}
                  </button>}
            </div>
            <div style={{textAlign:"center",fontSize:11,color:C.muted,marginTop:10}}>
              🔒 {tt("aiact.noWriteUntilConfirm")}
            </div>
          </div>
          )}
        </div>
      </div>
    </div>
  );
}

function AssistantIA({ user, patient, rdvs, finances, activeView, executors, onClose }){
  const tt = tr;
  const [action, setAction] = React.useState(null);
  const [proposal, setProposal] = React.useState(null); // Phase 4 : proposition à valider
  const [output, setOutput] = React.useState("");
  const [busy, setBusy] = React.useState(false);
  const [copied, setCopied] = React.useState(false);
  const [tab, setTab] = React.useState("assistant"); // "assistant" | "chat"

  // ── Chat conversationnel (Phase 13) — historique en mémoire de session ──
  const [messages, setMessages] = React.useState([]);   // {role, text, ts, source, medLevel}
  const [chatInput, setChatInput] = React.useState("");
  const [thinking, setThinking] = React.useState(false);
  const [speakingId, setSpeakingId] = React.useState(null);
  const [feedback, setFeedback] = React.useState({});    // id → "up"|"down"
  const chatEndRef = React.useRef(null);

  // Défilement automatique vers le bas à chaque nouveau message
  React.useEffect(()=>{ try{ if(chatEndRef.current) chatEndRef.current.scrollIntoView({behavior:"smooth"}); }catch(e){} },[messages, thinking]);

  // Envoie la question courante à l'IA (aucune action CRM, réponse texte uniquement).
  const sendChat = async (forcedText) => {
    const text = String(forcedText!=null?forcedText:chatInput).trim();
    if(!text || thinking) return;
    const userMsg = { role:"user", text, ts:Date.now(), id:uid() };
    setMessages(m=>[...m, userMsg]);
    setChatInput("");
    setThinking(true);
    try {
      const r = await aiChatRespond(text, user, patient);
      const botMsg = { role:"assistant", text:r.text, source:r.source, medSources:r.medSources, medLevel:r.medLevel, ts:Date.now(), id:uid() };
      setMessages(m=>[...m, botMsg]);
    } catch(e){
      setMessages(m=>[...m, { role:"assistant", text:tr("chat.error"), medLevel:"none", ts:Date.now(), id:uid() }]);
    }
    setThinking(false);
  };

  // Régénère la dernière réponse à partir de la dernière question.
  const regenerate = async () => {
    const lastUser = [...messages].reverse().find(m=>m.role==="user");
    if(!lastUser || thinking) return;
    // retire la dernière réponse assistant
    setMessages(m=>{ const c=[...m]; for(let i=c.length-1;i>=0;i--){ if(c[i].role==="assistant"){ c.splice(i,1); break; } } return c; });
    setThinking(true);
    try {
      const r = await aiChatRespond(lastUser.text, user, patient);
      setMessages(m=>[...m, { role:"assistant", text:r.text, source:r.source, medSources:r.medSources, medLevel:r.medLevel, ts:Date.now(), id:uid() }]);
    } catch(e){}
    setThinking(false);
  };

  // Synthèse vocale (lecture d'une réponse) — interruptible.
  const speak = (id, text) => {
    try {
      if(!window.speechSynthesis){ return; }
      if(speakingId===id){ window.speechSynthesis.cancel(); setSpeakingId(null); return; }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = (CURRENT_LANG==="tr"?"tr-TR":CURRENT_LANG==="en"?"en-US":CURRENT_LANG==="es"?"es-ES":"fr-FR");
      u.onend = ()=>setSpeakingId(null);
      setSpeakingId(id);
      window.speechSynthesis.speak(u);
    } catch(e){ setSpeakingId(null); }
  };
  // Stopper la synthèse à la fermeture du panneau
  React.useEffect(()=>()=>{ try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){} },[]);

  const newConversation = () => { try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){} setMessages([]); setChatInput(""); setThinking(false); setSpeakingId(null); setFeedback({}); };

  // ── Reconnaissance vocale (Web Speech API, 100% navigateur, aucune donnée ne sort) ──
  // La voix REMPLIT UN CHAMP TEXTE. Elle ne déclenche jamais d'action CRM directement.
  const [voiceText, setVoiceText] = React.useState("");   // texte reconnu, éditable
  const [listening, setListening] = React.useState(false);
  const [voiceLang, setVoiceLang] = React.useState("fr-FR");
  const recognitionRef = React.useRef(null);
  const SpeechRec = (typeof window!=="undefined") && (window.SpeechRecognition || window.webkitSpeechRecognition);
  const voiceSupported = !!SpeechRec;

  const startListening = () => {
    if(!voiceSupported || listening) return;
    try {
      const rec = new SpeechRec();
      rec.lang = voiceLang;              // fr-FR | tr-TR | en-US
      rec.interimResults = true;         // affichage progressif
      rec.continuous = false;
      rec.onresult = (e) => {
        let txt = "";
        for(let i=0;i<e.results.length;i++){ txt += e.results[i][0].transcript; }
        setVoiceText(txt);               // remplit seulement le champ éditable
      };
      rec.onerror = () => { setListening(false); };
      rec.onend = () => { setListening(false); };
      recognitionRef.current = rec;
      setListening(true);
      rec.start();
    } catch(e){ setListening(false); }
  };
  const stopListening = () => {
    try { if(recognitionRef.current) recognitionRef.current.stop(); } catch(e){}
    setListening(false);
  };
  // Nettoyage : arrêter l'écoute si le panneau se ferme (pas de micro qui traîne).
  React.useEffect(()=>()=>{ try{ if(recognitionRef.current) recognitionRef.current.stop(); }catch(e){} },[]);

  const canFinance = can(user, "finances", "view");
  const ctx = { user, finances, canFinance };

  const run = async (kind) => {
    setAction(kind); setBusy(true); setOutput(""); setCopied(false);
    let text = "";
    // Génération : moteur local par défaut. (Le moteur Claude, si activé plus tard,
    // recevrait un contexte minimisé — préparé mais désactivé en Phase 3.)
    if(kind==="patient") text = aiLocalSummaryPatient(patient, ctx);
    else if(kind==="rdvs") text = aiLocalSummaryRdvs(patient, rdvs);
    else if(kind==="commercial") text = aiLocalSummaryCommercial(patient, ctx);
    else if(kind==="message") text = aiLocalDraftMessage(patient, ctx);
    setOutput(text || tt("ai.nothing"));
    setBusy(false);
  };

  const copy = () => {
    try{ navigator.clipboard.writeText(output); setCopied(true); setTimeout(()=>setCopied(false),1500); }catch(e){}
  };

  // Phase 4 : prépare une PROPOSITION inerte (aucune écriture). L'objet est passé
  // à <AIActionReview> qui gère la confirmation humaine.
  const propose = (kind, opts) => { setProposal(aiProposeAction(kind, patient, { ...(opts||{}), user })); };

  const medLevel = output ? medicalGuard(output) : "none"; // "urgent" | "medical" | "none"
  const needsPatient = !patient;

  const btn = (kind, icon, label, disabled) => (
    <button onClick={()=>!disabled&&run(kind)} disabled={disabled}
      style={{display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"left",padding:"11px 13px",marginBottom:8,
        border:"none",borderRadius:11,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.45:1,
        background:action===kind?C.navy:C.white,color:action===kind?C.white:C.text,
        boxShadow:action===kind?"none":`inset 0 0 0 1px ${C.border}`,fontWeight:700,fontSize:13}}>
      <span style={{fontSize:16}}>{icon}</span> {label}
    </button>
  );

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.55)",zIndex:1200,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(3px)"}}>
      <div onClick={e=>e.stopPropagation()} className="slide-up cn-scroll" style={{background:C.bg,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,maxHeight:"92vh",boxShadow:"0 -8px 40px rgba(0,0,0,0.28)"}}>
        {/* En-tête */}
        <div style={{background:`linear-gradient(135deg,${C.navy},#12325C)`,padding:"18px 20px 16px",position:"sticky",top:0,zIndex:2}}>
          <div style={{width:36,height:4,borderRadius:99,background:"rgba(255,255,255,0.5)",margin:"0 auto 12px"}}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <span style={{fontSize:22}}>🤖</span>
              <div>
                <div style={{color:C.white,fontSize:17,fontWeight:800}}>{tt("ai.title")}</div>
                <div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{tt("ai.readonlyBadge")}</div>
              </div>
            </div>
            <button onClick={onClose} style={{border:"none",background:"rgba(255,255,255,0.15)",color:C.white,width:30,height:30,borderRadius:8,cursor:"pointer",fontSize:15}}>✕</button>
          </div>
        </div>

        <div style={{padding:"16px 16px 96px"}}>
          {/* Bandeau "Suggestion uniquement" permanent */}
          <div style={{background:"#EEF4FB",border:`1px solid ${C.blue}33`,borderRadius:10,padding:"9px 12px",marginBottom:14,fontSize:12,color:C.navy,fontWeight:600}}>
            💡 {tt("ai.suggestionOnly")}
          </div>

          {/* Onglets : Assistant (résumés/actions) | Chat conversationnel */}
          <div style={{display:"flex",gap:6,marginBottom:14,background:"#EEF2F7",borderRadius:12,padding:4}}>
            <button onClick={()=>setTab("assistant")} style={{flex:1,padding:"9px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:800,fontSize:12.5,background:tab==="assistant"?C.white:"transparent",color:tab==="assistant"?C.navy:C.muted,boxShadow:tab==="assistant"?"0 1px 4px rgba(0,0,0,0.08)":"none"}}>🗂 {tt("chat.tabAssistant")}</button>
            <button onClick={()=>setTab("chat")} style={{flex:1,padding:"9px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:800,fontSize:12.5,background:tab==="chat"?C.white:"transparent",color:tab==="chat"?C.navy:C.muted,boxShadow:tab==="chat"?"0 1px 4px rgba(0,0,0,0.08)":"none"}}>💬 {tt("chat.tabChat")}</button>
          </div>

          {tab==="assistant" && (<div>

          {/* ── Reconnaissance vocale (remplit un champ texte, aucune action automatique) ── */}
          {aiCan(user,"ia_lecture_patient") && (
            <div style={{background:C.white,borderRadius:12,padding:12,marginBottom:14,boxShadow:`inset 0 0 0 1px ${C.border}`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:12,fontWeight:800,color:C.navy}}>🎙️ {tt("voice.title")}</span>
                {voiceSupported && (
                  <select value={voiceLang} onChange={e=>setVoiceLang(e.target.value)} disabled={listening}
                    style={{fontSize:11,fontWeight:700,padding:"4px 8px",borderRadius:8,border:`1px solid ${C.border}`,background:C.white,color:C.text}}>
                    <option value="fr-FR">🇫🇷 Français</option>
                    <option value="tr-TR">🇹🇷 Türkçe</option>
                    <option value="en-US">🇬🇧 English</option>
                  </select>
                )}
              </div>

              {!voiceSupported ? (
                <div style={{fontSize:12,color:C.muted,padding:"8px 0"}}>⚠️ {tt("voice.unsupported")}</div>
              ) : (
                <div>
                  {/* Boutons démarrer / arrêter */}
                  <div style={{display:"flex",gap:8,marginBottom:listening||voiceText?10:0}}>
                    {!listening
                      ? <button onClick={startListening} style={{flex:1,padding:"10px",border:"none",borderRadius:10,background:C.navy,color:C.white,fontWeight:800,fontSize:12,cursor:"pointer"}}>🎙️ {tt("voice.start")}</button>
                      : <button onClick={stopListening} style={{flex:1,padding:"10px",border:"none",borderRadius:10,background:C.red,color:C.white,fontWeight:800,fontSize:12,cursor:"pointer"}}>⏹ {tt("voice.stop")}</button>}
                  </div>

                  {/* Indicateur "Écoute en cours…" */}
                  {listening && (
                    <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.red,fontWeight:700,marginBottom:10}}>
                      <span style={{width:9,height:9,borderRadius:"50%",background:C.red,display:"inline-block",animation:"pulse 1s infinite"}}/>
                      {tt("voice.listening")}
                    </div>
                  )}

                  {/* Texte reconnu — ÉDITABLE avant toute utilisation */}
                  {(voiceText || listening) && (
                    <div>
                      <textarea value={voiceText} onChange={e=>setVoiceText(e.target.value)} rows={3}
                        placeholder={tt("voice.placeholder")}
                        style={{width:"100%",boxSizing:"border-box",borderRadius:10,border:`1px solid ${C.border}`,padding:10,fontSize:13,fontFamily:"inherit",resize:"vertical",marginBottom:8}}/>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>{ setOutput(voiceText); setAction("voice"); }}
                          disabled={!voiceText.trim()}
                          style={{flex:1,padding:"10px",border:"none",borderRadius:10,background:voiceText.trim()?C.navy:"#CBD5E1",color:C.white,fontWeight:800,fontSize:12,cursor:voiceText.trim()?"pointer":"not-allowed"}}>
                          ✓ {tt("voice.useText")}
                        </button>
                        <button onClick={()=>{ setVoiceText(""); }}
                          style={{padding:"10px 14px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,color:C.text,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                          {tt("voice.clear")}
                        </button>
                      </div>
                      <div style={{fontSize:10,color:C.muted,marginTop:6,textAlign:"center"}}>🔒 {tt("voice.note")}</div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {needsPatient && (
            <div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"10px 0 16px"}}>{tt("ai.openPatientHint")}</div>
          )}

          {/* Actions disponibles */}
          {btn("patient","📋",tt("ai.summarizePatient"),needsPatient||!aiCan(user,"ia_lecture_patient"))}
          {btn("rdvs","📅",tt("ai.summarizeRdvs"),needsPatient||!aiCan(user,"ia_lecture_patient"))}
          {btn("commercial","📈",tt("ai.summarizeCommercial"),needsPatient||isSurgeon(user)||!aiCan(user,"ia_lecture_patient"))}
          {btn("message","✉️",tt("ai.draftMessage"),needsPatient||isSurgeon(user)||!aiCan(user,"ia_brouillon_message"))}

          {/* Phase 4 — Actions préparées (proposition → validation humaine) */}
          {!needsPatient && (
            <div style={{marginTop:6}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",margin:"10px 0 8px"}}>{tt("aiact.sectionTitle")}</div>
              {aiCan(user,"ia_action_note") && <button onClick={()=>propose("note")} style={{display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"left",padding:"11px 13px",marginBottom:8,border:"none",borderRadius:11,cursor:"pointer",background:C.white,color:C.text,boxShadow:`inset 0 0 0 1px ${C.border}`,fontWeight:700,fontSize:13}}><span style={{fontSize:16}}>📝</span> {tt("aiact.addNote")}</button>}
              {aiCan(user,"ia_action_tache") && <button onClick={()=>propose("tache")} style={{display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"left",padding:"11px 13px",marginBottom:8,border:"none",borderRadius:11,cursor:"pointer",background:C.white,color:C.text,boxShadow:`inset 0 0 0 1px ${C.border}`,fontWeight:700,fontSize:13}}><span style={{fontSize:16}}>✅</span> {tt("aiact.prepTask")}</button>}
              {aiCan(user,"ia_action_note") && <button onClick={()=>propose("relance")} style={{display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"left",padding:"11px 13px",marginBottom:8,border:"none",borderRadius:11,cursor:"pointer",background:C.white,color:C.text,boxShadow:`inset 0 0 0 1px ${C.border}`,fontWeight:700,fontSize:13}}><span style={{fontSize:16}}>🔔</span> {tt("aiact.prepRelance")}</button>}
              {aiCan(user,"ia_action_rdv") && <button onClick={()=>propose("rdv")} style={{display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"left",padding:"11px 13px",marginBottom:8,border:"none",borderRadius:11,cursor:"pointer",background:C.white,color:C.text,boxShadow:`inset 0 0 0 1px ${C.border}`,fontWeight:700,fontSize:13}}><span style={{fontSize:16}}>📅</span> {tt("aiact.prepRdv")}</button>}
            </div>
          )}

          {/* Sortie */}
          {busy && <div style={{textAlign:"center",padding:20,color:C.muted,fontSize:13}}>⏳ {tt("ai.working")}</div>}
          {!busy && output && (
            <div style={{marginTop:6}}>
              {medLevel==="urgent" && (
                <div style={{background:"#FEE2E2",border:`2px solid ${C.red}`,borderRadius:10,padding:"11px 13px",marginBottom:10,fontSize:12.5,color:"#7F1D1D",fontWeight:700}}>
                  🚨 {tt("med.urgentWarning")}
                </div>
              )}
              {medLevel==="medical" && (
                <div style={{background:"#FEF2F2",border:`1px solid ${C.red}44`,borderRadius:10,padding:"10px 12px",marginBottom:10,fontSize:12,color:"#991B1B",fontWeight:600}}>
                  ⚕️ {tt(AI_MEDICAL_WARNING_KEY)}
                </div>
              )}
              <div style={{background:C.white,borderRadius:12,padding:14,boxShadow:`inset 0 0 0 1px ${C.border}`,fontSize:13,color:C.text,whiteSpace:"pre-wrap",lineHeight:1.5}}>
                {output}
              </div>
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <button onClick={copy} style={{flex:1,padding:"11px",border:"none",borderRadius:11,background:C.navy,color:C.white,fontWeight:800,fontSize:13,cursor:"pointer"}}>
                  {copied?("✓ "+tt("ai.copied")):("📋 "+tt("ai.copy"))}
                </button>
                <button onClick={onClose} style={{flex:1,padding:"11px",border:`1px solid ${C.border}`,borderRadius:11,background:C.white,color:C.text,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  {tt("common.close")}
                </button>
              </div>
              <div style={{textAlign:"center",fontSize:11,color:C.muted,marginTop:10}}>
                🔒 {tt("ai.noWriteNote")}
              </div>
            </div>
          )}
          </div>)}

          {/* ═══ ONGLET CHAT CONVERSATIONNEL (Phase 13) ═══ */}
          {tab==="chat" && (
            <div>
              {!aiCan(user,"ia_lecture_patient") ? (
                <div style={{textAlign:"center",padding:"30px 10px",color:C.muted,fontSize:13}}>🔒 {tt("chat.noPermission")}</div>
              ) : (
                <div>
                  {/* En-tête conversation + Nouvelle conversation */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <span style={{fontSize:12,color:C.muted,fontWeight:600}}>{AI_CONFIG.engine==="external"?"🌐 "+tt("chat.modeExternal"):"🔒 "+tt("chat.modeLocal")}</span>
                    {messages.length>0 && <button onClick={newConversation} style={{fontSize:11,fontWeight:700,padding:"5px 10px",border:`1px solid ${C.border}`,borderRadius:8,background:C.white,color:C.red,cursor:"pointer"}}>🗑 {tt("chat.new")}</button>}
                  </div>

                  {/* Fil de conversation */}
                  <div className="cn-scroll" style={{maxHeight:"38vh",overflowY:"auto",WebkitOverflowScrolling:"touch",marginBottom:12,paddingRight:2}}>
                    {messages.length===0 && !thinking && (
                      <div style={{textAlign:"center",padding:"24px 10px",color:C.muted,fontSize:13}}>
                        💬 {tt("chat.welcome")}
                      </div>
                    )}
                    {messages.map(m=>(
                      <div key={m.id} style={{marginBottom:12}}>
                        {m.role==="user" ? (
                          <div style={{display:"flex",justifyContent:"flex-end"}}>
                            <div style={{maxWidth:"85%",background:`linear-gradient(135deg,${C.navy},#12325C)`,color:C.white,padding:"9px 13px",borderRadius:"14px 14px 4px 14px",fontSize:13,lineHeight:1.45}}>
                              <div style={{fontSize:10,opacity:0.7,marginBottom:2,fontWeight:700}}>👤 {tt("chat.you")}</div>
                              {m.text}
                            </div>
                          </div>
                        ) : (
                          <div style={{display:"flex",justifyContent:"flex-start"}}>
                            <div style={{maxWidth:"88%",width:"100%"}}>
                              {/* Garde-fous médicaux gradués */}
                              {m.medLevel==="urgent" && <div style={{background:"#FEE2E2",border:`2px solid ${C.red}`,borderRadius:8,padding:"7px 10px",marginBottom:6,fontSize:11,color:"#7F1D1D",fontWeight:700}}>🚨 {tt("med.urgentWarning")}</div>}
                              {m.medLevel==="medical" && <div style={{background:"#FEF2F2",border:`1px solid ${C.red}44`,borderRadius:8,padding:"7px 10px",marginBottom:6,fontSize:11,color:"#991B1B",fontWeight:600}}>⚕️ {tt("ai.medicalWarning")}</div>}
                              <div style={{background:C.white,color:C.text,padding:"10px 13px",borderRadius:"14px 14px 14px 4px",fontSize:13,lineHeight:1.5,boxShadow:`inset 0 0 0 1px ${C.border}`,whiteSpace:"pre-wrap"}}>
                                <div style={{fontSize:10,color:C.muted,marginBottom:3,fontWeight:700}}>🤖 {tt("chat.assistant")}</div>
                                {m.text}
                                {m.source && (
                                  <div style={{marginTop:8,paddingTop:6,borderTop:`1px solid ${C.border}`,fontSize:10.5,color:C.muted}}>
                                    📎 {m.source.nom}{m.source.url && <> · <a href={m.source.url} target="_blank" rel="noopener noreferrer" style={{color:C.blue}}>{tt("kb.openSource")}</a></>}
                                  </div>
                                )}
                                {m.medSources && m.medSources.length>0 && (
                                  <div style={{marginTop:8,paddingTop:7,borderTop:`1px solid ${C.border}`}}>
                                    <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:5}}>📚 {tt("med.sourcesUsed")}</div>
                                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                                      {m.medSources.map((s,idx)=>(
                                        <a key={idx} href={s.url||"#"} target="_blank" rel="noopener noreferrer"
                                          style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:99,textDecoration:"none",
                                            background:s.niveau===1?"#E8F0FB":"#F1F5F9",color:s.niveau===1?C.navy:C.muted,border:`1px solid ${s.niveau===1?C.blue+"44":C.border}`}}>
                                          {s.niveau===1?"🏥 ":"🌐 "}{s.label||s.nom}
                                        </a>
                                      ))}
                                    </div>
                                  </div>
                                )}
                              </div>
                              {/* Actions sous la réponse */}
                              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
                                <button onClick={()=>speak(m.id, m.text)} style={{fontSize:11,fontWeight:700,padding:"5px 9px",border:`1px solid ${C.border}`,borderRadius:8,background:speakingId===m.id?C.navy:C.white,color:speakingId===m.id?C.white:C.text,cursor:"pointer"}}>{speakingId===m.id?"⏹ "+tt("chat.stopRead"):"🔊 "+tt("chat.read")}</button>
                                <button onClick={()=>{ try{navigator.clipboard.writeText(m.text);}catch(e){} }} style={{fontSize:11,fontWeight:700,padding:"5px 9px",border:`1px solid ${C.border}`,borderRadius:8,background:C.white,color:C.text,cursor:"pointer"}}>📋 {tt("chat.copy")}</button>
                                <button onClick={()=>setFeedback(f=>({...f,[m.id]:"up"}))} style={{fontSize:11,padding:"5px 9px",border:`1px solid ${C.border}`,borderRadius:8,background:feedback[m.id]==="up"?"#DCFCE7":C.white,cursor:"pointer"}}>👍</button>
                                <button onClick={()=>setFeedback(f=>({...f,[m.id]:"down"}))} style={{fontSize:11,padding:"5px 9px",border:`1px solid ${C.border}`,borderRadius:8,background:feedback[m.id]==="down"?"#FEE2E2":C.white,cursor:"pointer"}}>👎</button>
                                <button onClick={regenerate} style={{fontSize:11,fontWeight:700,padding:"5px 9px",border:`1px solid ${C.border}`,borderRadius:8,background:C.white,color:C.text,cursor:"pointer"}}>↺ {tt("chat.regenerate")}</button>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                    {/* Indicateur "Je réfléchis" */}
                    {thinking && (
                      <div style={{display:"flex",justifyContent:"flex-start",marginBottom:12}}>
                        <div style={{background:C.white,padding:"10px 14px",borderRadius:"14px 14px 14px 4px",boxShadow:`inset 0 0 0 1px ${C.border}`,fontSize:13,color:C.muted,fontWeight:600}}>
                          🤖 {tt("chat.thinking")} <span style={{animation:"pulse 1s infinite"}}>●●●</span>
                        </div>
                      </div>
                    )}
                    <div ref={chatEndRef}/>
                  </div>

                  {/* Zone de saisie */}
                  <textarea value={chatInput} onChange={e=>setChatInput(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendChat(); } }}
                    rows={2} placeholder={tt("chat.placeholder")}
                    style={{width:"100%",boxSizing:"border-box",borderRadius:12,border:`1px solid ${C.border}`,padding:11,fontSize:13,fontFamily:"inherit",resize:"vertical",marginBottom:8}}/>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>sendChat()} disabled={!chatInput.trim()||thinking}
                      style={{flex:1,padding:"11px",border:"none",borderRadius:11,background:(chatInput.trim()&&!thinking)?C.navy:"#CBD5E1",color:C.white,fontWeight:800,fontSize:13,cursor:(chatInput.trim()&&!thinking)?"pointer":"not-allowed"}}>
                      📤 {tt("chat.send")}
                    </button>
                    <button onClick={()=>setChatInput("")} disabled={!chatInput}
                      style={{padding:"11px 16px",border:`1px solid ${C.border}`,borderRadius:11,background:C.white,color:C.text,fontWeight:700,fontSize:13,cursor:chatInput?"pointer":"not-allowed",opacity:chatInput?1:0.5}}>
                      🗑 {tt("chat.clear")}
                    </button>
                  </div>
                  <div style={{textAlign:"center",fontSize:10.5,color:C.muted,marginTop:8}}>🔒 {tt("chat.securityNote")}</div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Phase 4 — Écran de validation de la proposition (si présente) */}
      {proposal && <AIActionReview proposal={proposal} user={user} executors={executors} onClose={()=>setProposal(null)}/>}
    </div>
  );
}

function AccueilPremium(){
  const WELCOME = "Bonjour \uD83D\uDC4B\nJe suis le Dr House.\nQue puis-je faire pour vous aujourd'hui ?";
  // Première visite ? (préférence mémorisée)
  const firstTime = (()=>{ try{ return !localStorage.getItem("cn_accueil_seen"); }catch(e){ return true; } })();
  const [open, setOpen] = React.useState(firstTime);
  const [typed, setTyped] = React.useState("");
  const [audioReady, setAudioReady] = React.useState(false);
  const audioRef = React.useRef(null);
  const typingRef = React.useRef(null);

  // Marquer comme vu dès la première ouverture automatique
  React.useEffect(()=>{
    if(firstTime){ try{ localStorage.setItem("cn_accueil_seen","1"); }catch(e){} }
  },[]);

  // Effet machine à écrire quand la carte est ouverte
  React.useEffect(()=>{
    if(!open){ setTyped(""); if(typingRef.current) clearInterval(typingRef.current); return; }
    setTyped("");
    let i = 0;
    typingRef.current = setInterval(()=>{
      i++;
      setTyped(WELCOME.slice(0,i));
      if(i>=WELCOME.length && typingRef.current){ clearInterval(typingRef.current); }
    }, 45);
    return ()=>{ if(typingRef.current) clearInterval(typingRef.current); };
  },[open]);

  // Lecture audio automatique à l'ouverture (si le navigateur l'autorise)
  React.useEffect(()=>{
    if(open && audioRef.current){
      const p = audioRef.current.play();

            {/* halo lumineux */}
            <div style={{position:"absolute",top:-40,left:"50%",transform:"translateX(-50%)",width:220,height:220,borderRadius:"50%",background:"radial-gradient(circle,rgba(201,168,76,0.25) 0%,transparent 70%)"}}/>
            {/* Avatar corps entier, non coupé, fond transparent */}
            <img src={ACCUEIL_AVATAR} alt="Dr House" draggable="false" style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",height:180,width:"auto",objectFit:"contain",filter:"drop-shadow(0 6px 14px rgba(0,0,0,0.28))",animation:"accFloat 5s ease-in-out infinite"}}/>
          </div>
          {/* Corps : texte progressif */}
          <div style={{padding:"16px 18px 18px"}}>
            <div style={{minHeight:70,fontSize:15,lineHeight:1.5,color:NAVY,fontWeight:600,whiteSpace:"pre-line"}}>

            </div>
            {/* Lecteur audio discret */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginTop:14,paddingTop:12,borderTop:"1px solid rgba(11,31,58,0.08)"}}>
              <button onClick={replay} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 14px",border:"none",borderRadius:99,cursor:"pointer",
                background:`linear-gradient(135deg,${NAVY},${BLUE})`,color:"#fff",fontSize:12.5,fontWeight:700,boxShadow:"0 3px 10px rgba(29,115,201,0.3)"}}>
                🔊 Rejouer le message
              </button>
              <span style={{fontSize:11,color:"#8A94A6"}}>Clinic Nobel</span>
            </div>
          </div>
          <audio ref={audioRef} src={ACCUEIL_AUDIO} preload="auto"/>
        </div>
      )}

      {/* BULLE RONDE — toujours visible, en bas à droite */}
      <button onClick={()=>setOpen(o=>!o)} aria-label="Assistant d'accueil" className="acc-bubble"
        style={{position:"fixed",bottom:18,right:18,zIndex:1399,width:60,height:60,borderRadius:"50%",border:"3px solid #fff",cursor:"pointer",padding:0,
          background:`linear-gradient(135deg,${NAVY},${BLUE})`,overflow:"hidden",transition:"transform 0.25s ease"}}>
        <img src={ACCUEIL_AVATAR} alt="" draggable="false" style={{position:"absolute",top:2,left:"50%",transform:"translateX(-50%)",height:78,width:"auto",objectFit:"contain",objectPosition:"top",pointerEvents:"none"}}/>
      </button>
    </div>
  );
}



function App() {

  const [user,setUser] = useState(()=>{
    try{ const s=localStorage.getItem("cn_user"); return s?JSON.parse(s):null; }catch(e){return null;}
  });
  const [lang,setLangState] = useState(CURRENT_LANG);
  const changeLang = (code)=>{ setLang(code); setLangState(code); };
  const [view,setView] = useState("dashboard");
  const [patients,setPatients] = useState(()=>cache.load("patients")||[]);
  const [rdvs,setRdvs] = useState(()=>cache.load("rdvs")||[]);
  const [finances,setFinances] = useState(()=>cache.load("finances")||[]);
  const [taches,setTaches] = useState(()=>cache.load("taches")||[]);
  const [hopitaux,setHopitaux] = useState(()=>{
    // Migration : supprimer les anciens hôpitaux et utiliser les nouveaux
    const cached = cache.load("hopitaux");
    const ANCIENS = ["Medicana International","Memorial Hospital","Acibadem","Dental Plus Clinic"];
    const NOUVEAUX = ["Avrasya Hospital","Scala Clinic","VSC Fişekhane Dental"];
    if(cached && cached.some(h=>ANCIENS.includes(h.nom))){
      // Réinitialiser avec les nouveaux hôpitaux
      localStorage.removeItem("cn2_hopitaux");
      return [];
    }
    return cached||[];
  });
  // Don't show loading if we have cached data
  const [loading,setLoading] = useState(()=>!(cache.load("patients")));
  const finLoadedRef = React.useRef(!!cache.load("finances")); // finances en lazy-load
  const [syncing,setSyncing] = useState(false);
  const [loadError,setLoadError] = useState(null);
  const [saveStatus,setSaveStatus] = useState("saved"); // "saved" | "saving" | "unsaved"
  const [pendingSaves,setPendingSaves] = useState([]);
  const [modal,setModal] = useState(null);
  const [selected,setSelected] = useState(null);
  const [menuOpen,setMenuOpen] = useState(false);
  const [permVer,setPermVer] = useState(0); // incrémenté à chaque changement de permissions → re-rendu live
  const applyRBAC = () => { setPermVer(v=>v+1); };

  // ── NAVIGATION INTERNE (pile back/forward type application native) ──────────
  const navRef = React.useRef(null);
  const restoringRef = React.useRef(false);
  const allowExitRef = React.useRef(false);
  const liveRef = React.useRef({});
  liveRef.current = {patients, rdvs, finances};
  const [navState,setNavState] = useState({canBack:false, canFwd:false});
  const [quitOpen,setQuitOpen] = useState(false);

  const navSnap = () => ({
    view, selectedId: selected?selected.id:null,
    modal: modal ? {type:modal.type, dataId: modal.data?modal.data.id:null} : null,
    scroll: (typeof window!=="undefined"?window.scrollY:0),
  });
  const sameSnap = (a,b) => !!a && !!b && a.view===b.view && (a.selectedId||null)===(b.selectedId||null) && JSON.stringify(a.modal||null)===JSON.stringify(b.modal||null);
  const findRec = (type,id) => { if(!id) return null; const L=liveRef.current||{}; const arr = type==="rdv"?L.rdvs:type==="finance"?L.finances:L.patients; return (arr||[]).find(x=>String(x.id)===String(id))||null; };
  const applySnap = (s) => {
    restoringRef.current = true;
    setView(s.view);
    setSelected(s.selectedId ? findRec("patient", s.selectedId) : null);
    setModal(s.modal ? {type:s.modal.type, data: s.modal.dataId ? findRec(s.modal.type, s.modal.dataId) : null} : null);
    setMenuOpen(false);
    requestAnimationFrame(()=>{ try{ window.scrollTo(0, s.scroll||0); }catch(e){} });
  };
  const updateNavButtons = () => { const n=navRef.current; if(n) setNavState({canBack:n.idx>0, canFwd:n.idx<n.stack.length-1}); };
  const goBack = () => { const n=navRef.current; if(n&&n.idx>0){ try{history.back();}catch(e){} } else { setQuitOpen(true); } };
  const goForward = () => { const n=navRef.current; if(n&&n.idx<n.stack.length-1){ try{history.forward();}catch(e){} } };
  const confirmQuit = () => { allowExitRef.current=true; setQuitOpen(false); const n=navRef.current; try{ history.go(-((n?n.idx:0)+2)); }catch(e){} };

  // Initialisation + interception du retour (navigateur / Android / geste iPhone)
  useEffect(()=>{
    if(!user) return;
    try{ history.replaceState({cnIdx:0}, ""); }catch(e){}
    navRef.current = { stack:[navSnap()], idx:0 };
    updateNavButtons();
    const onPop = (e) => {
      const n = navRef.current; if(!n) return;
      if(allowExitRef.current) return; // sortie volontaire confirmée
      const target = (e.state && typeof e.state.cnIdx==="number") ? e.state.cnIdx : -1;
      if(target < 0){ // tentative de sortie → on reste et on demande confirmation
        try{ history.pushState({cnIdx:n.idx}, ""); }catch(_){}
        setQuitOpen(true);
        return;
      }
      n.idx = Math.min(target, n.stack.length-1);
      applySnap(n.stack[n.idx]);
      updateNavButtons();
    };
    const onScroll = () => { const n=navRef.current; if(n&&n.stack[n.idx]) n.stack[n.idx].scroll = window.scrollY; };
    window.addEventListener("popstate", onPop);
    window.addEventListener("scroll", onScroll, {passive:true});
    return ()=>{ window.removeEventListener("popstate", onPop); window.removeEventListener("scroll", onScroll); };
  },[user]);

  // Enregistre chaque navigation (page, fiche, modal) dans la pile interne
  useEffect(()=>{
    if(!navRef.current) return;
    if(restoringRef.current){ restoringRef.current=false; updateNavButtons(); return; }
    const n = navRef.current;
    const s = navSnap();
    if(sameSnap(s, n.stack[n.idx])) return;
    n.stack[n.idx] = {...n.stack[n.idx], scroll: (typeof window!=="undefined"?window.scrollY:0)};
    n.stack = n.stack.slice(0, n.idx+1);
    n.stack.push(s);
    n.idx++;
    try{ history.pushState({cnIdx:n.idx}, ""); }catch(e){}
    updateNavButtons();
    if(!modal) requestAnimationFrame(()=>{ try{ window.scrollTo(0,0); }catch(e){} });
  },[view, selected, modal]);

  // Au montage : le cache est déjà affiché (états initialisés depuis cache.load).
  // On lance la synchro EN ARRIÈRE-PLAN sans bloquer l'interface.
  useEffect(()=>{ if(user) loadAll(false); },[user]);

  // Charge les finances à la demande (module Finances/Analyses) — une seule fois.
  const ensureFinances = async () => {
    if(finLoadedRef.current) return;
    finLoadedRef.current = true;
    try {
      const f = await api.get("finances");
      const finances_data = f.filter(x=>x.type);
      setFinances(finances_data);
      cache.save("finances", finances_data);
    } catch(e){ finLoadedRef.current = false; /* on réessaiera à la prochaine ouverture */ }
  };

  // loadAll(showLoad) : showLoad=true seulement pour "Synchroniser maintenant".
  // En arrière-plan (showLoad=false) l'écran reste sur le cache, mis à jour à l'arrivée des données.
  const loadAll = async (showLoad=true) => {
    if(showLoad) setLoading(true);
    setLoadError(null);
    setSyncing(true);
    try {
      // Finances retirées du chargement initial (lazy) — sauf si déjà chargées/ouvertes.
      const calls = [api.get("patients"), api.get("rdvs"), api.get("taches"), api.get("users")];
      if(finLoadedRef.current) calls.push(api.get("finances"));
      const [p,r,tData,u,f] = await Promise.all(calls);
      const patients_data = p.filter(x=>x.prenom);
      const rdvs_data = r.filter(x=>x.id);
      const taches_data = tData.filter(x=>x.titre);
      setPatients(patients_data);
      setRdvs(rdvs_data);
      setTaches(taches_data);
      cache.save("patients", patients_data);
      cache.save("rdvs", rdvs_data);
      cache.save("taches", taches_data);
      if(f){ const finances_data = f.filter(x=>x.type); setFinances(finances_data); cache.save("finances", finances_data); }
      if(Array.isArray(u) && u.length){ mergeServerUsers(u); setPermVer(v=>v+1); }
      try{ localStorage.setItem("cn_lastSync", String(Date.now())); }catch(_){}
    } catch(e) {
      console.log("Network error, keeping cache data", e);
      const hasCache = cache.load("rdvs") || cache.load("patients");
      if(!hasCache){ setLoadError(t("rdv.loadError")); }
    }
    if(showLoad) setLoading(false);
    setSyncing(false);
  };

  const syncPost = async (type, action, record) => {
    setSyncing(true);
    setSaveStatus("saving");
    try {
      await api.post(type, action, record);
      setSaveStatus("saved");
    } catch(e) {
      console.error("Sync error:", e);
      setSaveStatus("unsaved");
    }
    setSyncing(false);
    setTimeout(()=>setSaveStatus("saved"), 5000);
  };

  // Manual sync - reload from Google Sheets
  const manualSave = async () => {
    setSaveStatus("saving");
    setSyncing(true);
    try {
      await loadAll(false);
      setSaveStatus("saved");
      alert("✅ Données synchronisées avec Google Sheets !");
    } catch(e) {
      setSaveStatus("unsaved");
      alert("❌ Erreur réseau. Les données locales sont préservées.");
    }
    setSyncing(false);
  };

  // Force sync - vide le cache local et recharge tout depuis Google Sheets
  const forceSync = async () => {
    if(!window.confirm("Vider le cache local et recharger toutes les données depuis Google Sheets ?")) return;
    ["patients","rdvs","finances","taches"].forEach(k => {
      try { localStorage.removeItem("cn_cache_"+k); } catch(e){}
    });
    setPatients([]); setRdvs([]); setFinances([]); setTaches([]);
    setSaveStatus("saving");
    setSyncing(true);
    setLoading(true);
    try {
      const [p,r,f,t] = await Promise.all([
        api.get("patients"), api.get("rdvs"), api.get("finances"), api.get("taches")
      ]);
      const pd = p.filter(x=>x.prenom);
      const rd = r.filter(x=>x.type);
      const fd = f.filter(x=>x.type);
      const td = t.filter(x=>x.titre);
      setPatients(pd); setRdvs(rd); setFinances(fd); setTaches(td);
      cache.save("patients",pd); cache.save("rdvs",rd);
      cache.save("finances",fd); cache.save("taches",td);
      setSaveStatus("saved");
      alert(`✅ Synchronisation complète !\n${pd.length} patients · ${rd.length} RDV · ${td.length} tâches`);
    } catch(e) {
      setSaveStatus("unsaved");
      alert("❌ Erreur réseau. Vérifiez votre connexion.");
    }
    setSyncing(false);
    setLoading(false);
  };

  const savePatient = async (f) => {
    if(f.id){
      const updated = {...f,dernierContact:todayStr()};
      setPatients(ps=>{
        const newPs = ps.map(p=>p.id===f.id?{...p,...updated}:p);
        cache.save("patients", newPs);
        return newPs;
      });
      await syncPost("patients","update",updated);
    } else {
      const n={...f,id:uid(),cree:todayStr(),dernierContact:todayStr(),creePar:user.id};
      setPatients(ps=>{
        const newPs=[...ps,n];
        cache.save("patients", newPs);
        return newPs;
      });
      await syncPost("patients","add",n);
    }
    setModal(null);
  };
  const deletePatient = async (id) => {
    setPatients(ps=>{const np=ps.filter(p=>p.id!==id);cache.save("patients",np);return np;});
    await syncPost("patients","delete",{id});
    setSelected(null); setView("patients");
  };
  const changeStage = async (id,stade) => {
    const p=patients.find(x=>x.id===id); if(!p) return;
    const u={...p,stade,dernierContact:todayStr()};
    setPatients(ps=>{const np=ps.map(x=>x.id===id?u:x);cache.save("patients",np);return np;});
    await syncPost("patients","update",u);
  };
  const saveRdv = async (f) => {
    if(!f.patientId||!f.date||!f.heure) { alert(t("rdv.requiredFields")); return; }

    const cleanHeure = normalizeHeure(f.heure) || f.heure;
    const n={...f, date:cleanDate, heure:cleanHeure, id:uid(), creePar:user.id};
    setRdvs(rs=>{const nr=[...rs,n];cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","add",n);
    setModal(null);
  };
  const updateRdv = async (f) => {
    const cleanDate = normalizeDate(f.date);
    if(f.date && !cleanDate) { alert(t("rdv.invalidDate")); return; }
    const fixed = {...f, date:cleanDate||f.date, heure:normalizeHeure(f.heure)||f.heure};
    setRdvs(rs=>{const nr=rs.map(r=>r.id===fixed.id?{...r,...fixed}:r);cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","update",fixed);
    setModal(null);
  };
  const deleteRdv = async (id) => {
    if(!window.confirm(t("rdv.deleteConfirm"))) return;
    setRdvs(rs=>{const nr=rs.filter(r=>r.id!==id);cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","delete",{id});
  };
  const duplicateRdvApp = async (r) => {
    const copy = {...r, id:uid(), statut:"Planifié", historique:JSON.stringify([])};
    setRdvs(rs=>{const nr=[...rs,copy];cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","add",copy);
    setModal(null);
  };
  const openPatientById = (pid) => {
    const p = patients.find(x=>String(x.id)===String(pid));
    if(p){ setSelected(p); setView("patients"); setModal(null); }
    else alert("Fiche patient introuvable.");
  };
  const saveFinance = async (f) => {
    if(!f.montant) { alert("Montant obligatoire !"); return; }
    const n={...f,id:uid(),creePar:user.id};
    setFinances(fs=>{const nf=[...fs,n];cache.save("finances",nf);return nf;});
    await syncPost("finances","add",n);
    setModal(null);
  };
  const updateFinance = async (f) => {
    setFinances(fs=>{const nf=fs.map(x=>x.id===f.id?{...x,...f}:x);cache.save("finances",nf);return nf;});
    await syncPost("finances","update",f);
    setModal(null);
  };
  const deleteFinance = async (id) => {
    if(!window.confirm("Supprimer cette transaction ?")) return;
    setFinances(fs=>{const nf=fs.filter(f=>f.id!==id);cache.save("finances",nf);return nf;});
    await syncPost("finances","delete",{id});
  };

    {id:"equipe",label:t("nav.equipe"),icon:"👁️"},

    {id:"taches",label:t("nav.taches"),icon:"✅"},
    {id:"agenda",label:t("nav.agenda"),icon:"🗓️"},
    {id:"finances",label:t("nav.finances"),icon:"💳"},
    {id:"analyses",label:t("nav.analyses"),icon:"📈"},
    {id:"messagerie",label:t("nav.messagerie"),icon:"💬"},
    {id:"notifications",label:t("nav.notifications"),icon:"🔔"},
    {id:"recherche",label:t("nav.recherche"),icon:"🔍"},
    {id:"hopitaux",label:t("nav.hopitaux"),icon:"🏥"},
    {id:"medecins",label:t("nav.medecins"),icon:"🩺"},
    {id:"utilisateurs",label:t("nav.utilisateurs"),icon:"🔐"},
    {id:"journal-ia",label:t("iaj.title"),icon:"🤖"},
    {id:"base-connaissances",label:t("kb.title"),icon:"📚"},
    {id:"biblio-medicale",label:t("med.title"),icon:"🩺"},
    {id:"knowledge-graph",label:t("kg.title"),icon:"🕸"},

  ].filter(n=> n.id==="dashboard" || (n.id==="journal-ia" ? journalIACanAccess(navUser) : (n.id==="base-connaissances" ? (navUser && !isSurgeon(navUser)) : (n.id==="biblio-medicale" ? aiCan(navUser,"ia_admin") : (n.id==="knowledge-graph" ? aiCan(navUser,"ia_admin") : (n.id==="ia-permissions" ? aiCan(navUser,"ia_admin") : (navUser && can(navUser, n.id, "view"))))))));

  const goTo = v => { setView(v); setSelected(null); setMenuOpen(false); };
  const logout = () => {
    if(!window.confirm("Êtes-vous sûr de vouloir vous déconnecter ?")) return;
    // Fermer la session et nettoyer
    try {
      localStorage.removeItem("cn_user");
      localStorage.removeItem("cn2_user");
      setAuthToken("");
    } catch(e){}
    setMenuOpen(false);
    setSelected(null);
    setView("dashboard");
    setUser(null); // redirige vers la page de connexion
  };

  const AccessDenied = () => (
    <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
      <div style={{fontSize:42,marginBottom:12}}>🔒</div>
      <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:6}}>{t("common.accessDenied")}</div>
      <div style={{fontSize:13}}>{t("common.noPermission")}<br/>{t("common.contactAdmin")}</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:C.bg,width:"100%",maxWidth:"100%",overflowX:"hidden",position:"relative"}}>
      {/* TOP BAR MOBILE */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"0 12px",height:56,display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(11,31,58,0.08)",width:"100%",maxWidth:"100%",boxSizing:"border-box"}}>
        <button onClick={()=>setMenuOpen(x=>!x)} style={{border:"none",background:"none",cursor:"pointer",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,flexShrink:0}}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <div style={{width:20,height:2,background:C.navy,borderRadius:99}}/>
            <div style={{width:14,height:2,background:C.navy,borderRadius:99}}/>
            <div style={{width:20,height:2,background:C.navy,borderRadius:99}}/>
          </div>
        </button>
        {/* Navigation interne ← / → (type application native) */}
        <div style={{display:"flex",gap:2,flexShrink:0}}>
          <button onClick={goBack} title="Retour" style={{border:"none",background:navState.canBack?C.navy+"10":"transparent",cursor:"pointer",width:32,height:32,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:navState.canBack?C.navy:"#C7CFDA",fontWeight:800}}>‹</button>
          <button onClick={goForward} disabled={!navState.canFwd} title="Suivant" style={{border:"none",background:navState.canFwd?C.navy+"10":"transparent",cursor:navState.canFwd?"pointer":"default",width:32,height:32,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:navState.canFwd?C.navy:"#C7CFDA",fontWeight:800}}>›</button>
        </div>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
          <img src="https://i.ibb.co/b5k523qC/image.jpg" style={{width:30,height:30,borderRadius:8,objectFit:"contain"}} alt="CN"/>
          <span style={{fontWeight:800,fontSize:15,color:C.navy}}>Clinic Nobel</span>
        </div>
        <button onClick={manualSave} style={{border:"none",borderRadius:20,cursor:"pointer",fontSize:11,padding:"6px 10px",background:saveStatus==="saved"?C.green+"18":saveStatus==="saving"?C.amber+"18":"#fee2e2",color:saveStatus==="saved"?C.green:saveStatus==="saving"?C.amber:C.red,fontWeight:700,display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          <span style={{fontSize:12}}>{saveStatus==="saving"?"⏳":saveStatus==="saved"?"✅":"💾"}</span>
          <span style={{display:"none",fontSize:11}}>{saveStatus==="saving"?"Sync…":saveStatus==="saved"?"OK":"Sauv."}</span>
        </button>
        <button onClick={()=>goTo("recherche")} style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>🔍</button>
        <button onClick={()=>goTo("notifications")} style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,position:"relative"}}>
          🔔
          {(taches.filter(t=>t.echeance<=todayStr()&&t.statut!=="Terminée"&&(userFull.role==="admin"||t.assigneA===userFull.id)).length+rdvs.filter(r=>r.date===todayStr()).length)>0&&
            <div style={{position:"absolute",top:4,right:4,width:8,height:8,borderRadius:99,background:C.red,border:`2px solid ${C.white}`}}/>}
        </button>
        <button onClick={forceSync} title={t("common.forceSync")} style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🔄</button>
        <div onClick={()=>setMenuOpen(true)} style={{width:36,height:36,borderRadius:99,background:`linear-gradient(135deg,${userFull.color},${userFull.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontWeight:800,fontSize:13,cursor:"pointer",flexShrink:0}}>
          {userFull.prenom[0]}
        </div>
      </div>

      {/* SIDEBAR MOBILE */}
      {menuOpen&&<div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.5)",zIndex:89,backdropFilter:"blur(4px)"}}/>}
      <div style={{position:"fixed",top:0,left:0,bottom:0,width:"80%",maxWidth:300,background:C.white,transform:menuOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.25s cubic-bezier(0.4,0,0.2,1)",zIndex:90,display:"flex",flexDirection:"column",boxShadow:"4px 0 30px rgba(11,31,58,0.15)"}}>
        
        {/* Profile header — fixe */}
        <div style={{background:`linear-gradient(135deg,${userFull.color},${userFull.color}99)`,padding:"48px 20px 20px",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:52,height:52,borderRadius:16,background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontWeight:800,fontSize:20}}>
              {userFull.prenom[0]}
            </div>
            <div>
              <div style={{fontWeight:800,fontSize:16,color:C.white}}>{userFull.prenom}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginTop:2}}>{ROLE_LABELS[userFull.role]}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>✅ Google Sheets actif</div>
            </div>
            <button onClick={()=>setMenuOpen(false)} style={{marginLeft:"auto",border:"none",background:"rgba(255,255,255,0.2)",color:C.white,width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        </div>

        {/* Zone HAUTE fixe : Langue + Déconnexion (toujours visibles, PC + mobile) */}
        <div style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`,flexShrink:0,background:C.white}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1}}>
              <LanguageSelector onChange={(c)=>{changeLang(c);}}/>
            </div>
            <button onClick={logout} title={t("logout.button")} style={{flexShrink:0,padding:"9px 14px",border:"1px solid #FECACA",borderRadius:12,background:"#FEF2F2",color:"#DC2626",fontWeight:800,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,whiteSpace:"nowrap",transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="#DC2626";e.currentTarget.style.color="#fff";}}
              onMouseLeave={e=>{e.currentTarget.style.background="#FEF2F2";e.currentTarget.style.color="#DC2626";}}>
              🚪 <span>{t("logout.button")}</span>
            </button>
          </div>
        </div>

        {/* Nav items — zone scrollable */}
        <div className="cn-scroll" style={{flex:1,padding:"12px 10px",overflowY:"auto",WebkitOverflowScrolling:"touch",minHeight:0}}>
          {NAV_ITEMS.map(item=>{
            const isActive=view===item.id||(item.id==="patients"&&activeView==="fiche");
            return (
              <button key={item.id} onClick={()=>goTo(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"13px 14px",borderRadius:12,border:"none",cursor:"pointer",marginBottom:4,textAlign:"left",fontSize:14,background:isActive?userFull.color+"18":"transparent",color:isActive?userFull.color:C.text,fontWeight:isActive?700:500,transition:"all 0.15s"}}>
                <span style={{fontSize:20,width:28,textAlign:"center"}}>{item.icon}</span>
                <span>{item.label}</span>
                {isActive&&<div style={{marginLeft:"auto",width:6,height:6,borderRadius:99,background:userFull.color}}/>}
              </button>
            );
          })}
        </div>

        {/* Bottom actions — uniquement "+ Nouveau patient" (langue et déconnexion sont désormais en haut) */}
        {can(userFull,"patients","add")&&<div style={{padding:"12px 14px calc(12px + env(safe-area-inset-bottom))",borderTop:`1px solid ${C.border}`,flexShrink:0,background:C.white}}>
          <button onClick={()=>{setModal({type:"patient"});setMenuOpen(false);}} style={{width:"100%",padding:"13px",border:"none",borderRadius:12,background:userFull.color,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>
            + {t("patient.new")}
          </button>
        </div>}
      </div>

      {/* CONTENU */}
      <div style={{maxWidth:600,margin:"0 auto",padding:"16px 14px 100px",width:"100%",boxSizing:"border-box",overflowX:"hidden"}}>
        {loadError&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
          <div style={{flex:1,fontSize:13,color:"#B91C1C",fontWeight:600}}>{loadError}</div>
          <button onClick={()=>loadAll(true)} style={{border:"none",background:"#DC2626",color:"#fff",borderRadius:9,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:12,flexShrink:0}}>{t("common.retry")}</button>
        </div>}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          {activeView==="fiche"&&<button onClick={goBack} style={{width:36,height:36,borderRadius:10,border:`1px solid ${C.border}`,background:C.white,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>←</button>}
          <div>
            <h1 style={{margin:0,fontSize:20,fontWeight:800,color:C.text,lineHeight:1.2}}>
              {activeView==="fiche"&&selected?`${selected.prenom} ${selected.nom}`:TITLES[view]||""}
            </h1>
            {activeView==="fiche"&&selected&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{selected.procedure}</div>}
          </div>
        </div>
        {loading?<Spinner text={t("common.loadingSheets")}/>:!viewAllowed?<AccessDenied/>:<ErrorBoundary key={activeView}>
          {activeView==="dashboard"&&<DashboardPersonnel user={userFull} patients={vPatients} rdvs={vRdvs} taches={vTaches} finances={vFinances}/>}
          {activeView==="patients"&&<Patients user={userFull} patients={vPatients} onSelect={p=>{ if(isSurgeon(userFull)) return; setSelected(p); }} onAdd={()=>setModal({type:"patient"})} onDelete={deletePatient}/>}
          {activeView==="fiche"&&selected&&<FichePatient user={userFull} patient={selected} patients={vPatients} rdvs={vRdvs} finances={vFinances} taches={vTaches} onEdit={()=>setModal({type:"patient",data:selected})} onDelete={()=>deletePatient(selected.id)} onStageChange={changeStage} onBack={goBack} onSavePatient={savePatient} onUpdateRdv={updateRdv}/>}
          {activeView==="rdvs"&&<Rdvs user={userFull} rdvs={vRdvs} patients={vPatients} taches={vTaches} finances={vFinances} setRdvs={setRdvs} setTaches={setTaches} onAdd={()=>setModal({type:"rdv"})} onDelete={deleteRdv} onEdit={(r)=>setModal({type:"rdv",data:r})} onUpdate={(r)=>setModal({type:"rdv",data:r})} onOpenPatient={openPatientById}/>}
          {activeView==="taches"&&<Taches user={userFull} taches={vTaches} setTaches={setTaches} patients={vPatients} rdvs={vRdvs} hopitaux={hopitaux} syncing={syncing} setSyncing={setSyncing}/>}
          {activeView==="agenda"&&<Agenda user={userFull} rdvs={vRdvs} taches={vTaches} patients={vPatients} finances={vFinances} onAddRdv={()=>setModal({type:"rdv"})} onSelectPatient={p=>{setSelected(p);setView("patients");}}/>}
          {activeView==="analyses"&&<Analyses patients={vPatients} finances={vFinances}/>}
          {activeView==="finances"&&<Finances user={userFull} finances={vFinances} patients={vPatients} rdvs={vRdvs} onAdd={()=>setModal({type:"finance"})} onDelete={deleteFinance}/>}
          {activeView==="hopitaux"&&<Hopitaux user={userFull} patients={patients} rdvs={rdvs} hopitaux={hopitaux} setHopitaux={setHopitaux} syncing={syncing} setSyncing={setSyncing}/>}
          {activeView==="equipe"&&<VueEquipe patients={patients} rdvs={rdvs} taches={taches} finances={finances}/>}
          {activeView==="medecins"&&<Medecins patients={patients} rdvs={rdvs}/>}
          {activeView==="messagerie"&&<Messagerie user={userFull} patients={vPatients}/>}
          {activeView==="notifications"&&<Notifications user={userFull} patients={vPatients} rdvs={vRdvs} taches={vTaches} finances={vFinances}/>}
          {activeView==="recherche"&&<RechercheGlobale patients={vPatients} rdvs={vRdvs} taches={vTaches} finances={isSurgeon(userFull)?[]:vFinances} onSelectPatient={p=>{ if(isSurgeon(userFull)) return; setSelected(p);setView("patients"); }}/>}
          {activeView==="utilisateurs"&&<GestionUtilisateurs user={userFull} onApplied={applyRBAC} permVer={permVer}/>}
          {activeView==="journal-ia"&&<JournalIA user={userFull}/>}
          {activeView==="base-connaissances"&&<BaseConnaissances user={userFull}/>}
          {activeView==="biblio-medicale"&&<BiblioMedicale user={userFull}/>}
          {activeView==="knowledge-graph"&&<KnowledgeGraph user={userFull}/>}
          {activeView==="ia-permissions"&&<AIPermsManager user={userFull}/>}
        </ErrorBoundary>}
      </div>

      {modal?.type==="patient"&&<ModalPatient user={userFull} patient={modal.data||null} onSave={savePatient} onClose={()=>setModal(null)}/>}      {modal?.type==="rdv"&&<ModalRdv user={userFull} patients={patients} rdv={modal.data||null} onSave={modal.data?updateRdv:saveRdv} onClose={()=>setModal(null)} taches={taches} setTaches={setTaches} onDelete={deleteRdv} onDuplicate={duplicateRdvApp} onOpenPatient={openPatientById}/>}
      {modal?.type==="finance"&&<ModalFinance user={userFull} patients={patients} onSave={saveFinance} onClose={()=>setModal(null)}/>}

      {/* Confirmation avant de quitter (uniquement depuis l'accueil) */}
      {quitOpen&&<div onClick={()=>setQuitOpen(false)} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.6)",zIndex:1500,display:"flex",alignItems:"center",justifyContent:"center",padding:20,backdropFilter:"blur(4px)"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:C.white,borderRadius:20,padding:"24px 22px",width:"100%",maxWidth:360,boxShadow:"0 20px 60px rgba(0,0,0,0.3)",textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:10}}>👋</div>
          <div style={{fontSize:17,fontWeight:800,color:C.text,marginBottom:6}}>Quitter Clinic Nobel ?</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Vous êtes sur la page d'accueil. Souhaitez-vous vraiment quitter l'application ?</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setQuitOpen(false)} style={{flex:2,padding:13,border:`1.5px solid ${C.navy}`,borderRadius:12,background:C.navy,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>Rester</button>
            <button onClick={confirmQuit} style={{flex:1,padding:13,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.red,fontSize:14}}>Quitter</button>
          </div>
        </div>
      </div>}

      {/* BOTTOM NAV MOBILE */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.white,borderTop:`1px solid ${C.border}`,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-around",padding:"6px 0 calc(6px + env(safe-area-inset-bottom))",boxShadow:"0 -4px 20px rgba(11,31,58,0.08)",maxWidth:"100%",boxSizing:"border-box",overflowX:"hidden"}}>
        {[
          {id:"dashboard",icon:"🏠",label:t("bottom.home")},
          {id:"patients",icon:"👥",label:t("bottom.patients")},
          {id:"rdvs",icon:"📅",label:t("bottom.rdvs")},
          {id:"agenda",icon:"🗓️",label:t("bottom.agenda")},
          {id:"taches",icon:"✅",label:t("bottom.taches")},
          ...(userFull.role==="admin"?[{id:"equipe",icon:"👁️",label:t("bottom.equipe")}]:[{id:"finances",icon:"💳",label:t("bottom.finances")}])
        ].filter(n=>NAV_ITEMS.find(x=>x.id===n.id)).map(item=>{
          const isActive = view===item.id||(item.id==="patients"&&activeView==="fiche");
          return (
            <button key={item.id} onClick={()=>goTo(item.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,border:"none",background:"none",cursor:"pointer",padding:"4px 8px",flex:1,minWidth:0}}>
              <div style={{width:36,height:36,borderRadius:12,background:isActive?userFull.color+"18":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,transition:"all 0.15s"}}>
                {item.icon}
              </div>
              <span style={{fontSize:9,fontWeight:isActive?700:500,color:isActive?userFull.color:C.muted,letterSpacing:"0.02em"}}>{item.label}</span>
            </button>
          );
        })}
      </div>

      {/* Bouton flottant Assistant IA (lecture seule) — visible après connexion */}
      {user && <AccueilPremium/>}
      {user && <button onClick={()=>setAiOpen(true)} title={t("ai.title")}
        style={{position:"fixed",bottom:80,right:18,zIndex:1000,width:54,height:54,borderRadius:"50%",border:"none",cursor:"pointer",
          background:`linear-gradient(135deg,${C.navy},#12325C)`,color:C.white,fontSize:24,boxShadow:"0 6px 24px rgba(11,31,58,0.4)"}}>🤖</button>}
      {aiOpen && <AssistantIA user={userFull} patient={activeView==="fiche"?selected:null} rdvs={vRdvs} finances={vFinances} activeView={activeView} executors={{
        updatePatientField: async (id, field, value) => {
          const p = patients.find(x=>x.id===id); if(!p) return;
          const u = {...p, [field]:value, dernierContact:todayStr()};
          setPatients(ps=>{const np=ps.map(x=>x.id===id?u:x);cache.save("patients",np);return np;});
          await syncPost("patients","update",u);
        },
        addTache: async (taskObj) => {
          const n = {...taskObj, id:uid(), cree:todayStr(), creePar:user.id, historique:JSON.stringify([])};
          setTaches(ts=>{const nt=[...ts,n];cache.save("taches",nt);return nt;});
          try { await api.post("taches","add",n); } catch(e){}
        },
        addRdv: async (rdvObj) => {
          const cleanDate = normalizeDate(rdvObj.date);
          const n = {...rdvObj, date:cleanDate||rdvObj.date, heure:normalizeHeure(rdvObj.heure)||rdvObj.heure, id:uid(), creePar:user.id};
          setRdvs(rs=>{const nr=[...rs,n];cache.save("rdvs",nr);return nr;});
          await syncPost("rdvs","add",n);
        },
      }} onClose={()=>setAiOpen(false)}/>}

      {/* Floating sync indicator */}
      {syncing&&<div style={{position:"fixed",bottom:76,left:"50%",transform:"translateX(-50%)",background:C.navy,color:C.white,padding:"8px 18px",borderRadius:99,fontSize:12,fontWeight:700,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
        <span style={{fontSize:14}}>⏳</span> {t("common.syncing")}
      </div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
