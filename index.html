// ════════════════════════════════════════════════════════════════════════════
// ASSISTANT IA — PHASE 3 (LECTURE SEULE)
// Règles absolues :
//  • Ce module ne reçoit AUCUNE fonction d'écriture (pas de setState, pas d'api.post).
//    Il ne PEUT donc pas modifier, supprimer ni envoyer quoi que ce soit.
//  • Il ne lit que des données déjà filtrées par les permissions (vPatients, vFinances…)
//    et applique en plus les règles chirurgien (canViewSensitivePatientData / isSurgeon).
//  • Toute sortie est du TEXTE affiché, marqué « Suggestion uniquement ».
// ════════════════════════════════════════════════════════════════════════════

// Configuration du moteur IA. Mode "local" par défaut : aucune donnée ne sort du navigateur,
// aucune clé API requise. Mode "claude" PRÉPARÉ mais désactivé : il exigera un backend
// dédié (jamais de clé API dans ce fichier). Bascule ultérieure en Phase 9.
const AI_CONFIG = {
  engine: "local",              // "local" (actif par défaut) | "external" (nécessite backend + activation admin)
  externalEnabled: false,       // KILL-SWITCH frontend : tant que false, AUCUN appel externe possible
  provider: "claude",           // fournisseur cible côté backend : "claude" | "openai" | "gemini" | "local_model"
  proxyAction: "ai_proxy",      // action envoyée au backend Code.gs (le backend détient la clé)
};

// ════════════════════════════════════════════════════════════════════════════
// PHASE 9 — PRÉPARATION CONNEXION IA EXTERNE (via backend proxy, sans clé frontend)
// • Aucune clé API ici. Le backend (Code.gs) lit la clé depuis PropertiesService.
// • Mode local reste le défaut. Les appels externes exigent externalEnabled=true.
// • Données minimisées + filtrées par permissions avant tout envoi.
// • Chirurgien : jamais de données sensibles envoyées.
// ════════════════════════════════════════════════════════════════════════════

// Minimise et filtre les données avant un éventuel envoi externe.
// Retourne un objet réduit : initiales au lieu du nom, pas de coordonnées ni de montants
// sauf droit explicite. Chirurgien ou absence de permission → contexte vide.
function minimizeForExternal(kind, data, user){
  if(!user) return {};
  if(isSurgeon(user)) return {};                         // règle dure : rien de sensible pour le chirurgien
  if(!aiCan(user, "ia_lecture_patient")) return {};      // sans droit de lecture IA, aucun contexte
  const p = data || {};
  const initials = `${(p.prenom||"").charAt(0)}${(p.nom||"").charAt(0)}`.toUpperCase() || "??";
  // Base minimale, non identifiante
  const ctx = {
    ref: initials,                                       // initiales seulement (pas de nom complet)
    procedure: p.procedure || "",
    stade: p.stade || "",
    pays: p.pays || "",
  };
  // Champs financiers uniquement si l'utilisateur a la capacité IA finance
  if(aiCan(user, "ia_resume_finance")){
    ctx.budget = p.budget || null;
  }
  // JAMAIS de téléphone/email/notes/historique/source envoyés à un tiers.
  return ctx;
}

// Appel IA externe sécurisé — PRÉPARÉ, désactivé par défaut.
// Ne s'exécute que si : externalEnabled ET engine="external" ET aiCan ET backend configuré.
// La clé API n'est jamais ici : elle vit dans PropertiesService côté Code.gs.
async function aiExternalCall(kind, prompt, patient, user){
  // 1. Kill-switch + mode
  if(!AI_CONFIG.externalEnabled || AI_CONFIG.engine !== "external"){
    return { ok:false, error:"external_disabled" };
  }
  // 2. Permission IA
  if(!aiCan(user, "ia_lecture_patient")){
    try { logIA(user?user.id:"", "cancelled", "ai_external", "ia", kind, "provider", "", AI_CONFIG.provider, "permission refusée"); } catch(e){}
    return { ok:false, error:"permission_denied" };
  }
  // 3. Minimisation + filtrage
  const context = minimizeForExternal(kind, patient, user);
  // 4. Journalisation de l'envoi (ce qui part réellement, minimisé)
  try { logIA(user.id, "confirmed", "ai_external_call", "ia", kind, "envoi_minimise", "", JSON.stringify(context), AI_CONFIG.provider); } catch(e){}
  // 5. Appel du BACKEND PROXY (jamais le fournisseur en direct ; la clé reste côté serveur)
  try {
    const r = await fetch(SCRIPT_URL, {
      method:"POST", redirect:"follow", cache:"no-cache",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ action:AI_CONFIG.proxyAction, provider:AI_CONFIG.provider, kind, prompt, context, token:AUTH_TOKEN })
    });
    const d = JSON.parse(await r.text());
    if(d && d.ok && d.text){ return { ok:true, text:d.text }; }
    try { logIA(user.id, "cancelled", "ai_external", "ia", kind, "resultat", "", "", (d&&d.error)||"empty"); } catch(e){}
    return { ok:false, error:(d&&d.error)||"empty" };
  } catch(e){
    try { logIA(user.id, "cancelled", "ai_external", "ia", kind, "resultat", "", "", "network"); } catch(_){}
    return { ok:false, error:"network" };
  }
}

// Détecte un contenu à teneur médicale pour afficher l'avertissement obligatoire.
// ════════════════════════════════════════════════════════════════════════════
// PHASE 8 — GARDE-FOUS MÉDICAUX (détection graduée + anti-promesse)
// Deux niveaux : "urgent" (symptôme grave → consultation urgente) et "medical"
// (sujet médical général → avertissement + renvoi chirurgien). Plus un filtre
// anti-promesse qui bloque toute garantie/diagnostic/promesse de résultat.
// ════════════════════════════════════════════════════════════════════════════

// Symptômes GRAVES → urgence médicale
const URGENT_KEYWORDS = [
  "douleur thoracique","douleur à la poitrine","poitrine","essoufflement","essouffl","difficulté à respirer",
  "respirer","malaise","perte de connaissance","évanoui","evanoui","syncope",
  "nécrose","necrose","hémorragie","hemorragie","saignement abondant","saigne beaucoup",
  "fièvre élevée","fievre elevee","forte fièvre","infection sévère","infection severe","septic",
  "embolie","phlébite","phlebite","thrombose","caillot","pus","gonflement soudain",
  "vomissement","ne cicatrise pas","plaie ouverte","point noir","zone noire"
];
// Sujets médicaux GÉNÉRAUX → avertissement + renvoi chirurgien
const MEDICAL_KEYWORDS = [
  "douleur","complication","cicatri","infection","anesthés","anesthesi","saigne","hématome","hematome",
  "œdème","oedeme","fièvre","fievre","suture","greffe","implant","post-op","postop","post opératoire",
  "pré-op","preop","opératoire","operatoire","risque","séquelle","sequelle","médicament","medicament",
  "antibiot","résultat","resultat","guéri","gueri","diagnos","symptôme","symptome","traitement","douloureux",
  "inflammation","rougeur","bleu","ecchymose","drainage","pansement","suites opératoires"
];
// Formulations INTERDITES (promesse / garantie / diagnostic affirmatif)
const FORBIDDEN_CLAIMS = [
  "garanti","garantie","résultat garanti","resultat garanti","sans risque","sans aucun risque",
  "100%","100 %","cent pour cent","aucun risque","certain à","je vous assure","je garantis",
  "résultat parfait","resultat parfait","succès garanti","succes garanti","sans douleur garanti",
  "vous n'aurez aucun","aucune complication","zéro risque","zero risque","promis","c'est sûr à"
];

// Classe un texte : "urgent" > "medical" > "none".
function medicalGuard(text){
  const s = String(text||"").toLowerCase();
  if(URGENT_KEYWORDS.some(k=>s.includes(k))) return "urgent";
  if(MEDICAL_KEYWORDS.some(k=>s.includes(k))) return "medical";
  return "none";
}
// Détecte une formulation interdite (promesse/garantie/diagnostic).
function detectForbiddenClaim(text){
  const s = String(text||"").toLowerCase();
  const hit = FORBIDDEN_CLAIMS.find(k=>s.includes(k));
  return hit || null;
}
// Alias rétrocompatible (Phases 3-6 l'utilisent) : vrai si médical ou urgent.
function aiIsMedicalTopic(text){ return medicalGuard(text) !== "none"; }
const AI_MEDICAL_WARNING_KEY = "ai.medicalWarning";

// ── MOTEUR LOCAL : compose des résumés à partir des champs réels, sans appel réseau ──
// ════════════════════════════════════════════════════════════════════════════
// PHASE 13 — MOTEUR CONVERSATIONNEL IA
// L'IA répond à des questions en langage naturel. Elle NE MODIFIE JAMAIS le CRM :
// aucune fonction d'écriture n'est accessible ici. Toute réponse passe par aiCan()
// et par les garde-fous médicaux (medicalGuard). Mode local par défaut ; mode
// external via le proxy sécurisé de la Phase 9 (aucune clé dans le frontend).
// ════════════════════════════════════════════════════════════════════════════

// Normalise une chaîne pour la recherche (minuscules, sans accents).
function aiNormalize(s){
  return String(s||"").toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim();
}

// Moteur LOCAL : cherche une réponse dans la base de connaissances validée, puis
// dans les données autorisées (fiche patient ouverte). N'invente jamais de données.
function aiLocalChatAnswer(question, user, patient){
  const q = aiNormalize(question);
  if(!q) return { text: tr("chat.emptyQ"), source:null };

  // 1) Recherche dans la base de connaissances VALIDÉE (Phase 6)
  const kb = (kbVisibleFor(user) || []).filter(e => e.statut === KB_STATUS.VALID);
  let best = null, bestScore = 0;
  kb.forEach(e => {
    const hay = aiNormalize(`${e.titre} ${e.contenu} ${e.theme}`);
    const words = q.split(" ").filter(w=>w.length>2);
    let score = 0;
    words.forEach(w=>{ if(hay.includes(w)) score++; });
    // bonus si le titre contient un mot de la question
    const titleN = aiNormalize(e.titre);
    words.forEach(w=>{ if(titleN.includes(w)) score+=2; });
    if(score>bestScore){ bestScore=score; best=e; }
  });
  if(best && bestScore>=2){
    return {
      text: `${best.contenu}`,
      source: { nom:best.sourceNom, url:best.sourceUrl, theme:best.theme, date:best.dateConsultation }
    };
  }

  // 2) Questions sur le patient ouvert (si droit de lecture IA)
  if(patient && aiCan(user, "ia_lecture_patient")){
    if(/(resume|synthese|dossier|fiche|patient|qui est|infos?)/.test(q)){
      const ctx = { user, finances:[], canFinance: aiCan(user,"ia_resume_finance") };
      return { text: aiLocalSummaryPatient(patient, ctx), source:null };
    }
  }

  // 3) Réponse honnête : aucune donnée inventée
  return { text: tr("chat.noAnswer"), source:null, noInfo:true };
}

// Point d'entrée conversationnel unifié. Retourne { text, source, medLevel }.
// user : utilisateur connecté ; patient : fiche ouverte (ou null).
async function aiChatRespond(question, user, patient){
  // Verrou permission (double clé Phase 7)
  if(!aiCan(user, "ia_lecture_patient")){
    return { text: tr("chat.noPermission"), medLevel:"none", blocked:true };
  }

  let answer;
  if(AI_CONFIG.engine === "external" && AI_CONFIG.externalEnabled){
    // Mode externe : passe par le proxy sécurisé (Phase 9), données minimisées.
    const r = await aiExternalCall("chat", question, patient, user);
    answer = r.ok ? { text:r.text, source:null } : { text: tr("chat.externalUnavailable"), source:null };
  } else {
    // Mode local (défaut) : bibliothèque médicale + graphe de connaissances, puis KB générale.
    const med = aiMedicalSearch(question, user);
    const kg = kgQuery(question, user);   // relations validées (Phase 14B)
    if(med.found || kg.found){
      // Assemble une réponse médicale structurée à partir des connaissances validées.
      const parts = [];
      if(med.found){ med.sections.forEach(s=>{ parts.push(s.contenu); }); }
      // Relations issues du knowledge graph (uniquement validées)
      if(kg.found && kg.relations && kg.relations.length){
        parts.push("\n🔗 " + tr("kg.relationsTitle") + " :");
        kg.relations.forEach(r=>{ parts.push(`• ${r.from} ${r.relation} ${r.target}`); });
      }
      if(med.found && med.anatomie && med.anatomie.length){
        parts.push("\n🧬 " + tr("med.anatomyConcerned") + " :");
        med.anatomie.forEach(a=>{ parts.push(`• ${a.region} — ${a.description}${a.pertinence?` (${a.pertinence})`:""}`); });
      }
      parts.push("\n⚕️ " + tr("med.disclaimer"));
      const medSources = [];
      if(med.found){
        med.sources.niveau1.forEach(s=>medSources.push({...s}));
        med.sources.niveau2.forEach(s=>medSources.push({...s}));
      }
      // Références des relations KG (source obligatoire)
      if(kg.found && kg.relations){
        kg.relations.forEach(r=>{ if(r.sourceRef) medSources.push({ label:r.sourceRef, nom:r.sourceRef, niveau:1 }); });
      }
      answer = { text: parts.join("\n"), source:null, medSources };
    } else {
      // Anti-hallucination : rien de validé → message fixe, pas d'invention.
      const local = aiLocalChatAnswer(question, user, patient);
      if(local.noInfo){
        // Si la question portait sur des relations mais qu'aucune n'est validée, message dédié.
        const kgAll = kgQuery(question, {id:"x",role:"admin"}); // teste s'il existe des nœuds (même non validés)
        answer = kgAll.node ? { text: tr("kg.noValidatedRelation"), source:null, noInfo:true } : { text: tr("med.noValidated"), source:null, noInfo:true };
      } else {
        answer = local;
      }
    }
  }

  // Garde-fous médicaux (Phase 8) sur la réponse
  const medLevel = medicalGuard(answer.text + " " + question);
  // Journalisation de l'échange (Phase 5) — jamais de contenu patient sensible en clair
  try { logIA(user.id, "confirmed", "chat", "ia", "question", "", "", aiNormalize(question).slice(0,80), AI_CONFIG.engine); } catch(e){}

  return { text: answer.text, source: answer.source||null, medSources: answer.medSources||null, medLevel, noInfo: !!answer.noInfo };
}

function aiLocalSummaryPatient(p, ctx){
  if(!p) return "";
  const L = [];
  L.push(`👤 ${p.prenom||""} ${p.nom||""}`.trim());
  if(p.stade) L.push(`• ${t("ai.stage")}: ${stageLabel(p.stade)}`);
  if(p.procedure) L.push(`• ${t("patient.procedure")}: ${p.procedure}`);
  const med = patientMedecin(p); if(med) L.push(`• ${t("rdv.doctor")}: ${med}`);
  if(p.hopital) L.push(`• ${t("rdv.hospital")}: ${p.hopital}`);
  if(p.pays) L.push(`• ${t("patient.country")}: ${p.pays}`);
  // Données financières : uniquement si l'utilisateur y a droit ET a le module finances
  if(ctx && ctx.canFinance && !isSurgeon(ctx.user)){
    const total = Number(p.budget||0);
    const paid = (ctx.finances||[]).filter(f=>String(f.patientId)===String(p.id)&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
    if(total>0){ L.push(`• ${t("finance.totalAmount")}: ${fmtEur(total)} · ${t("finance.amountPaid")}: ${fmtEur(paid)} · ${t("finance.remainingBalance")}: ${fmtEur(Math.max(total-paid,0))}`); }
  }
  return L.join("\n");
}
function aiLocalSummaryRdvs(p, rdvs){
  const rs = (rdvs||[]).filter(r=>String(r.patientId)===String(p?.id));
  if(!rs.length) return t("ai.noRdv");
  const today = todayStr();
  const sorted = rs.slice().sort((a,b)=>String(normalizeDate(a.date)).localeCompare(String(normalizeDate(b.date))));
  const L = [t("ai.rdvSummaryTitle")+" :"];
  sorted.forEach(r=>{
    const d = normalizeDate(r.date);
    const when = d>=today ? "🔜" : "✓";
    L.push(`${when} ${d||"?"} ${normalizeHeure(r.heure)||""} — ${r.type?rdvTypeLabel(r.type):""}${r.hopital?` · ${r.hopital}`:""}`.trim());
  });
  return L.join("\n");
}
function aiLocalSummaryCommercial(p, ctx){
  const L = [t("ai.commercialTitle")+" :"];
  if(p.stade) L.push(`• ${t("ai.stage")}: ${stageLabel(p.stade)}`);
  if(p.source) L.push(`• ${t("patient.sourceChannel")}: ${sourceLabel(p.source)}`);
  const resp = (USERS||[]).find(u=>u.id===p.assigneA||u.id===p.creePar);
  if(resp) L.push(`• ${t("patient.commercial")}: ${resp.prenom} ${resp.nom||""}`.trim());
  if(p.dernierContact) L.push(`• ${t("ai.lastContact")}: ${normalizeDate(p.dernierContact)}`);
  // Signalement d'informations manquantes
  const missing = [];
  if(!p.tel && !isSurgeon(ctx.user)) missing.push(t("patient.phone"));
  if(!p.procedure) missing.push(t("patient.procedure"));
  if(!p.pays) missing.push(t("patient.country"));
  if(missing.length) L.push(`\n⚠️ ${t("ai.missingInfo")}: ${missing.join(", ")}`);
  return L.join("\n");
}
function aiLocalDraftMessage(p, ctx){
  const prenom = p?.prenom || "";
  // Brouillon neutre et prudent, sans promesse ni contenu médical
  return `${t("ai.draftHello")} ${prenom},\n\n${t("ai.draftBody")}\n\n${t("ai.draftSignature")}`;
}

// Composant panneau Assistant IA (lecture seule). Reçoit UNIQUEMENT des données et des
// callbacks de lecture/fermeture — jamais de setters d'écriture.
// ════════════════════════════════════════════════════════════════════════════
// PHASE 6 — BASE DE CONNAISSANCES RÉGLEMENTAIRE CONTRÔLÉE (ia_kb)
// • Chaque connaissance a un STATUT : "En attente" → "Validé" / "Refusé" / "Archivé".
// • Création = proposition (statut forcé "En attente"). Jamais "Validé" directement.
// • Valider / Refuser / Archiver = admin/pdg UNIQUEMENT (frontend + backend).
// • Aucune donnée patient ici : uniquement des sources réglementaires citées.
// ════════════════════════════════════════════════════════════════════════════

// Statuts internes (valeurs STABLES, jamais traduites dans les données)
const KB_STATUS = { PENDING:"En attente", VALID:"Validé", REJECTED:"Refusé", ARCHIVED:"Archivé", PROPOSAL:"Proposition IA" };
// Types de source autorisés (catégories, valeurs internes stables)
const KB_SOURCE_TYPES = ["Site officiel de santé","Autorité réglementaire","Publication scientifique","Document interne"];
// Thèmes possibles (valeurs internes stables)
const KB_THEMES = ["Chirurgie esthétique","Dentaire","Greffe capillaire","Consentement patient","Acompte","Devis","RGPD","Publicité médicale","Post-opératoire","Urgence / complication","Voyage médical","Paiements","Relance patient"];
// Niveaux de fiabilité (valeurs internes stables)
const KB_RELIABILITY = ["Officiel","Scientifique","Interne"];

function kbLoad(){ return cfgStore.load("ia_kb") || []; }
function kbSave(list){ cfgStore.save("ia_kb", (list||[]).slice(-1000)); }

// Crée une PROPOSITION (statut "En attente"). N'écrit jamais "Validé" directement.
function kbPropose(rec, user){
  const {date, heure} = nowParts();
  const entry = {
    id: uid(),
    titre: String(rec.titre||"").trim(),
    contenu: String(rec.contenu||"").trim(),
    sourceNom: String(rec.sourceNom||"").trim(),
    sourceUrl: String(rec.sourceUrl||"").trim(),
    sourceType: rec.sourceType || KB_SOURCE_TYPES[0],
    theme: rec.theme || KB_THEMES[0],
    fiabilite: rec.fiabilite || KB_RELIABILITY[0],
    dateConsultation: rec.dateConsultation || date,
    statut: KB_STATUS.PENDING,           // toujours "En attente" à la création
    proposePar: user ? user.id : "",
    dateProposition: date, heureProposition: heure,
    validePar: "", dateValidation: "",
    notesInternes: String(rec.notesInternes||"").trim(),
  };
  const list = kbLoad(); list.push(entry); kbSave(list);
  try { api.post("ia_kb","add",entry); } catch(e){}
  try { logIA(user?user.id:"", "confirmed", "kb_propose", "connaissance", entry.titre, "statut", "", KB_STATUS.PENDING, entry.sourceNom); } catch(e){}
  return entry;
}

// Change le statut d'une connaissance. RÉSERVÉ admin/pdg (vérifié aussi côté backend).
function kbSetStatus(id, newStatus, user){
  if(!user || !isFullRole(user.role)) return { ok:false, error:"interdit" };
  const {date, heure} = nowParts();
  const list = kbLoad();
  const i = list.findIndex(x=>String(x.id)===String(id));
  if(i<0) return { ok:false, error:"introuvable" };
  const old = list[i].statut;
  list[i] = { ...list[i], statut:newStatus, validePar:user.id, dateValidation:date };
  kbSave(list);
  try { api.post("ia_kb","update",list[i]); } catch(e){}
  try { logIA(user.id, "confirmed", "kb_status", "connaissance", list[i].titre, "statut", old, newStatus, list[i].sourceNom); } catch(e){}
  return { ok:true };
}

// Portée de lecture : admin/pdg voient tout ; les autres UNIQUEMENT les "Validé".
function kbVisibleFor(user){
  const list = kbLoad();
  if(user && isFullRole(user.role)) return list;
  return list.filter(e => e.statut === KB_STATUS.VALID);
}

// ── Moteur de recherche documentaire hiérarchique ──
// Retourne { found, titre, sections[], anatomie[], sources{niveau1[], niveau2[]} } ou { found:false }.
function aiMedicalSearch(question, user){
  const q = aiNormalize(question);
  if(!q || q.length<3) return { found:false };
  const words = q.split(" ").filter(w=>w.length>2);

  // NIVEAU 1 — base de connaissances Clinic Nobel VALIDÉE
  const kb = (kbVisibleFor(user)||[]).filter(e=>e.statut===KB_STATUS.VALID);
  let best=null, bestScore=0;
  kb.forEach(e=>{
    const title=aiNormalize(e.titre), body=aiNormalize(e.contenu), theme=aiNormalize(e.theme||"");
    let score=0;
    words.forEach(w=>{ if(title.includes(w)) score+=3; if(body.includes(w)) score+=1; if(theme.includes(w)) score+=1; });
    if(score>bestScore){ bestScore=score; best=e; }
  });

  // Anatomie concernée (régions dont le nom apparaît dans la question)
  const anat = anatVisibleFor(user).filter(a=>{
    const rn=aiNormalize(a.region);
    return words.some(w=> rn.includes(w) || w.includes(rn.split(" ")[0]));
  }).slice(0,4);

  // Seuil anti-hallucination : sans correspondance KB suffisante ET sans anatomie → rien
  const SEUIL = 3;
  if(bestScore < SEUIL && anat.length===0){ return { found:false }; }

  // Sources : Niveau 1 (Clinic Nobel) si KB trouvée + Niveau 2 (autorisées actives)
  const sourcesN1 = [];
  if(best && bestScore>=SEUIL){
    sourcesN1.push({ label:"Clinic Nobel", nom:best.sourceNom||"Base Clinic Nobel", url:best.sourceUrl||"", theme:best.theme||"", niveau:1 });
  }
  const sourcesN2 = medSourcesActive().slice(0,4).map(s=>({ label:s.nom, nom:s.nom, url:s.url, domaine:s.domaine, niveau:2 }));

  const sections = [];
  if(best && bestScore>=SEUIL){ sections.push({ titre: best.titre, contenu: best.contenu }); }

  return {
    found: (best && bestScore>=SEUIL) || anat.length>0,
    titre: best && bestScore>=SEUIL ? best.titre : (anat[0] ? anat[0].region : ""),
    sections,
    anatomie: anat,
    sources: { niveau1: sourcesN1, niveau2: sourcesN2 },
    hasClinicNobel: !!(best && bestScore>=SEUIL)
  };
}

// Fusion de deux nœuds (admin) : les arêtes du nœud source pointent vers la cible.
function kgMergeNodes(fromId, toId, user){
  if(!user || !isFullRole(user.role)) return { ok:false, error:"admin requis" };
  if(fromId===toId) return { ok:false, error:"identique" };
  const edges = kgEdgesLoad();
  edges.forEach(e=>{ if(e.sourceNode===fromId) e.sourceNode=toId; if(e.targetNode===fromId) e.targetNode=toId; });
  kgEdgesSave(edges);
  const nodes = kgNodesLoad();
  const from = nodes.find(n=>n.id===fromId);
  if(from){ from.statut = KB_STATUS.ARCHIVED; }
  kgNodesSave(nodes);
  kgLog("kg_merge", `${fromId}→${toId}`, "fusion", user);
  return { ok:true };
}

// ── Moteur relationnel : construit une réponse à partir des RELATIONS VALIDÉES ──
// Retourne { found, node, relations:[{relation, target, sourceRef}] } ou { found:false }.
function kgQuery(question, user){
  const q = aiNormalize(question);
  if(!q || q.length<3) return { found:false };
  const words = q.split(" ").filter(w=>w.length>2);

  // Nœuds validés dont le label apparaît dans la question
  const nodes = kgNodesValid(user).filter(n=>n.statut===KB_STATUS.VALID);
  const matched = nodes.filter(n=>{
    const ln = aiNormalize(n.label);
    return words.some(w=> ln.includes(w) || w.includes(ln.split(" ")[0])) || q.includes(ln);
  });
  if(matched.length===0) return { found:false };

  // Arêtes VALIDÉES partant des nœuds trouvés (profondeur 1)
  const edges = kgEdgesLoad().filter(e=>e.statut===KB_STATUS.VALID);
  const results = [];
  matched.forEach(n=>{
    edges.filter(e=>e.sourceNode===n.id).forEach(e=>{
      const target = kgNodeById(e.targetNode);
      if(target && target.statut===KB_STATUS.VALID){
        results.push({ from:n.label, relation:e.relation, target:target.label, targetType:target.type, sourceRef:e.sourceRef });
      }
    });
  });

  if(results.length===0) return { found:false, node:matched[0]?matched[0].label:"" };
  return { found:true, node:matched[0].label, relations:results };
}

// PHASE 11 — SAUVEGARDE / RESTAURATION (admin uniquement)
// Export/import JSON de : config IA, permissions IA, base de connaissances,
// paramètres CRM (rôles, overrides, objectifs). Aucune donnée patient incluse.
// ════════════════════════════════════════════════════════════════════════════
function SauvegardeRestauration({ user }){
  const tt = tr;
  const [msg, setMsg] = React.useState("");
  const [importData, setImportData] = React.useState(null);
  if(!user || !isFullRole(user.role)){
    return <div style={{textAlign:"center",padding:40}}><div style={{fontSize:36,marginBottom:8}}>🔒</div><div style={{fontWeight:800,color:C.text}}>{tt("aiperm.adminOnly")}</div></div>;
  }

  // Construit l'objet de sauvegarde (jamais de données patient : ni patients, ni rdvs, ni finances)
  const buildBackup = () => ({
    _meta: { app:"ClinicNobelCRM", type:"config-backup", version:"1.0", date:new Date().toISOString(), by:user.id },
    ia_config: { engine: AI_CONFIG.engine, externalEnabled: AI_CONFIG.externalEnabled, provider: AI_CONFIG.provider },
    ia_perms: cfgStore.load("ia_perms") || {},
    ia_perms_user: cfgStore.load("ia_perms_user") || {},
    ia_kb: cfgStore.load("ia_kb") || [],
    crm_roles: cfgStore.load("roles") || {},
    crm_overrides: cfgStore.load("overrides") || {},
    crm_objectif: cfgStore.load("objectif_mensuel") || null,
    users_ext: cfgStore.load("users_ext") || [],
  });

  const doExport = () => {
    try{
      const data = JSON.stringify(buildBackup(), null, 2);
      const blob = new Blob(["\uFEFF"+data], {type:"application/json;charset=utf-8;"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `clinicnobel_config_${todayStr()}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      try { logIA(user.id, "confirmed", "backup_export", "config", "sauvegarde", "", "", "export", "sauvegarde complète"); } catch(e){}
      setMsg("✅ "+tt("backup.exported"));
      setTimeout(()=>setMsg(""), 2500);
    }catch(e){ setMsg("❌ "+String(e)); }
  };

  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        let txt = String(reader.result||"");
        if(txt.charCodeAt(0)===0xFEFF) txt = txt.slice(1);
        const parsed = JSON.parse(txt);
        if(!parsed || parsed._meta?.app!=="ClinicNobelCRM") throw new Error("format");
        setImportData(parsed);
        setMsg("");
      }catch(err){ setMsg("❌ "+tt("backup.invalidFile")); setImportData(null); }
    };
    reader.readAsText(f);
  };

  // La restauration écrit UNIQUEMENT la config (jamais de données patient). Confirmation requise.
  const doImport = () => {
    if(!importData) return;
    try{
      if(importData.ia_perms) cfgStore.save("ia_perms", importData.ia_perms);
      if(importData.ia_perms_user) cfgStore.save("ia_perms_user", importData.ia_perms_user);
      if(importData.ia_kb) cfgStore.save("ia_kb", importData.ia_kb);
      if(importData.crm_roles) cfgStore.save("roles", importData.crm_roles);
      if(importData.crm_overrides) cfgStore.save("overrides", importData.crm_overrides);
      if(importData.crm_objectif!=null) cfgStore.save("objectif_mensuel", importData.crm_objectif);
      if(importData.users_ext) cfgStore.save("users_ext", importData.users_ext);
      try { logIA(user.id, "confirmed", "backup_import", "config", "restauration", "", "", "import", "restauration config"); } catch(e){}
      setMsg("✅ "+tt("backup.restored"));
      setImportData(null);
      setTimeout(()=>{ try{ window.location.reload(); }catch(e){} }, 1500);
    }catch(err){ setMsg("❌ "+String(err)); }
  };

  const card = { background:C.white, borderRadius:14, padding:16, marginBottom:14, boxShadow:`inset 0 0 0 1px ${C.border}` };
  const btn = (bg) => ({ padding:"11px 16px", border:"none", borderRadius:11, background:bg, color:C.white, fontWeight:800, fontSize:13, cursor:"pointer" });

  return (
    <div>
      <div style={{background:"#EEF4FB",border:`1px solid ${C.blue}33`,borderRadius:10,padding:"9px 12px",marginBottom:14,fontSize:12,color:C.navy,fontWeight:600}}>
        💾 {tt("backup.intro")}
      </div>

      {/* EXPORT */}
      <div style={card}>
        <div style={{fontSize:14,fontWeight:800,color:C.navy,marginBottom:6}}>⬇ {tt("backup.exportTitle")}</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:12}}>{tt("backup.exportDesc")}</div>
        <ul style={{fontSize:12,color:C.text,margin:"0 0 12px 18px",padding:0,lineHeight:1.7}}>
          <li>{tt("backup.itemIaConfig")}</li>
          <li>{tt("backup.itemIaPerms")}</li>
          <li>{tt("backup.itemKb")}</li>
          <li>{tt("backup.itemCrm")}</li>
        </ul>
        <button onClick={doExport} style={btn(C.navy)}>⬇ {tt("backup.exportBtn")}</button>
      </div>

      {/* IMPORT */}
      <div style={card}>
        <div style={{fontSize:14,fontWeight:800,color:C.navy,marginBottom:6}}>⬆ {tt("backup.importTitle")}</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:12}}>{tt("backup.importDesc")}</div>
        <input type="file" accept="application/json,.json" onChange={onFile} style={{fontSize:12,marginBottom:12,display:"block"}}/>
        {importData && (
          <div style={{background:"#FFF7ED",border:`1px solid ${C.amber}44`,borderRadius:9,padding:"9px 11px",marginBottom:12,fontSize:12,color:"#7C4A02"}}>
            ⚠️ {tt("backup.confirmWarn")}
            <div style={{fontSize:11,marginTop:4,color:C.muted}}>
              {tt("backup.fileDate")}: {importData._meta?.date?.slice(0,10) || "?"} · KB: {(importData.ia_kb||[]).length} · {tt("aiperm.title")}: {Object.keys(importData.ia_perms||{}).length}
            </div>
          </div>
        )}
        <button onClick={doImport} disabled={!importData} style={{...btn(importData?"#D97706":"#CBD5E1"),cursor:importData?"pointer":"not-allowed"}}>⬆ {tt("backup.importBtn")}</button>
      </div>

      {msg && <div style={{textAlign:"center",fontSize:13,fontWeight:700,color:msg.startsWith("✅")?C.green:C.red,padding:8}}>{msg}</div>}
      <div style={{fontSize:11,color:C.muted,marginTop:6}}>🔒 {tt("backup.noPatientNote")}</div>
    </div>
  );
}

// validation/refus/archivage/fusion (admin), export CSV. Journalisé.

function KnowledgeGraph({ user }){
  const tt = tr;
  const [sub, setSub] = React.useState("relations"); // "relations" | "nodes"
  const [, force] = React.useState(0);
  const refresh = ()=>force(x=>x+1);
  const [search, setSearch] = React.useState("");
  const [fStatut, setFStatut] = React.useState("all");
  const [newEdge, setNewEdge] = React.useState({ sourceNode:"", relation:"concerne", targetNode:"", sourceRef:"" });

  if(!user || !isFullRole(user.role)){
    return <div style={{textAlign:"center",padding:40}}><div style={{fontSize:36,marginBottom:8}}>🔒</div><div style={{fontWeight:800,color:C.text}}>{tt("med.adminOnly")}</div></div>;
  }

  const nodes = kgNodesLoad();
  const edges = kgEdgesLoad();
  const nodeLabel = (id)=>{ const n=nodes.find(x=>x.id===id); return n?n.label:id; };
  const statusColor = (s)=> s===KB_STATUS.VALID?C.green : s===KB_STATUS.PENDING?C.amber : s===KB_STATUS.REJECTED?C.red : C.muted;

  const matchFilter = (statut, text)=>{
    if(fStatut!=="all" && statut!==fStatut) return false;
    if(search && !aiNormalize(text).includes(aiNormalize(search))) return false;
    return true;
  };

  const filteredEdges = edges.filter(e=>matchFilter(e.statut, `${nodeLabel(e.sourceNode)} ${e.relation} ${nodeLabel(e.targetNode)} ${e.sourceRef}`));
  const filteredNodes = nodes.filter(n=>matchFilter(n.statut, `${n.label} ${n.type} ${n.description}`));

  const addEdge = ()=>{
    const r = kgEdgePropose(newEdge, user);
    if(!r.ok){ alert(r.error==="source_required"?tt("kg.sourceRequired"):tt("kg.incomplete")); return; }
    setNewEdge({ sourceNode:"", relation:"concerne", targetNode:"", sourceRef:"" });
    refresh();
  };

  const exportCSV = ()=>{
    const rows = [["Source","Relation","Cible","Référence","Statut"]];
    edges.forEach(e=>rows.push([nodeLabel(e.sourceNode), e.relation, nodeLabel(e.targetNode), e.sourceRef||"", e.statut]));
    const csv = "\uFEFF" + rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\r\n");
    try{
      const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob); const a = document.createElement("a");
      a.href = url; a.download = `knowledge_graph_${todayStr()}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }catch(e){}
  };

  const card = { background:C.white, borderRadius:12, padding:12, marginBottom:10, boxShadow:`inset 0 0 0 1px ${C.border}` };
  const sbtn = (label, onClick, bg)=> <button onClick={onClick} style={{fontSize:11,fontWeight:700,padding:"5px 10px",border:"none",borderRadius:8,background:bg,color:C.white,cursor:"pointer",marginRight:6,marginTop:4}}>{label}</button>;
  const inp = { padding:8, borderRadius:8, border:`1px solid ${C.border}`, fontSize:12, boxSizing:"border-box" };

    <div>
      {/* Sous-onglets */}
      <div style={{display:"flex",gap:6,marginBottom:12,background:"#EEF2F7",borderRadius:12,padding:4}}>
        <button onClick={()=>setSub("relations")} style={{flex:1,padding:"9px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:800,fontSize:12.5,background:sub==="relations"?C.white:"transparent",color:sub==="relations"?C.navy:C.muted}}>🔗 {tt("kg.tabRelations")}</button>
        <button onClick={()=>setSub("nodes")} style={{flex:1,padding:"9px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:800,fontSize:12.5,background:sub==="nodes"?C.white:"transparent",color:sub==="nodes"?C.navy:C.muted}}>⬤ {tt("kg.tabNodes")}</button>
      </div>

      {/* Recherche + filtres + export */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={"🔎 "+tt("kg.search")} style={{...inp,flex:1,minWidth:120}}/>
        <select value={fStatut} onChange={e=>setFStatut(e.target.value)} style={{...inp}}>
          <option value="all">{tt("kg.allStatus")}</option>
          <option value={KB_STATUS.PENDING}>{KB_STATUS.PENDING}</option>
          <option value={KB_STATUS.VALID}>{KB_STATUS.VALID}</option>
          <option value={KB_STATUS.REJECTED}>{KB_STATUS.REJECTED}</option>
          <option value={KB_STATUS.ARCHIVED}>{KB_STATUS.ARCHIVED}</option>
        </select>
        <button onClick={exportCSV} style={{...inp,cursor:"pointer",fontWeight:700,color:C.navy,background:C.white}}>📥 CSV</button>
      </div>

      {sub==="relations" && (
        <div>

                <option value="">{tt("kg.sourceNode")}</option>

            <div style={{fontSize:10.5,color:C.muted,marginTop:6}}>🔒 {tt("kg.sourceMandatory")}</div>

          {/* Liste des relations */}
          <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{filteredEdges.length} {tt("kg.tabRelations").toLowerCase()}</div>
          {filteredEdges.map(e=>(

                  <b style={{color:C.navy}}>{nodeLabel(e.sourceNode)}</b> <span style={{color:C.blue,fontWeight:700}}>{e.relation}</span> <b style={{color:C.navy}}>{nodeLabel(e.targetNode)}</b>
                </div>
                <span style={{fontSize:10,fontWeight:800,padding:"3px 8px",borderRadius:99,background:statusColor(e.statut)+"22",color:statusColor(e.statut),whiteSpace:"nowrap"}}>{e.statut}</span>
              </div>
              {e.sourceRef ? <div style={{fontSize:11,color:C.muted,marginTop:4}}>📎 {e.sourceRef}</div> : <div style={{fontSize:11,color:C.red,marginTop:4}}>⚠️ {tt("kg.noSource")}</div>}
              <div style={{display:"flex",flexWrap:"wrap"}}>
                {e.statut!==KB_STATUS.VALID && sbtn("✓ "+tt("med.validate"), ()=>{ const r=kgEdgeSetStatus(e.id,KB_STATUS.VALID,user); if(!r.ok&&r.error==="source_required")alert(tt("kg.sourceRequired")); refresh(); }, C.green)}
                {e.statut!==KB_STATUS.REJECTED && sbtn("✕ "+tt("med.reject"), ()=>{ kgEdgeSetStatus(e.id,KB_STATUS.REJECTED,user); refresh(); }, C.red)}
                {e.statut!==KB_STATUS.ARCHIVED && sbtn("📦 "+tt("med.archive"), ()=>{ kgEdgeSetStatus(e.id,KB_STATUS.ARCHIVED,user); refresh(); }, C.muted)}
              </div>
            </div>
          ))}
        </div>
      )}

      {sub==="nodes" && (
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{filteredNodes.length} {tt("kg.tabNodes").toLowerCase()}</div>
          {filteredNodes.map(n=>(
            <div key={n.id} style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                <div><span style={{fontSize:13,fontWeight:800,color:C.navy}}>{n.label}</span> <span style={{fontSize:10,color:C.muted,marginLeft:6,padding:"2px 6px",borderRadius:6,background:"#EEF2F7"}}>{n.type}</span></div>
                <span style={{fontSize:10,fontWeight:800,padding:"3px 8px",borderRadius:99,background:statusColor(n.statut)+"22",color:statusColor(n.statut)}}>{n.statut}</span>
              </div>
              {n.description && <div style={{fontSize:12,color:C.text,marginTop:4}}>{n.description}</div>}
              <div style={{display:"flex",flexWrap:"wrap"}}>
                {n.statut!==KB_STATUS.VALID && sbtn("✓ "+tt("med.validate"), ()=>{ kgNodeSetStatus(n.id,KB_STATUS.VALID,user); refresh(); }, C.green)}
                {n.statut!==KB_STATUS.REJECTED && sbtn("✕ "+tt("med.reject"), ()=>{ kgNodeSetStatus(n.id,KB_STATUS.REJECTED,user); refresh(); }, C.red)}
                {n.statut!==KB_STATUS.ARCHIVED && sbtn("📦 "+tt("med.archive"), ()=>{ kgNodeSetStatus(n.id,KB_STATUS.ARCHIVED,user); refresh(); }, C.muted)}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function BiblioMedicale({ user }){
  const tt = tr;
  const [sub, setSub] = React.useState("sources"); // "sources" | "anatomie"
  const [, force] = React.useState(0);
  const refresh = ()=>force(x=>x+1);
  const [newSrc, setNewSrc] = React.useState({ nom:"", domaine:"", url:"", categorie:"Chirurgie esthétique", priorite:2 });

  if(!user || !isFullRole(user.role)){
    return <div style={{textAlign:"center",padding:40}}><div style={{fontSize:36,marginBottom:8}}>🔒</div><div style={{fontWeight:800,color:C.text}}>{tt("med.adminOnly")}</div></div>;
  }

  const sources = medSourcesLoad();
  const anat = anatLoad();

  const addSource = ()=>{
    if(!newSrc.nom.trim() || !newSrc.url.trim()) return;
    medSourceAdd(newSrc, user);
    setNewSrc({ nom:"", domaine:"", url:"", categorie:"Chirurgie esthétique", priorite:2 });
    refresh();
  };
  const statusColor = (s)=> s===KB_STATUS.VALID?C.green : s===KB_STATUS.PENDING?C.amber : s===KB_STATUS.REJECTED?C.red : C.muted;
  const card = { background:C.white, borderRadius:12, padding:12, marginBottom:10, boxShadow:`inset 0 0 0 1px ${C.border}` };
  const sbtn = (label, onClick, bg)=> <button onClick={onClick} style={{fontSize:11,fontWeight:700,padding:"5px 10px",border:"none",borderRadius:8,background:bg,color:C.white,cursor:"pointer",marginRight:6}}>{label}</button>;

  return (
    <div>
      {/* Sous-onglets */}
      <div style={{display:"flex",gap:6,marginBottom:14,background:"#EEF2F7",borderRadius:12,padding:4}}>
        <button onClick={()=>setSub("sources")} style={{flex:1,padding:"9px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:800,fontSize:12.5,background:sub==="sources"?C.white:"transparent",color:sub==="sources"?C.navy:C.muted}}>🌐 {tt("med.tabSources")}</button>
        <button onClick={()=>setSub("anatomie")} style={{flex:1,padding:"9px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:800,fontSize:12.5,background:sub==="anatomie"?C.white:"transparent",color:sub==="anatomie"?C.navy:C.muted}}>🧬 {tt("med.tabAnatomy")}</button>
      </div>

      {sub==="sources" && (
        <div>
          {/* Ajout de source */}
          <div style={{...card, background:"#F8FAFD"}}>
            <div style={{fontSize:13,fontWeight:800,color:C.navy,marginBottom:8}}>➕ {tt("med.addSource")}</div>
            <input value={newSrc.nom} onChange={e=>setNewSrc(s=>({...s,nom:e.target.value}))} placeholder={tt("med.sourceName")} style={{width:"100%",boxSizing:"border-box",marginBottom:6,padding:8,borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}}/>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <input value={newSrc.domaine} onChange={e=>setNewSrc(s=>({...s,domaine:e.target.value}))} placeholder={tt("med.sourceDomain")} style={{flex:1,boxSizing:"border-box",padding:8,borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}}/>
              <input value={newSrc.categorie} onChange={e=>setNewSrc(s=>({...s,categorie:e.target.value}))} placeholder={tt("med.sourceCategory")} style={{flex:1,boxSizing:"border-box",padding:8,borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}}/>
            </div>
            <input value={newSrc.url} onChange={e=>setNewSrc(s=>({...s,url:e.target.value}))} placeholder={tt("med.sourceUrl")} style={{width:"100%",boxSizing:"border-box",marginBottom:8,padding:8,borderRadius:8,border:`1px solid ${C.border}`,fontSize:12}}/>
            <button onClick={addSource} style={{padding:"9px 14px",border:"none",borderRadius:9,background:C.navy,color:C.white,fontWeight:800,fontSize:12,cursor:"pointer"}}>➕ {tt("med.addSource")}</button>
          </div>

          {/* Liste des sources */}
          {sources.map(s=>(
            <div key={s.id} style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.text}}>{s.nom}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.domaine} · {s.categorie} · P{s.priorite}</div>
                  <a href={s.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:C.blue}}>{s.url}</a>
                </div>
                <span style={{fontSize:10,fontWeight:800,padding:"3px 8px",borderRadius:99,background:statusColor(s.statut)+"22",color:statusColor(s.statut)}}>{s.statut}</span>
              </div>
              <div style={{marginTop:8,display:"flex",alignItems:"center",flexWrap:"wrap",gap:4}}>
                {s.statut!==KB_STATUS.VALID && sbtn("✓ "+tt("med.validate"), ()=>{ medSourceSetStatus(s.id,KB_STATUS.VALID,user); refresh(); }, C.green)}
                {s.statut!==KB_STATUS.REJECTED && sbtn("✕ "+tt("med.reject"), ()=>{ medSourceSetStatus(s.id,KB_STATUS.REJECTED,user); refresh(); }, C.red)}
                {sbtn("📦 "+tt("med.archive"), ()=>{ medSourceSetStatus(s.id,KB_STATUS.ARCHIVED,user); refresh(); }, C.muted)}
                <button onClick={()=>{ medSourceToggle(s.id,user); refresh(); }} style={{fontSize:11,fontWeight:700,padding:"5px 10px",border:`1px solid ${C.border}`,borderRadius:8,background:s.actif?"#DCFCE7":C.white,color:s.actif?C.green:C.muted,cursor:"pointer"}}>
                  {s.actif?"🟢 "+tt("med.active"):"⚪ "+tt("med.inactive")}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {sub==="anatomie" && (
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:10}}>🧬 {anat.length} {tt("med.tabAnatomy").toLowerCase()}</div>
          {anat.map(a=>(
            <div key={a.id} style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:13,fontWeight:800,color:C.navy}}>{a.region}</div>
                <span style={{fontSize:10,fontWeight:800,padding:"3px 8px",borderRadius:99,background:statusColor(a.statut)+"22",color:statusColor(a.statut)}}>{a.statut}</span>
              </div>
              <div style={{fontSize:12,color:C.text,marginTop:5,lineHeight:1.45}}>{a.description}</div>
              {a.structures && <div style={{fontSize:11,color:C.muted,marginTop:4}}>🔬 {tt("med.structures")}: {a.structures}</div>}
              {a.pertinence && <div style={{fontSize:11,color:C.muted,marginTop:2}}>⚕️ {tt("med.relevance")}: {a.pertinence}</div>}
              <div style={{marginTop:8}}>
                {a.statut!==KB_STATUS.VALID && sbtn("✓ "+tt("med.validate"), ()=>{ anatSetStatus(a.id,KB_STATUS.VALID,user); refresh(); }, C.green)}
                {a.statut!==KB_STATUS.REJECTED && sbtn("✕ "+tt("med.reject"), ()=>{ anatSetStatus(a.id,KB_STATUS.REJECTED,user); refresh(); }, C.red)}
                {a.statut!==KB_STATUS.ARCHIVED && sbtn("📦 "+tt("med.archive"), ()=>{ anatSetStatus(a.id,KB_STATUS.ARCHIVED,user); refresh(); }, C.muted)}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function BaseConnaissances({ user }){
  const tt = tr;
  const isAdmin = isFullRole(user && user.role);
  const canValidateKb = aiCan(user, "ia_kb_validation"); // permission IA dédiée (admin/pdg par défaut)
  const [fStatut, setFStatut] = React.useState("tous");
  const [fTheme, setFTheme] = React.useState("tous");
  const [q, setQ] = React.useState("");
  const [showForm, setShowForm] = React.useState(false);
  const [tick, setTick] = React.useState(0); // pour rafraîchir après action
  const refresh = () => setTick(t=>t+1);

  // Formulaire de proposition
  const [form, setForm] = React.useState({
    titre:"", contenu:"", sourceNom:"", sourceUrl:"", sourceType:KB_SOURCE_TYPES[0],
    theme:KB_THEMES[0], fiabilite:KB_RELIABILITY[0], dateConsultation:todayStr(), notesInternes:""
  });
  const setF = (k,v)=> setForm(f=>({...f,[k]:v}));

  const list = kbVisibleFor(user).slice().reverse();
  const filtered = list.filter(e=>{
    if(fStatut!=="tous" && e.statut!==fStatut) return false;
    if(fTheme!=="tous" && e.theme!==fTheme) return false;
    if(q){ const s=q.toLowerCase(); if(!(String(e.titre||"").toLowerCase().includes(s)||String(e.contenu||"").toLowerCase().includes(s)||String(e.sourceNom||"").toLowerCase().includes(s))) return false; }
    return true;
  });

  const statusColor = (s)=> s===KB_STATUS.VALID?"#16A34A":s===KB_STATUS.REJECTED?"#DC2626":s===KB_STATUS.ARCHIVED?"#64748B":"#D97706";
  const canSubmit = form.titre.trim() && form.contenu.trim() && form.sourceNom.trim() && form.sourceUrl.trim();

  const submit = () => {
    if(!canSubmit) return;
    kbPropose(form, user);
    setForm({titre:"",contenu:"",sourceNom:"",sourceUrl:"",sourceType:KB_SOURCE_TYPES[0],theme:KB_THEMES[0],fiabilite:KB_RELIABILITY[0],dateConsultation:todayStr(),notesInternes:""});
    setShowForm(false); refresh();
  };
  const setStatus = (id, st) => { kbSetStatus(id, st, user); refresh(); };

  const inp = { width:"100%", boxSizing:"border-box", padding:"9px 11px", borderRadius:9, border:`1px solid ${C.border}`, fontSize:13, fontFamily:"inherit" };
  const lbl = { fontSize:11, fontWeight:700, color:C.muted, textTransform:"uppercase", marginBottom:4, display:"block" };
  const sel = { padding:"7px 10px", borderRadius:9, border:`1px solid ${C.border}`, background:C.white, fontSize:12, color:C.text, fontWeight:600 };

  return (
    <div>
      {/* Bandeau confidentialité */}
      <div style={{background:"#EEF4FB",border:`1px solid ${C.blue}33`,borderRadius:10,padding:"9px 12px",marginBottom:14,fontSize:12,color:C.navy,fontWeight:600}}>
        📚 {tt("kb.intro")}
      </div>

      {/* Barre d'actions + filtres */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder={"🔍 "+tt("common.search")} style={{...sel,minWidth:150}}/>
        {isAdmin && (
          <select value={fStatut} onChange={e=>setFStatut(e.target.value)} style={sel}>
            <option value="tous">🔖 {tt("kb.allStatuses")}</option>
            <option value={KB_STATUS.PENDING}>{tt("kb.pending")}</option>
            <option value={KB_STATUS.VALID}>{tt("kb.valid")}</option>
            <option value={KB_STATUS.REJECTED}>{tt("kb.rejected")}</option>
            <option value={KB_STATUS.ARCHIVED}>{tt("kb.archived")}</option>
          </select>
        )}
        <select value={fTheme} onChange={e=>setFTheme(e.target.value)} style={sel}>
          <option value="tous">📂 {tt("kb.allThemes")}</option>
          {KB_THEMES.map(th=><option key={th} value={th}>{th}</option>)}
        </select>
        <button onClick={()=>setShowForm(s=>!s)} style={{...sel,background:C.navy,color:C.white,fontWeight:800,cursor:"pointer"}}>➕ {tt("kb.propose")}</button>
      </div>

      {/* Formulaire de proposition */}
      {showForm && (
        <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:16,boxShadow:`inset 0 0 0 1px ${C.border}`}}>
          <div style={{fontSize:13,fontWeight:800,color:C.navy,marginBottom:12}}>{tt("kb.newProposal")}</div>
          <div style={{marginBottom:10}}><label style={lbl}>{tt("kb.fTitle")} *</label><input style={inp} value={form.titre} onChange={e=>setF("titre",e.target.value)}/></div>
          <div style={{marginBottom:10}}><label style={lbl}>{tt("kb.fContent")} *</label><textarea rows={3} style={{...inp,resize:"vertical"}} value={form.contenu} onChange={e=>setF("contenu",e.target.value)}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={lbl}>{tt("kb.fSourceName")} *</label><input style={inp} value={form.sourceNom} onChange={e=>setF("sourceNom",e.target.value)}/></div>
            <div><label style={lbl}>{tt("kb.fSourceUrl")} *</label><input style={inp} value={form.sourceUrl} onChange={e=>setF("sourceUrl",e.target.value)} placeholder="https://"/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={lbl}>{tt("kb.fSourceType")}</label><select style={inp} value={form.sourceType} onChange={e=>setF("sourceType",e.target.value)}>{KB_SOURCE_TYPES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
            <div><label style={lbl}>{tt("kb.fTheme")}</label><select style={inp} value={form.theme} onChange={e=>setF("theme",e.target.value)}>{KB_THEMES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={lbl}>{tt("kb.fReliability")}</label><select style={inp} value={form.fiabilite} onChange={e=>setF("fiabilite",e.target.value)}>{KB_RELIABILITY.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
            <div><label style={lbl}>{tt("kb.fConsultDate")}</label><input type="date" style={inp} value={form.dateConsultation} onChange={e=>setF("dateConsultation",e.target.value)}/></div>
          </div>
          <div style={{marginBottom:12}}><label style={lbl}>{tt("kb.fNotes")}</label><input style={inp} value={form.notesInternes} onChange={e=>setF("notesInternes",e.target.value)}/></div>
          <div style={{background:"#FFF7ED",border:`1px solid ${C.amber}44`,borderRadius:9,padding:"8px 11px",marginBottom:12,fontSize:11,color:"#7C4A02",fontWeight:600}}>
            ⚠️ {tt("kb.pendingNote")}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={submit} disabled={!canSubmit} style={{flex:1,padding:"11px",border:"none",borderRadius:11,background:canSubmit?C.navy:"#CBD5E1",color:C.white,fontWeight:800,fontSize:13,cursor:canSubmit?"pointer":"not-allowed"}}>{tt("kb.submitProposal")}</button>
            <button onClick={()=>setShowForm(false)} style={{flex:1,padding:"11px",border:`1px solid ${C.border}`,borderRadius:11,background:C.white,color:C.text,fontWeight:700,fontSize:13,cursor:"pointer"}}>{tt("common.cancel")}</button>
          </div>
        </div>
      )}

      {/* Liste des connaissances */}
      {filtered.length===0
        ? <div style={{fontSize:13,color:C.muted,textAlign:"center",padding:40}}>{tt("kb.empty")}</div>
        : filtered.map(e=>(
          <div key={e.id} style={{background:C.white,borderRadius:12,padding:"12px 14px",marginBottom:8,boxShadow:`inset 0 0 0 1px ${C.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
              <Badge text={e.statut} color={statusColor(e.statut)} small/>
              <Badge text={e.theme} color={C.navy} small/>
              <Badge text={e.fiabilite} color={C.blue} small/>
            </div>
            <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:4}}>{e.titre}</div>
            <div style={{fontSize:13,color:C.text,marginBottom:8,whiteSpace:"pre-wrap"}}>{e.contenu}</div>
            {/* Citation de la source */}
            <div style={{background:"#F8FAFC",borderRadius:8,padding:"8px 10px",fontSize:11,color:C.muted,marginBottom:6}}>
              📎 <b style={{color:C.text}}>{e.sourceNom}</b> · {e.sourceType}
              {e.sourceUrl && <> · <a href={e.sourceUrl} target="_blank" rel="noopener noreferrer" style={{color:C.blue}}>{tt("kb.openSource")}</a></>}
              <br/>🗓️ {tt("kb.consultedOn")}: {e.dateConsultation}
              {e.validePar && <> · ✓ {tt("kb.validatedBy")}: {(USERS||[]).find(u=>u.id===e.validePar)?.prenom||e.validePar} ({e.dateValidation})</>}
            </div>
            {/* Actions admin (workflow de statut) */}
            {canValidateKb && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
                {e.statut!==KB_STATUS.VALID && <button onClick={()=>setStatus(e.id,KB_STATUS.VALID)} style={{padding:"6px 12px",border:"none",borderRadius:8,background:"#16A34A",color:C.white,fontWeight:700,fontSize:11,cursor:"pointer"}}>✓ {tt("kb.validate")}</button>}
                {e.statut!==KB_STATUS.REJECTED && <button onClick={()=>setStatus(e.id,KB_STATUS.REJECTED)} style={{padding:"6px 12px",border:"none",borderRadius:8,background:"#DC2626",color:C.white,fontWeight:700,fontSize:11,cursor:"pointer"}}>✕ {tt("kb.reject")}</button>}
                {e.statut!==KB_STATUS.ARCHIVED && <button onClick={()=>setStatus(e.id,KB_STATUS.ARCHIVED)} style={{padding:"6px 12px",border:"none",borderRadius:8,background:"#64748B",color:C.white,fontWeight:700,fontSize:11,cursor:"pointer"}}>🗄 {tt("kb.archive")}</button>}
              </div>
            )}
          </div>
        ))}
    </div>
  );
}

// PHASE 5 — JOURNAL IA (consultation, lecture seule)
// • Lit ia_log (rempli en Phase 4). Aucune fonction d'écriture reçue → rien à modifier/supprimer.
// • Permissions : admin/pdg voient tout ; les autres ne voient QUE leurs propres entrées ;
//   le chirurgien n'a pas accès (règle dure).
// • Journal append-only garanti côté backend (aucune route update/delete sur ia_log).
// ════════════════════════════════════════════════════════════════════════════
function journalIACanAccess(user){
  if(!user) return false;
  if(isSurgeon(user)) return false;                 // chirurgien : jamais
  if(isFullRole(user.role)) return true;            // admin / pdg : accès complet
  // Sinon : accès à ses propres logs si droit patients ET permission IA journal activée
  return can(user, "patients", "view") && aiCan(user, "ia_journal");
}

function JournalIA({ user }){
  const tt = tr;
  const [fUser, setFUser] = React.useState("tous");
  const [fPatient, setFPatient] = React.useState("");
  const [fModule, setFModule] = React.useState("tous");
  const [fDecision, setFDecision] = React.useState("tous");
  const [fFrom, setFFrom] = React.useState("");
  const [fTo, setFTo] = React.useState("");

  // Accès refusé (défense en profondeur, même si la nav est masquée)
  if(!journalIACanAccess(user)){
    return (
      <div style={{textAlign:"center",padding:50}}>
        <div style={{fontSize:40,marginBottom:10}}>🔒</div>
        <div style={{fontSize:16,fontWeight:800,color:C.text}}>{tt("iaj.noAccess")}</div>
      </div>
    );
  }

  const isFull = isFullRole(user.role);
  const all = iaLog().slice().reverse(); // plus récent d'abord

  // Portée : admin/pdg → tout ; autres → uniquement leurs propres entrées
  let rows = isFull ? all : all.filter(e => String(e.by) === String(user.id));

  // Filtres
  const q = fPatient.trim().toLowerCase();
  rows = rows.filter(e => {
    if(fUser!=="tous" && String(e.by)!==String(fUser)) return false;
    if(fModule!=="tous" && String(e.actionType)!==fModule) return false;
    if(fDecision!=="tous" && String(e.decision)!==fDecision) return false;
    if(q && !String(e.cible||"").toLowerCase().includes(q)) return false;
    if(fFrom && String(e.date||"") < fFrom) return false;
    if(fTo && String(e.date||"") > fTo) return false;
    return true;
  });

  const userName = (id) => { const u=(USERS||[]).find(x=>String(x.id)===String(id)); return u?`${u.prenom} ${u.nom||""}`.trim():id; };
  const decLabel = (d) => d==="confirmed"?tt("iaj.confirmed"):d==="cancelled"?tt("iaj.cancelled"):d==="modified"?tt("iaj.modified"):d;
  const decColor = (d) => d==="confirmed"?"#16A34A":d==="cancelled"?"#DC2626":"#D97706";

  // Modules présents pour le filtre
  const modules = Array.from(new Set(all.map(e=>e.actionType).filter(Boolean)));

  const exportCSV = () => {
    const head = ["date","heure","utilisateur","decision","action","cible","champ","ancien","nouveau","raison"];
    const esc = v => `"${String(v==null?"":v).replace(/"/g,'""')}"`;
    const lines = [head.join(",")].concat(rows.map(e => [
      e.date, e.heure, userName(e.by), e.decision, e.actionType, e.cible, e.champ, e.ancien, e.nouveau, e.raison
    ].map(esc).join(",")));
    const csv = "\uFEFF" + lines.join("\r\n");
    try{
      const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `journal_ia_${todayStr()}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){}
  };

  const sel = { padding:"7px 10px", borderRadius:9, border:`1px solid ${C.border}`, background:C.white, fontSize:12, color:C.text, fontWeight:600 };

  return (
    <div>
      {/* Bandeau lecture seule */}
      <div style={{background:"#EEF4FB",border:`1px solid ${C.blue}33`,borderRadius:10,padding:"9px 12px",marginBottom:14,fontSize:12,color:C.navy,fontWeight:600}}>
        🔒 {tt("iaj.readonly")} · {rows.length} {tt("iaj.entries")}
      </div>

      {/* Filtres */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {isFull && (
          <select value={fUser} onChange={e=>setFUser(e.target.value)} style={sel}>
            <option value="tous">👤 {tt("fin.allUsers")}</option>
            {(USERS||[]).map(u=><option key={u.id} value={u.id}>{u.prenom} {u.nom}</option>)}
          </select>
        )}
        <input value={fPatient} onChange={e=>setFPatient(e.target.value)} placeholder={"🔍 "+tt("nav.patients")} style={{...sel, minWidth:130}}/>
        <select value={fModule} onChange={e=>setFModule(e.target.value)} style={sel}>
          <option value="tous">📂 {tt("iaj.allModules")}</option>
          {modules.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
        <select value={fDecision} onChange={e=>setFDecision(e.target.value)} style={sel}>
          <option value="tous">🔖 {tt("iaj.allDecisions")}</option>
          <option value="confirmed">{tt("iaj.confirmed")}</option>
          <option value="cancelled">{tt("iaj.cancelled")}</option>
          <option value="modified">{tt("iaj.modified")}</option>
        </select>
        <input type="date" value={fFrom} onChange={e=>setFFrom(e.target.value)} style={sel} title={tt("iaj.from")}/>
        <input type="date" value={fTo} onChange={e=>setFTo(e.target.value)} style={sel} title={tt("iaj.to")}/>
        {(fUser!=="tous"||fPatient||fModule!=="tous"||fDecision!=="tous"||fFrom||fTo) &&
          <button onClick={()=>{setFUser("tous");setFPatient("");setFModule("tous");setFDecision("tous");setFFrom("");setFTo("");}} style={{...sel,color:C.red,fontWeight:800,cursor:"pointer"}}>✕ {tt("common.reset")}</button>}
        <button onClick={exportCSV} disabled={rows.length===0} style={{...sel,background:C.navy,color:C.white,fontWeight:800,cursor:rows.length?"pointer":"not-allowed",opacity:rows.length?1:0.5}}>⬇ {tt("iaj.exportCsv")}</button>
      </div>

      {/* Liste (lecture seule — aucun bouton modifier/supprimer) */}
      {rows.length===0
        ? <div style={{fontSize:13,color:C.muted,textAlign:"center",padding:40}}>{tt("iaj.empty")}</div>
        : rows.map(e=>(
          <div key={e.id} style={{background:C.white,borderRadius:12,padding:"12px 14px",marginBottom:8,boxShadow:`inset 0 0 0 1px ${C.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
