// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  get: async (type) => {
    try {
      const r = await fetch(`${SCRIPT_URL}?type=${type}&t=${Date.now()}`, {
        method:"GET", redirect:"follow"
      });
      const text = await r.text();
      const d = JSON.parse(text);
      return Array.isArray(d) ? d : [];
    } catch(e) { 
      console.error("GET error:", e);
      return []; 
    }
  },
  post: async (type, action, record) => {
    // Method 1: fetch no-cors with text/plain (works for writing)
    const body = JSON.stringify({type, action, record});
    const promises = [
      fetch(SCRIPT_URL, {
        method:"POST", mode:"no-cors", cache:"no-cache",
        headers:{"Content-Type":"text/plain"},
        body
      }).catch(()=>{}),
    ];
    await Promise.allSettled(promises);
    await new Promise(r=>setTimeout(r,800));
  }
};

// Local cache to persist data across reloads
const cache = {
  save: (key, data) => {
    try { localStorage.setItem("cn_cache_"+key, JSON.stringify({data, ts:Date.now()})); } catch(e){}
  },
  load: (key) => {
    try { 
      const s = localStorage.getItem("cn_cache_"+key);
      if(!s) return null;
      const {data, ts} = JSON.parse(s);
      // Cache valid for 24h
      if(Date.now()-ts < 86400000) return data;
      return null;
    } catch(e){ return null; }
  }
};

// ── TÂCHES ────────────────────────────────────────────────────────────────────
function Taches({user, taches, setTaches, syncing, setSyncing}) {
  const [tab,setTab] = useState("mes");
  const [showForm,setShowForm] = useState(false);
  const [f,setF] = useState({titre:"",description:"",assigneA:user.id,priorite:"Normale",echeance:"",statut:"En cours"});
  const ch = (k,v) => setF(x=>({...x,[k]:v}));
  const inp = {width:"100%",padding:"9px 11px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,outline:"none",background:C.bg,boxSizing:"border-box"};
  const lbl = {fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4};

  const mesTaches = taches.filter(t=>t.assigneA===user.id);
  const groupTaches = taches;

  const addTache = async () => {
    if(!f.titre.trim()) { alert("Le titre est obligatoire !"); return; }
    const n={...f,id:uid(),creePar:user.id,cree:todayStr(),statut:"En cours"};
    setTaches(ts=>{const nt=[...ts,n];cache.save("taches",nt);return nt;});
    setSyncing(true);
    try {
      await api.post("taches","add",n);
    } catch(e){ console.error("Tache add error:",e); }
    setSyncing(false);
    setShowForm(false);
    setF({titre:"",description:"",assigneA:user.id,priorite:"Normale",echeance:"",statut:"En cours"});
  };

  const toggleStatut = async (t) => {
    const newStatut = t.statut==="Terminée"?"En cours":"Terminée";
    const updated={...t,statut:newStatut};
    setTaches(ts=>{const nt=ts.map(x=>x.id===t.id?updated:x);cache.save("taches",nt);return nt;});
    setSyncing(true);
    try {
      await api.post("taches","update",updated);
    } catch(e){ console.error("Tache update error:",e); }
    setSyncing(false);
  };

  const deleteTache = async (id) => {
    if(!window.confirm("Supprimer cette tâche ?")) return;
    setTaches(ts=>{const nt=ts.filter(t=>t.id!==id);cache.save("taches",nt);return nt;});
    setSyncing(true);
    try {
      await api.post("taches","delete",{id});
    } catch(e){ console.error("Tache delete error:",e); }
    setSyncing(false);
  };

  const displayTaches = tab==="mes"?mesTaches:groupTaches;

  const TacheItem = ({t}) => {
    const assignee = USERS.find(u=>u.id===t.assigneA);
    const done = t.statut==="Terminée";
    return (
      <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 0",borderBottom:`1px solid ${C.bg}`,opacity:done?0.5:1}}>

// ── FINANCES PREMIUM ──────────────────────────────────────────────────────────
function Finances({user, finances, patients, onAdd, onDelete, onUpdate}) {
  const [tab, setTab] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [filterPeriod, setFilterPeriod] = useState("tout");
  const [filterUser, setFilterUser] = useState("tous");
  const [filterStatut, setFilterStatut] = useState("tous");
  const [filterDevise, setFilterDevise] = useState("tous");
  const [selectedPatient, setSelectedPatient] = useState(null);

  const DEVISES = ["€","$","£","CHF","TRY","AED"];
  const getP = id => patients.find(p=>String(p.id)===String(id));
  const getU = id => USERS.find(u=>u.id===id);

  const today = todayStr();
  const thisWeekStart = (() => { const d=new Date(); d.setDate(d.getDate()-(d.getDay()||7)+1); return d.toISOString().split("T")[0]; })();
  const thisMonthStart = today.slice(0,7)+"-01";
  const thisYearStart = today.slice(0,4)+"-01-01";

  const inPeriod = (date) => {
    if(filterPeriod==="tout") return true;
    if(filterPeriod==="today") return date===today;
    if(filterPeriod==="week") return date>=thisWeekStart;
    if(filterPeriod==="month") return date>=thisMonthStart;
    if(filterPeriod==="year") return date>=thisYearStart;
    return true;
  };

  const filtered = finances.filter(f => {
    const p = getP(f.patientId);
    const sq = search.toLowerCase();
    const matchSearch = !search || 
      (p && `${p.prenom} ${p.nom}`.toLowerCase().includes(sq)) ||
      (f.procedure||"").toLowerCase().includes(sq) ||
      (f.montant||"").toString().includes(sq);
    const matchPeriod = inPeriod(f.date||"");
    const matchUser = filterUser==="tous" || f.creePar===filterUser;
    const matchStatut = filterStatut==="tous" || f.statut===filterStatut;
    const matchDevise = filterDevise==="tous" || (f.methode||"")===filterDevise;
    return matchSearch && matchPeriod && matchUser && matchStatut;
  });

  // Calculs
  const total = filtered.reduce((a,f)=>a+Number(f.montant||0),0);
  const recus = filtered.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const attente = filtered.filter(f=>f.statut==="En attente").reduce((a,f)=>a+Number(f.montant||0),0);
  const acomptes = filtered.filter(f=>f.type==="Acompte").reduce((a,f)=>a+Number(f.montant||0),0);
  const nAcomptes = filtered.filter(f=>f.type==="Acompte").length;
  const rembours = filtered.filter(f=>f.type==="Remboursement").reduce((a,f)=>a+Number(f.montant||0),0);
  const todayRecus = finances.filter(f=>f.date===today&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const weekRecus = finances.filter(f=>f.date>=thisWeekStart&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const monthRecus = finances.filter(f=>f.date>=thisMonthStart&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const panierMoyen = patients.filter(p=>p.budget).length ? Math.round(patients.filter(p=>p.budget).reduce((a,p)=>a+Number(p.budget||0),0)/patients.filter(p=>p.budget).length) : 0;
  const tauxConv = patients.length ? Math.round((patients.filter(p=>["Confirmé","Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade)).length/patients.length)*100) : 0;
  const patientsValides = patients.filter(p=>["Confirmé","Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade));
  const patientsOperes = patients.filter(p=>["Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade));

  // CA par mois (6 derniers mois)
  const caParMois = Array.from({length:6},(_,i)=>{
    const d = new Date(); d.setMonth(d.getMonth()-5+i);
    const key = d.toISOString().slice(0,7);
    const moisNom = d.toLocaleDateString("fr-FR",{month:"short"});
    const ca = finances.filter(f=>f.date&&f.date.startsWith(key)&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
    return {mois:moisNom, ca};
  });
  const maxCA = Math.max(...caParMois.map(m=>m.ca),1);

  // CA par coordinateur
  const caParUser = USERS.map(u=>({
    u, ca: finances.filter(f=>f.creePar===u.id&&f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0),
    nb: finances.filter(f=>f.creePar===u.id).length
  })).sort((a,b)=>b.ca-a.ca);

  // Alertes
  const alertes = [
    ...finances.filter(f=>f.statut==="En attente"&&f.date<today).map(f=>({type:"retard",msg:`Paiement en retard — ${getP(f.patientId)?.prenom||"?"} ${fmtEur(f.montant)}`,color:C.red})),
    ...finances.filter(f=>f.date===today&&f.statut==="Complété").map(f=>({type:"recu",msg:`✅ Paiement reçu aujourd'hui — ${fmtEur(f.montant)}`,color:C.green})),
    ...patients.filter(p=>p.stade==="Confirmé"&&!finances.some(f=>f.patientId===p.id&&f.type==="Acompte")).map(p=>({type:"acompte",msg:`⚠️ Acompte manquant — ${p.prenom} ${p.nom}`,color:C.amber})),
  ].slice(0,5);

  const TABS = [
    {id:"dashboard",label:"Dashboard",icon:"📊"},
    {id:"transactions",label:"Transactions",icon:"💳"},
    {id:"patients",label:"Patients",icon:"👥"},
    {id:"perf",label:"Performance",icon:"🏆"},
    {id:"stats",label:"Statistiques",icon:"📈"},
  ];

  const StatCard = ({icon,label,value,color=C.navy,sub}) => (
    <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:42,height:42,borderRadius:12,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{icon}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:18,fontWeight:800,color:C.text,lineHeight:1}}>{value}</div>
        <div style={{fontSize:11,color:C.muted,marginTop:2}}>{label}</div>
        {sub&&<div style={{fontSize:10,color,fontWeight:700,marginTop:1}}>{sub}</div>}
      </div>
    </div>
  );

  if(selectedPatient) {
    const p = getP(selectedPatient);
    const pFinances = finances.filter(f=>f.patientId===selectedPatient).sort((a,b)=>b.date?.localeCompare(a.date||"")||0);
    const totalPaye = pFinances.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
    const restant = Number(p?.budget||0) - totalPaye;
    return (
      <div>
        <button onClick={()=>setSelectedPatient(null)} style={{border:"none",background:"none",cursor:"pointer",color:C.blue,fontWeight:700,fontSize:13,marginBottom:14,display:"flex",alignItems:"center",gap:6}}>← Retour Finance</button>
        <Card style={{background:`linear-gradient(135deg,${C.navy},#1a3a5c)`,border:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <Avatar p={p||{prenom:"?",nom:""}} size={48}/>
            <div>
              <div style={{color:C.white,fontWeight:800,fontSize:16}}>{p?.prenom} {p?.nom}</div>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{p?.procedure} · {p?.pays}</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:14}}>
            {[
              {label:"Budget total",value:fmtEur(p?.budget),color:C.gold},
              {label:"Total payé",value:fmtEur(totalPaye),color:"#4ade80"},
              {label:"Restant",value:fmtEur(Math.max(restant,0)),color:restant>0?"#fbbf24":"#4ade80"},
            ].map(s=>(
              <div key={s.label} style={{background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                <div style={{color:s.color,fontWeight:800,fontSize:14}}>{s.value}</div>
                <div style={{color:"rgba(255,255,255,0.6)",fontSize:9,marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
        </Card>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
          <button onClick={onAdd} style={{padding:"9px 16px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13}}>+ Paiement</button>
        </div>
        {pFinances.length===0 ? <div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Aucune transaction pour ce patient.</div> :
        pFinances.map(f=>(
          <Card key={f.id} style={{padding:"12px 16px",borderLeft:`3px solid ${f.statut==="Complété"?C.green:C.amber}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>

                <div style={{fontWeight:800,fontSize:15,color:f.statut==="Complété"?C.green:C.amber}}>{fmtEur(f.montant)}</div>

          </Card>
        ))}
      </div>

  }

  return (
    <div>
      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 12px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:11,background:tab===t.id?C.navy:C.bg,color:tab===t.id?C.white:C.muted,flexShrink:0,display:"flex",alignItems:"center",gap:4}}>

      {tab==="dashboard" && <>
        {/* Alertes */}
        {alertes.length>0&&<div style={{marginBottom:12}}>
          {alertes.map((a,i)=>(
            <div key={i} style={{background:a.color+"12",border:`1px solid ${a.color}33`,borderRadius:10,padding:"8px 12px",marginBottom:6,fontSize:12,color:a.color,fontWeight:600}}>{a.msg}</div>

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>

          <StatCard icon="⏳" label="En attente" value={fmtEur(attente)} color={C.amber}/>
          <StatCard icon="📥" label="Acomptes reçus" value={fmtEur(acomptes)} color={C.blue} sub={`${nAcomptes} transactions`}/>
          <StatCard icon="📅" label="Ce mois" value={fmtEur(monthRecus)} color={C.purple} sub={`Semaine: ${fmtEur(weekRecus)}`}/>

          <StatCard icon="✅" label="Patients validés" value={patientsValides.length} color={C.navy}/>
          <StatCard icon="🏥" label="Patients opérés" value={patientsOperes.length} color={C.blue}/>

        {/* CA par mois */}
        <Card>
          <SecTitle icon="📈">Chiffre d'affaires — 6 derniers mois</SecTitle>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
            {caParMois.map((m,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{fontSize:9,fontWeight:700,color:C.navy}}>{m.ca>0?`${Math.round(m.ca/1000)}k`:""}</div>
                <div style={{width:"100%",borderRadius:"4px 4px 0 0",background:i===5?C.gold:C.navy+"44",height:`${maxCA>0?(m.ca/maxCA)*60:4}px`,minHeight:4,transition:"height 0.3s"}}/>

        </Card>

        {/* Top coordinateurs */}
        <Card>
          <SecTitle icon="🏆">Performance équipe</SecTitle>
          {caParUser.map((x,i)=>(
            <div key={x.u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<caParUser.length-1?`1px solid ${C.bg}`:"none"}}>

                <div style={{fontWeight:700,fontSize:13,color:C.text}}>{x.u.prenom}</div>

              </div>
              <div style={{fontWeight:800,fontSize:14,color:C.green}}>{fmtEur(x.ca)}</div>

      {/* TRANSACTIONS */}
      {tab==="transactions" && <>

        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher…" style={{flex:1,minWidth:120,padding:"8px 10px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,outline:"none",background:C.white}}/>
          <select value={filterPeriod} onChange={e=>setFilterPeriod(e.target.value)} style={{padding:"8px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,background:C.white,outline:"none"}}>

            <option value="today">Aujourd'hui</option>

            <option value="month">Ce mois</option>

            <option value="Complété">Complété</option>
            <option value="En attente">En attente</option>
            <option value="Annulé">Annulé</option>
          </select>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,color:C.muted}}>{filtered.length} transaction(s) · <span style={{color:C.green,fontWeight:700}}>{fmtEur(recus)}</span> encaissé</div>

        {filtered.length===0?<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Aucune transaction.</div>:

          const p=getP(f.patientId);
          const createdBy=getU(f.creePar);

            <Card key={f.id} style={{padding:"12px 16px",borderLeft:`3px solid ${f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber}`}}>

                <Avatar p={p||{prenom:"?",nom:""}} size={36}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.text,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    {p?`${p.prenom} ${p.nom}`:"—"}
                    <Badge text={f.type} color={f.type==="Acompte"?C.blue:f.type==="Remboursement"?C.red:C.green} small/>
                  </div>
                  <div style={{fontSize:11,color:C.muted}}>📅 {f.date} · {f.methode} · {createdBy?.prenom||"—"}</div>
                  {f.procedure&&<div style={{fontSize:11,color:C.muted}}>{f.procedure}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontWeight:800,fontSize:15,color:f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber}}>{fmtEur(f.montant)}</div>
                  <Badge text={f.statut} color={f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber} small/>
                </div>
                {user.role==="admin"&&<button onClick={()=>onDelete(f.id)} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:13,marginLeft:4}}>🗑</button>}
              </div>
            </Card>
          );
        })}
      </>}

      {/* PATIENTS FINANCIERS */}
      {tab==="patients" && <>
        <div style={{marginBottom:10,fontSize:12,color:C.muted}}>{patients.length} patients · Cliquez pour voir le détail</div>
        {patients.filter(p=>{
          if(!search) return true;
          return `${p.prenom} ${p.nom} ${p.procedure}`.toLowerCase().includes(search.toLowerCase());
        }).map(p=>{
          const pFin = finances.filter(f=>f.patientId===p.id);
          const totalPaye = pFin.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
          const restant = Math.max(Number(p.budget||0)-totalPaye,0);
          const pct = p.budget ? Math.round((totalPaye/Number(p.budget))*100) : 0;
          return (
            <Card key={p.id} style={{padding:"12px 16px",cursor:"pointer"}} onClick={()=>setSelectedPatient(p.id)}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Avatar p={p} size={38}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.text}}>{p.prenom} {p.nom}</div>
                  <div style={{fontSize:11,color:C.muted}}>{p.procedure} · {p.pays}</div>
                  <div style={{marginTop:6,background:C.bg,borderRadius:99,height:5}}>
                    <div style={{background:pct>=100?C.green:pct>50?C.amber:C.red,borderRadius:99,height:5,width:`${Math.min(pct,100)}%`,transition:"width 0.3s"}}/>
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.green}}>{fmtEur(totalPaye)}</div>
                  {restant>0&&<div style={{fontSize:11,color:C.red,fontWeight:600}}>-{fmtEur(restant)}</div>}
                  <div style={{fontSize:10,color:C.muted}}>{pct}%</div>
                </div>
              </div>
            </Card>
          );
        })}
      </>}

      {/* PERFORMANCE */}
      {tab==="perf" && <>
        <Card style={{overflowX:"auto"}}>
          <SecTitle icon="🏆">Performance par coordinateur</SecTitle>
          {USERS.map((u,i)=>{
            const uFin = finances.filter(f=>f.creePar===u.id);
            const uCA = uFin.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
            const uAcomptes = uFin.filter(f=>f.type==="Acompte").reduce((a,f)=>a+Number(f.montant||0),0);
            const uPatients = patients.filter(p=>p.creePar===u.id);
            const uOperes = uPatients.filter(p=>["Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade));
            const objectif = 50000;
            const prog = Math.min(Math.round((uCA/objectif)*100),100);
            return (
              <div key={u.id} style={{padding:"14px 0",borderBottom:i<USERS.length-1?`1px solid ${C.bg}`:"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <Avatar p={{prenom:u.prenom,nom:""}} size={36} color={u.color}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:13,color:C.text}}>{u.prenom}</div>
                    <div style={{fontSize:11,color:u.color,fontWeight:600}}>{ROLE_LABELS[u.role]}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:800,fontSize:15,color:C.green}}>{fmtEur(uCA)}</div>
                    <div style={{fontSize:10,color:C.muted}}>{prog}% objectif</div>
                  </div>
                </div>
                <div style={{background:C.bg,borderRadius:99,height:6,marginBottom:8}}>
                  <div style={{background:prog>=100?C.green:prog>50?u.color:C.amber,borderRadius:99,height:6,width:`${prog}%`,transition:"width 0.5s"}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                  {[
                    {label:"Patients",value:uPatients.length},
                    {label:"Opérés",value:uOperes.length},
                    {label:"Acomptes",value:fmtEur(uAcomptes)},
                    {label:"Transactions",value:uFin.length},
                  ].map(s=>(
                    <div key={s.label} style={{background:C.bg,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
                      <div style={{fontWeight:800,fontSize:12,color:C.text}}>{s.value}</div>
                      <div style={{fontSize:9,color:C.muted}}>{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </Card>
      </>}

      {/* STATISTIQUES */}
      {tab==="stats" && <>
        <Card>
          <SecTitle icon="📊">Répartition des paiements</SecTitle>
          {["Acompte","Paiement total","Remboursement","Devis"].map(type=>{
            const n = finances.filter(f=>f.type===type).length;
            const pct = finances.length ? Math.round((n/finances.length)*100) : 0;
            const colors = {"Acompte":C.blue,"Paiement total":C.green,"Remboursement":C.red,"Devis":C.amber};
            return (
              <div key={type} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                  <span style={{color:C.text,fontWeight:600}}>{type}</span>
                  <span style={{color:C.muted}}>{n} · {pct}%</span>
                </div>
                <div style={{background:C.bg,borderRadius:99,height:8}}>
                  <div style={{background:colors[type],borderRadius:99,height:8,width:`${pct}%`}}/>
                </div>
              </div>
            );
          })}
        </Card>
        <Card>
          <SecTitle icon="💳">Modes de paiement</SecTitle>
          {["Virement","Carte bancaire","Espèces","PayPal"].map(m=>{
            const n = finances.filter(f=>f.methode===m).length;
            const pct = finances.length ? Math.round((n/finances.length)*100) : 0;
            return (
              <div key={m} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.bg}`}}>
                <span style={{fontSize:13,color:C.text}}>{m}</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:60,background:C.bg,borderRadius:99,height:6}}>
                    <div style={{background:C.navy,borderRadius:99,height:6,width:`${pct}%`}}/>
                  </div>
                  <span style={{fontSize:12,color:C.muted,width:30,textAlign:"right"}}>{n}</span>
                </div>
              </div>
            );
          })}
        </Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <StatCard icon="🔄" label="Remboursements" value={fmtEur(rembours)} color={C.red}/>
          <StatCard icon="📋" label="Devis envoyés" value={finances.filter(f=>f.type==="Devis").length} color={C.purple}/>
          <StatCard icon="⚡" label="Paiements en attente" value={finances.filter(f=>f.statut==="En attente").length} color={C.amber}/>
          <StatCard icon="✅" label="Paiements complets" value={finances.filter(f=>f.statut==="Complété").length} color={C.green}/>
        </div>
      </>}
    </div>
  );
}

// ── ANALYSES ──────────────────────────────────────────────────────────────────
function Analyses({patients, finances}) {
  const byProc = PROCEDURES.map(p=>({name:p,n:patients.filter(x=>x.procedure===p).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n).slice(0,6);
  const bySrc = SOURCES.map(s=>({name:s,n:patients.filter(x=>x.source===s).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const taux = patients.length?Math.round((patients.filter(p=>p.stade==="Clôturé ✓").length/patients.length)*100):0;
  const bMoy = patients.filter(p=>p.budget).length?Math.round(patients.filter(p=>p.budget).reduce((a,p)=>a+Number(p.budget),0)/patients.filter(p=>p.budget).length):0;
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        {[
          {icon:"📈",label:"Conversion",value:`${taux}%`,color:C.green},
          {icon:"💶",label:"Budget moyen",value:fmtEur(bMoy),color:C.blue},
          {icon:"🌍",label:"Pays",value:[...new Set(patients.map(p=>p.pays))].filter(Boolean).length,color:C.purple},
          {icon:"⭐",label:"Satisfaction",value:"98%",color:C.amber},
        ].map(s=>(
          <Card key={s.label} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:10,background:s.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{s.icon}</div>
            <div><div style={{fontSize:18,fontWeight:800,color:C.text}}>{s.value}</div><div style={{fontSize:11,color:C.muted}}>{s.label}</div></div>
          </Card>
        ))}
      </div>
      <Card>
        <SecTitle icon="🏥">Top procédures</SecTitle>
        {byProc.length===0?<div style={{color:C.muted,fontSize:13}}>Aucune donnée.</div>:byProc.map(x=>(
          <div key={x.name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:3}}><span>{x.name}</span><span style={{fontWeight:700,color:C.text}}>{x.n}</span></div>
            <div style={{background:C.bg,borderRadius:99,height:6}}><div style={{background:C.blue,borderRadius:99,height:6,width:`${patients.length?(x.n/patients.length)*100:0}%`}}/></div>
          </div>
        ))}
      </Card>
      <Card>
        <SecTitle icon="📊">Canaux d'acquisition</SecTitle>
        {bySrc.length===0?<div style={{color:C.muted,fontSize:13}}>Aucune donnée.</div>:bySrc.map(x=>(
          <div key={x.name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:3}}><span>{x.name}</span><span style={{fontWeight:700,color:C.text}}>{x.n}</span></div>
            <div style={{background:C.bg,borderRadius:99,height:6}}><div style={{background:C.purple,borderRadius:99,height:6,width:`${patients.length?(x.n/patients.length)*100:0}%`}}/></div>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function ModalPatient({user, patient, onSave, onClose}) {
  const [f,setF] = useState(patient||{prenom:"",nom:"",email:"",tel:"",pays:"France",ville:"",procedure:PROCEDURES[0],stade:STAGES[0],source:SOURCES[0],priorite:"Normale",budget:"",dateArrivee:"",notes:""});
  const [saving,setSaving] = useState(false);
  const ch = (k,v) => setF(x=>({...x,[k]:v}));
  const inp = {width:"100%",padding:"9px 11px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,background:C.bg,outline:"none",boxSizing:"border-box"};
  const lbl = {fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4};
  const row = (lb,el) => <div style={{marginBottom:12}}><label style={lbl}>{lb}</label>{el}</div>;
  const [saved,setSaved] = useState(false);
  const handleSave = async () => { 
    if(!f.prenom||!f.nom) { alert("Prénom et nom obligatoires !"); return; }
    setSaving(true); 
    await onSave(f); 
    setSaved(true);
    setSaving(false); 
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:C.white,borderRadius:"24px 24px 0 0",padding:"8px 20px 24px",width:"100%",maxHeight:"95vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(11,31,58,0.2)"}}>
        <div style={{width:40,height:4,borderRadius:99,background:C.border,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{margin:0,fontSize:17,fontWeight:800,color:C.text}}>{patient?.id?"Modifier":"Nouveau patient"}</h2>
          <button onClick={onClose} style={{border:"none",background:C.bg,borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div>{row("Prénom",<input style={inp} value={f.prenom} onChange={e=>ch("prenom",e.target.value)}/>)}</div>
          <div>{row("Nom",<input style={inp} value={f.nom} onChange={e=>ch("nom",e.target.value)}/>)}</div>
        </div>
        {row("Email",<input style={inp} type="email" value={f.email} onChange={e=>ch("email",e.target.value)}/>)}
        {row("Téléphone",<input style={inp} value={f.tel} onChange={e=>ch("tel",e.target.value)}/>)}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div>{row("Pays",<input style={inp} value={f.pays} onChange={e=>ch("pays",e.target.value)}/>)}</div>
          <div>{row("Ville",<input style={inp} value={f.ville} onChange={e=>ch("ville",e.target.value)}/>)}</div>
        </div>
        {row("Procédure",<select style={inp} value={f.procedure} onChange={e=>ch("procedure",e.target.value)}>{PROCEDURES.map(p=><option key={p}>{p}</option>)}</select>)}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div>{row("Statut",<select style={inp} value={f.stade} onChange={e=>ch("stade",e.target.value)}>{STAGES.map(s=><option key={s}>{s}</option>)}</select>)}</div>
          <div>{row("Source",<select style={inp} value={f.source} onChange={e=>ch("source",e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select>)}</div>
        </div>

// ── AGENDA CALENDRIER ─────────────────────────────────────────────────────────
function Agenda({user, rdvs, taches, patients}) {
  const [currentDate, setCurrentDate] = useState(new Date());
  const [viewMode, setViewMode] = useState("month"); // month | week
  const [selectedDay, setSelectedDay] = useState(null);

  const getPatient = id => patients.find(p=>String(p.id)===String(id));
  const getUser = id => USERS.find(u=>u.id===id);

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const JOURS = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

  // Jours du mois
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  const startDow = (firstDay.getDay()+6)%7; // Lundi = 0
  const daysInMonth = lastDay.getDate();

  // Filtrer les événements du jour
  const getEventsForDay = (dateStr) => {
    const rdvDay = rdvs.filter(r => r.date === dateStr);
    const tachDay = taches.filter(t => t.echeance === dateStr && t.statut !== "Terminée");
    return {rdvs: rdvDay, taches: tachDay};
  };

  const formatDate = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  const prevMonth = () => setCurrentDate(new Date(year, month-1, 1));
  const nextMonth = () => setCurrentDate(new Date(year, month+1, 1));
  const goToday = () => { setCurrentDate(new Date()); setSelectedDay(todayStr()); };

  const todayFmt = todayStr();

  // Construire la grille
  const cells = [];
  for(let i=0; i<startDow; i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  // Vue semaine
  const getWeekDays = () => {
    const today = selectedDay ? new Date(selectedDay+"T12:00:00") : new Date();
    const dow = (today.getDay()+6)%7;
    const monday = new Date(today); monday.setDate(today.getDate()-dow);
    return Array.from({length:7},(_,i)=>{
      const d = new Date(monday); d.setDate(monday.getDate()+i);
      return formatDate(d.getFullYear(), d.getMonth(), d.getDate());
    });
  };

  const weekDays = getWeekDays();

  const selectedEvents = selectedDay ? getEventsForDay(selectedDay) : null;

  return (
    <div>
      {/* Header navigation */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div style={{display:"flex",gap:6}}>
          <button onClick={prevMonth} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <button onClick={nextMonth} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <div style={{fontWeight:800,fontSize:16,color:C.navy}}>{MOIS[month]} {year}</div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={goToday} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700,color:C.navy}}>Auj.</button>
          <button onClick={()=>setViewMode(viewMode==="month"?"week":"month")} style={{border:"none",background:C.navy,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700,color:C.white}}>
            {viewMode==="month"?"Semaine":"Mois"}
          </button>
        </div>
      </div>

      {viewMode==="month" && <>
        {/* Grille jours semaine */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {JOURS.map(j=><div key={j} style={{textAlign:"center",fontSize:10,fontWeight:700,color:C.muted,padding:"4px 0"}}>{j}</div>)}
        </div>
        {/* Grille mois */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:16}}>
          {cells.map((d,i)=>{
            if(!d) return <div key={i}/>;
            const dateStr = formatDate(year,month,d);
            const {rdvs:dr, taches:dt} = getEventsForDay(dateStr);
            const total = dr.length + dt.length;
            const isToday = dateStr===todayFmt;
            const isSelected = dateStr===selectedDay;
            return (
              <div key={i} onClick={()=>setSelectedDay(isSelected?null:dateStr)}
                style={{minHeight:44,borderRadius:8,padding:"4px 2px",cursor:"pointer",textAlign:"center",
                  background:isSelected?C.navy:isToday?"#EFF6FF":C.white,
                  border:`1px solid ${isSelected?C.navy:isToday?C.blue:C.border}`,
                  transition:"all 0.15s"}}>
                <div style={{fontSize:12,fontWeight:isToday||isSelected?800:500,color:isSelected?C.white:isToday?C.blue:C.text,marginBottom:2}}>{d}</div>
                {dr.length>0&&<div style={{width:6,height:6,borderRadius:99,background:isSelected?C.white:C.blue,margin:"0 auto 2px"}}/>}
                {dt.length>0&&<div style={{width:6,height:6,borderRadius:99,background:isSelected?C.white:C.amber,margin:"0 auto"}}/>}
                {total>1&&<div style={{fontSize:8,color:isSelected?"rgba(255,255,255,0.8)":C.muted,fontWeight:700}}>{total}</div>}
              </div>
            );
          })}
        </div>
      </>}

      {viewMode==="week" && <>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:16}}>
          {weekDays.map((dateStr,i)=>{
            const d = new Date(dateStr+"T12:00:00");
            const day = d.getDate();
            const {rdvs:dr, taches:dt} = getEventsForDay(dateStr);
            const isToday = dateStr===todayFmt;
            const isSelected = dateStr===selectedDay;
            return (
              <div key={i} onClick={()=>setSelectedDay(isSelected?null:dateStr)}
                style={{borderRadius:10,padding:"8px 4px",cursor:"pointer",textAlign:"center",
                  background:isSelected?C.navy:isToday?"#EFF6FF":C.white,
                  border:`1px solid ${isSelected?C.navy:isToday?C.blue:C.border}`}}>
                <div style={{fontSize:9,fontWeight:700,color:isSelected?C.white:C.muted,marginBottom:2}}>{JOURS[i]}</div>
                <div style={{fontSize:14,fontWeight:800,color:isSelected?C.white:isToday?C.blue:C.text,marginBottom:4}}>{day}</div>
                {dr.length>0&&<div style={{fontSize:9,background:isSelected?"rgba(255,255,255,0.2)":C.blue+"18",color:isSelected?C.white:C.blue,borderRadius:4,padding:"1px 3px",marginBottom:2,fontWeight:700}}>{dr.length} RDV</div>}
                {dt.length>0&&<div style={{fontSize:9,background:isSelected?"rgba(255,255,255,0.2)":C.amber+"18",color:isSelected?C.white:C.amber,borderRadius:4,padding:"1px 3px",fontWeight:700}}>{dt.length} tâche{dt.length>1?"s":""}</div>}
              </div>
            );
          })}
        </div>
      </>}

      {/* Légende */}
      <div style={{display:"flex",gap:16,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.muted}}>
          <div style={{width:8,height:8,borderRadius:99,background:C.blue}}/> RDV
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.muted}}>
          <div style={{width:8,height:8,borderRadius:99,background:C.amber}}/> Tâches
        </div>
      </div>

      {/* Détail jour sélectionné */}
      {selectedDay && selectedEvents && (
        <div>
          <div style={{fontSize:13,fontWeight:800,color:C.navy,marginBottom:10}}>
            📅 {new Date(selectedDay+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}
          </div>

          {selectedEvents.rdvs.length===0 && selectedEvents.taches.length===0 && (
            <div style={{background:C.white,borderRadius:12,padding:20,textAlign:"center",color:C.muted,fontSize:13,border:`1px solid ${C.border}`}}>
              Aucun événement ce jour 🎉
            </div>
          )}

          {selectedEvents.rdvs.map(r=>{
            const pat = getPatient(r.patientId);
            const assignee = getUser(r.assigneA);
            return (
              <div key={r.id} style={{background:C.white,borderRadius:12,padding:14,marginBottom:8,border:`1px solid ${C.border}`,borderLeft:`4px solid ${C.blue}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:800,fontSize:13,color:C.navy,marginBottom:2}}>📅 {r.heure} — {r.type}</div>
                    {pat&&<div style={{fontSize:12,color:C.text,marginBottom:2}}>👤 {pat.prenom} {pat.nom}</div>}
                    {r.medecin&&<div style={{fontSize:12,color:C.muted}}>🩺 {r.medecin}</div>}

            );
          })}
        </div>
      )}
    </div>
  );
}

      {/* Finances */}

}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser] = useState(()=>{
    try{ const s=localStorage.getItem("cn_user"); return s?JSON.parse(s):null; }catch(e){return null;}
  });
  const [view,setView] = useState("dashboard");
  const [patients,setPatients] = useState(()=>cache.load("patients")||[]);
  const [rdvs,setRdvs] = useState(()=>cache.load("rdvs")||[]);
  const [finances,setFinances] = useState(()=>cache.load("finances")||[]);
  const [taches,setTaches] = useState(()=>cache.load("taches")||[]);
  // Don't show loading if we have cached data
  const [loading,setLoading] = useState(()=>!(cache.load("patients")));
  const [syncing,setSyncing] = useState(false);
  const [saveStatus,setSaveStatus] = useState("saved"); // "saved" | "saving" | "unsaved"
  const [pendingSaves,setPendingSaves] = useState([]);
  const [modal,setModal] = useState(null);
  const [selected,setSelected] = useState(null);
  const [menuOpen,setMenuOpen] = useState(false);

  useEffect(()=>{ if(user) loadAll(); },[user]);

  const loadAll = async (showLoad=true) => {
    if(showLoad) setLoading(true);
    try {
      const [p,r,f,t] = await Promise.all([
        api.get("patients"), api.get("rdvs"), api.get("finances"), api.get("taches")
      ]);
      const patients_data = p.filter(x=>x.prenom);
      const rdvs_data = r.filter(x=>x.type);
      const finances_data = f.filter(x=>x.type);
      const taches_data = t.filter(x=>x.titre);
      setPatients(patients_data);
      setRdvs(rdvs_data);
      setFinances(finances_data);
      setTaches(taches_data);
      cache.save("patients", patients_data);
      cache.save("rdvs", rdvs_data);
      cache.save("finances", finances_data);
      cache.save("taches", taches_data);
    } catch(e) {
      console.log("Network error, keeping cache data");
    }
    if(showLoad) setLoading(false);
  };

  const syncPost = async (type, action, record) => {
    setSyncing(true);
    setSaveStatus("saving");
    try {
      await api.post(type, action, record);
      setSaveStatus("saved");
    } catch(e) {
      console.error("Sync error:", e);
      setSaveStatus("unsaved");
    }
    setSyncing(false);
    setTimeout(()=>setSaveStatus("saved"), 5000);
  };

  // Manual sync - reload from Google Sheets
  const manualSave = async () => {
    setSaveStatus("saving");
    setSyncing(true);
    try {
      await loadAll(false);
      setSaveStatus("saved");
      alert("✅ Données synchronisées avec Google Sheets !");
    } catch(e) {
      setSaveStatus("unsaved");
      alert("❌ Erreur réseau. Les données locales sont préservées.");
    }
    setSyncing(false);
  };

  // Force sync - vide le cache local et recharge tout depuis Google Sheets
  const forceSync = async () => {
    if(!window.confirm("Vider le cache local et recharger toutes les données depuis Google Sheets ?")) return;
    ["patients","rdvs","finances","taches"].forEach(k => {
      try { localStorage.removeItem("cn_cache_"+k); } catch(e){}
    });
    setPatients([]); setRdvs([]); setFinances([]); setTaches([]);
    setSaveStatus("saving");
    setSyncing(true);
    setLoading(true);
    try {
      const [p,r,f,t] = await Promise.all([
        api.get("patients"), api.get("rdvs"), api.get("finances"), api.get("taches")
      ]);
      const pd = p.filter(x=>x.prenom);
      const rd = r.filter(x=>x.type);
      const fd = f.filter(x=>x.type);
      const td = t.filter(x=>x.titre);
      setPatients(pd); setRdvs(rd); setFinances(fd); setTaches(td);
      cache.save("patients",pd); cache.save("rdvs",rd);
      cache.save("finances",fd); cache.save("taches",td);
      setSaveStatus("saved");
      alert(`✅ Synchronisation complète !\n${pd.length} patients · ${rd.length} RDV · ${td.length} tâches`);
    } catch(e) {
      setSaveStatus("unsaved");
      alert("❌ Erreur réseau. Vérifiez votre connexion.");
    }
    setSyncing(false);
    setLoading(false);
  };

  const savePatient = async (f) => {
    if(f.id){
      const updated = {...f,dernierContact:todayStr()};
      setPatients(ps=>{
        const newPs = ps.map(p=>p.id===f.id?{...p,...updated}:p);
        cache.save("patients", newPs);
        return newPs;
      });
      await syncPost("patients","update",updated);
    } else {
      const n={...f,id:uid(),cree:todayStr(),dernierContact:todayStr(),creePar:user.id};
      setPatients(ps=>{
        const newPs=[...ps,n];
        cache.save("patients", newPs);
        return newPs;
      });
      await syncPost("patients","add",n);
    }
    setModal(null);
  };
  const deletePatient = async (id) => {
    setPatients(ps=>{const np=ps.filter(p=>p.id!==id);cache.save("patients",np);return np;});
    await syncPost("patients","delete",{id});
    setSelected(null); setView("patients");
  };
  const changeStage = async (id,stade) => {
    const p=patients.find(x=>x.id===id); if(!p) return;
    const u={...p,stade,dernierContact:todayStr()};
    setPatients(ps=>{const np=ps.map(x=>x.id===id?u:x);cache.save("patients",np);return np;});
    await syncPost("patients","update",u);
  };
  const saveRdv = async (f) => {
    if(!f.patientId||!f.date||!f.heure) { alert("Patient, date et heure obligatoires !"); return; }
    const n={...f,id:uid(),creePar:user.id};
    setRdvs(rs=>{const nr=[...rs,n];cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","add",n);
    setModal(null);
  };
  const updateRdv = async (f) => {
    setRdvs(rs=>{const nr=rs.map(r=>r.id===f.id?{...r,...f}:r);cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","update",f);
    setModal(null);
  };
  const deleteRdv = async (id) => {
    if(!window.confirm("Supprimer ce rendez-vous ?")) return;
    setRdvs(rs=>{const nr=rs.filter(r=>r.id!==id);cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","delete",{id});
  };
  const saveFinance = async (f) => {
    if(!f.montant) { alert("Montant obligatoire !"); return; }
    const n={...f,id:uid(),creePar:user.id};
    setFinances(fs=>{const nf=[...fs,n];cache.save("finances",nf);return nf;});
    await syncPost("finances","add",n);
    setModal(null);
  };
  const updateFinance = async (f) => {
    setFinances(fs=>{const nf=fs.map(x=>x.id===f.id?{...x,...f}:x);cache.save("finances",nf);return nf;});
    await syncPost("finances","update",f);
    setModal(null);
  };
  const deleteFinance = async (id) => {
    if(!window.confirm("Supprimer cette transaction ?")) return;
    setFinances(fs=>{const nf=fs.filter(f=>f.id!==id);cache.save("finances",nf);return nf;});
    await syncPost("finances","delete",{id});
  };

  const NAV_ITEMS = [
    {id:"dashboard",label:"Mon espace",icon:"🏠",roles:["admin","commerciale","coordinatrice"]},
    {id:"equipe",label:"Mon équipe",icon:"👁️",roles:["admin"]},
    {id:"patients",label:"Les patients",icon:"👥",roles:["admin","commerciale","coordinatrice"]},
    {id:"rdvs",label:"Rendez-vous",icon:"📅",roles:["admin","commerciale","coordinatrice"]},
    {id:"taches",label:"Tâches",icon:"✅",roles:["admin","commerciale","coordinatrice"]},
    {id:"agenda",label:"Agenda",icon:"🗓️",roles:["admin","commerciale","coordinatrice"]},
    {id:"analyses",label:"Analyses",icon:"📈",roles:["admin","commerciale"]},
    {id:"finances",label:"Finances",icon:"💳",roles:["admin","commerciale"]},
    {id:"hopitaux",label:"Hôpitaux",icon:"🏥",roles:["admin"]},
    {id:"medecins",label:"Médecins",icon:"🩺",roles:["admin","commerciale","coordinatrice"]},
  ].filter(n=>!user||n.roles.includes(user.role));

  const goTo = v => { setView(v); setSelected(null); setMenuOpen(false); };
  const logout = () => { localStorage.removeItem("cn_user"); setUser(null); };
  const activeView = selected?"fiche":view;
  const TITLES = {dashboard:"Mon espace",equipe:"Vue équipe — Veys Turan PDG",patients:"Les patients",rdvs:"Rendez-vous",taches:"Tâches",agenda:"Agenda",analyses:"Analyses",finances:"Finances",hopitaux:"Hôpitaux partenaires",medecins:"Médecins"};

  if(!user) return <LoginScreen onLogin={u=>{const full=USERS.find(x=>x.id===u.id)||u; setUser(full);}} />;

  const userFull = USERS.find(u2=>u2.id===user.id)||user;

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* TOP BAR MOBILE */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"0 12px",height:56,display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(11,31,58,0.08)"}}>
        <button onClick={()=>setMenuOpen(x=>!x)} style={{border:"none",background:"none",cursor:"pointer",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,flexShrink:0}}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <div style={{width:20,height:2,background:C.navy,borderRadius:99}}/>
            <div style={{width:14,height:2,background:C.navy,borderRadius:99}}/>
            <div style={{width:20,height:2,background:C.navy,borderRadius:99}}/>
          </div>
        </button>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
          <img src="https://i.ibb.co/b5k523qC/image.jpg" style={{width:30,height:30,borderRadius:8,objectFit:"contain"}} alt="CN"/>
          <span style={{fontWeight:800,fontSize:15,color:C.navy}}>Clinic Nobel</span>
        </div>
        <button onClick={manualSave} style={{border:"none",borderRadius:20,cursor:"pointer",fontSize:11,padding:"6px 10px",background:saveStatus==="saved"?C.green+"18":saveStatus==="saving"?C.amber+"18":"#fee2e2",color:saveStatus==="saved"?C.green:saveStatus==="saving"?C.amber:C.red,fontWeight:700,display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          <span style={{fontSize:12}}>{saveStatus==="saving"?"⏳":saveStatus==="saved"?"✅":"💾"}</span>

        </button>
        <button onClick={forceSync} title="Forcer la synchronisation" style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🔄</button>
        <div onClick={()=>setMenuOpen(true)} style={{width:36,height:36,borderRadius:99,background:`linear-gradient(135deg,${userFull.color},${userFull.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontWeight:800,fontSize:13,cursor:"pointer",flexShrink:0}}>
          {userFull.prenom[0]}
        </div>
      </div>

      {/* SIDEBAR MOBILE */}
      {menuOpen&&<div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.5)",zIndex:89,backdropFilter:"blur(4px)"}}/>}
      <div style={{position:"fixed",top:0,left:0,bottom:0,width:"80%",maxWidth:300,background:C.white,transform:menuOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.25s cubic-bezier(0.4,0,0.2,1)",zIndex:90,display:"flex",flexDirection:"column",overflowY:"auto",boxShadow:"4px 0 30px rgba(11,31,58,0.15)"}}>
        
        {/* Profile header */}
        <div style={{background:`linear-gradient(135deg,${userFull.color},${userFull.color}99)`,padding:"48px 20px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:52,height:52,borderRadius:16,background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontWeight:800,fontSize:20}}>
              {userFull.prenom[0]}
            </div>
            <div>
              <div style={{fontWeight:800,fontSize:16,color:C.white}}>{userFull.prenom}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginTop:2}}>{ROLE_LABELS[userFull.role]}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>✅ Google Sheets actif</div>
            </div>
            <button onClick={()=>setMenuOpen(false)} style={{marginLeft:"auto",border:"none",background:"rgba(255,255,255,0.2)",color:C.white,width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
          <div style={{marginTop:16}}>
            <img src="https://i.ibb.co/b5k523qC/image.jpg" style={{width:36,height:36,borderRadius:8,objectFit:"contain",background:"rgba(255,255,255,0.9)",padding:2}} alt="CN"/>
          </div>
        </div>

        {/* Nav items */}
        <div style={{flex:1,padding:"12px 10px"}}>
          {NAV_ITEMS.map(item=>{
            const isActive=view===item.id||(item.id==="patients"&&activeView==="fiche");
            return (
              <button key={item.id} onClick={()=>goTo(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"13px 14px",borderRadius:12,border:"none",cursor:"pointer",marginBottom:4,textAlign:"left",fontSize:14,background:isActive?userFull.color+"18":"transparent",color:isActive?userFull.color:C.text,fontWeight:isActive?700:500,transition:"all 0.15s"}}>
                <span style={{fontSize:20,width:28,textAlign:"center"}}>{item.icon}</span>
                <span>{item.label}</span>
                {isActive&&<div style={{marginLeft:"auto",width:6,height:6,borderRadius:99,background:userFull.color}}/>}
              </button>
            );
          })}
        </div>

        {/* Bottom actions */}
        <div style={{padding:"12px 14px",borderTop:`1px solid ${C.border}`}}>
          {userFull.access?.includes("patients")&&<button onClick={()=>{setModal({type:"patient"});setMenuOpen(false);}} style={{width:"100%",padding:"13px",border:"none",borderRadius:12,background:userFull.color,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14,marginBottom:8}}>
            + Nouveau patient
          </button>}
          <button onClick={logout} style={{width:"100%",padding:"11px",border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:600,fontSize:13,color:C.muted,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            🚪 Se déconnecter
          </button>
        </div>
      </div>

      {/* CONTENU */}
      <div style={{maxWidth:600,margin:"0 auto",padding:"16px 14px 100px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          {activeView==="fiche"&&<button onClick={()=>setSelected(null)} style={{width:36,height:36,borderRadius:10,border:`1px solid ${C.border}`,background:C.white,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>←</button>}
          <div>
            <h1 style={{margin:0,fontSize:20,fontWeight:800,color:C.text,lineHeight:1.2}}>
              {activeView==="fiche"&&selected?`${selected.prenom} ${selected.nom}`:TITLES[view]||""}
            </h1>
            {activeView==="fiche"&&selected&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{selected.procedure}</div>}
          </div>
        </div>
        {loading?<Spinner text="Chargement depuis Google Sheets…"/>:<>
          {activeView==="dashboard"&&<DashboardPersonnel user={userFull} patients={patients} rdvs={rdvs} taches={taches} finances={finances}/>}
          {activeView==="patients"&&<Patients user={userFull} patients={patients} onSelect={p=>setSelected(p)} onAdd={()=>setModal({type:"patient"})} onDelete={deletePatient}/>}
          {activeView==="fiche"&&selected&&<FichePatient user={userFull} patient={selected} patients={patients} onEdit={()=>setModal({type:"patient",data:selected})} onDelete={()=>deletePatient(selected.id)} onStageChange={changeStage} onBack={()=>setSelected(null)}/>}
          {activeView==="rdvs"&&<Rdvs user={userFull} rdvs={rdvs} patients={patients} onAdd={()=>setModal({type:"rdv"})} onDelete={deleteRdv}/>}
          {activeView==="taches"&&<Taches user={userFull} taches={taches} setTaches={setTaches} syncing={syncing} setSyncing={setSyncing}/>}
          {activeView==="agenda"&&<Agenda user={userFull} rdvs={rdvs} taches={taches} patients={patients}/>}
          {activeView==="analyses"&&<Analyses patients={patients} finances={finances}/>}
          {activeView==="finances"&&<Finances user={userFull} finances={finances} patients={patients} onAdd={()=>setModal({type:"finance"})} onDelete={deleteFinance}/>}
          {activeView==="hopitaux"&&<div style={{color:C.muted,fontSize:14,textAlign:"center",padding:40}}>Hôpitaux partenaires — Section admin uniquement</div>}
          {activeView==="equipe"&&<VueEquipe patients={patients} rdvs={rdvs} taches={taches} finances={finances}/>}
          {activeView==="medecins"&&<Medecins/>}
        </>}
      </div>

      {modal?.type==="patient"&&<ModalPatient user={userFull} patient={modal.data||null} onSave={savePatient} onClose={()=>setModal(null)}/>}
      {modal?.type==="rdv"&&<ModalRdv user={userFull} patients={patients} onSave={saveRdv} onClose={()=>setModal(null)}/>}
      {modal?.type==="finance"&&<ModalFinance user={userFull} patients={patients} onSave={saveFinance} onClose={()=>setModal(null)}/>}

      {/* BOTTOM NAV MOBILE */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.white,borderTop:`1px solid ${C.border}`,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-around",padding:"6px 0 calc(6px + env(safe-area-inset-bottom))",boxShadow:"0 -4px 20px rgba(11,31,58,0.08)"}}>
        {[
          {id:"dashboard",icon:"🏠",label:"Accueil"},
          {id:"patients",icon:"👥",label:"Patients"},
          {id:"rdvs",icon:"📅",label:"RDV"},
          {id:"agenda",icon:"🗓️",label:"Agenda"},
          {id:"taches",icon:"✅",label:"Tâches"},
          ...(userFull.role==="admin"?[{id:"equipe",icon:"👁️",label:"Équipe"}]:[{id:"finances",icon:"💳",label:"Finances"}])
        ].filter(n=>NAV_ITEMS.find(x=>x.id===n.id)).map(item=>{
          const isActive = view===item.id||(item.id==="patients"&&activeView==="fiche");
          return (
            <button key={item.id} onClick={()=>goTo(item.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,border:"none",background:"none",cursor:"pointer",padding:"4px 8px",flex:1,minWidth:0}}>
              <div style={{width:36,height:36,borderRadius:12,background:isActive?userFull.color+"18":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,transition:"all 0.15s"}}>
                {item.icon}
              </div>
              <span style={{fontSize:9,fontWeight:isActive?700:500,color:isActive?userFull.color:C.muted,letterSpacing:"0.02em"}}>{item.label}</span>
            </button>
          );
        })}
      </div>

      {/* Floating sync indicator */}
      {syncing&&<div style={{position:"fixed",bottom:76,left:"50%",transform:"translateX(-50%)",background:C.navy,color:C.white,padding:"8px 18px",borderRadius:99,fontSize:12,fontWeight:700,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
        <span style={{fontSize:14}}>⏳</span> Sync Google Sheets…
      </div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
