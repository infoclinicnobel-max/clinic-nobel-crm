                  <div style={{width:6,height:6,borderRadius:99,background:by?.color||C.muted,marginTop:6,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:C.text}}><b>{by?.prenom||"—"}</b> · {RDV_FIELD_LABELS[h.champ]||h.champ} : <span style={{color:C.muted,textDecoration:"line-through"}}>{h.ancien||"—"}</span> → <span style={{color:C.green,fontWeight:700}}>{h.nouveau||"—"}</span></div>
                    <div style={{fontSize:10,color:C.muted}}>{h.date} à {h.heure}</div>
                  </div>
                </div>
              );
            })}
          </div>}
        </div>
      </div>
    </div>
  );
}


function Rdvs({user, rdvs:rawRdvs, patients, taches, finances, setRdvs, setTaches, onAdd, onDelete, onUpdate, onEdit, onOpenPatient}) {
  const tt = t; // alias sûr : évite toute collision avec variables locales "t"
  const [view,setView] = useState("liste");
  const [filterTab,setFilterTab] = useState("tous");
  const [filterDate,setFilterDate] = useState("");
  const [search,setSearch] = useState("");
  const [calDate,setCalDate] = useState(new Date());
  const [selDay,setSelDay] = useState(todayStr());
  const today = todayStr();
  // Normaliser toutes les dates/heures à la lecture (corrige "Sat Dec 30 1899")
  const rdvs = (rawRdvs||[]).map(r=>({...r, date:normalizeDate(r.date), heure:normalizeHeure(r.heure)||r.heure}));
  const getP = id => patients.find(p=>String(p.id)===String(id));
  const getU = id => USERS.find(u=>u.id===id);
  const MOIS = Array.from({length:12},(_,i)=>new Intl.DateTimeFormat(localeForLang(),{month:"long"}).format(new Date(2024,i,1)));
  const JOURS_SHORT = Array.from({length:7},(_,i)=>new Intl.DateTimeFormat(localeForLang(),{weekday:"short"}).format(new Date(2024,0,i+1)));
  const fmtDate = d=>{const n=normalizeDate(d); return n?new Intl.DateTimeFormat(localeForLang(),{weekday:"short",day:"numeric",month:"short"}).format(new Date(n+"T12:00:00")):tt("date.invalid");};

  // ── Interactivité (clic = détail, double-clic = édition, clic droit / appui long = menu) ──
  const [detail,setDetail] = useState(null);
  const [menu,setMenu] = useState(null);
  const [moving,setMoving] = useState(null);
  const [dragId,setDragId] = useState(null);
  const clickTimer = React.useRef(null);
  const lpTimer = React.useRef(null);
  const lpFired = React.useRef(false);
  const openEdit = (r)=> onEdit ? onEdit(r) : (onUpdate&&onUpdate(r));

  // Persistance directe sans rechargement (état + cache + Sheets) avec historique
  const persistRdv = (updated, histBase) => {
    const withHist = histBase ? {...updated, historique: buildHistGeneric(histBase, updated, user, RDV_FIELD_LABELS)} : updated;
    setRdvs && setRdvs(rs=>{ const nr=rs.map(x=>x.id===withHist.id?{...x,...withHist}:x); cache.save("rdvs",nr); return nr; });
    try{ api.post("rdvs","update",withHist); }catch(e){}
    return withHist;
  };
  const duplicateRdv = (r) => {
    const copy = {...r, id:uid(), statut:"Planifié", historique:JSON.stringify([])};
    setRdvs && setRdvs(rs=>{ const nr=[...rs,copy]; cache.save("rdvs",nr); return nr; });
    try{ api.post("rdvs","add",copy); }catch(e){}
    setDetail(null);
  };
  const moveRdv = (r,newDate,newHeure) => persistRdv({...r, date:newDate||r.date, heure:newHeure||r.heure}, r);
  const cancelRdv = (r) => { persistRdv({...r, statut:"Annulé"}, r); setDetail(null); };
  const generateTask = (r) => {
    const p = getP(r.patientId);
    const t = {id:uid(), titre:`Suivi RDV — ${p?`${p.prenom} ${p.nom}`:""}`.trim(), description:`Suite au RDV ${r.type||""} du ${normalizeDate(r.date)} à ${normalizeHeure(r.heure)}`, patientId:r.patientId||"", rdvId:r.id, medecin:r.medecin||"", hopital:r.hopital||"", assigneA:r.assigneA||user.id, priorite:"Normale", statut:"En cours", echeance:normalizeDate(r.date)||todayStr(), heure:normalizeHeure(r.heure)||"", couleur:"", categorie:"Suivi patient", creePar:user.id, cree:todayStr(), historique:JSON.stringify([])};
    setTaches && setTaches(ts=>{ const nt=[...ts,t]; cache.save("taches",nt); return nt; });
    try{ api.post("taches","add",t); }catch(e){}
    alert("✅ Tâche de suivi créée.");
  };
  // Gestionnaires d'interaction réutilisables pour chaque carte
  const cardHandlers = (r) => ({
    onClick:(e)=>{ if(e.target.closest("[data-stop]")) return; if(lpFired.current){lpFired.current=false;return;} if(clickTimer.current){ clearTimeout(clickTimer.current); clickTimer.current=null; openEdit(r); } else { clickTimer.current=setTimeout(()=>{ clickTimer.current=null; setDetail(r); },230); } },
    onContextMenu:(e)=>{ e.preventDefault(); setMenu(r); },
    onTouchStart:()=>{ lpFired.current=false; lpTimer.current=setTimeout(()=>{ lpFired.current=true; setMenu(r); if(navigator.vibrate)navigator.vibrate(18); },500); },
    onTouchEnd:()=>{ clearTimeout(lpTimer.current); },
    onTouchMove:()=>{ clearTimeout(lpTimer.current); },
    style:{cursor:"pointer"},
  });

  // Filtrage
  const allRdvs = filterTab==="mes" ? rdvs.filter(r=>r.assigneA===user.id) :
                  filterTab==="medecin" ? rdvs.filter(r=>r.medecin) : rdvs;
  const filtered = allRdvs.filter(r=>{
    const p=getP(r.patientId);
    const sq=search.toLowerCase();
    return (!search||`${p?.prenom||""} ${p?.nom||""} ${r.type||""} ${r.medecin||""}`.toLowerCase().includes(sq))
      &&(!filterDate||normalizeDate(r.date)===filterDate);
  }).sort((a,b)=>a.date?.localeCompare(b.date||"")||a.heure?.localeCompare(b.heure||""));

  // Stats
  const rdvsToday = rdvs.filter(r=>normalizeDate(r.date)===today&&(user.role==="admin"||r.assigneA===user.id));
  const rdvsWeek = rdvs.filter(r=>r.date>=today&&r.date<=new Date(Date.now()+7*86400000).toISOString().split("T")[0]);
  const rdvsConfirmes = rdvs.filter(r=>r.statut==="Confirmé");

  // Calendrier mensuel
  const year=calDate.getFullYear(), month=calDate.getMonth();
  const firstDow=(new Date(year,month,1).getDay()+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const fmtD=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const rdvsForDay=ds=>rdvs.filter(r=>normalizeDate(r.date)===ds&&(user.role==="admin"||r.assigneA===user.id));

  // Carte RDV
  const RdvCard=({r})=>{
    const p=getP(r.patientId);
    const assignee=getU(r.assigneA);
    const isPast=r.date<today;
    const statusColor=r.statut==="Confirmé"?C.green:r.statut==="Terminé"?C.muted:r.statut==="Annulé"?C.red:C.amber;
    return (
      <div {...cardHandlers(r)} draggable onDragStart={()=>setDragId(r.id)} onDragEnd={()=>setDragId(null)} style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,marginBottom:8,overflow:"hidden",opacity:isPast?0.72:1,borderLeft:`4px solid ${r.couleur||assignee?.color||C.blue}`,cursor:"pointer",transition:"all 0.12s"}}>
        <div style={{padding:"12px 14px",display:"flex",gap:12,alignItems:"center"}}>
          <div style={{minWidth:52,textAlign:"center",flexShrink:0}}>
            <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"0.05em"}}>{r.date?r.date.slice(5).replace("-","/"):""}</div>
            <div style={{fontSize:17,fontWeight:800,color:r.couleur||assignee?.color||C.navy,lineHeight:1.1}}>{r.heure}</div>
            {r.duree&&<div style={{fontSize:9,color:C.muted}}>{r.duree}min</div>}
          </div>
          <div style={{width:1,height:40,background:C.border,flexShrink:0}}/>
          <Avatar p={p||{prenom:"?",nom:""}} size={36}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{p?`${p.prenom} ${p.nom}`:tt("patient.default")}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>{rdvTypeLabel(r.type)}{r.medecin?` · 🩺 ${r.medecin}`:""}</div>
            {r.hopital&&<div style={{fontSize:10,color:C.muted}}>🏥 {r.hopital}</div>}
            <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
              {assignee&&<span style={{fontSize:10,color:assignee.color,fontWeight:700,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:99,background:assignee.color,display:"inline-block"}}/>{assignee.prenom}</span>}
              {r.priorite&&r.priorite!=="Normale"&&<span style={{fontSize:9,fontWeight:800,color:(RDV_PRIORITES.find(x=>x.v===r.priorite)||{}).c||C.muted}}>⚑ {priorityLabel(r.priorite)}</span>}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
            <Badge text={rdvStatusLabel(r.statut||"Planifié")} color={statusColor} small/>
            {r.notes&&<span style={{fontSize:9,color:C.muted}}>💬</span>}
            {!isSurgeon(user)&&<button data-stop onClick={(e)=>{e.stopPropagation();setMenu(r);}} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:14,lineHeight:1}}>⋮</button>}
          </div>
        </div>
        {r.notes&&<div style={{padding:"6px 14px 10px",fontSize:11,color:C.muted,fontStyle:"italic",borderTop:`1px solid ${C.bg}`}}>💬 {r.notes}</div>}
      </div>
    );
  };

  // Jour sélectionné (vue calendrier)
  const selRdvs=rdvsForDay(selDay).sort((a,b)=>a.heure?.localeCompare(b.heure||""));

  return (
    <div>
      {/* KPI bar */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[{ic:"📅",l:tt("common.today"),v:rdvsToday.length,c:C.blue},{ic:"📆",l:tt("rdv.thisWeek"),v:rdvsWeek.length,c:C.purple},{ic:"✅",l:tt("rdvstatus.Confirmé"),v:rdvsConfirmes.length,c:C.green}].map(s=>(
          <div key={s.l} style={{background:C.white,borderRadius:12,padding:"10px 8px",textAlign:"center",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:18,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:9,color:C.muted,marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Barre d'outils */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:4,background:C.bg,borderRadius:10,padding:3,flex:1}}>
          {[{id:"liste",ic:"☰"},{id:"calendrier",ic:"📅"},{id:"jour",ic:"⏰"}].map(v=>(
            <button key={v.id} onClick={()=>setView(v.id)} style={{flex:1,padding:"7px",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:11,background:view===v.id?C.white:"transparent",color:view===v.id?C.navy:C.muted,transition:"all 0.15s"}}>
              {v.ic} {v.id.charAt(0).toUpperCase()+v.id.slice(1)}
            </button>
          ))}
        </div>
        {!isSurgeon(user)&&<button onClick={onAdd} style={{padding:"9px 14px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>+ {tt("nav.rdvs")}</button>}
      </div>

      {/* Filtre par rôle */}
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
        {[{id:"tous",l:tt("common.all"),ic:"👥"},{id:"mes",l:tt("rdv.myRdvs"),ic:"👤"},...(user.role==="admin"?[{id:"medecin",l:tt("rdv.byDoctor"),ic:"🩺"}]:[])].map(ft=>(
          <button key={ft.id} onClick={()=>setFilterTab(ft.id)} style={{padding:"7px 12px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:12,background:filterTab===ft.id?user.color:C.bg,color:filterTab===ft.id?C.white:C.muted,flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
            {ft.ic} {ft.l}
          </button>
        ))}
      </div>

      {/* VUE LISTE */}
      {view==="liste"&&<>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={"🔍 "+tt("rdv.searchPlaceholder")} style={{flex:1,padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:C.white}}/>
          <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{padding:"9px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:12,background:C.white,outline:"none"}}/>
          {filterDate&&<button onClick={()=>setFilterDate("")} style={{padding:"9px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",color:C.muted,fontSize:12}}>✕</button>}
        </div>
        {/* Groupé par date */}
        {(()=>{
          const groups={};
          filtered.forEach(r=>{const d=r.date||"__invalid__";if(!groups[d])groups[d]=[];groups[d].push(r);});
          // Trier : dates valides en premier, "à corriger" en dernier
          const sortedKeys=Object.keys(groups).sort((a,b)=>{
            if(a==="__invalid__")return 1;
            if(b==="__invalid__")return -1;
            return a.localeCompare(b);
          });
          return sortedKeys.map(date=>{
            const rList=groups[date];
            const isInvalid=date==="__invalid__";
            return (
            <div key={date} style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:800,color:isInvalid?C.red:date===today?C.blue:date<today?C.muted:C.navy,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:6,height:6,borderRadius:99,background:isInvalid?C.red:date===today?C.blue:date<today?C.muted:C.navy}}/>
                {isInvalid?"⚠️ "+tt("date.invalid"):date===today?tt("common.today"):fmtDate(date)} — {rList.length} {tt("nav.rdvs")}
              </div>
              {rList.map(r=>isInvalid?(
                <div key={r.id} style={{background:C.white,borderRadius:14,border:`1px solid #fecaca`,borderLeft:`4px solid ${C.red}`,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar p={getP(r.patientId)||{prenom:"?",nom:""}} size={36}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:C.text}}>{(()=>{const p=getP(r.patientId);return p?`${p.prenom} ${p.nom}`:"Patient inconnu";})()}</div>
                      <div style={{fontSize:11,color:C.red}}>⚠️ {tt("date.invalid")} · {r.type?rdvTypeLabel(r.type):tt("nav.rdvs")}</div>
                    </div>
                    {!isSurgeon(user)&&<button onClick={()=>onUpdate&&onUpdate(r)} style={{padding:"7px 12px",border:"none",borderRadius:9,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:11}}>{tt("date.fix")}</button>}
                    {(user.role==="admin"||r.assigneA===user.id)&&<button onClick={()=>onDelete(r.id)} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:13}}>🗑</button>}
                  </div>
                </div>
              ):<RdvCard key={r.id} r={r}/>)}
            </div>
          );});
        })()}
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>{tt("rdv.none")}</div>}
      </>}

      {/* VUE CALENDRIER MENSUEL */}
      {view==="calendrier"&&<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>setCalDate(new Date(year,month-1,1))} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <button onClick={()=>setCalDate(new Date(year,month+1,1))} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>
          <div style={{fontWeight:800,fontSize:15,color:C.navy}}>{MOIS[month]} {year}</div>
          <button onClick={()=>{setCalDate(new Date());setSelDay(today);}} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>{tt("common.today")}</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {JOURS_SHORT.map(j=><div key={j} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,padding:"3px 0"}}>{j}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:14}}>
          {cells.map((d,i)=>{
            if(!d)return <div key={i}/>;
            const ds=fmtD(year,month,d);
            const dr=rdvsForDay(ds);
            const isToday=ds===today;
            const isSel=ds===selDay;
            return (
              <div key={i} onClick={()=>{setSelDay(ds);setView("jour");}} onDragOver={e=>{e.preventDefault();}} onDrop={()=>{ if(dragId){ const dr2=rdvs.find(x=>x.id===dragId); if(dr2&&dr2.date!==ds) moveRdv(dr2,ds,dr2.heure); setDragId(null); } }} style={{minHeight:44,borderRadius:9,padding:"4px 2px",cursor:"pointer",textAlign:"center",background:isSel?C.navy:isToday?"#EFF6FF":C.white,border:`1px solid ${dragId?C.blue:isSel?C.navy:isToday?C.blue:C.border}`,borderStyle:dragId?"dashed":"solid",transition:"all 0.15s"}}>
                <div style={{fontSize:11,fontWeight:isToday||isSel?800:400,color:isSel?C.white:isToday?C.blue:C.text,marginBottom:2}}>{d}</div>
                {dr.slice(0,2).map((r,i)=>{
                  const a=getU(r.assigneA);
                  return <div key={i} style={{width:"80%",height:3,borderRadius:99,background:a?.color||C.blue,margin:"1px auto"}}/>;
                })}
                {dr.length>2&&<div style={{fontSize:7,color:isSel?"rgba(255,255,255,0.7)":C.muted,fontWeight:700}}>+{dr.length-2}</div>}
              </div>
            );
          })}
        </div>
        {/* RDV du jour sélectionné */}
        {selDay&&<div>
          <div style={{fontSize:12,fontWeight:800,color:C.navy,marginBottom:8}}>📅 {fmtDate(selDay)} — {rdvsForDay(selDay).length} RDV</div>
          {rdvsForDay(selDay).length===0?<div style={{background:C.white,borderRadius:12,padding:16,textAlign:"center",color:C.muted,fontSize:13,border:`1px solid ${C.border}`}}>{tt("rdv.emptyDay")}</div>:
          rdvsForDay(selDay).sort((a,b)=>a.heure?.localeCompare(b.heure||"")).map(r=><RdvCard key={r.id} r={r}/>)}
        </div>}
      </>}

      {/* VUE JOUR (timeline) */}
      {view==="jour"&&<>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <button onClick={()=>{const d=new Date(selDay+"T12:00:00");d.setDate(d.getDate()-1);setSelDay(d.toISOString().split("T")[0]);}} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontWeight:800,fontSize:14,color:C.navy}}>{selDay===today?"📅 "+tt("common.today"):fmtDate(selDay)}</div>
            <div style={{fontSize:11,color:C.muted}}>{selRdvs.length} {tt("nav.rdvs").toLowerCase()}</div>
          </div>
          <button onClick={()=>{const d=new Date(selDay+"T12:00:00");d.setDate(d.getDate()+1);setSelDay(d.toISOString().split("T")[0]);}} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <input type="date" value={selDay} onChange={e=>setSelDay(e.target.value)} style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:C.white,marginBottom:12,boxSizing:"border-box"}}/>
        {/* Timeline */}
        <div style={{position:"relative",paddingLeft:48}}>
          <div style={{position:"absolute",left:20,top:0,bottom:0,width:2,background:C.border,borderRadius:99}}/>
          {selRdvs.length===0?<div style={{background:C.white,borderRadius:12,padding:20,textAlign:"center",color:C.muted,fontSize:13,border:`1px solid ${C.border}`,marginLeft:-48}}>{tt("rdv.emptyDay")}</div>:
          selRdvs.map(r=>{
            const p=getP(r.patientId);
            const a=getU(r.assigneA);
            return (
              <div key={r.id} style={{position:"relative",marginBottom:14}}>
                <div style={{position:"absolute",left:-35,top:8,width:14,height:14,borderRadius:99,background:a?.color||C.blue,border:`2px solid ${C.white}`,boxShadow:`0 0 0 2px ${a?.color||C.blue}44`}}/>
                <div {...cardHandlers(r)} style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,padding:"12px 14px",borderLeft:`3px solid ${r.couleur||a?.color||C.blue}`,cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:14,color:C.navy}}>{r.heure}{r.duree?` · ${r.duree}min`:""}</div>
                      <div style={{fontWeight:600,fontSize:13,color:C.text,marginTop:2}}>{p?`${p.prenom} ${p.nom}`:"—"}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>{rdvTypeLabel(r.type)}{r.medecin?` · ${r.medecin}`:""}</div>

const CHART_PALETTE = ["#0B1F3A","#C9A84C","#16A34A","#1D73C9","#7C3AED","#D97706","#0891B2","#DC2777","#0D9488","#65A30D","#9333EA","#E11D48","#2563EB","#CA8A04"];

function Donut({segments, size=168, thickness=22, center, sub, onClick, activeLabel}) {
  const total = segments.reduce((a,s)=>a+(Number(s.value)||0),0);
  const r = (size - thickness) / 2, cx = size/2, cy = size/2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  const segs = segments.filter(s=>Number(s.value)>0);
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,maxWidth:"100%",display:"block"}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.bg} strokeWidth={thickness}/>
      {total>0 && segs.map((s,i)=>{
        const len = s.value/total*circ;
        const node = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color}
            strokeWidth={activeLabel===s.label ? thickness+5 : thickness}
            strokeDasharray={`${len} ${circ-len}`} strokeDashoffset={-offset}
            transform={`rotate(-90 ${cx} ${cy})`} className="donut-seg"
            onClick={onClick?()=>onClick(s):undefined} style={{cursor:onClick?"pointer":"default"}}>
            <title>{s.label}</title>
          </circle>
        );
        offset += len;
        return node;
      })}
      {center!==undefined && <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central" fontSize={size*0.19} fontWeight="800" fill={C.text}>{center}</text>}
      {sub && <text x={cx} y={cy+size*0.16} textAnchor="middle" fontSize={size*0.072} fill={C.muted}>{sub}</text>}
    </svg>
  );
}

// ── HELPERS FINANCES (encaissements) — champs réels : ────────────────────────
// total = patient.budget · payé = Σ encaissements signés (statut "Complété")
// solde = total − payé · responsable = patient.assigneA · statut = patient.stade
//
// RÈGLES DE CALCUL (corrigées) :
//  · "Remboursement" compte en NÉGATIF (avant : il gonflait le "déjà encaissé")
//  · "Devis" n'est PAS un encaissement (avant : un devis "Complété" comptait comme paiement)
//  · "Paiement chirurgien" est une DÉPENSE : exclu des encaissements patients et du CA
const FIN_NON_CASH_TYPES = ["Devis"];                    // documents, pas d'argent
const FIN_EXPENSE_TYPES  = ["Paiement chirurgien"];      // sorties d'argent (dépenses)
function isPatientCashFlow(f){
  return !!f && f.statut==="Complété"
    && FIN_NON_CASH_TYPES.indexOf(f.type)<0
    && FIN_EXPENSE_TYPES.indexOf(f.type)<0;
}
// Montant signé : remboursement → négatif, tout le reste → positif
function finSignedAmount(f){
  const m = Math.abs(Number(f?.montant||0));
  return f?.type==="Remboursement" ? -m : m;
}
function getPatientTotal(p){ return Number(p?.budget||0); }
function getPatientPaid(p, finances){
  return (finances||[])
    .filter(f=> String(f.patientId)===String(p?.id) && isPatientCashFlow(f))
    .reduce((a,f)=> a + finSignedAmount(f), 0);
}
function getPatientBalance(p, finances){
  return Math.max(getPatientTotal(p) - getPatientPaid(p, finances), 0);
}
// ── POSTE 1 : VIREMENTS BANCAIRES PATIENT ────────────────────────────────────
// Modes de paiement (valeurs internes existantes du champ `methode`, jamais traduites)
const FIN_MODE_TRANSFER = "Virement";
const FIN_MODE_CASH = "Espèces";
// Total encaissé pour UN mode donné (signé : remboursements déduits, devis exclus)
function getPatientPaidByMode(p, finances, mode){
  return (finances||[])
    .filter(f=> String(f.patientId)===String(p?.id) && isPatientCashFlow(f) && (f.methode||"")===mode)
    .reduce((a,f)=> a + finSignedAmount(f), 0);
}
// Libellé d'AFFICHAGE des statuts d'argent (la valeur interne reste "Complété"/"En attente"/"Annulé")
function finStatusLabel(st){
  if(st==="Complété") return t("finance.stReceived");
  if(st==="En attente") return t("finance.stPending");
  if(st==="Annulé") return t("finance.stCancelled");
  return st||"—";
}
// Mouvements d'argent PATIENT d'un patient (dépenses chirurgien exclues)
function patientMoneyMovements(p, finances){
  return (finances||[]).filter(f=> String(f.patientId)===String(p?.id) && FIN_EXPENSE_TYPES.indexOf(f.type)<0);
}
function patientNextOpDate(p, rdvs){
  const rs = (rdvs||[]).filter(r=> String(r.patientId)===String(p?.id) && r.date);
  if(!rs.length) return null;
  const today = new Date().toISOString().slice(0,10);
  const future = rs.map(r=>normalizeDate(r.date)).filter(Boolean).filter(d=> d>=today).sort();
  if(future.length) return future[0];
  const past = rs.map(r=>normalizeDate(r.date)).filter(Boolean).sort();
  return past.length ? past[past.length-1] : null;
}
const CLOSED_STAGE = "Clôturé ✓";
// Stades où l'intervention est TERMINÉE (le patient n'est plus "à venir")
const FIN_DONE_STAGES = ["Post-opératoire", CLOSED_STAGE];
// ── RÈGLES MÉTIER (validées) ─────────────────────────────────────────────────
// · À venir       : intervention pas encore terminée (stade avant post-op)
// · Paiement dû   : solde restant > 0, quel que soit le stade
// · Clôturé       : stade "Clôturé ✓" ET solde restant = 0 (les DEUX conditions)
function isClosedPatient(p, finances){
  return p?.stade===CLOSED_STAGE && getPatientBalance(p, finances)===0;
}
function isUpcomingPatient(p, rdvs){
  return FIN_DONE_STAGES.indexOf(p?.stade)<0;
}
function isPaymentDuePatient(p, finances){
  return getPatientTotal(p)>0 && getPatientBalance(p, finances)>0;
}
function paymentBadge(p, finances){
  const total=getPatientTotal(p), paid=getPatientPaid(p,finances), bal=total-paid;
  if(total>0 && bal<=0) return {key:"finance.paid", color:"#16A34A"};
  if(paid>0 && bal>0)  return {key:"finance.partialPayment", color:"#D97706"};
  if(bal>0)            return {key:"finance.toCollect", color:"#D97706"};
  return {key:"finance.paid", color:"#16A34A"};
}

// FINANCES — TABLEAU DE BORD PREMIUM
// ════════════════════════════════════════════════════════════════════════════
function Finances({user, finances, patients, rdvs, onAdd, onDelete, onUpdate, onSave}) {
  const tt = t; // alias sûr : évite toute collision avec variables locales "t"
  const [tab, setTab] = useState("dashboard");
  const [period, setPeriod] = useState("12m");
  const [fUser, setFUser] = useState("tous");
  const [fPays, setFPays] = useState("tous");
  const [fInterv, setFInterv] = useState("tous");
  const [fMedecin, setFMedecin] = useState("tous");
  const [fHopital, setFHopital] = useState("tous");
  const [fMode, setFMode] = useState("tous");       // POSTE 1 : filtre mode de paiement
  const [fStatut, setFStatut] = useState("tous");   // POSTE 1 : filtre statut
  const [drill, setDrill] = useState(null); // {dim,key,label}
  const [objectif, setObjectif] = useState(()=>{ try{ return Number(cfgStore.load("objectif_mensuel"))||50000; }catch(e){ return 50000; } });

  const eur = (n)=> (Math.round(Number(n)||0)).toLocaleString("fr-FR")+" €";
  const getP = id => patients.find(p=>String(p.id)===String(id));
  const today = todayStr();

  // ── Période ───────────────────────────────────────────────────────────────
  const cutoff = (()=>{
    const d=new Date(); 
    if(period==="today") return today;
    if(period==="7j"){ d.setDate(d.getDate()-7); }
    else if(period==="30j"){ d.setDate(d.getDate()-30); }
    else if(period==="3m"){ d.setMonth(d.getMonth()-3); }
    else if(period==="6m"){ d.setMonth(d.getMonth()-6); }
    else if(period==="12m"){ d.setMonth(d.getMonth()-12); }
    else return null;
    return d.toISOString().slice(0,10);
  })();
  const inPeriod = (date)=> !cutoff ? true : (period==="today" ? date===today : (date||"")>=cutoff);

  // ── Filtres dimensionnels (patient) ─────────────────────────────────────────
  const matchDims = (p)=>{
    if(!p) return false;
    if(fPays!=="tous" && (p.pays||"—")!==fPays) return false;
    if(fMedecin!=="tous" && patientMedecin(p)!==fMedecin) return false;
    if(fHopital!=="tous" && (p.hopital||"—")!==fHopital) return false;
    if(fInterv!=="tous" && opBucket(p)!==fInterv) return false;
    return true;
  };
  const matchUserP = (p)=> fUser==="tous" || p.assigneA===fUser || p.creePar===fUser;

  const opBucket = (p)=>{
    const s = (opsArray(p).join(" ")+" "+(p.procedure||"")).toLowerCase();
    if(/rhino/.test(s)) return "Rhinoplastie";
    if(/bbl|fessier|lipofilling/.test(s)) return "BBL";
    if(/liposuc|vaser/.test(s)) return "Liposuccion";
    if(/abdomino/.test(s)) return "Abdominoplastie";
    if(/lifting|facelift|fox/.test(s)) return "Lifting visage";
    if(/greffe|capillaire|dhi|fue|barbe/.test(s)) return "Greffe capillaire";
    if(/dent|dental|hollywood|couronne|facette/.test(s)) return "Dentaire";
    return (p.procedure||opsArray(p).length) ? "Autres" : "Aucune";
  };

  // Patients filtrés (dimensions + utilisateur)
  const pat = patients.filter(p=> matchDims(p) && matchUserP(p));
  const patIds = new Set(pat.map(p=>String(p.id)));

  // ── BASE FINANCIÈRE UNIFIÉE ─────────────────────────────────────────────────
  // Correction : les filtres utilisateur + dimensions s'appliquent désormais
  // PARTOUT (KPIs inclus — avant, les KPIs CA ignoraient les filtres et
  // contredisaient les donuts). Les dépenses (paiements chirurgiens) sont
  // exclues de tous les calculs patients/CA.
  const matchFinFilters = (f)=>{
    if(fUser!=="tous" && f.creePar!==fUser) return false;
    if(fMode!=="tous" && (f.methode||"")!==(fMode==="aucun"?"":fMode)) return false;   // "aucun" = mode non renseigné
    if(fStatut!=="tous" && (f.statut||"")!==fStatut) return false;
    if((fPays!=="tous"||fMedecin!=="tous"||fHopital!=="tous"||fInterv!=="tous")){
      if(!patIds.has(String(f.patientId))) return false;
    }
    return true;
  };
  const finBase = finances.filter(f=> FIN_EXPENSE_TYPES.indexOf(f.type)<0 && matchFinFilters(f)); // tous temps
  const fin = finBase.filter(f=> inPeriod(f.date||""));   // + période (donuts, liste transactions)
  const done = fin.filter(isPatientCashFlow);              // encaissements réels, période
  const doneAll = finBase.filter(isPatientCashFlow);       // encaissements réels, tous temps (KPIs calendaires)

  // ── KPIs ────────────────────────────────────────────────────────────────────
  // Montants SIGNÉS : les remboursements se déduisent, les devis ne comptent pas.
  const thisWeek=(()=>{const d=new Date();d.setDate(d.getDate()-(d.getDay()||7)+1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;})();
  const ca = (from)=> doneAll.filter(f=>(from?(f.date||"")>=from:true)).reduce((a,f)=>a+finSignedAmount(f),0);
  const caToday = doneAll.filter(f=>f.date===today).reduce((a,f)=>a+finSignedAmount(f),0);
  const caWeek = ca(thisWeek), caMonth = ca(today.slice(0,7)+"-01"), caYear = ca(today.slice(0,4)+"-01-01");
  const totalEncaisse = done.reduce((a,f)=>a+finSignedAmount(f),0);
  const enAttente = fin.filter(f=>f.statut==="En attente"&&FIN_NON_CASH_TYPES.indexOf(f.type)<0).reduce((a,f)=>a+finSignedAmount(f),0);
  const rembourse = Math.abs(done.filter(f=>f.type==="Remboursement").reduce((a,f)=>a+finSignedAmount(f),0));
  const acomptesRecus = done.filter(f=>f.type==="Acompte").reduce((a,f)=>a+finSignedAmount(f),0);
  const nAcompte = done.filter(f=>f.type==="Acompte").length;
  const acompteMoyen = nAcompte ? Math.round(acomptesRecus/nAcompte) : 0;
  const budgets = pat.filter(p=>Number(p.budget)>0);
  const panierMoyen = budgets.length ? Math.round(budgets.reduce((a,p)=>a+Number(p.budget),0)/budgets.length) : 0;
  // Solde restant réel = Σ soldes patients (tous temps, cohérent quel que soit
  // le filtre de période — avant : budgets tous-temps − paiements de la période → faux)
  const resteEncaisser = pat.reduce((a,p)=>a+getPatientBalance(p, finances),0);
  const objPct = objectif ? Math.min(100, Math.round(caMonth/objectif*100)) : 0;

  // ── Donut : ventes par utilisateur (montants signés) ────────────────────────
  const ventesUser = USERS.map((u,i)=>({
    label:`${u.prenom} ${u.nom}`.trim(), uid:u.id, color:u.color||CHART_PALETTE[i%CHART_PALETTE.length],
    value: done.filter(f=>f.creePar===u.id).reduce((a,f)=>a+finSignedAmount(f),0),
    nb: done.filter(f=>f.creePar===u.id).length
  })).filter(s=>s.value>0);

  // ── Donut : paiements ────────────────────────────────────────────────────────
  const paiements = [
    {key:"acomptes", label:tt("fin.depositsReceived"), value:acomptesRecus, color:C.gold},
    {key:"complets", label:tt("fin.fullPayments"), value:done.filter(f=>f.type!=="Acompte"&&f.type!=="Remboursement").reduce((a,f)=>a+finSignedAmount(f),0), color:C.green},
    {key:"attente", label:tt("fin.pending"), value:Math.max(0,enAttente), color:C.amber},
    {key:"rembourses", label:tt("fin.refunded"), value:rembourse, color:C.red},
    {key:"solde", label:tt("finance.remainingBalance"), value:resteEncaisser, color:C.muted},
  ].filter(s=>s.value>0);

  // ── Donut : patients par stade ───────────────────────────────────────────────
  // Correction : utilise les VRAIS stades du CRM (STAGES). L'ancienne liste
  // contenait "Prospect"/"Acompte reçu" (inexistants) et omettait "Nouveau",
  // "Contacté", "Consultation planifiée", "Préopératoire" → patients invisibles.
  const parStade = STAGES.map((st,i)=>({label:stageLabel(st), key:st, color:CHART_PALETTE[i%CHART_PALETTE.length],
    value: pat.filter(p=>(p.stade||"Nouveau")===st).length})).filter(s=>s.value>0);

  // ── Donut : opérations ───────────────────────────────────────────────────────
  const OPS = ["Rhinoplastie","BBL","Liposuccion","Abdominoplastie","Lifting visage","Greffe capillaire","Dentaire","Autres"];
  const parOp = OPS.map((op,i)=>{
    const ps = pat.filter(p=>opBucket(p)===op);
    return {label:op, key:op, color:CHART_PALETTE[i%CHART_PALETTE.length], value:ps.length,
      ca: ps.reduce((a,p)=>a+Number(p.budget||0),0)};
  }).filter(s=>s.value>0);

  // ── Donut : pays ─────────────────────────────────────────────────────────────
  const paysMap = {};
  pat.forEach(p=>{ const k=p.pays||"—"; paysMap[k]=(paysMap[k]||0)+1; });
  const parPays = Object.keys(paysMap).map((k,i)=>({label:k,key:k,value:paysMap[k],color:CHART_PALETTE[i%CHART_PALETTE.length]})).sort((a,b)=>b.value-a.value);

  // ── Donut : sources ──────────────────────────────────────────────────────────
  const srcMap = {};
  pat.forEach(p=>{ const k=p.source||"—"; srcMap[k]=(srcMap[k]||0)+1; });
  const parSource = Object.keys(srcMap).map((k,i)=>({label:k,key:k,value:srcMap[k],color:CHART_PALETTE[i%CHART_PALETTE.length]})).sort((a,b)=>b.value-a.value);

  // ── Évolution CA (12 mois) ───────────────────────────────────────────────────
  const evol = Array.from({length:12},(_,i)=>{
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-11+i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const moisCourt=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"][d.getMonth()];
    return {label:moisCourt, value: doneAll.filter(f=>(f.date||"").startsWith(key)).reduce((a,f)=>a+finSignedAmount(f),0)};
  });

  // ── Podium / classement commerciaux ──────────────────────────────────────────
  const classement = USERS.map(u=>{
    const ventes = done.filter(f=>f.creePar===u.id);
    const caU = ventes.reduce((a,f)=>a+finSignedAmount(f),0);
    const patsU = pat.filter(p=>p.assigneA===u.id||p.creePar===u.id);
    const confirmes = patsU.filter(p=>["Confirmé","Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade)).length;
    return {u, ca:caU, nb:ventes.length, panier: ventes.length?Math.round(caU/ventes.length):0,
      conv: patsU.length?Math.round(confirmes/patsU.length*100):0};
  }).filter(r=>r.ca>0||r.nb>0).sort((a,b)=>b.ca-a.ca);

  // ── Options de filtres ───────────────────────────────────────────────────────
  const paysOpts = Array.from(new Set(patients.map(p=>p.pays).filter(Boolean)));
  const hopitalOpts = Array.from(new Set(patients.map(p=>p.hopital).filter(Boolean)));
  const medecinOpts = Array.from(new Set(patients.map(p=>patientMedecin(p)).filter(Boolean)));

  // ── Drill-down : liste correspondante ────────────────────────────────────────
  const drillList = (()=>{
    if(!drill) return null;
    if(drill.dim==="user") return {kind:"fin", items: done.filter(f=>f.creePar===drill.key)};
    if(drill.dim==="paiement") return {kind:"fin", items: fin.filter(f=>{
      if(drill.key==="acomptes") return isPatientCashFlow(f)&&f.type==="Acompte";
      if(drill.key==="complets") return isPatientCashFlow(f)&&f.type!=="Acompte"&&f.type!=="Remboursement";
      if(drill.key==="attente") return f.statut==="En attente"&&FIN_NON_CASH_TYPES.indexOf(f.type)<0;
      if(drill.key==="rembourses") return f.statut==="Complété"&&f.type==="Remboursement";
      return false;
    })};
    if(drill.dim==="stade") return {kind:"pat", items: pat.filter(p=>(p.stade||"Prospect")===drill.key)};
    if(drill.dim==="op") return {kind:"pat", items: pat.filter(p=>opBucket(p)===drill.key)};
    if(drill.dim==="pays") return {kind:"pat", items: pat.filter(p=>(p.pays||"—")===drill.key)};
    if(drill.dim==="source") return {kind:"pat", items: pat.filter(p=>(p.source||"—")===drill.key)};
    return null;
  })();

  // ── Export ───────────────────────────────────────────────────────────────────
  const exportCSV = ()=>{
    // Correction : la colonne "Devise" exportait en réalité la méthode de
    // paiement. Désormais : Méthode = f.methode, Devise = f.devise (EUR par défaut).
    const rows = [["Date","Patient","Type","Montant","Statut","Méthode","Devise","Référence/Notes","Créé par"]];
    fin.forEach(f=>{ const p=getP(f.patientId); rows.push([f.date||"", p?`${p.prenom} ${p.nom}`:"", f.type||"", f.montant||"", f.statut||"", f.methode||"", f.devise||"EUR", f.notes||"", (USERS.find(u=>u.id===f.creePar)||{}).prenom||f.creePar||""]); });
    const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    try{
      const blob = new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob); const a=document.createElement("a");
      a.href=url; a.download=`finances-clinic-nobel-${today}.csv`; a.click(); URL.revokeObjectURL(url);
    }catch(e){ alert(tt("fin.exportError")); }
  };
  // Rapport PDF propre (remplace window.print() qui imprimait toute l'interface).
  // Ouvre une fenêtre dédiée avec KPIs + transactions, mise en page imprimable
  // (fonctionne aussi sur mobile : le dialogue permet "Enregistrer en PDF").
  const exportPDF = ()=>{
    try{
      const esc = s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const kpiRows = [
        [tt("fin.revenueToday"),eur(caToday)],[tt("fin.revenueWeek"),eur(caWeek)],
        [tt("fin.revenueMonth"),eur(caMonth)],[tt("fin.revenueYear"),eur(caYear)],
        [tt("fin.received"),eur(totalEncaisse)],[tt("fin.pending"),eur(Math.max(0,enAttente))],
        [tt("fin.refunded"),eur(rembourse)],[tt("finance.remainingBalance"),eur(resteEncaisser)],
      ];
      const trRows = fin.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(f=>{
        const p=getP(f.patientId);
        return `<tr><td>${esc(f.date)}</td><td>${esc(p?`${p.prenom} ${p.nom}`:"—")}</td><td>${esc(f.type)}</td><td style="text-align:right">${esc(eur(f.montant))}</td><td>${esc(f.statut)}</td></tr>`;
      }).join("");
      const w = window.open("","_blank");
      if(!w){ alert(tt("fin.exportError")); return; }
      w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Finances — Clinic Nobel — ${today}</title>
        <style>
          body{font-family:Arial,Helvetica,sans-serif;color:#0B1F3A;margin:24px}
          h1{font-size:18px;margin:0 0 4px} .sub{color:#7B8BA5;font-size:11px;margin-bottom:18px}
          table{border-collapse:collapse;width:100%;font-size:11px;margin-bottom:18px}
          th,td{border:1px solid #E3E9F2;padding:6px 8px;text-align:left}
          th{background:#F4F7FB;font-weight:700}
          .kpi td:last-child{text-align:right;font-weight:700}
          @media print{ body{margin:8mm} }
        </style></head><body>
        <h1>💰 Finances — Clinic Nobel Istanbul</h1>
        <div class="sub">${today} · ${fin.length} transactions</div>
        <table class="kpi"><tbody>${kpiRows.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td></tr>`).join("")}</tbody></table>
        <table><thead><tr><th>Date</th><th>Patient</th><th>Type</th><th style="text-align:right">${esc(tt("finance.totalAmount"))}</th><th>Statut</th></tr></thead><tbody>${trRows}</tbody></table>
        <script>window.onload=()=>{window.print();};<\/script></body></html>`);
      w.document.close();
    }catch(e){ alert(tt("fin.exportError")); }
  };

  const periods = [["today",tt("common.today")],["7j","7j"],["30j","30j"],["3m","3"+tt("date.monthsShort")],["6m","6"+tt("date.monthsShort")],["12m","12"+tt("date.monthsShort")],["tout",tt("common.all")]];
  const sel = {padding:"8px 10px",border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:12,background:C.white,color:C.text,fontWeight:600,maxWidth:"100%"};
  const KPI = ({label,value,color=C.navy,icon,sub})=>(
    <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,padding:"12px 14px",minWidth:0}}>
      <div style={{fontSize:11,color:C.muted,fontWeight:700,display:"flex",alignItems:"center",gap:5}}>{icon&&<span>{icon}</span>}{label}</div>
      <div style={{fontSize:18,fontWeight:800,color,marginTop:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{value}</div>
      {sub&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>{sub}</div>}
    </div>
  );

  return (
    <div style={{maxWidth:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{fontSize:22,fontWeight:800,color:C.text}}>💰 {tt("nav.finances")}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={exportCSV} style={{padding:"8px 12px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",fontWeight:700,fontSize:12,color:C.text}}>⬇️ CSV</button>
          <button onClick={exportPDF} style={{padding:"8px 12px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",fontWeight:700,fontSize:12,color:C.text}}>🖨️ PDF</button>
          {can(user,"finances","add")&&<button onClick={onAdd} style={{padding:"8px 14px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:800,fontSize:12}}>+ {tt("fin.new")}</button>}
        </div>
      </div>

      {/* Onglets — les onglets 🔐 exigent la permission indépendante "financesAdmin" */}
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {[["dashboard","📊 "+tt("title.dashboard")],["upcoming","🔜 "+tt("finance.upcomingPatients")],["due","💸 "+tt("finance.upcomingPayments")],["closed","✅ "+tt("finance.closedPatients")],["transactions","💳 "+tt("fin.transactions")],
          ...(hasFinancesAdmin(user)?[["surgeons","💼 "+tt("finance.surgeonPayments")],["adminfin","🔐 "+tt("finance.adminFinances")]]:[])].map(([id,lb])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,whiteSpace:"nowrap",
            background:tab===id?C.navy:C.white,color:tab===id?C.white:C.muted,boxShadow:tab===id?"none":`inset 0 0 0 1px ${C.border}`}}>{lb}</button>
        ))}
      </div>

      {/* Filtres */}
      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
        {periods.map(([id,lb])=>(
          <button key={id} onClick={()=>setPeriod(id)} style={{padding:"6px 12px",borderRadius:99,border:"none",cursor:"pointer",fontWeight:700,fontSize:11,whiteSpace:"nowrap",
            background:period===id?C.gold:C.white,color:period===id?C.navy:C.muted,boxShadow:period===id?"none":`inset 0 0 0 1px ${C.border}`}}>{lb}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8,marginBottom:16}}>
        <select value={fUser} onChange={e=>setFUser(e.target.value)} style={sel}><option value="tous">👤 {tt("fin.allUsers")}</option>{USERS.map(u=><option key={u.id} value={u.id}>{u.prenom} {u.nom}</option>)}</select>
        <select value={fPays} onChange={e=>setFPays(e.target.value)} style={sel}><option value="tous">🌍 {tt("fin.allCountries")}</option>{paysOpts.map(p=><option key={p} value={p}>{p}</option>)}</select>
        <select value={fInterv} onChange={e=>setFInterv(e.target.value)} style={sel}><option value="tous">🔪 {tt("fin.allProcedures")}</option>{OPS.map(o=><option key={o} value={o}>{o}</option>)}</select>
        <select value={fMedecin} onChange={e=>setFMedecin(e.target.value)} style={sel}><option value="tous">🩺 {tt("fin.allDoctors")}</option>{medecinOpts.map(m=><option key={m} value={m}>{m}</option>)}</select>
        <select value={fHopital} onChange={e=>setFHopital(e.target.value)} style={sel}><option value="tous">🏥 {tt("fin.allHospitals")}</option>{hopitalOpts.map(h=><option key={h} value={h}>{h}</option>)}</select>
        <select value={fMode} onChange={e=>setFMode(e.target.value)} style={sel}>
          <option value="tous">💳 {tt("finance.allModes")}</option>
          <option value={FIN_MODE_TRANSFER}>🏦 {tt("finance.bankTransfer")}</option>
          <option value={FIN_MODE_CASH}>💵 {tt("finance.cashClinic")}</option>
          <option value="Carte bancaire">💳 Carte bancaire</option>
          <option value="PayPal">🅿️ PayPal</option>
          <option value="aucun">❔ {tt("finance.modeUnknown")}</option>
        </select>
        <select value={fStatut} onChange={e=>setFStatut(e.target.value)} style={sel}>
          <option value="tous">📌 {tt("finance.allStatuses")}</option>
          {["Complété","En attente","Annulé"].map(s=><option key={s} value={s}>{finStatusLabel(s)}</option>)}
        </select>
        {(fUser!=="tous"||fPays!=="tous"||fInterv!=="tous"||fMedecin!=="tous"||fHopital!=="tous"||fMode!=="tous"||fStatut!=="tous")&&
          <button onClick={()=>{setFUser("tous");setFPays("tous");setFInterv("tous");setFMedecin("tous");setFHopital("tous");setFMode("tous");setFStatut("tous");}} style={{...sel,color:C.red,fontWeight:800,cursor:"pointer"}}>✕ {tt("common.reset")}</button>}
      </div>

      {tab==="dashboard" && <div>
        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
          <KPI icon="📅" label={tt("fin.revenueToday")} value={eur(caToday)} color={C.green}/>
          <KPI icon="🗓️" label={tt("fin.revenueWeek")} value={eur(caWeek)} color={C.green}/>
          <KPI icon="📆" label={tt("fin.revenueMonth")} value={eur(caMonth)} color={C.green}/>
          <KPI icon="📈" label={tt("fin.revenueYear")} value={eur(caYear)} color={C.navy}/>
          <KPI icon="🛒" label={tt("fin.avgBasket")} value={eur(panierMoyen)} color={C.navy}/>
          <KPI icon="💵" label={tt("fin.avgDeposit")} value={eur(acompteMoyen)} color={C.gold}/>
          <KPI icon="⏳" label={tt("fin.balance")} value={eur(resteEncaisser)} color={C.amber}/>
          <KPI icon="✅" label={tt("fin.received")} value={eur(totalEncaisse)} color={C.green}/>
        </div>

        {/* Objectif mensuel (jauge) */}
        <div style={{background:C.white,borderRadius:16,border:`1px solid ${C.border}`,padding:16,marginBottom:16,display:"flex",alignItems:"center",gap:18,flexWrap:"wrap"}}>
          <Donut size={150} thickness={20}
            segments={[{label:"Atteint",value:caMonth,color:objPct>=100?C.green:C.gold},{label:"Restant",value:Math.max(0,objectif-caMonth),color:C.bg}]}
            center={`${objPct}%`} sub="objectif"/>
          <div style={{flex:1,minWidth:180}}>
            <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:6}}>🎯 {tt("fin.monthlyGoal")}</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:8}}>{eur(caMonth)} / {eur(objectif)} {tt("fin.thisMonth")}</div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input type="number" value={objectif} onChange={e=>{const v=Number(e.target.value)||0;setObjectif(v);try{cfgStore.save("objectif_mensuel",v);}catch(x){}}}
                style={{width:130,padding:"7px 9px",border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:13}}/>
              <span style={{fontSize:12,color:C.muted}}>€ / {tt("date.monthsShort")}</span>
            </div>
          </div>
        </div>

        {/* Évolution */}
        <div style={{background:C.white,borderRadius:16,border:`1px solid ${C.border}`,padding:16,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:4}}>📈 {tt("fin.revenueEvolution")}</div>
          <MiniBars data={evol} color={C.navy} fmt={eur}/>
        </div>

        {/* Podium */}
        {classement.length>0 && <div style={{background:C.white,borderRadius:16,border:`1px solid ${C.border}`,padding:16,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:14}}>🏆 {tt("fin.salesRanking")}</div>
          <Podium rows={classement} fmtEur={eur}/>
          <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:6}}>
            {classement.map((r,i)=>(
              <div key={r.u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,background:C.bg}}>
                <span style={{fontSize:13,fontWeight:800,color:C.muted,width:20}}>{i+1}</span>
                <span style={{flex:1,minWidth:0,fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.u.prenom} {r.u.nom}</span>
                <span style={{fontSize:12,fontWeight:800,color:C.green}}>{eur(r.ca)}</span>
                <span style={{fontSize:10,color:C.muted,whiteSpace:"nowrap"}}>{tt("fin.avgBasket").toLowerCase()} {eur(r.panier)} · {r.conv}% conv.</span>
              </div>
            ))}
          </div>
        </div>}

        {/* Graphiques circulaires */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:14}}>
          <ChartCard title={tt("fin.salesByUser")} icon="👤" segments={ventesUser} fmtVal={s=>eur(s.value)}
            active={drill&&drill.dim==="user"?drill.label:null}
            onSlice={s=>setDrill({dim:"user",key:s.uid,label:s.label})}/>
          <ChartCard title={tt("fin.paymentSplit")} icon="💳" segments={paiements} fmtVal={s=>eur(s.value)} center={eur(totalEncaisse+enAttente).replace(" €","")} sub="€"
            active={drill&&drill.dim==="paiement"?drill.label:null}
            onSlice={s=>setDrill({dim:"paiement",key:s.key,label:s.label})}/>
          <ChartCard title={tt("fin.patientsByStage")} icon="📍" segments={parStade}
            active={drill&&drill.dim==="stade"?drill.label:null}
            onSlice={s=>setDrill({dim:"stade",key:s.key,label:s.label})}/>
          <ChartCard title={tt("patient.procedure")} icon="🔪" segments={parOp} fmtVal={s=>`${s.value} · ${eur(s.ca)}`}
            active={drill&&drill.dim==="op"?drill.label:null}
            onSlice={s=>setDrill({dim:"op",key:s.key,label:s.label})}/>
          <ChartCard title={tt("patient.country")} icon="🌍" segments={parPays}
            active={drill&&drill.dim==="pays"?drill.label:null}
            onSlice={s=>setDrill({dim:"pays",key:s.key,label:s.label})}/>
          <ChartCard title={tt("patient.source")} icon="📣" segments={parSource}
            active={drill&&drill.dim==="source"?drill.label:null}
            onSlice={s=>setDrill({dim:"source",key:s.key,label:s.label})}/>
        </div>

        {/* Drill-down */}
        {drillList && <div style={{background:C.white,borderRadius:16,border:`2px solid ${C.navy}`,padding:16,marginTop:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:C.navy}}>🔎 {drill.label} — {drillList.items.length} résultat{drillList.items.length>1?"s":""}</div>
            <button onClick={()=>setDrill(null)} style={{border:"none",background:C.bg,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:700,fontSize:12}}>✕ {tt("common.close")}</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:340,overflowY:"auto"}}>
            {drillList.kind==="fin" ? drillList.items.map(f=>{ const p=getP(f.patientId); return (
              <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,background:C.bg}}>
                <span style={{flex:1,minWidth:0,fontSize:12,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p?`${p.prenom} ${p.nom}`:"—"}</span>
                <Badge text={f.type||"Paiement"} color={C.navy} small/>
                <span style={{fontSize:12,fontWeight:800,color:C.green,whiteSpace:"nowrap"}}>{eur(f.montant)}</span>
                <span style={{fontSize:10,color:C.muted,whiteSpace:"nowrap"}}>{fmtJour(f.date)}</span>
              </div>
            );}) : drillList.items.map(p=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,background:C.bg}}>
                <Avatar p={p} color={p.color} size={28}/>
                <span style={{flex:1,minWidth:0,fontSize:12,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.prenom} {p.nom}</span>
                {patientMedecin(p)&&<MedBadge name={patientMedecin(p)} color={patientMedColor(p)} small/>}
                <span style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{p.pays||"—"}</span>
                {Number(p.budget)>0&&<span style={{fontSize:12,fontWeight:800,color:C.navy,whiteSpace:"nowrap"}}>{eur(p.budget)}</span>}
              </div>
            ))}
            {drillList.items.length===0&&<div style={{fontSize:12,color:C.muted,textAlign:"center",padding:20}}>{tt("common.noResult")}</div>}
          </div>
        </div>}
      </div>}

      {/* ══ PATIENTS À VENIR ══ */}
      {tab==="upcoming" && (()=>{
        const list = pat.filter(p=>isUpcomingPatient(p, rdvs));
        const totalPrevu = list.reduce((a,p)=>a+getPatientTotal(p),0);
        const totalRestant = list.reduce((a,p)=>a+getPatientBalance(p, finances),0);
        return (
          <div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              <KPI icon="🔜" label={tt("finance.patientCount")} value={list.length} color={C.blue}/>
              <KPI icon="💰" label={tt("finance.totalAmount")} value={eur(totalPrevu)} color={C.navy}/>
              <KPI icon="⏳" label={tt("finance.remainingBalance")} value={eur(totalRestant)} color={C.amber}/>
            </div>
            {list.length===0
              ? <div style={{fontSize:13,color:C.muted,textAlign:"center",padding:40}}>{tt("common.noResult")}</div>
              : list.map(p=>(<FinPatientRow key={p.id} p={p} finances={finances} rdvs={rdvs} kind="upcoming"/>))}
          </div>
        );
      })()}

      {/* ══ PAIEMENTS À VENIR / À ENCAISSER ══ */}
      {tab==="due" && (()=>{
        const list = pat.filter(p=>isPaymentDuePatient(p, finances))
          .sort((a,b)=>getPatientBalance(b,finances)-getPatientBalance(a,finances));
        const totalDu = list.reduce((a,p)=>a+getPatientBalance(p, finances),0);
        const totalRecu = list.reduce((a,p)=>a+getPatientPaid(p, finances),0);
        const soldeMoyen = list.length ? Math.round(totalDu/list.length) : 0;
        return (
          <div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              <KPI icon="💸" label={tt("finance.totalToCollect")} value={eur(totalDu)} color={C.amber}/>
              <KPI icon="👥" label={tt("finance.patientCount")} value={list.length} color={C.navy}/>
              <KPI icon="✅" label={tt("finance.amountPaid")} value={eur(totalRecu)} color={C.green}/>
              <KPI icon="📊" label={tt("finance.avgBalance")} value={eur(soldeMoyen)} color={C.blue}/>
            </div>
            {list.length===0
              ? <div style={{fontSize:13,color:C.muted,textAlign:"center",padding:40}}>{tt("common.noResult")}</div>
              : list.map(p=>(<FinPatientRow key={p.id} p={p} finances={finances} rdvs={rdvs} kind="due"/>))}
          </div>
        );
      })()}

      {/* ══ PATIENTS CLÔTURÉS ══ */}
      {tab==="closed" && (()=>{
        const list = pat.filter(p=>isClosedPatient(p, finances));
        const totalPaye = list.reduce((a,p)=>a+getPatientPaid(p, finances),0);
        return (
          <div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              <KPI icon="✅" label={tt("finance.patientCount")} value={list.length} color={C.green}/>
              <KPI icon="💰" label={tt("finance.amountPaid")} value={eur(totalPaye)} color={C.navy}/>
            </div>
            {list.length===0
              ? <div style={{fontSize:13,color:C.muted,textAlign:"center",padding:40}}>{tt("common.noResult")}</div>
              : list.map(p=>(<FinPatientRow key={p.id} p={p} finances={finances} rdvs={rdvs} kind="closed"/>))}
          </div>
        );
      })()}

      {tab==="transactions" && (()=>{
        const virRecus = done.filter(f=>(f.methode||"")===FIN_MODE_TRANSFER).reduce((a,f)=>a+finSignedAmount(f),0);
        const virAttente = fin.filter(f=>f.statut==="En attente"&&(f.methode||"")===FIN_MODE_TRANSFER&&FIN_NON_CASH_TYPES.indexOf(f.type)<0).reduce((a,f)=>a+Math.abs(finSignedAmount(f)),0);
        return (<div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
          <KPI icon="🏦" label={tt("finance.transfersReceived")} value={eur(virRecus)} color={C.green} sub={virAttente>0?`${tt("finance.stPending")} : ${eur(virAttente)}`:null}/>
          <KPI icon="✅" label={tt("fin.received")} value={eur(totalEncaisse)} color={C.navy}/>
          <KPI icon="⏳" label={tt("fin.pending")} value={eur(Math.max(0,enAttente))} color={C.amber}/>
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:10}}>{fin.length} {tt("fin.transactions").toLowerCase()}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {fin.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(f=>{ const p=getP(f.patientId); return (
            <div key={f.id} style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div style={{width:38,height:38,borderRadius:10,background:(f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber)+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{(f.methode||"")===FIN_MODE_TRANSFER?"🏦":(f.methode||"")===FIN_MODE_CASH?"💵":f.type==="Acompte"?"💵":f.type==="Remboursement"?"↩️":"💳"}</div>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p?`${p.prenom} ${p.nom}`:tt("finance.patientUnknown")}</div>
                <div style={{fontSize:11,color:C.muted}}>{f.type||tt("fin.payment")} · {fmtJour(f.date)}</div>
                {(f.methode||"")===FIN_MODE_TRANSFER&&f.notes&&<div style={{fontSize:10,color:C.navy,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🔖 {f.notes}</div>}
              </div>
              <Badge text={f.methode||tt("finance.modeUnknown")} color={(f.methode||"")===FIN_MODE_TRANSFER?C.navy:(f.methode||"")===FIN_MODE_CASH?C.gold:C.muted} small/>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:14,fontWeight:800,color:f.type==="Remboursement"?C.red:C.green}}>{f.type==="Remboursement"?"−":""}{eur(f.montant)}</div>
                <Badge text={finStatusLabel(f.statut)} color={f.statut==="Complété"?C.green:f.statut==="Annulé"?C.red:C.amber} small/>
              </div>
              {can(user,"finances","delete")&&<button onClick={()=>onDelete&&onDelete(f.id)} style={{border:"none",background:"none",cursor:"pointer",fontSize:15,opacity:0.5,flexShrink:0}}>🗑</button>}
            </div>
          );})}
          {fin.length===0&&<div style={{fontSize:13,color:C.muted,textAlign:"center",padding:40}}>{tt("common.noResult")}</div>}
        </div>
      </div>);})()}

      {/* ══ PAIEMENTS CHIRURGIENS (permission financesAdmin requise) ══
          Stockage : enregistrements "finances" avec type "Paiement chirurgien"
          (compatible backend actuel, AUCUNE modification Apps Script requise).
          Le nom du chirurgien est stocké dans le champ `notes` (colonne existante).
          Ces enregistrements sont des DÉPENSES : exclus du CA et des soldes patients. */}
      {tab==="surgeons" && hasFinancesAdmin(user) && (()=>{
        const sp = finances.filter(f=>f.type==="Paiement chirurgien").filter(f=>inPeriod(f.date||""));
        const spSorted = sp.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
        const totalAPayer = sp.filter(f=>f.statut!=="Payé").reduce((a,f)=>a+Math.abs(Number(f.montant||0)),0);
        const totalPaye = sp.filter(f=>f.statut==="Payé").reduce((a,f)=>a+Math.abs(Number(f.montant||0)),0);
        const parChir = {};
        sp.forEach(f=>{ const k=f.notes||"—"; parChir[k]=parChir[k]||{du:0,paye:0}; if(f.statut==="Payé") parChir[k].paye+=Math.abs(Number(f.montant||0)); else parChir[k].du+=Math.abs(Number(f.montant||0)); });
        const docOpts = Array.from(new Set([...medecinOpts, ...USERS.filter(u2=>u2.role==="chirurgien").map(u2=>`${u2.prenom} ${u2.nom}`.trim()), ...sp.map(f=>f.notes).filter(Boolean)]));
        return (
          <div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
              <KPI icon="⏳" label={tt("finance.toPay")} value={eur(totalAPayer)} color={C.amber}/>
              <KPI icon="✅" label={tt("finance.paidOut")} value={eur(totalPaye)} color={C.green}/>
              <KPI icon="🩺" label={tt("finance.surgeon")+"s"} value={Object.keys(parChir).length} color={C.navy}/>
            </div>
            {can(user,"finances","add")&&<SurgeonPayForm onSave={onSave} docOpts={docOpts} tt={tt}/>}
            {Object.keys(parChir).length>0&&<div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,padding:14,marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:8}}>🩺 {tt("finance.surgeonPayments")}</div>
              {Object.keys(parChir).map(k=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderTop:`1px solid ${C.bg}`}}>
                  <span style={{flex:1,minWidth:0,fontSize:12,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{k}</span>
                  {parChir[k].du>0&&<span style={{fontSize:11,fontWeight:800,color:C.amber,whiteSpace:"nowrap"}}>{tt("finance.toPay")} {eur(parChir[k].du)}</span>}
                  {parChir[k].paye>0&&<span style={{fontSize:11,fontWeight:800,color:C.green,whiteSpace:"nowrap"}}>{tt("finance.paidOut")} {eur(parChir[k].paye)}</span>}
                </div>
              ))}
            </div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {spSorted.map(f=>{ const p=getP(f.patientId); return (
                <div key={f.id} style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <div style={{width:38,height:38,borderRadius:10,background:(f.statut==="Payé"?C.green:C.amber)+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🩺</div>
                  <div style={{flex:1,minWidth:130}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.text}}>{f.notes||"—"}</div>
                    <div style={{fontSize:11,color:C.muted}}>{f.procedure||""}{p?` · ${p.prenom} ${p.nom}`:""} · {fmtJour(f.date)}</div>
                  </div>
                  <div style={{fontSize:14,fontWeight:800,color:C.red,whiteSpace:"nowrap"}}>−{eur(f.montant)}</div>
                  <Badge text={f.statut==="Payé"?tt("finance.paidOut"):tt("finance.toPay")} color={f.statut==="Payé"?C.green:C.amber} small/>
                  {f.statut!=="Payé"&&can(user,"finances","edit")&&onUpdate&&<button onClick={()=>onUpdate({...f,statut:"Payé"})} style={{padding:"5px 10px",border:"none",borderRadius:8,background:C.green,color:C.white,cursor:"pointer",fontWeight:700,fontSize:11}}>✓ {tt("finance.markPaid")}</button>}
                  {can(user,"finances","delete")&&<button onClick={()=>onDelete&&onDelete(f.id)} style={{border:"none",background:"none",cursor:"pointer",fontSize:15,opacity:0.5,flexShrink:0}}>🗑</button>}
                </div>
              );})}
              {sp.length===0&&<div style={{fontSize:13,color:C.muted,textAlign:"center",padding:40}}>{tt("common.noResult")}</div>}
            </div>
          </div>
        );
      })()}

      {/* ══ FINANCES ADMINISTRATEUR (permission financesAdmin requise) ══ */}
      {tab==="adminfin" && hasFinancesAdmin(user) && (()=>{
        const spAll = finances.filter(f=>f.type==="Paiement chirurgien").filter(f=>inPeriod(f.date||""));
        const depPayees = spAll.filter(f=>f.statut==="Payé").reduce((a,f)=>a+Math.abs(Number(f.montant||0)),0);
        const depAPayer = spAll.filter(f=>f.statut!=="Payé").reduce((a,f)=>a+Math.abs(Number(f.montant||0)),0);
        const caBrut = done.filter(f=>f.type!=="Remboursement").reduce((a,f)=>a+finSignedAmount(f),0);
        const caNet = totalEncaisse; // déjà signé (remboursements déduits)
        const marge = caNet - depPayees;
        return (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:16}}>
              <KPI icon="💰" label={tt("finance.grossRevenue")} value={eur(caBrut)} color={C.green}/>
              <KPI icon="↩️" label={tt("fin.refunded")} value={"−"+eur(rembourse)} color={C.red}/>
              <KPI icon="📥" label={tt("finance.netRevenue")} value={eur(caNet)} color={C.navy}/>
              <KPI icon="🩺" label={tt("finance.expenses")} value={"−"+eur(depPayees)} color={C.red} sub={depAPayer>0?`${tt("finance.toPay")} : ${eur(depAPayer)}`:null}/>
              <KPI icon="📊" label={tt("finance.netMargin")} value={eur(marge)} color={marge>=0?C.green:C.red}/>
              <KPI icon="⏳" label={tt("finance.remainingBalance")} value={eur(resteEncaisser)} color={C.amber}/>
            </div>
            <div style={{background:C.white,borderRadius:16,border:`1px solid ${C.border}`,padding:16}}>
              <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:4}}>📈 {tt("fin.revenueEvolution")}</div>
              <MiniBars data={evol} color={C.navy} fmt={eur}/>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── Formulaire d'ajout Paiement chirurgien (inline, léger) ────────────────────
function SurgeonPayForm({onSave, docOpts, tt}){
  const [f,setF] = useState({notes:"",procedure:"",montant:"",date:todayStr(),statut:"À payer"});
  const [busy,setBusy] = useState(false);
  const ch=(k,v)=>setF(x=>({...x,[k]:v}));
  const inp={padding:"8px 10px",border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:12,background:C.white,minWidth:0,width:"100%",boxSizing:"border-box"};
  const submit = async ()=>{
    if(!f.notes||!f.montant){ alert(tt("finance.amountRequired")); return; }
    if(!onSave) return;
    setBusy(true);
    await onSave({patientId:"", type:"Paiement chirurgien", procedure:f.procedure, montant:Math.abs(Number(f.montant)||0), date:f.date, statut:f.statut, methode:"", devise:"EUR", notes:f.notes});
    setF({notes:"",procedure:"",montant:"",date:todayStr(),statut:"À payer"});
    setBusy(false);
  };
  return (
    <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,padding:14,marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:10}}>➕ {tt("finance.addPayment")}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8}}>
        <div><input list="cn-doc-opts" style={inp} placeholder={tt("finance.surgeon")} value={f.notes} onChange={e=>ch("notes",e.target.value)}/>
          <datalist id="cn-doc-opts">{docOpts.map(d=><option key={d} value={d}/>)}</datalist></div>
        <input style={inp} placeholder={tt("patient.procedure")} value={f.procedure} onChange={e=>ch("procedure",e.target.value)}/>
        <input style={inp} type="number" placeholder="€" value={f.montant} onChange={e=>ch("montant",e.target.value)}/>
        <input style={inp} type="date" value={f.date} onChange={e=>ch("date",e.target.value)}/>
        <select style={inp} value={f.statut} onChange={e=>ch("statut",e.target.value)}>
          <option value="À payer">{tt("finance.toPay")}</option><option value="Payé">{tt("finance.paidOut")}</option>
        </select>
        <button onClick={submit} disabled={busy} style={{padding:"8px 12px",border:"none",borderRadius:9,background:busy?"#94a3b8":C.navy,color:C.white,cursor:busy?"not-allowed":"pointer",fontWeight:800,fontSize:12}}>{busy?"…":tt("common.save")}</button>
      </div>
    </div>
  );
}

// ── ANALYSES ──────────────────────────────────────────────────────────────────
function Analyses({patients, finances}) {
  const tt = t; // alias sûr : évite toute collision avec variables locales "t"
  const byProc = PROCEDURES.map(p=>({name:p,n:patients.filter(x=>opsArray(x).includes(p)).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n).slice(0,6);
  const bySrc = SOURCES.map(s=>({name:s,n:patients.filter(x=>x.source===s).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const taux = patients.length?Math.round((patients.filter(p=>p.stade==="Clôturé ✓").length/patients.length)*100):0;
  const bMoy = patients.filter(p=>p.budget).length?Math.round(patients.filter(p=>p.budget).reduce((a,p)=>a+Number(p.budget),0)/patients.filter(p=>p.budget).length):0;
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        {[
          {icon:"📈",label:tt("analytics.conversion"),value:`${taux}%`,color:C.green},
          {icon:"💶",label:tt("analytics.avgBudget"),value:fmtEur(bMoy),color:C.blue},
          {icon:"🌍",label:tt("patient.country"),value:[...new Set(patients.map(p=>p.pays))].filter(Boolean).length,color:C.purple},
          {icon:"⭐",label:tt("analytics.satisfaction"),value:"98%",color:C.amber},
        ].map(s=>(
          <Card key={s.label} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:10,background:s.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{s.icon}</div>
            <div><div style={{fontSize:18,fontWeight:800,color:C.text}}>{s.value}</div><div style={{fontSize:11,color:C.muted}}>{s.label}</div></div>
          </Card>
        ))}
      </div>
      <Card>
        <SecTitle icon="🏥">{tt("analytics.topProcedures")}</SecTitle>
        {byProc.length===0?<div style={{color:C.muted,fontSize:13}}>{tt("analytics.noData")}</div>:byProc.map(x=>(
          <div key={x.name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:3}}><span>{x.name}</span><span style={{fontWeight:700,color:C.text}}>{x.n}</span></div>
            <div style={{background:C.bg,borderRadius:99,height:6}}><div style={{background:C.blue,borderRadius:99,height:6,width:`${patients.length?(x.n/patients.length)*100:0}%`}}/></div>
          </div>
        ))}
      </Card>
      <Card>
        <SecTitle icon="📊">{tt("analytics.acquisitionChannels")}</SecTitle>
        {bySrc.length===0?<div style={{color:C.muted,fontSize:13}}>{tt("analytics.noData")}</div>:bySrc.map(x=>(
          <div key={x.name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:3}}><span>{x.name}</span><span style={{fontWeight:700,color:C.text}}>{x.n}</span></div>
            <div style={{background:C.bg,borderRadius:99,height:6}}><div style={{background:C.purple,borderRadius:99,height:6,width:`${patients.length?(x.n/patients.length)*100:0}%`}}/></div>
          </div>
        ))}
      </Card>
    </div>
  );
}
