// ── MESSAGERIE ────────────────────────────────────────────────────────────────
function Messagerie({user,patients}){
  const tt = t; // alias sûr : évite toute collision avec variables locales "t"
  const [selUser,setSelUser]=useState(null);
  const [msg,setMsg]=useState("");
  const [messages,setMessages]=useState(()=>{try{return JSON.parse(localStorage.getItem("cn_messages")||"{}");}catch(e){return{};}});
  const autres=USERS.filter(u=>u.id!==user.id);
  const getThread=(uid)=>messages[`${[user.id,uid].sort().join("_")}`]||[];
  const sendMsg=()=>{
    if(!msg.trim()||!selUser)return;
    const key=[user.id,selUser.id].sort().join("_");
    const newMsg={id:uid(),from:user.id,text:msg.trim(),ts:Date.now()};
    const updated={...messages,[key]:[...getThread(selUser.id),newMsg]};
    setMessages(updated);
    localStorage.setItem("cn_messages",JSON.stringify(updated));
    setMsg("");
  };
  const thread=selUser?getThread(selUser.id):[];
  if(selUser){
    return (
      <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 160px)"}}>
        <button onClick={()=>setSelUser(null)} style={{border:"none",background:"none",cursor:"pointer",color:C.blue,fontWeight:700,fontSize:13,marginBottom:12,display:"flex",alignItems:"center",gap:6,padding:0}}>← {tt("nav.messagerie")}</button>
        <div style={{background:`linear-gradient(135deg,${selUser.color},${selUser.color}cc)`,borderRadius:14,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
          <Avatar p={{prenom:selUser.prenom,nom:selUser.nom}} size={40} color={selUser.color} style={{background:"rgba(255,255,255,0.2)"}}/>
          <div>
            <div style={{color:C.white,fontWeight:800,fontSize:14}}>{selUser.prenom} {selUser.nom}</div>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{roleLabel(selUser.role)} · {tt("msg.online")}</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 0 8px"}}>
          {thread.length===0&&<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>{tt("msg.startConversation")} 💬</div>}
          {thread.map(m=>{
            const isMine=m.from===user.id;
            const sender=USERS.find(u=>u.id===m.from);
            return (
              <div key={m.id} style={{display:"flex",justifyContent:isMine?"flex-end":"flex-start",marginBottom:8}}>
                {!isMine&&<Avatar p={{prenom:sender?.prenom||"?",nom:""}} size={28} color={sender?.color} style={{marginRight:8,alignSelf:"flex-end",flexShrink:0}}/>}
                <div style={{maxWidth:"75%"}}>
                  <div style={{background:isMine?C.navy:C.white,color:isMine?C.white:C.text,borderRadius:isMine?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 14px",fontSize:13,border:isMine?"none":`1px solid ${C.border}`,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                    {m.text}
                  </div>
                  <div style={{fontSize:9,color:C.muted,marginTop:3,textAlign:isMine?"right":"left"}}>{new Date(m.ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
          <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()} placeholder={tt("msg.writeMessage")} style={{flex:1,padding:"11px 14px",border:`1.5px solid ${C.border}`,borderRadius:12,fontSize:13,outline:"none",background:C.white}}/>
          <button onClick={sendMsg} style={{width:44,height:44,border:"none",borderRadius:12,background:C.navy,color:C.white,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>➤</button>
        </div>
      </div>
    );
  }
  return (
    <div>
      <div style={{fontSize:13,color:C.muted,marginBottom:14}}>{tt("msg.internalMessaging")}</div>
      {autres.map(u=>{
        const thread=getThread(u.id);
        const lastMsg=thread[thread.length-1];
        const unread=thread.filter(m=>m.from!==user.id).length;
        return (
          <div key={u.id} onClick={()=>setSelUser(u)} style={{background:C.white,borderRadius:14,padding:"14px 16px",marginBottom:8,cursor:"pointer",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
            <div style={{position:"relative"}}>
              <Avatar p={{prenom:u.prenom,nom:u.nom}} size={44} color={u.color}/>
              <div style={{position:"absolute",bottom:0,right:0,width:10,height:10,borderRadius:99,background:C.green,border:`2px solid ${C.white}`}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,color:C.text}}>{u.prenom} {u.nom}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{lastMsg?lastMsg.text.slice(0,40)+"…":tt("msg.empty")}</div>
            </div>
            <div style={{textAlign:"right"}}>
              {unread>0&&<div style={{width:20,height:20,borderRadius:99,background:C.blue,color:C.white,fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</div>}
              {lastMsg&&<div style={{fontSize:9,color:C.muted,marginTop:4}}>{new Date(lastMsg.ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function Notifications({user,patients,rdvs,taches,finances}){
  const tt = t; // alias sûr : évite toute collision avec variables locales "t"
  const today=todayStr();
  const notifs=[
    ...rdvs.filter(r=>r.date===today&&(user.role==="admin"||r.assigneA===user.id)).map(r=>{
      const p=patients.find(x=>String(x.id)===String(r.patientId));
      return {id:"rdv_"+r.id,ic:"📅",title:tt("notif.rdvToday"),desc:`${p?.prenom||"?"} ${p?.nom||""} ${tt("date.at")} ${r.heure}`,color:C.blue,ts:r.heure};
    }),
    ...taches.filter(t=>t.echeance===today&&t.statut!=="Terminée"&&(user.role==="admin"||t.assigneA===user.id)).map(t=>({
      id:"tache_"+t.id,ic:"✅",title:tt("notif.taskDueToday"),desc:t.titre,color:C.amber,ts:"now"
    })),
    ...taches.filter(t=>t.echeance<today&&t.statut!=="Terminée"&&(user.role==="admin"||t.assigneA===user.id)).map(t=>({
      id:"late_"+t.id,ic:"⚠️",title:tt("notif.taskLate"),desc:`${t.titre} — ${tt("notif.dueOn")} ${t.echeance}`,color:C.red,ts:t.echeance
    })),
    ...finances.filter(f=>f.date===today&&f.statut==="Complété").map(f=>{
      const p=patients.find(x=>String(x.id)===String(f.patientId));
      if(isSurgeon(user)) return null; return {id:"fin_"+f.id,ic:"💶",title:tt("notif.paymentReceived"),desc:`${p?.prenom||"?"} — ${fmtEur(f.montant)}`,color:C.green,ts:f.date};
    }),
    ...finances.filter(f=>f.statut==="En attente"&&f.date<today).map(f=>{
      const p=patients.find(x=>String(x.id)===String(f.patientId));
      if(isSurgeon(user)) return null; return {id:"debt_"+f.id,ic:"🔴",title:tt("notif.paymentLate"),desc:`${p?.prenom||"?"} — ${fmtEur(f.montant)} ${tt("notif.due")}`,color:C.red,ts:f.date};
    }),
    ...patients.filter(p=>p.cree===today).map(p=>({
      id:"pat_"+p.id,ic:"👤",title:tt("notif.newPatient"),desc:`${p.prenom} ${p.nom} — ${p.procedure}`,color:C.purple,ts:"now"
    })),
    ...patients.filter(p=>p.stade==="Confirmé"&&!finances.some(f=>f.patientId===p.id&&f.type==="Acompte")).map(p=>({
      id:"acc_"+p.id,ic:"💰",__hideSurgeon:true,title:tt("notif.missingDeposit"),desc:`${p.prenom} ${p.nom} — ${tt("notif.confirmedNoDeposit")}`,color:C.amber,ts:"action"
    })),
  ].filter(n=>n && !(isSurgeon(user)&&n.__hideSurgeon)); // chirurgien : notifications financières exclues
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontSize:13,color:C.muted}}>{notifs.length} {tt("nav.notifications").toLowerCase()}</div>
        <div style={{background:C.red,color:C.white,borderRadius:99,padding:"2px 10px",fontSize:11,fontWeight:700}}>{notifs.length}</div>
      </div>
      {notifs.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>{tt("notif.empty")} 🎉</div>}
      {notifs.map(n=>(
        <div key={n.id} style={{background:C.white,borderRadius:14,padding:"14px 16px",marginBottom:8,border:`1px solid ${C.border}`,borderLeft:`4px solid ${n.color}`,display:"flex",alignItems:"flex-start",gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:n.color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{n.ic}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{n.title}</div>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{n.desc}</div>
          </div>
          <div style={{width:8,height:8,borderRadius:99,background:n.color,flexShrink:0,marginTop:6}}/>
        </div>
      ))}
    </div>
  );
}

// ── RECHERCHE GLOBALE ─────────────────────────────────────────────────────────
function RechercheGlobale({patients,rdvs,taches,finances,onSelectPatient}){
  const tt = t; // alias sûr : évite toute collision avec variables locales "t"
  const [q,setQ]=useState("");
  const [cat,setCat]=useState("tous");
  const sq=q.toLowerCase().trim();
  const results=sq.length<2?[]:([
    ...(cat==="tous"||cat==="patients"?patients.filter(p=>`${p.prenom} ${p.nom} ${p.email||""} ${p.tel||""} ${p.procedure||""}`.toLowerCase().includes(sq)).map(p=>({type:"patient",ic:"👤",title:`${p.prenom} ${p.nom}`,sub:`${p.procedure} · ${p.pays}`,color:C.blue,data:p})):[]),
    ...(cat==="tous"||cat==="rdvs"?rdvs.filter(r=>{const p=patients.find(x=>String(x.id)===String(r.patientId));return `${p?.prenom||""} ${p?.nom||""} ${r.type||""} ${r.medecin||""}`.toLowerCase().includes(sq);}).map(r=>{const p=patients.find(x=>String(x.id)===String(r.patientId));return{type:"rdv",ic:"📅",title:`${p?.prenom||"?"} ${p?.nom||""} — ${r.type}`,sub:`${r.date} à ${r.heure}`,color:C.purple,data:r};}):[]),
    ...(cat==="tous"||cat==="taches"?taches.filter(t=>`${t.titre} ${t.description||""}`.toLowerCase().includes(sq)).map(t=>({type:"tache",ic:"✅",title:t.titre,sub:t.description||"—",color:C.amber,data:t})):[]),
    ...(cat==="tous"||cat==="finances"?finances.filter(f=>{const p=patients.find(x=>String(x.id)===String(f.patientId));return `${p?.prenom||""} ${p?.nom||""} ${f.procedure||""}`.toLowerCase().includes(sq);}).map(f=>{const p=patients.find(x=>String(x.id)===String(f.patientId));return{type:"finance",ic:"💶",title:`${p?.prenom||"?"} — ${f.type}`,sub:`${fmtEur(f.montant)} · ${f.date}`,color:C.green,data:f};}):[]),
  ]).slice(0,20);
  return (
    <div>
      <div style={{background:`linear-gradient(135deg,${C.navy},#1a3a5c)`,borderRadius:16,padding:"16px",marginBottom:14}}>
        <div style={{position:"relative"}}>
          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder={"🔍 "+tt("search.globalPlaceholder")} style={{width:"100%",padding:"12px 16px 12px 44px",border:"none",borderRadius:12,fontSize:14,outline:"none",background:"rgba(255,255,255,0.95)",boxSizing:"border-box"}}/>
          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18}}>🔍</span>
          {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:16}}>✕</button>}
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {[{id:"tous",l:tt("common.all")},{id:"patients",l:"👤 "+tt("nav.patients")},{id:"rdvs",l:"📅 "+tt("nav.rdvs")},{id:"taches",l:"✅ "+tt("nav.taches")},{id:"finances",l:"💶 "+tt("nav.finances")}].map(c=>(
          <button key={c.id} onClick={()=>setCat(c.id)} style={{padding:"7px 12px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:11,background:cat===c.id?C.navy:C.bg,color:cat===c.id?C.white:C.muted,flexShrink:0,whiteSpace:"nowrap"}}>
            {c.l}
          </button>
        ))}
      </div>
      {q.length>=2&&results.length===0&&<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:14}}>{tt("common.noResult")} "{q}"</div>}
      {q.length<2&&<div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>{tt("search.minChars")}</div>}
      {results.map((r,i)=>(
        <div key={i} onClick={r.type==="patient"?()=>onSelectPatient(r.data):undefined} style={{background:C.white,borderRadius:12,padding:"12px 14px",marginBottom:6,border:`1px solid ${C.border}`,borderLeft:`3px solid ${r.color}`,cursor:r.type==="patient"?"pointer":"default",display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:9,background:r.color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{r.ic}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{r.title}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>{r.sub}</div>
          </div>
          <Badge text={r.type} color={r.color} small/>
        </div>
      ))}
      {results.length>0&&<div style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:8}}>{results.length} {tt("search.results")}</div>}
    </div>
  );
}
// ── PERMISSIONS — MATRICE RÉUTILISABLE ───────────────────────────────────────
function PermMatrix({value, onChange, readOnly}) {
  const perms = value.perms||{}, scopes = value.scopes||{}, editOwn = value.editOwn||{};
  const Chk = ({on,onClick,color}) => (
    <button onClick={readOnly?undefined:onClick} disabled={readOnly} style={{width:22,height:22,borderRadius:6,border:`1.5px solid ${on?(color||C.green):C.border}`,background:on?(color||C.green):C.white,cursor:readOnly?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontSize:12,fontWeight:800,opacity:readOnly?0.6:1}}>{on?"✓":""}</button>
  );
  const toggle = (mk,ak) => { const cur=perms[mk]||P(0,0,0,0); onChange({perms:{...perms,[mk]:{...cur,[ak]:!cur[ak]}},scopes,editOwn}); };
  const toggleAll = (mk) => { const c=perms[mk]||P(0,0,0,0); const all=c.view&&c.add&&c.edit&&c.delete; onChange({perms:{...perms,[mk]:all?P(0,0,0,0):P(1,1,1,1)},scopes,editOwn}); };
  const setScope = (mk,v) => onChange({perms,scopes:{...scopes,[mk]:v},editOwn});
  const setEO = (mk,v) => onChange({perms,scopes,editOwn:{...editOwn,[mk]:v}});
  const th = {fontSize:10,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:"0.03em",padding:"8px 6px",textAlign:"center",whiteSpace:"nowrap"};
  const td = {padding:"8px 6px",textAlign:"center",borderTop:`1px solid ${C.bg}`};
  return (
    <div style={{overflowX:"auto",border:`1px solid ${C.border}`,borderRadius:12,background:C.white}}>
      <table style={{borderCollapse:"collapse",width:"100%",minWidth:560}}>
        <thead><tr style={{background:C.bg}}>
          <th style={{...th,textAlign:"left",paddingLeft:12,position:"sticky",left:0,background:C.bg}}>{t("team.module")}</th>
          {PERM_ACTIONS.map(a=><th key={a.k} style={th}>{permissionActionLabel(a.l)}</th>)}
          <th style={th}>{t("common.all")}</th>
          <th style={{...th,minWidth:120}}>{t("team.visibility")}</th>
        </tr></thead>
        <tbody>
          {PERM_MODULES.map(m=>{
            const c = perms[m.k]||P(0,0,0,0);
            const all = c.view&&c.add&&c.edit&&c.delete;
            return (
              <tr key={m.k}>
                <td style={{...td,textAlign:"left",paddingLeft:12,position:"sticky",left:0,background:C.white,whiteSpace:"nowrap"}}>
                  <span style={{fontSize:13}}>{m.icon}</span> <span style={{fontSize:12,fontWeight:700,color:C.text}}>{moduleLabel(m.k)}</span>
                  {!m.view&&<span style={{fontSize:8,color:C.muted,marginLeft:4}}>{t("team.reserved")}</span>}
                </td>
                <td style={td}><Chk on={c.view} color={C.blue} onClick={()=>toggle(m.k,"view")}/></td>
                <td style={td}><Chk on={c.add} color={C.green} onClick={()=>toggle(m.k,"add")}/></td>
                <td style={td}><Chk on={c.edit} color={C.amber} onClick={()=>toggle(m.k,"edit")}/></td>
                <td style={td}><Chk on={c.delete} color={C.red} onClick={()=>toggle(m.k,"delete")}/></td>
                <td style={td}><Chk on={all} color={C.navy} onClick={()=>toggleAll(m.k)}/></td>
                <td style={td}>
                  {m.scoped?(
                    <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
                      <select disabled={readOnly} value={scopes[m.k]||"all"} onChange={e=>setScope(m.k,e.target.value)} style={{fontSize:11,padding:"4px 6px",border:`1px solid ${C.border}`,borderRadius:7,background:C.white,color:C.text,outline:"none"}}>
                        {SCOPE_OPTIONS.map(s=><option key={s.v} value={s.v}>{scopeLabel(s.l)}</option>)}
                      </select>
                      <label style={{fontSize:9,color:C.muted,display:"flex",alignItems:"center",gap:3,cursor:readOnly?"default":"pointer"}}>
                        <input type="checkbox" disabled={readOnly} checked={!!editOwn[m.k]} onChange={e=>setEO(m.k,e.target.checked)} style={{accentColor:C.navy}}/> {t("team.editOwn")}
                      </label>
                    </div>
                  ):<span style={{fontSize:11,color:C.border}}>—</span>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── MODAL UTILISATEUR (création / édition) ───────────────────────────────────
function ModalUser({admin, target, onClose, onApplied}) {
  const tt = t; // alias sûr : évite toute collision avec variables locales "t"
  const isNew = !target;
  const seed = target || {id:"", prenom:"", nom:"", email:"", password:"", telephone:"", fonction:"", photo:"", role:"commerciale", statut:"Actif", color:ROLE_COLORS.commerciale};
  const [f,setF] = useState({...seed});
  const ov = !isNew ? (RBAC.overrides[target.id]||{}) : {};
  const [customPerms,setCustomPerms] = useState(!isNew && !!ov.perms);
  const initialPV = () => {
    const base = (ov.perms) ? {perms:ov.perms, scopes:ov.scopes||{}, editOwn:ov.editOwn||{}} : rolePerms(f.role);
    return JSON.parse(JSON.stringify({perms:base.perms||{}, scopes:base.scopes||{}, editOwn:base.editOwn||{}}));
  };
  const [pv,setPv] = useState(initialPV());
  const ch = (k,v) => setF(x=>({...x,[k]:v}));
  const inp = {width:"100%",padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:"#F8FAFC",boxSizing:"border-box",color:C.text};
  const lbl = {fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:5};
  const isSelf = !isNew && target.id===admin.id;
  const lockedRole = !isNew && (target.id===admin.id);

  const save = () => {
    if(!f.prenom.trim()||!f.email.trim()){ alert(tt("team.nameEmailRequired")); return; }
    if(isNew && !f.password.trim()){ alert(tt("team.setPassword")); return; }
    if(isNew && USERS.find(u=>u.email.toLowerCase()===f.email.trim().toLowerCase())){ alert(tt("team.emailExists")); return; }
    const id = isNew ? ("u"+uid().slice(-6)) : f.id;
    const u = { ...f, id, email:f.email.trim(), color:f.color||ROLE_COLORS[f.role]||C.navy, statut:f.statut||"Actif",
      access: undefined,
      permsOverride: customPerms?pv.perms:undefined,
      scopesOverride: customPerms?pv.scopes:undefined,
      editOwnOverride: customPerms?pv.editOwn:undefined };
    if(!customPerms){ // retirer toute personnalisation existante
      const o = cfgStore.load("overrides")||{}; if(o[id]){ delete o[id].perms; delete o[id].scopes; delete o[id].editOwn; cfgStore.save("overrides",o); RBAC.overrides=o; }
    }
    saveUserConfig(admin.id, u, isNew);
    onApplied(); onClose();
  };
  const del = () => {
    if(isSelf){ alert(tt("team.cannotDeleteSelf")); return; }
    if(target.role==="admin"){ alert(tt("team.cannotDeleteAdmin")); return; }
    if(!window.confirm(`${tt("team.deletePermanently")} ${target.prenom} ${target.nom} ?`)) return;
    deleteUserConfig(admin.id, target.id); onApplied(); onClose();
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.7)",zIndex:1200,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div className="slide-up" style={{background:C.bg,borderRadius:"20px 20px 0 0",padding:"8px 18px 26px",width:"100%",maxWidth:560,maxHeight:"94vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
        <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"12px auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:17,fontWeight:800,color:C.text}}>{isNew?"➕ "+tt("team.newUser"):`✏️ ${target.prenom} ${target.nom}`}</div>
          <button onClick={onClose} style={{border:"none",background:C.border,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>✕</button>
        </div>

        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={lbl}>{tt("patient.firstname")} *</label><input style={inp} value={f.prenom} onChange={e=>ch("prenom",e.target.value)}/></div>
            <div><label style={lbl}>{tt("patient.lastname")}</label><input style={inp} value={f.nom} onChange={e=>ch("nom",e.target.value)}/></div>
          </div>
          <div style={{marginBottom:10}}><label style={lbl}>{tt("team.function")}</label><input style={inp} value={f.fonction} onChange={e=>ch("fonction",e.target.value)} placeholder={tt("team.functionPlaceholder")}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={lbl}>{tt("patient.email")} *</label><input style={inp} type="email" value={f.email} onChange={e=>ch("email",e.target.value)}/></div>
            <div><label style={lbl}>{tt("team.phone")}</label><input style={inp} value={f.telephone||""} onChange={e=>ch("telephone",e.target.value)}/></div>
          </div>
          <div style={{marginBottom:10}}><label style={lbl}>{tt("team.photoUrl")}</label><input style={inp} value={f.photo||""} onChange={e=>ch("photo",e.target.value)} placeholder="https://…"/></div>
          {isNew&&<div><label style={lbl}>{tt("login.password")} *</label><input style={inp} value={f.password||""} onChange={e=>ch("password",e.target.value)} placeholder={tt("team.loginPasswordPlaceholder")}/></div>}
        </div>

        {/* Rôle + Statut */}
        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
          <label style={lbl}>{tt("team.role")}</label>
          {lockedRole?(
            <div style={{fontSize:13,fontWeight:700,color:C.navy,padding:"6px 0"}}>{roleLabel(f.role)} — {tt("team.locked")}</div>
          ):(
            <select style={{...inp,marginBottom:12}} value={f.role} onChange={e=>{const r=e.target.value;ch("role",r);ch("color",ROLE_COLORS[r]||C.navy);if(!customPerms)setPv(JSON.parse(JSON.stringify({perms:rolePerms(r).perms||{},scopes:rolePerms(r).scopes||{},editOwn:rolePerms(r).editOwn||{}})));}}>
              {Object.keys(RBAC.roles).map(rid=><option key={rid} value={rid}>{roleLabel(rid)||RBAC.roles[rid].label||rid}</option>)}
            </select>
          )}
          <label style={lbl}>{tt("team.accountStatus")}</label>
          <div style={{display:"flex",gap:8}}>
            {["Actif","Inactif"].map(s=>(
              <button key={s} disabled={isSelf} onClick={()=>ch("statut",s)} style={{flex:1,padding:"9px",border:`1.5px solid ${f.statut===s?(s==="Actif"?C.green:C.red):C.border}`,borderRadius:10,cursor:isSelf?"not-allowed":"pointer",fontWeight:f.statut===s?700:400,background:f.statut===s?(s==="Actif"?C.green+"12":C.red+"12"):C.white,color:f.statut===s?(s==="Actif"?C.green:C.red):C.muted,fontSize:12,opacity:isSelf?0.6:1}}>
                {s==="Actif"?"🟢 "+tt("common.active"):"🔴 "+tt("common.inactive")}
              </button>
            ))}
          </div>
        </div>

        {/* Permissions personnalisées */}
        {!lockedRole&&<div style={{background:C.white,borderRadius:14,padding:14,marginBottom:14}}>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:customPerms?12:0}}>
            <div onClick={()=>setCustomPerms(x=>!x)} style={{width:42,height:24,borderRadius:99,background:customPerms?C.navy:C.border,position:"relative",transition:"all 0.15s",flexShrink:0}}>
              <div style={{width:18,height:18,borderRadius:99,background:C.white,position:"absolute",top:3,left:customPerms?21:3,transition:"all 0.15s"}}/>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>{tt("team.customPermissions")}</div>
              <div style={{fontSize:11,color:C.muted}}>{customPerms?tt("team.hasOwnRights"):tt("team.usesDefaultRights")}</div>
            </div>
          </label>
          {customPerms&&<PermMatrix value={pv} onChange={setPv}/>}
        </div>}

        {/* Boutons */}
        <div style={{display:"flex",gap:10}}>
          {!isNew&&<button onClick={del} style={{flex:1,padding:12,border:`1px solid ${C.red}55`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.red,fontSize:13}}>🗑 {tt("common.delete")}</button>}
          <button onClick={onClose} style={{flex:1,padding:12,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted,fontSize:13}}>{tt("common.cancel")}</button>
          <button onClick={save} style={{flex:2,padding:12,border:"none",borderRadius:12,background:C.green,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>✅ {tt("common.save")}</button>
        </div>
      </div>
    </div>
  );
}

// ── ADMINISTRATION : GESTION UTILISATEURS & PERMISSIONS ──────────────────────
function GestionUtilisateurs({user, onApplied, permVer}) {
  const tt = t; // alias sûr : évite toute collision avec variables locales "t"
  const [tab,setTab] = useState("users");
  const [modalUser,setModalUser] = useState(undefined); // undefined=fermé, null=new, obj=edit
  const [roleSel,setRoleSel] = useState("commerciale");
  const [rolePv,setRolePv] = useState(()=>JSON.parse(JSON.stringify({perms:rolePerms("commerciale").perms||{},scopes:rolePerms("commerciale").scopes||{},editOwn:rolePerms("commerciale").editOwn||{}})));
  const [toast,setToast] = useState("");
  const flash = (m)=>{ setToast(m); setTimeout(()=>setToast(""),2500); };

  if(!isFullRole(user.role)) return <div style={{textAlign:"center",padding:50,color:C.muted}}>🔒 {tt("team.adminOnly")}</div>;

  const users = allUsers();
  const selectRole = (rid) => { setRoleSel(rid); setRolePv(JSON.parse(JSON.stringify({perms:rolePerms(rid).perms||{},scopes:rolePerms(rid).scopes||{},editOwn:rolePerms(rid).editOwn||{}}))); };
  const saveRole = () => {
    const r = RBAC.roles[roleSel]||{};
    setRoleConfig(user.id, roleSel, {...r, label:r.label||ROLE_LABELS[roleSel]||roleSel, color:r.color||ROLE_COLORS[roleSel], system:r.system, perms:rolePv.perms, scopes:rolePv.scopes, editOwn:rolePv.editOwn});
    onApplied(); flash("✅ "+tt("team.roleUpdated"));
  };
  const resetRole = () => {
    if(!DEFAULT_ROLES[roleSel]){ flash(tt("team.noDefaultValue")); return; }
    if(!window.confirm(tt("team.resetRoleConfirm"))) return;
    setRolePv(JSON.parse(JSON.stringify({perms:DEFAULT_ROLES[roleSel].perms||{},scopes:DEFAULT_ROLES[roleSel].scopes||{},editOwn:DEFAULT_ROLES[roleSel].editOwn||{}})));
    setRoleConfig(user.id, roleSel, DEFAULT_ROLES[roleSel]);
    onApplied(); flash("↩️ "+tt("team.roleReset"));
  };

  const toggleActive = (u) => {
    if(u.id===user.id){ flash(tt("team.cannotDisableSelf")); return; }
    const ns = userStatut(u)==="Actif"?"Inactif":"Actif";
    saveUserConfig(user.id, {...u, statut:ns}, false); onApplied(); flash(ns==="Actif"?"🟢 "+tt("team.accountActivated"):"🔴 "+tt("team.accountDeactivated"));
  };

  const tabBtn = (id,label) => (
    <button onClick={()=>setTab(id)} style={{flex:1,padding:"9px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:12,background:tab===id?user.color:C.bg,color:tab===id?C.white:C.muted}}>{label}</button>
  );
  const log = permLog().slice().reverse();
  const fullRole = isFullRole(roleSel);

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {tabBtn("users","👥 "+tt("nav.utilisateurs"))}
        {tabBtn("roles","🔐 "+tt("team.rolesPermissions"))}
        {tabBtn("log","📜 "+tt("team.log"))}
      </div>

      {tab==="users"&&<>
        <button onClick={()=>setModalUser(null)} style={{width:"100%",padding:"11px",border:"none",borderRadius:10,background:user.color,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13,marginBottom:14}}>+ {tt("team.newUser")}</button>
        {users.map(u=>{
          const actif = userStatut(u)==="Actif";
          return (
            <Card key={u.id} style={{padding:"12px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {u.photo?<img src={u.photo} alt="" style={{width:42,height:42,borderRadius:13,objectFit:"cover",flexShrink:0}}/>:<Avatar p={{prenom:u.prenom,nom:u.nom}} size={42} color={u.color}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontWeight:800,fontSize:14,color:C.text}}>{u.prenom} {u.nom}</span>
                    <Badge text={roleLabel(u.role)||RBAC.roles[u.role]?.label||u.role} color={u.color||ROLE_COLORS[u.role]||C.navy} small/>
                    <span style={{fontSize:10,fontWeight:800,color:actif?C.green:C.red,background:(actif?C.green:C.red)+"15",padding:"1px 8px",borderRadius:99}}>{actif?tt("common.active"):tt("common.inactive")}</span>
                  </div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{(u.fonction && u.fonction!==(RBAC.roles[u.role]?.label||ROLE_LABELS[u.role]))?`${u.fonction} · `:""}{u.email}{u.telephone?` · ${u.telephone}`:""}</div>
                  {RBAC.overrides[u.id]?.perms&&<div style={{fontSize:10,color:C.purple,fontWeight:700,marginTop:2}}>⚙️ {tt("team.customPermissions")}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
                  <button onClick={()=>setModalUser(u)} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:12}} title={tt("common.edit")}>✏️</button>
                  <button onClick={()=>toggleActive(u)} disabled={u.id===user.id} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,padding:"5px 8px",cursor:u.id===user.id?"not-allowed":"pointer",fontSize:12,opacity:u.id===user.id?0.4:1}} title={actif?tt("team.deactivate"):tt("team.activate")}>{actif?"⏸️":"▶️"}</button>
                </div>
              </div>
            </Card>
          );
        })}
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>{users.length} {tt("team.usersCount")}</div>
      </>}

      {tab==="roles"&&<>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
          {Object.keys(RBAC.roles).map(rid=>(
            <button key={rid} onClick={()=>selectRole(rid)} style={{padding:"7px 12px",borderRadius:99,border:`1.5px solid ${roleSel===rid?(RBAC.roles[rid].color||C.navy):C.border}`,background:roleSel===rid?(RBAC.roles[rid].color||C.navy)+"12":C.white,color:roleSel===rid?(RBAC.roles[rid].color||C.navy):C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>
              {roleLabel(rid)||RBAC.roles[rid].label||rid}
            </button>
          ))}
        </div>
        {fullRole?(
          <Card style={{textAlign:"center",padding:30}}>
            <div style={{fontSize:30,marginBottom:8}}>👑</div>
            <div style={{fontWeight:800,color:C.text,marginBottom:4}}>{roleLabel(roleSel)||RBAC.roles[roleSel].label} — {tt("team.fullAccess")}</div>
            <div style={{fontSize:12,color:C.muted}}>{tt("team.fullAccessDesc")}</div>
          </Card>
        ):(
          <>
            <div style={{fontSize:12,color:C.muted,marginBottom:8}}>{tt("team.checkRightsDesc")}</div>
            <PermMatrix value={rolePv} onChange={setRolePv}/>
            <div style={{display:"flex",gap:10,marginTop:12}}>
              <button onClick={resetRole} style={{flex:1,padding:11,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted,fontSize:13}}>↩️ {tt("common.reset")}</button>
              <button onClick={saveRole} style={{flex:2,padding:11,border:"none",borderRadius:12,background:C.green,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>✅ {tt("team.saveRole")}</button>
            </div>
          </>
        )}
      </>}

      {tab==="log"&&<>
        {log.length===0?<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:13}}>{tt("team.noActivity")}</div>:
        <Card style={{padding:"6px 14px"}}>
          {log.map((e,i)=>{
            const by=USERS.find(u=>u.id===e.by);
            const cibleName = e.cibleType==="user" ? (USERS.find(u=>u.id===e.cible)?`${USERS.find(u=>u.id===e.cible).prenom}`:e.cible) : (roleLabel(e.cible)||RBAC.roles[e.cible]?.label||e.cible);
            return (
              <div key={e.id||i} style={{display:"flex",gap:10,padding:"10px 0",borderBottom:i<log.length-1?`1px solid ${C.bg}`:"none"}}>
                <div style={{width:6,height:6,borderRadius:99,background:by?.color||C.muted,marginTop:6,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:C.text}}>
                    <b>{by?.prenom||e.by}</b> · {e.cibleType==="user"?"👤":"🔐"} <b>{cibleName}</b> — {e.champ} :{" "}
                    <span style={{color:C.muted,textDecoration:"line-through"}}>{e.ancien||"—"}</span> → <span style={{color:C.green,fontWeight:700}}>{e.nouveau||"—"}</span>
                  </div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{e.date} à {e.heure}</div>
                </div>
              </div>
            );
          })}
        </Card>}
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>{log.length} entrée(s) · journal local</div>
      </>}

      {modalUser!==undefined&&<ModalUser admin={user} target={modalUser} onClose={()=>setModalUser(undefined)} onApplied={()=>{onApplied();flash(modalUser?"✅ Utilisateur mis à jour":"✅ Utilisateur créé avec succès");}}/>}
      {toast&&<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:C.navy,color:C.white,padding:"10px 20px",borderRadius:99,fontSize:13,fontWeight:700,zIndex:1300,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",whiteSpace:"nowrap"}}>{toast}</div>}
    </div>
  );
}


function App() {
  const [user,setUser] = useState(()=>{
    try{ const s=localStorage.getItem("cn_user"); return s?JSON.parse(s):null; }catch(e){return null;}
  });
  const [lang,setLangState] = useState(CURRENT_LANG);
  const changeLang = (code)=>{ setLang(code); setLangState(code); };
  const [view,setView] = useState("dashboard");
  const [patients,setPatients] = useState(()=>cache.load("patients")||[]);
  const [rdvs,setRdvs] = useState(()=>cache.load("rdvs")||[]);
  const [finances,setFinances] = useState(()=>cache.load("finances")||[]);
  const [taches,setTaches] = useState(()=>cache.load("taches")||[]);
  const [hopitaux,setHopitaux] = useState(()=>{
    // Migration : supprimer les anciens hôpitaux et utiliser les nouveaux
    const cached = cache.load("hopitaux");
    const ANCIENS = ["Medicana International","Memorial Hospital","Acibadem","Dental Plus Clinic"];
    const NOUVEAUX = ["Avrasya Hospital","Scala Clinic","VSC Fişekhane Dental"];
    if(cached && cached.some(h=>ANCIENS.includes(h.nom))){
      // Réinitialiser avec les nouveaux hôpitaux
      localStorage.removeItem("cn2_hopitaux");
      return [];
    }
    return cached||[];
  });
  // Don't show loading if we have cached data
  const [loading,setLoading] = useState(()=>!(cache.load("patients")));
  const finLoadedRef = React.useRef(!!cache.load("finances")); // finances en lazy-load
  const [syncing,setSyncing] = useState(false);
  const [loadError,setLoadError] = useState(null);
  const [saveStatus,setSaveStatus] = useState("saved"); // "saved" | "saving" | "unsaved"
  const [pendingSaves,setPendingSaves] = useState([]);
  const [modal,setModal] = useState(null);
  const [selected,setSelected] = useState(null);
  const [menuOpen,setMenuOpen] = useState(false);
  const [permVer,setPermVer] = useState(0); // incrémenté à chaque changement de permissions → re-rendu live
  const applyRBAC = () => { setPermVer(v=>v+1); };

  // ── NAVIGATION INTERNE (pile back/forward type application native) ──────────
  const navRef = React.useRef(null);
  const restoringRef = React.useRef(false);
  const allowExitRef = React.useRef(false);
  const liveRef = React.useRef({});
  liveRef.current = {patients, rdvs, finances};
  const [navState,setNavState] = useState({canBack:false, canFwd:false});
  const [quitOpen,setQuitOpen] = useState(false);

  const navSnap = () => ({
    view, selectedId: selected?selected.id:null,
    modal: modal ? {type:modal.type, dataId: modal.data?modal.data.id:null} : null,
    scroll: (typeof window!=="undefined"?window.scrollY:0),
  });
  const sameSnap = (a,b) => !!a && !!b && a.view===b.view && (a.selectedId||null)===(b.selectedId||null) && JSON.stringify(a.modal||null)===JSON.stringify(b.modal||null);
  const findRec = (type,id) => { if(!id) return null; const L=liveRef.current||{}; const arr = type==="rdv"?L.rdvs:type==="finance"?L.finances:L.patients; return (arr||[]).find(x=>String(x.id)===String(id))||null; };
  const applySnap = (s) => {
    restoringRef.current = true;
    setView(s.view);
    setSelected(s.selectedId ? findRec("patient", s.selectedId) : null);
    setModal(s.modal ? {type:s.modal.type, data: s.modal.dataId ? findRec(s.modal.type, s.modal.dataId) : null} : null);
    setMenuOpen(false);
    requestAnimationFrame(()=>{ try{ window.scrollTo(0, s.scroll||0); }catch(e){} });
  };
  const updateNavButtons = () => { const n=navRef.current; if(n) setNavState({canBack:n.idx>0, canFwd:n.idx<n.stack.length-1}); };
  const goBack = () => { const n=navRef.current; if(n&&n.idx>0){ try{history.back();}catch(e){} } else { setQuitOpen(true); } };
  const goForward = () => { const n=navRef.current; if(n&&n.idx<n.stack.length-1){ try{history.forward();}catch(e){} } };
  const confirmQuit = () => { allowExitRef.current=true; setQuitOpen(false); const n=navRef.current; try{ history.go(-((n?n.idx:0)+2)); }catch(e){} };

  // Initialisation + interception du retour (navigateur / Android / geste iPhone)
  useEffect(()=>{
    if(!user) return;
    try{ history.replaceState({cnIdx:0}, ""); }catch(e){}
    navRef.current = { stack:[navSnap()], idx:0 };
    updateNavButtons();
    const onPop = (e) => {
      const n = navRef.current; if(!n) return;
      if(allowExitRef.current) return; // sortie volontaire confirmée
      const target = (e.state && typeof e.state.cnIdx==="number") ? e.state.cnIdx : -1;
      if(target < 0){ // tentative de sortie → on reste et on demande confirmation
        try{ history.pushState({cnIdx:n.idx}, ""); }catch(_){}
        setQuitOpen(true);
        return;
      }
      n.idx = Math.min(target, n.stack.length-1);
      applySnap(n.stack[n.idx]);
      updateNavButtons();
    };
    const onScroll = () => { const n=navRef.current; if(n&&n.stack[n.idx]) n.stack[n.idx].scroll = window.scrollY; };
    window.addEventListener("popstate", onPop);
    window.addEventListener("scroll", onScroll, {passive:true});
    return ()=>{ window.removeEventListener("popstate", onPop); window.removeEventListener("scroll", onScroll); };
  },[user]);

  // Enregistre chaque navigation (page, fiche, modal) dans la pile interne
  useEffect(()=>{
    if(!navRef.current) return;
    if(restoringRef.current){ restoringRef.current=false; updateNavButtons(); return; }
    const n = navRef.current;
    const s = navSnap();
    if(sameSnap(s, n.stack[n.idx])) return;
    n.stack[n.idx] = {...n.stack[n.idx], scroll: (typeof window!=="undefined"?window.scrollY:0)};
    n.stack = n.stack.slice(0, n.idx+1);
    n.stack.push(s);
    n.idx++;
    try{ history.pushState({cnIdx:n.idx}, ""); }catch(e){}
    updateNavButtons();
    if(!modal) requestAnimationFrame(()=>{ try{ window.scrollTo(0,0); }catch(e){} });
  },[view, selected, modal]);

  // Au montage : le cache est déjà affiché (états initialisés depuis cache.load).
  // On lance la synchro EN ARRIÈRE-PLAN sans bloquer l'interface.
  useEffect(()=>{ if(user) loadAll(false); },[user]);

  // Charge les finances à la demande (module Finances/Analyses) — une seule fois.
  const ensureFinances = async () => {
    if(finLoadedRef.current) return;
    finLoadedRef.current = true;
    try {
      const f = await api.get("finances");
      const finances_data = f.filter(x=>x.type);
      setFinances(finances_data);
      cache.save("finances", finances_data);
    } catch(e){ finLoadedRef.current = false; /* on réessaiera à la prochaine ouverture */ }
  };

  // loadAll(showLoad) : showLoad=true seulement pour "Synchroniser maintenant".
  // En arrière-plan (showLoad=false) l'écran reste sur le cache, mis à jour à l'arrivée des données.
  const loadAll = async (showLoad=true) => {
    if(showLoad) setLoading(true);
    setLoadError(null);
    setSyncing(true);
    try {
      // Finances retirées du chargement initial (lazy) — sauf si déjà chargées/ouvertes.
      const calls = [api.get("patients"), api.get("rdvs"), api.get("taches"), api.get("users")];
      if(finLoadedRef.current) calls.push(api.get("finances"));
      const [p,r,tData,u,f] = await Promise.all(calls);
      const patients_data = p.filter(x=>x.prenom);
      const rdvs_data = r.filter(x=>x.id);
      const taches_data = tData.filter(x=>x.titre);
      setPatients(patients_data);
      setRdvs(rdvs_data);
      setTaches(taches_data);
      cache.save("patients", patients_data);
      cache.save("rdvs", rdvs_data);
      cache.save("taches", taches_data);
      if(f){ const finances_data = f.filter(x=>x.type); setFinances(finances_data); cache.save("finances", finances_data); }
      if(Array.isArray(u) && u.length){ mergeServerUsers(u); setPermVer(v=>v+1); }
      try{ localStorage.setItem("cn_lastSync", String(Date.now())); }catch(_){}
    } catch(e) {
      console.log("Network error, keeping cache data", e);
      const hasCache = cache.load("rdvs") || cache.load("patients");
      if(!hasCache){ setLoadError(t("rdv.loadError")); }
    }
    if(showLoad) setLoading(false);
    setSyncing(false);
  };

  const syncPost = async (type, action, record) => {
    setSyncing(true);
    setSaveStatus("saving");
    try {
      await api.post(type, action, record);
      setSaveStatus("saved");
    } catch(e) {
      console.error("Sync error:", e);
      setSaveStatus("unsaved");
    }
    setSyncing(false);
    setTimeout(()=>setSaveStatus("saved"), 5000);
  };

  // Manual sync - reload from Google Sheets
  const manualSave = async () => {
    setSaveStatus("saving");
    setSyncing(true);
    try {
      await loadAll(false);
      setSaveStatus("saved");
      alert("✅ Données synchronisées avec Google Sheets !");
    } catch(e) {
      setSaveStatus("unsaved");
      alert("❌ Erreur réseau. Les données locales sont préservées.");
    }
    setSyncing(false);
  };

  // Force sync - vide le cache local et recharge tout depuis Google Sheets
  const forceSync = async () => {
    if(!window.confirm("Vider le cache local et recharger toutes les données depuis Google Sheets ?")) return;
    ["patients","rdvs","finances","taches"].forEach(k => {
      try { localStorage.removeItem("cn_cache_"+k); } catch(e){}
    });
    setPatients([]); setRdvs([]); setFinances([]); setTaches([]);
    setSaveStatus("saving");
    setSyncing(true);
    setLoading(true);
    try {
      const [p,r,f,t] = await Promise.all([
        api.get("patients"), api.get("rdvs"), api.get("finances"), api.get("taches")
      ]);
      const pd = p.filter(x=>x.prenom);
      const rd = r.filter(x=>x.type);
      const fd = f.filter(x=>x.type);
      const td = t.filter(x=>x.titre);
      setPatients(pd); setRdvs(rd); setFinances(fd); setTaches(td);
      cache.save("patients",pd); cache.save("rdvs",rd);
      cache.save("finances",fd); cache.save("taches",td);
      setSaveStatus("saved");
      alert(`✅ Synchronisation complète !\n${pd.length} patients · ${rd.length} RDV · ${td.length} tâches`);
    } catch(e) {
      setSaveStatus("unsaved");
      alert("❌ Erreur réseau. Vérifiez votre connexion.");
    }
    setSyncing(false);
    setLoading(false);
  };

  const savePatient = async (f) => {
    if(f.id){
      const updated = {...f,dernierContact:todayStr()};
      setPatients(ps=>{
        const newPs = ps.map(p=>p.id===f.id?{...p,...updated}:p);
        cache.save("patients", newPs);
        return newPs;
      });
      await syncPost("patients","update",updated);
    } else {
      const n={...f,id:uid(),cree:todayStr(),dernierContact:todayStr(),creePar:user.id};
      setPatients(ps=>{
        const newPs=[...ps,n];
        cache.save("patients", newPs);
        return newPs;
      });
      await syncPost("patients","add",n);
    }
    setModal(null);
  };
  const deletePatient = async (id) => {
    setPatients(ps=>{const np=ps.filter(p=>p.id!==id);cache.save("patients",np);return np;});
    await syncPost("patients","delete",{id});
    setSelected(null); setView("patients");
  };
  const changeStage = async (id,stade) => {
    const p=patients.find(x=>x.id===id); if(!p) return;
    const u={...p,stade,dernierContact:todayStr()};
    setPatients(ps=>{const np=ps.map(x=>x.id===id?u:x);cache.save("patients",np);return np;});
    await syncPost("patients","update",u);
  };
  const saveRdv = async (f) => {
    if(!f.patientId||!f.date||!f.heure) { alert(t("rdv.requiredFields")); return; }
    // Validation stricte : la date DOIT être au format YYYY-MM-DD réel
    const cleanDate = normalizeDate(f.date);
    if(!cleanDate) { alert(t("rdv.invalidDate")); return; }
    const cleanHeure = normalizeHeure(f.heure) || f.heure;
    const n={...f, date:cleanDate, heure:cleanHeure, id:uid(), creePar:user.id};
    setRdvs(rs=>{const nr=[...rs,n];cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","add",n);
    setModal(null);
  };
  const updateRdv = async (f) => {
    const cleanDate = normalizeDate(f.date);
    if(f.date && !cleanDate) { alert(t("rdv.invalidDate")); return; }
    const fixed = {...f, date:cleanDate||f.date, heure:normalizeHeure(f.heure)||f.heure};
    setRdvs(rs=>{const nr=rs.map(r=>r.id===fixed.id?{...r,...fixed}:r);cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","update",fixed);
    setModal(null);
  };
  const deleteRdv = async (id) => {
    if(!window.confirm(t("rdv.deleteConfirm"))) return;
    setRdvs(rs=>{const nr=rs.filter(r=>r.id!==id);cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","delete",{id});
  };
  const duplicateRdvApp = async (r) => {
    const copy = {...r, id:uid(), statut:"Planifié", historique:JSON.stringify([])};
    setRdvs(rs=>{const nr=[...rs,copy];cache.save("rdvs",nr);return nr;});
    await syncPost("rdvs","add",copy);
    setModal(null);
  };
  const openPatientById = (pid) => {
    const p = patients.find(x=>String(x.id)===String(pid));
    if(p){ setSelected(p); setView("patients"); setModal(null); }
    else alert("Fiche patient introuvable.");
  };
  const saveFinance = async (f) => {
    if(!f.montant) { alert(t("finance.amountRequired")); return; }
    const n={...f,id:uid(),creePar:user.id};
    setFinances(fs=>{const nf=[...fs,n];cache.save("finances",nf);return nf;});
    await syncPost("finances","add",n);
    setModal(null);
  };
  const updateFinance = async (f) => {
    setFinances(fs=>{const nf=fs.map(x=>x.id===f.id?{...x,...f}:x);cache.save("finances",nf);return nf;});
    await syncPost("finances","update",f);
    setModal(null);
  };
  const deleteFinance = async (id) => {
    if(!window.confirm(t("finance.deleteConfirm"))) return;
    setFinances(fs=>{const nf=fs.filter(f=>f.id!==id);cache.save("finances",nf);return nf;});
    await syncPost("finances","delete",{id});
  };

  const navUser = USERS.find(u2=>u2.id===user?.id)||user;
  const NAV_ITEMS = [
    {id:"dashboard",label:t("nav.dashboard"),icon:"🏠"},
    {id:"equipe",label:t("nav.equipe"),icon:"👁️"},
    {id:"patients",label:t("nav.patients"),icon:"👥"},
    {id:"rdvs",label:t("nav.rdvs"),icon:"📅"},
    {id:"taches",label:t("nav.taches"),icon:"✅"},
    {id:"agenda",label:t("nav.agenda"),icon:"🗓️"},
    {id:"finances",label:t("nav.finances"),icon:"💳"},
    {id:"analyses",label:t("nav.analyses"),icon:"📈"},
    {id:"messagerie",label:t("nav.messagerie"),icon:"💬"},
    {id:"notifications",label:t("nav.notifications"),icon:"🔔"},
    {id:"recherche",label:t("nav.recherche"),icon:"🔍"},
    {id:"hopitaux",label:t("nav.hopitaux"),icon:"🏥"},
    {id:"medecins",label:t("nav.medecins"),icon:"🩺"},
    {id:"utilisateurs",label:t("nav.utilisateurs"),icon:"🔐"},
  ].filter(n=> n.id==="dashboard" || (navUser && can(navUser, n.id, "view")));

  const goTo = v => { setView(v); setSelected(null); setMenuOpen(false); };
  const logout = () => {
    if(!window.confirm("Êtes-vous sûr de vouloir vous déconnecter ?")) return;
    // Fermer la session et nettoyer
    try {
      localStorage.removeItem("cn_user");
      localStorage.removeItem("cn2_user");
      setAuthToken("");
    } catch(e){}
    setMenuOpen(false);
    setSelected(null);
    setView("dashboard");
    setUser(null); // redirige vers la page de connexion
  };
  const activeView = selected?"fiche":view;
  const TITLES = {dashboard:t("title.dashboard"),equipe:t("title.equipe")+" — Veys Turan "+t("role.pdg"),patients:t("title.patients"),rdvs:t("title.rdvs"),taches:t("title.taches"),agenda:t("title.agenda"),analyses:t("title.analyses"),finances:t("title.finances"),hopitaux:t("title.hopitaux"),medecins:t("title.medecins"),messagerie:t("title.messagerie"),notifications:t("title.notifications"),recherche:t("title.recherche"),utilisateurs:t("title.utilisateurs")};

  if(!user) return <LoginScreen lang={lang} onLangChange={changeLang} onLogin={u=>{const full=USERS.find(x=>x.id===u.id)||u; setUser(full);}} />;

  const userFull = USERS.find(u2=>u2.id===user.id)||user;

  // ── Visibilité des données (mes / équipe / toutes) appliquée en direct ──
  const _pv = permVer; // dépendance : recalcule à chaque changement de permissions
  const vPatients = scopeArray(patients, userFull, "patients");
  const vRdvs     = scopeArray(rdvs, userFull, "rdvs");
  const vTaches   = scopeArray(taches, userFull, "taches");
  const vFinances = scopeArray(finances, userFull, "finances");

  // ── Garde d'accès aux vues ──
  const viewKey = activeView==="fiche" ? "patients" : activeView;
  const viewAllowed = activeView==="dashboard" || can(userFull, viewKey, "view");
  // Chargement paresseux des finances quand on ouvre un module qui en a besoin
  useEffect(()=>{ if(activeView==="finances"||activeView==="analyses") ensureFinances(); },[activeView]);
  const AccessDenied = () => (
    <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
      <div style={{fontSize:42,marginBottom:12}}>🔒</div>
      <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:6}}>{t("common.accessDenied")}</div>
      <div style={{fontSize:13}}>{t("common.noPermission")}<br/>{t("common.contactAdmin")}</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:C.bg,width:"100%",maxWidth:"100%",overflowX:"hidden",position:"relative"}}>
      {/* TOP BAR MOBILE */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"0 12px",height:56,display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(11,31,58,0.08)",width:"100%",maxWidth:"100%",boxSizing:"border-box"}}>
        <button onClick={()=>setMenuOpen(x=>!x)} style={{border:"none",background:"none",cursor:"pointer",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,flexShrink:0}}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <div style={{width:20,height:2,background:C.navy,borderRadius:99}}/>
            <div style={{width:14,height:2,background:C.navy,borderRadius:99}}/>
            <div style={{width:20,height:2,background:C.navy,borderRadius:99}}/>
          </div>
        </button>
        {/* Navigation interne ← / → (type application native) */}
        <div style={{display:"flex",gap:2,flexShrink:0}}>
          <button onClick={goBack} title="Retour" style={{border:"none",background:navState.canBack?C.navy+"10":"transparent",cursor:"pointer",width:32,height:32,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:navState.canBack?C.navy:"#C7CFDA",fontWeight:800}}>‹</button>
          <button onClick={goForward} disabled={!navState.canFwd} title="Suivant" style={{border:"none",background:navState.canFwd?C.navy+"10":"transparent",cursor:navState.canFwd?"pointer":"default",width:32,height:32,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:navState.canFwd?C.navy:"#C7CFDA",fontWeight:800}}>›</button>
        </div>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
          <img src="https://i.ibb.co/b5k523qC/image.jpg" style={{width:30,height:30,borderRadius:8,objectFit:"contain"}} alt="CN"/>
          <span style={{fontWeight:800,fontSize:15,color:C.navy}}>Clinic Nobel</span>
        </div>
        <button onClick={manualSave} style={{border:"none",borderRadius:20,cursor:"pointer",fontSize:11,padding:"6px 10px",background:saveStatus==="saved"?C.green+"18":saveStatus==="saving"?C.amber+"18":"#fee2e2",color:saveStatus==="saved"?C.green:saveStatus==="saving"?C.amber:C.red,fontWeight:700,display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          <span style={{fontSize:12}}>{saveStatus==="saving"?"⏳":saveStatus==="saved"?"✅":"💾"}</span>
          <span style={{display:"none",fontSize:11}}>{saveStatus==="saving"?"Sync…":saveStatus==="saved"?"OK":"Sauv."}</span>
        </button>
        <button onClick={()=>goTo("recherche")} style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>🔍</button>
        <button onClick={()=>goTo("notifications")} style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,position:"relative"}}>
          🔔
          {(taches.filter(t=>t.echeance<=todayStr()&&t.statut!=="Terminée"&&(userFull.role==="admin"||t.assigneA===userFull.id)).length+rdvs.filter(r=>r.date===todayStr()).length)>0&&
            <div style={{position:"absolute",top:4,right:4,width:8,height:8,borderRadius:99,background:C.red,border:`2px solid ${C.white}`}}/>}
        </button>
        <button onClick={forceSync} title={t("common.forceSync")} style={{border:"none",background:"#f1f5f9",cursor:"pointer",width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🔄</button>
        <div onClick={()=>setMenuOpen(true)} style={{width:36,height:36,borderRadius:99,background:`linear-gradient(135deg,${userFull.color},${userFull.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontWeight:800,fontSize:13,cursor:"pointer",flexShrink:0}}>
          {userFull.prenom[0]}
        </div>
      </div>

      {/* SIDEBAR MOBILE */}
      {menuOpen&&<div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.5)",zIndex:89,backdropFilter:"blur(4px)"}}/>}
      <div style={{position:"fixed",top:0,left:0,bottom:0,width:"80%",maxWidth:300,background:C.white,transform:menuOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.25s cubic-bezier(0.4,0,0.2,1)",zIndex:90,display:"flex",flexDirection:"column",boxShadow:"4px 0 30px rgba(11,31,58,0.15)"}}>
        
        {/* Profile header — fixe */}
        <div style={{background:`linear-gradient(135deg,${userFull.color},${userFull.color}99)`,padding:"48px 20px 20px",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:52,height:52,borderRadius:16,background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontWeight:800,fontSize:20}}>
              {userFull.prenom[0]}
            </div>
            <div>
              <div style={{fontWeight:800,fontSize:16,color:C.white}}>{userFull.prenom}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginTop:2}}>{ROLE_LABELS[userFull.role]}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",marginTop:2}}>✅ Google Sheets actif</div>
            </div>
            <button onClick={()=>setMenuOpen(false)} style={{marginLeft:"auto",border:"none",background:"rgba(255,255,255,0.2)",color:C.white,width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        </div>

        {/* Zone HAUTE fixe : Langue + Déconnexion (toujours visibles, PC + mobile) */}
        <div style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`,flexShrink:0,background:C.white}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1}}>
              <LanguageSelector onChange={(c)=>{changeLang(c);}}/>
            </div>
            <button onClick={logout} title={t("logout.button")} style={{flexShrink:0,padding:"9px 14px",border:"1px solid #FECACA",borderRadius:12,background:"#FEF2F2",color:"#DC2626",fontWeight:800,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,whiteSpace:"nowrap",transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="#DC2626";e.currentTarget.style.color="#fff";}}
              onMouseLeave={e=>{e.currentTarget.style.background="#FEF2F2";e.currentTarget.style.color="#DC2626";}}>
              🚪 <span>{t("logout.button")}</span>
            </button>
          </div>
        </div>

        {/* Nav items — zone scrollable */}
        <div style={{flex:1,padding:"12px 10px",overflowY:"auto",minHeight:0}}>
          {NAV_ITEMS.map(item=>{
            const isActive=view===item.id||(item.id==="patients"&&activeView==="fiche");
            return (
              <button key={item.id} onClick={()=>goTo(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"13px 14px",borderRadius:12,border:"none",cursor:"pointer",marginBottom:4,textAlign:"left",fontSize:14,background:isActive?userFull.color+"18":"transparent",color:isActive?userFull.color:C.text,fontWeight:isActive?700:500,transition:"all 0.15s"}}>
                <span style={{fontSize:20,width:28,textAlign:"center"}}>{item.icon}</span>
                <span>{item.label}</span>
                {isActive&&<div style={{marginLeft:"auto",width:6,height:6,borderRadius:99,background:userFull.color}}/>}
              </button>
            );
          })}
        </div>

        {/* Bottom actions — uniquement "+ Nouveau patient" (langue et déconnexion sont désormais en haut) */}
        {can(userFull,"patients","add")&&<div style={{padding:"12px 14px calc(12px + env(safe-area-inset-bottom))",borderTop:`1px solid ${C.border}`,flexShrink:0,background:C.white}}>
          <button onClick={()=>{setModal({type:"patient"});setMenuOpen(false);}} style={{width:"100%",padding:"13px",border:"none",borderRadius:12,background:userFull.color,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>
            + {t("patient.new")}
          </button>
        </div>}
      </div>

      {/* CONTENU */}
      <div style={{maxWidth:600,margin:"0 auto",padding:"16px 14px 100px",width:"100%",boxSizing:"border-box",overflowX:"hidden"}}>
        {loadError&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
          <div style={{flex:1,fontSize:13,color:"#B91C1C",fontWeight:600}}>{loadError}</div>
          <button onClick={()=>loadAll(true)} style={{border:"none",background:"#DC2626",color:"#fff",borderRadius:9,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:12,flexShrink:0}}>{t("common.retry")}</button>
        </div>}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          {activeView==="fiche"&&<button onClick={goBack} style={{width:36,height:36,borderRadius:10,border:`1px solid ${C.border}`,background:C.white,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>←</button>}
          <div>
            <h1 style={{margin:0,fontSize:20,fontWeight:800,color:C.text,lineHeight:1.2}}>
              {activeView==="fiche"&&selected?`${selected.prenom} ${selected.nom}`:TITLES[view]||""}
            </h1>
            {activeView==="fiche"&&selected&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{selected.procedure}</div>}
          </div>
        </div>
        {loading?<Spinner text={t("common.loadingSheets")}/>:!viewAllowed?<AccessDenied/>:<ErrorBoundary key={activeView}>
          {activeView==="dashboard"&&<DashboardPersonnel user={userFull} patients={vPatients} rdvs={vRdvs} taches={vTaches} finances={vFinances}/>}
          {activeView==="patients"&&<Patients user={userFull} patients={vPatients} onSelect={p=>{ if(isSurgeon(userFull)) return; setSelected(p); }} onAdd={()=>setModal({type:"patient"})} onDelete={deletePatient}/>}
          {activeView==="fiche"&&selected&&<FichePatient user={userFull} patient={selected} patients={vPatients} rdvs={vRdvs} finances={vFinances} taches={vTaches} onEdit={()=>setModal({type:"patient",data:selected})} onDelete={()=>deletePatient(selected.id)} onStageChange={changeStage} onBack={goBack} onSavePatient={savePatient} onUpdateRdv={updateRdv}/>}
          {activeView==="rdvs"&&<Rdvs user={userFull} rdvs={vRdvs} patients={vPatients} taches={vTaches} finances={vFinances} setRdvs={setRdvs} setTaches={setTaches} onAdd={()=>setModal({type:"rdv"})} onDelete={deleteRdv} onEdit={(r)=>setModal({type:"rdv",data:r})} onUpdate={(r)=>setModal({type:"rdv",data:r})} onOpenPatient={openPatientById}/>}
          {activeView==="taches"&&<Taches user={userFull} taches={vTaches} setTaches={setTaches} patients={vPatients} rdvs={vRdvs} hopitaux={hopitaux} syncing={syncing} setSyncing={setSyncing}/>}
          {activeView==="agenda"&&<Agenda user={userFull} rdvs={vRdvs} taches={vTaches} patients={vPatients} finances={vFinances} onAddRdv={()=>setModal({type:"rdv"})} onSelectPatient={p=>{setSelected(p);setView("patients");}}/>}
          {activeView==="analyses"&&<Analyses patients={vPatients} finances={vFinances}/>}
          {activeView==="finances"&&<Finances user={userFull} finances={vFinances} patients={vPatients} rdvs={vRdvs} onAdd={()=>setModal({type:"finance"})} onDelete={deleteFinance} onSave={saveFinance} onUpdate={updateFinance}/>}
          {activeView==="hopitaux"&&<Hopitaux user={userFull} patients={patients} rdvs={rdvs} hopitaux={hopitaux} setHopitaux={setHopitaux} syncing={syncing} setSyncing={setSyncing}/>}
          {activeView==="equipe"&&<VueEquipe patients={patients} rdvs={rdvs} taches={taches} finances={finances}/>}
          {activeView==="medecins"&&<Medecins patients={patients} rdvs={rdvs}/>}
          {activeView==="messagerie"&&<Messagerie user={userFull} patients={vPatients}/>}
          {activeView==="notifications"&&<Notifications user={userFull} patients={vPatients} rdvs={vRdvs} taches={vTaches} finances={vFinances}/>}
          {activeView==="recherche"&&<RechercheGlobale patients={vPatients} rdvs={vRdvs} taches={vTaches} finances={isSurgeon(userFull)?[]:vFinances} onSelectPatient={p=>{ if(isSurgeon(userFull)) return; setSelected(p);setView("patients"); }}/>}
          {activeView==="utilisateurs"&&<GestionUtilisateurs user={userFull} onApplied={applyRBAC} permVer={permVer}/>}
        </ErrorBoundary>}
      </div>

      {modal?.type==="patient"&&<ModalPatient user={userFull} patient={modal.data||null} onSave={savePatient} onClose={()=>setModal(null)}/>}      {modal?.type==="rdv"&&<ModalRdv user={userFull} patients={patients} rdv={modal.data||null} onSave={modal.data?updateRdv:saveRdv} onClose={()=>setModal(null)} taches={taches} setTaches={setTaches} onDelete={deleteRdv} onDuplicate={duplicateRdvApp} onOpenPatient={openPatientById}/>}
      {modal?.type==="finance"&&<ModalFinance user={userFull} patients={patients} onSave={saveFinance} onClose={()=>setModal(null)}/>}

      {/* Confirmation avant de quitter (uniquement depuis l'accueil) */}
      {quitOpen&&<div onClick={()=>setQuitOpen(false)} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.6)",zIndex:1500,display:"flex",alignItems:"center",justifyContent:"center",padding:20,backdropFilter:"blur(4px)"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:C.white,borderRadius:20,padding:"24px 22px",width:"100%",maxWidth:360,boxShadow:"0 20px 60px rgba(0,0,0,0.3)",textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:10}}>👋</div>
          <div style={{fontSize:17,fontWeight:800,color:C.text,marginBottom:6}}>Quitter Clinic Nobel ?</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Vous êtes sur la page d'accueil. Souhaitez-vous vraiment quitter l'application ?</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setQuitOpen(false)} style={{flex:2,padding:13,border:`1.5px solid ${C.navy}`,borderRadius:12,background:C.navy,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>Rester</button>
            <button onClick={confirmQuit} style={{flex:1,padding:13,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.red,fontSize:14}}>Quitter</button>
          </div>
        </div>
      </div>}

      {/* BOTTOM NAV MOBILE */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.white,borderTop:`1px solid ${C.border}`,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-around",padding:"6px 0 calc(6px + env(safe-area-inset-bottom))",boxShadow:"0 -4px 20px rgba(11,31,58,0.08)",maxWidth:"100%",boxSizing:"border-box",overflowX:"hidden"}}>
        {[
          {id:"dashboard",icon:"🏠",label:t("bottom.home")},
          {id:"patients",icon:"👥",label:t("bottom.patients")},
          {id:"rdvs",icon:"📅",label:t("bottom.rdvs")},
          {id:"agenda",icon:"🗓️",label:t("bottom.agenda")},
          {id:"taches",icon:"✅",label:t("bottom.taches")},
          ...(userFull.role==="admin"?[{id:"equipe",icon:"👁️",label:t("bottom.equipe")}]:[{id:"finances",icon:"💳",label:t("bottom.finances")}])
        ].filter(n=>NAV_ITEMS.find(x=>x.id===n.id)).map(item=>{
          const isActive = view===item.id||(item.id==="patients"&&activeView==="fiche");
          return (
            <button key={item.id} onClick={()=>goTo(item.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,border:"none",background:"none",cursor:"pointer",padding:"4px 8px",flex:1,minWidth:0}}>
              <div style={{width:36,height:36,borderRadius:12,background:isActive?userFull.color+"18":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,transition:"all 0.15s"}}>
                {item.icon}
              </div>
              <span style={{fontSize:9,fontWeight:isActive?700:500,color:isActive?userFull.color:C.muted,letterSpacing:"0.02em"}}>{item.label}</span>
            </button>
          );
        })}
      </div>

      {/* Floating sync indicator */}
      {syncing&&<div style={{position:"fixed",bottom:76,left:"50%",transform:"translateX(-50%)",background:C.navy,color:C.white,padding:"8px 18px",borderRadius:99,fontSize:12,fontWeight:700,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
        <span style={{fontSize:14}}>⏳</span> {t("common.syncing")}
      </div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
