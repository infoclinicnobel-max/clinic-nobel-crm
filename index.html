// ── CORRECTION DES DATES (administrateur) ────────────────────────────────────
function CorrigerDatesModal({patient, rdvs, onClose, onSavePatient, onUpdateRdv}) {
  const pRdvs = (rdvs||[]).filter(r=>String(r.patientId)===String(patient.id))
    .sort((a,b)=>(normalizeDate(a.date)||"").localeCompare(normalizeDate(b.date)||""));
  const firstRdv = pRdvs[0] || null;
  const [f,setF] = useState({
    dateArrivee: normalizeDate(patient.dateArrivee) || "",
    cree:        normalizeDate(patient.cree) || "",
    dateOperation: normalizeDate(patient.dateOperation) || "",
    dateDevis:   normalizeDate(patient.dateDevis) || "",
    rdv1:        firstRdv ? (normalizeDate(firstRdv.date) || "") : "",
  });
  const ch = (k,v)=>setF(x=>({...x,[k]:v}));
  const inp = {width:"100%",padding:"11px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:14,outline:"none",background:"#F8FAFC",boxSizing:"border-box",color:C.text};

  const champs = [
    {k:"dateArrivee", l:"✈️ Date d'arrivée", orig:patient.dateArrivee},
    {k:"cree",        l:"📅 Date de création", orig:patient.cree},
    {k:"dateOperation", l:"🔪 Date d'opération", orig:patient.dateOperation},
    {k:"rdv1",        l:"🗓️ Premier rendez-vous", orig:firstRdv?firstRdv.date:"", disabled:!firstRdv},
    {k:"dateDevis",   l:"📄 Date du devis", orig:patient.dateDevis},
  ];

  const save = () => {
    // Met à jour le patient (dates normalisées ou vidées)
    const updated = {...patient,
      dateArrivee: f.dateArrivee || "",
      cree: f.cree || "",
      dateOperation: f.dateOperation || "",
      dateDevis: f.dateDevis || "",
    };
    onSavePatient(updated);
    // Met à jour le premier RDV si la date a changé
    if(firstRdv && f.rdv1 && f.rdv1 !== normalizeDate(firstRdv.date)){
      onUpdateRdv && onUpdateRdv({...firstRdv, date:f.rdv1});
    }
    onClose();
  };

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.7)",zIndex:1300,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div onClick={e=>e.stopPropagation()} className="slide-up" style={{background:C.bg,borderRadius:"20px 20px 0 0",padding:"8px 18px 26px",width:"100%",maxWidth:480,maxHeight:"94vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
        <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"12px auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:17,fontWeight:800,color:C.text}}>🛠 Corriger les dates</div>
          <button onClick={onClose} style={{border:"none",background:C.border,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>{patient.prenom} {patient.nom} — corrigez chaque date au calendrier. Les valeurs invalides sont signalées.</div>

        <div style={{background:C.white,borderRadius:14,padding:14}}>
          {champs.map((c,i)=>{
            const needsFix = !c.disabled && c.orig && !isCRMDateValid(c.orig);
            const empty = !f[c.k];
            return (
              <div key={c.k} style={{marginBottom:i<champs.length-1?14:0}}>
                <label style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                  {c.l}
                  {needsFix&&<span style={{color:C.red,fontSize:10,fontWeight:800}}>⚠️ à corriger</span>}
                  {!needsFix&&empty&&!c.disabled&&<span style={{color:C.muted,fontSize:10}}>non renseignée</span>}
                </label>
                <input type="date" disabled={c.disabled} style={{...inp,opacity:c.disabled?0.5:1}} value={f[c.k]} onChange={e=>ch(c.k,e.target.value)}/>
                {c.disabled&&<div style={{fontSize:10,color:C.muted,marginTop:4}}>Aucun rendez-vous pour ce patient.</div>}
              </div>
            );
          })}
        </div>

        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={onClose} style={{flex:1,padding:12,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted,fontSize:13}}>Annuler</button>
          <button onClick={save} style={{flex:2,padding:12,border:"none",borderRadius:12,background:C.green,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>✅ Enregistrer</button>
        </div>
      </div>
    </div>
  );
}


function FichePatient({user, patient, patients, rdvs, finances, taches, onEdit, onDelete, onStageChange, onBack, onSavePatient, onUpdateRdv}) {
  const [tab,setTab] = useState("info");
  const [fixOpen,setFixOpen] = useState(false);
  const isAdmin = isFullRole(user.role);
  const p = patients.find(x=>x.id===patient.id)||patient;
  const sc = SC[p.stade]||C.muted;
  const pRdvs = (rdvs||[]).filter(r=>r.patientId===p.id).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const pFin = (finances||[]).filter(f=>f.patientId===p.id);
  const pTaches = (taches||[]).filter(t=>t.patientId===p.id||t.titre?.toLowerCase().includes(p.prenom?.toLowerCase()));
  const totalPaye = pFin.filter(f=>f.statut==="Complété").reduce((a,f)=>a+Number(f.montant||0),0);
  const restant = Math.max(Number(p.budget||0)-totalPaye,0);
  const fmtDate = d=>{const n=normalizeDate(d); return n?new Date(n+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"}):"Date à corriger";};
  const TABS=[{id:"info",l:"Infos"},{id:"agenda",l:"📅 Agenda"},{id:"rdvs",l:`RDV (${pRdvs.length})`},{id:"finances",l:"Finances"},{id:"taches",l:`Tâches (${pTaches.length})`}];
  return (
    <div>
      <button onClick={onBack} style={{border:"none",background:"none",cursor:"pointer",color:user.color,fontWeight:700,fontSize:13,marginBottom:14,display:"flex",alignItems:"center",gap:6}}>← Retour patients</button>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.navy},#1a3a5c)`,borderRadius:20,padding:"20px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <div style={{width:52,height:52,borderRadius:14,background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:C.white,flexShrink:0}}>{initials(p)}</div>
          <div style={{flex:1}}>
            <div style={{color:C.white,fontWeight:800,fontSize:18}}>{p.prenom} {p.nom}</div>
            <div style={{color:"rgba(255,255,255,0.6)",fontSize:12,marginTop:2}}>{p.procedure}</div>
            <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
              <Badge text={p.stade} color={sc}/>
              {p.source&&<Badge text={p.source} color={C.gold}/>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            {isAdmin&&<button onClick={()=>setFixOpen(true)} title="Corriger les dates" style={{width:34,height:34,borderRadius:10,border:"none",background:"rgba(255,255,255,0.15)",color:C.white,cursor:"pointer",fontSize:14}}>🛠</button>}
            <button onClick={onEdit} style={{width:34,height:34,borderRadius:10,border:"none",background:"rgba(255,255,255,0.15)",color:C.white,cursor:"pointer",fontSize:14}}>✏️</button>
            {user.role==="admin"&&<button onClick={onDelete} style={{width:34,height:34,borderRadius:10,border:"none",background:"rgba(220,38,38,0.3)",color:C.white,cursor:"pointer",fontSize:14}}>🗑</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{l:"Budget",v:fmtEur(p.budget),c:C.gold},{l:"Payé",v:fmtEur(totalPaye),c:"#4ade80"},{l:"Restant",v:fmtEur(restant),c:restant>0?"#fbbf24":"#4ade80"}].map(s=>(
            <div key={s.l} style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"8px",textAlign:"center"}}>
              <div style={{color:s.c,fontWeight:800,fontSize:13}}>{s.v}</div>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:9,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Statut */}
      <Card style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",marginBottom:8}}>Changer le statut</div>
        <select value={p.stade} onChange={e=>onStageChange(p.id,e.target.value)} style={{width:"100%",padding:"10px",border:`2px solid ${sc}55`,borderRadius:10,fontSize:13,background:sc+"11",color:sc,fontWeight:700,outline:"none"}}>
          {STAGES.map(s=><option key={s}>{s}</option>)}
        </select>
      </Card>
      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:12,background:C.bg,borderRadius:12,padding:4}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 4px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:11,background:tab===t.id?C.white:"transparent",color:tab===t.id?C.navy:C.muted,transition:"all 0.15s"}}>
            {t.l}
          </button>
        ))}
      </div>
      {tab==="agenda"&&<div>
        {/* Timeline patient */}
        {(()=>{
          const evts=[
            ...pRdvs.map(r=>({date:r.date,heure:r.heure,type:r.type,label:r.type,note:r.notes,statut:r.statut,source:"rdv",medecin:r.medecin})),
            ...pFin.map(f=>({date:f.date,heure:"",type:"Paiement",label:`${f.type||"Paiement"} — ${fmtEur(f.montant)}`,statut:f.statut,source:"finance"})),
            ...pTaches.map(t=>({date:t.echeance,heure:"",type:"Tâche",label:t.titre,note:t.description,statut:t.statut,source:"tache"})),
          ].filter(e=>e.date).sort((a,b)=>a.date?.localeCompare(b.date||"")||a.heure?.localeCompare(b.heure||""));
          if(evts.length===0) return <div style={{textAlign:"center",padding:30,color:C.muted,fontSize:13}}>Aucun événement pour ce patient.</div>;
          let lastDate="";
          return (
            <div style={{position:"relative",paddingLeft:44}}>
              <div style={{position:"absolute",left:18,top:0,bottom:0,width:2,background:C.border,borderRadius:99}}/>
              {evts.map((e,i)=>{
                const color=e.source==="tache"?C.muted:e.source==="finance"?C.amber:getEvtColor(e.type);
                const icon=e.source==="tache"?"✅":e.source==="finance"?"💶":getEvtIcon(e.type);
                const showDate=e.date!==lastDate;
                lastDate=e.date;
                return (
                  <div key={i} style={{marginBottom:10}}>
                    {showDate&&<div style={{fontSize:10,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,marginLeft:-44,paddingLeft:44}}>{fmtDate(e.date)}</div>}
                    <div style={{position:"relative"}}>
                      <div style={{position:"absolute",left:-32,top:10,width:14,height:14,borderRadius:99,background:color,border:`2px solid ${C.white}`,boxShadow:`0 0 0 2px ${color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7}}/>
                      <div style={{background:C.white,borderRadius:10,padding:"10px 12px",border:`1px solid ${C.border}`,borderLeft:`3px solid ${color}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"space-between"}}>
                          <div>
                            <div style={{fontWeight:700,fontSize:12,color:C.text,display:"flex",alignItems:"center",gap:4}}>
                              <span>{icon}</span>
                              {e.heure&&<span style={{color,fontWeight:800}}>{e.heure}</span>}
                              {e.label}

function Rdvs({user, rdvs:rawRdvs, patients, taches, finances, setRdvs, setTaches, onAdd, onDelete, onUpdate, onEdit, onOpenPatient}) {
  const [view,setView] = useState("liste");
  const [filterTab,setFilterTab] = useState("tous");
  const [filterDate,setFilterDate] = useState("");
  const [search,setSearch] = useState("");
  const [calDate,setCalDate] = useState(new Date());
  const [selDay,setSelDay] = useState(todayStr());
  const today = todayStr();
  // Normaliser toutes les dates/heures à la lecture (corrige "Sat Dec 30 1899")
  const rdvs = (rawRdvs||[]).map(r=>({...r, date:normalizeDate(r.date), heure:normalizeHeure(r.heure)||r.heure}));
  const getP = id => patients.find(p=>String(p.id)===String(id));
  const getU = id => USERS.find(u=>u.id===id);
  const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const JOURS_SHORT=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  const fmtDate = d=>{const n=normalizeDate(d); return n?new Date(n+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}):"Date à corriger";};

  // ── Interactivité (clic = détail, double-clic = édition, clic droit / appui long = menu) ──
  const [detail,setDetail] = useState(null);
  const [menu,setMenu] = useState(null);
  const [moving,setMoving] = useState(null);
  const [dragId,setDragId] = useState(null);
  const clickTimer = React.useRef(null);
  const lpTimer = React.useRef(null);
  const lpFired = React.useRef(false);
  const openEdit = (r)=> onEdit ? onEdit(r) : (onUpdate&&onUpdate(r));

  // Persistance directe sans rechargement (état + cache + Sheets) avec historique
  const persistRdv = (updated, histBase) => {
    const withHist = histBase ? {...updated, historique: buildHistGeneric(histBase, updated, user, RDV_FIELD_LABELS)} : updated;
    setRdvs && setRdvs(rs=>{ const nr=rs.map(x=>x.id===withHist.id?{...x,...withHist}:x); cache.save("rdvs",nr); return nr; });
    try{ api.post("rdvs","update",withHist); }catch(e){}
    return withHist;
  };
  const duplicateRdv = (r) => {
    const copy = {...r, id:uid(), statut:"Planifié", historique:JSON.stringify([])};
    setRdvs && setRdvs(rs=>{ const nr=[...rs,copy]; cache.save("rdvs",nr); return nr; });
    try{ api.post("rdvs","add",copy); }catch(e){}
    setDetail(null);
  };
  const moveRdv = (r,newDate,newHeure) => persistRdv({...r, date:newDate||r.date, heure:newHeure||r.heure}, r);
  const cancelRdv = (r) => { persistRdv({...r, statut:"Annulé"}, r); setDetail(null); };
  const generateTask = (r) => {
    const p = getP(r.patientId);
    const t = {id:uid(), titre:`Suivi RDV — ${p?`${p.prenom} ${p.nom}`:""}`.trim(), description:`Suite au RDV ${r.type||""} du ${normalizeDate(r.date)} à ${normalizeHeure(r.heure)}`, patientId:r.patientId||"", rdvId:r.id, medecin:r.medecin||"", hopital:r.hopital||"", assigneA:r.assigneA||user.id, priorite:"Normale", statut:"En cours", echeance:normalizeDate(r.date)||todayStr(), heure:normalizeHeure(r.heure)||"", couleur:"", categorie:"Suivi patient", creePar:user.id, cree:todayStr(), historique:JSON.stringify([])};
    setTaches && setTaches(ts=>{ const nt=[...ts,t]; cache.save("taches",nt); return nt; });
    try{ api.post("taches","add",t); }catch(e){}
    alert("✅ Tâche de suivi créée.");
  };
  // Gestionnaires d'interaction réutilisables pour chaque carte
  const cardHandlers = (r) => ({
    onClick:(e)=>{ if(e.target.closest("[data-stop]")) return; if(lpFired.current){lpFired.current=false;return;} if(clickTimer.current){ clearTimeout(clickTimer.current); clickTimer.current=null; openEdit(r); } else { clickTimer.current=setTimeout(()=>{ clickTimer.current=null; setDetail(r); },230); } },
    onContextMenu:(e)=>{ e.preventDefault(); setMenu(r); },
    onTouchStart:()=>{ lpFired.current=false; lpTimer.current=setTimeout(()=>{ lpFired.current=true; setMenu(r); if(navigator.vibrate)navigator.vibrate(18); },500); },
    onTouchEnd:()=>{ clearTimeout(lpTimer.current); },
    onTouchMove:()=>{ clearTimeout(lpTimer.current); },
    style:{cursor:"pointer"},
  });

  // Filtrage
  const allRdvs = filterTab==="mes" ? rdvs.filter(r=>r.assigneA===user.id) :
                  filterTab==="medecin" ? rdvs.filter(r=>r.medecin) : rdvs;
  const filtered = allRdvs.filter(r=>{
    const p=getP(r.patientId);
    const sq=search.toLowerCase();
    return (!search||`${p?.prenom||""} ${p?.nom||""} ${r.type||""} ${r.medecin||""}`.toLowerCase().includes(sq))
      &&(!filterDate||r.date===filterDate);
  }).sort((a,b)=>a.date?.localeCompare(b.date||"")||a.heure?.localeCompare(b.heure||""));

  // Stats
  const rdvsToday = rdvs.filter(r=>r.date===today&&(user.role==="admin"||r.assigneA===user.id));
  const rdvsWeek = rdvs.filter(r=>r.date>=today&&r.date<=new Date(Date.now()+7*86400000).toISOString().split("T")[0]);
  const rdvsConfirmes = rdvs.filter(r=>r.statut==="Confirmé");

  // Calendrier mensuel
  const year=calDate.getFullYear(), month=calDate.getMonth();
  const firstDow=(new Date(year,month,1).getDay()+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const fmtD=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const rdvsForDay=ds=>rdvs.filter(r=>r.date===ds&&(user.role==="admin"||r.assigneA===user.id));

  // Carte RDV
  const RdvCard=({r})=>{
    const p=getP(r.patientId);
    const assignee=getU(r.assigneA);
    const isPast=r.date<today;
    const statusColor=r.statut==="Confirmé"?C.green:r.statut==="Terminé"?C.muted:r.statut==="Annulé"?C.red:C.amber;
    return (
      <div {...cardHandlers(r)} draggable onDragStart={()=>setDragId(r.id)} onDragEnd={()=>setDragId(null)} style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,marginBottom:8,overflow:"hidden",opacity:isPast?0.72:1,borderLeft:`4px solid ${r.couleur||assignee?.color||C.blue}`,cursor:"pointer",transition:"all 0.12s"}}>
        <div style={{padding:"12px 14px",display:"flex",gap:12,alignItems:"center"}}>
          <div style={{minWidth:52,textAlign:"center",flexShrink:0}}>
            <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"0.05em"}}>{r.date?r.date.slice(5).replace("-","/"):""}</div>
            <div style={{fontSize:17,fontWeight:800,color:r.couleur||assignee?.color||C.navy,lineHeight:1.1}}>{r.heure}</div>
            {r.duree&&<div style={{fontSize:9,color:C.muted}}>{r.duree}min</div>}
          </div>
          <div style={{width:1,height:40,background:C.border,flexShrink:0}}/>
          <Avatar p={p||{prenom:"?",nom:""}} size={36}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:13,color:C.text}}>{p?`${p.prenom} ${p.nom}`:"Patient inconnu"}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>{r.type}{r.medecin?` · 🩺 ${r.medecin}`:""}</div>
            {r.hopital&&<div style={{fontSize:10,color:C.muted}}>🏥 {r.hopital}</div>}
            <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
              {assignee&&<span style={{fontSize:10,color:assignee.color,fontWeight:700,display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:99,background:assignee.color,display:"inline-block"}}/>{assignee.prenom}</span>}
              {r.priorite&&r.priorite!=="Normale"&&<span style={{fontSize:9,fontWeight:800,color:(RDV_PRIORITES.find(x=>x.v===r.priorite)||{}).c||C.muted}}>⚑ {r.priorite}</span>}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
            <Badge text={r.statut||"Planifié"} color={statusColor} small/>
            {r.notes&&<span style={{fontSize:9,color:C.muted}}>💬</span>}
            <button data-stop onClick={(e)=>{e.stopPropagation();setMenu(r);}} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:14,lineHeight:1}}>⋮</button>
          </div>
        </div>
        {r.notes&&<div style={{padding:"6px 14px 10px",fontSize:11,color:C.muted,fontStyle:"italic",borderTop:`1px solid ${C.bg}`}}>💬 {r.notes}</div>}
      </div>
    );
  };

  // Jour sélectionné (vue calendrier)
  const selRdvs=rdvsForDay(selDay).sort((a,b)=>a.heure?.localeCompare(b.heure||""));

  return (
    <div>
      {/* KPI bar */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[{ic:"📅",l:"Aujourd'hui",v:rdvsToday.length,c:C.blue},{ic:"📆",l:"Cette semaine",v:rdvsWeek.length,c:C.purple},{ic:"✅",l:"Confirmés",v:rdvsConfirmes.length,c:C.green}].map(s=>(
          <div key={s.l} style={{background:C.white,borderRadius:12,padding:"10px 8px",textAlign:"center",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:18,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:9,color:C.muted,marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Barre d'outils */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:4,background:C.bg,borderRadius:10,padding:3,flex:1}}>
          {[{id:"liste",ic:"☰"},{id:"calendrier",ic:"📅"},{id:"jour",ic:"⏰"}].map(v=>(
            <button key={v.id} onClick={()=>setView(v.id)} style={{flex:1,padding:"7px",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:11,background:view===v.id?C.white:"transparent",color:view===v.id?C.navy:C.muted,transition:"all 0.15s"}}>
              {v.ic} {v.id.charAt(0).toUpperCase()+v.id.slice(1)}
            </button>
          ))}
        </div>
        <button onClick={onAdd} style={{padding:"9px 14px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>+ RDV</button>
      </div>

      {/* Filtre par rôle */}
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
        {[{id:"tous",l:"Tous",ic:"👥"},{id:"mes",l:"Mes RDV",ic:"👤"},...(user.role==="admin"?[{id:"medecin",l:"Par médecin",ic:"🩺"}]:[])].map(t=>(
          <button key={t.id} onClick={()=>setFilterTab(t.id)} style={{padding:"7px 12px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:12,background:filterTab===t.id?user.color:C.bg,color:filterTab===t.id?C.white:C.muted,flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
            {t.ic} {t.l}
          </button>
        ))}
      </div>

      {/* VUE LISTE */}
      {view==="liste"&&<>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Patient, médecin, type…" style={{flex:1,padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:C.white}}/>
          <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{padding:"9px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:12,background:C.white,outline:"none"}}/>
          {filterDate&&<button onClick={()=>setFilterDate("")} style={{padding:"9px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",color:C.muted,fontSize:12}}>✕</button>}
        </div>
        {/* Groupé par date */}
        {(()=>{
          const groups={};
          filtered.forEach(r=>{const d=r.date||"__invalid__";if(!groups[d])groups[d]=[];groups[d].push(r);});
          // Trier : dates valides en premier, "à corriger" en dernier
          const sortedKeys=Object.keys(groups).sort((a,b)=>{
            if(a==="__invalid__")return 1;
            if(b==="__invalid__")return -1;
            return a.localeCompare(b);
          });
          return sortedKeys.map(date=>{
            const rList=groups[date];
            const isInvalid=date==="__invalid__";
            return (
            <div key={date} style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:800,color:isInvalid?C.red:date===today?C.blue:date<today?C.muted:C.navy,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:6,height:6,borderRadius:99,background:isInvalid?C.red:date===today?C.blue:date<today?C.muted:C.navy}}/>
                {isInvalid?"⚠️ Date à corriger":date===today?"Aujourd'hui":fmtDate(date)} — {rList.length} RDV
              </div>
              {rList.map(r=>isInvalid?(
                <div key={r.id} style={{background:C.white,borderRadius:14,border:`1px solid #fecaca`,borderLeft:`4px solid ${C.red}`,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <Avatar p={getP(r.patientId)||{prenom:"?",nom:""}} size={36}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:C.text}}>{(()=>{const p=getP(r.patientId);return p?`${p.prenom} ${p.nom}`:"Patient inconnu";})()}</div>
                      <div style={{fontSize:11,color:C.red}}>⚠️ Date à corriger · {r.type||"RDV"}</div>
                    </div>
                    <button onClick={()=>onUpdate&&onUpdate(r)} style={{padding:"7px 12px",border:"none",borderRadius:9,background:C.navy,color:C.white,cursor:"pointer",fontWeight:700,fontSize:11}}>Corriger la date</button>
                    {(user.role==="admin"||r.assigneA===user.id)&&<button onClick={()=>onDelete(r.id)} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:13}}>🗑</button>}
                  </div>
                </div>
              ):<RdvCard key={r.id} r={r}/>)}
            </div>
          );});
        })()}
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Aucun rendez-vous.</div>}
      </>}

      {/* VUE CALENDRIER MENSUEL */}
      {view==="calendrier"&&<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>setCalDate(new Date(year,month-1,1))} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <button onClick={()=>setCalDate(new Date(year,month+1,1))} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>
          <div style={{fontWeight:800,fontSize:15,color:C.navy}}>{MOIS[month]} {year}</div>
          <button onClick={()=>{setCalDate(new Date());setSelDay(today);}} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700}}>Auj.</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {JOURS_SHORT.map(j=><div key={j} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.muted,padding:"3px 0"}}>{j}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:14}}>
          {cells.map((d,i)=>{
            if(!d)return <div key={i}/>;
            const ds=fmtD(year,month,d);
            const dr=rdvsForDay(ds);
            const isToday=ds===today;
            const isSel=ds===selDay;
            return (
              <div key={i} onClick={()=>{setSelDay(ds);setView("jour");}} onDragOver={e=>{e.preventDefault();}} onDrop={()=>{ if(dragId){ const dr2=rdvs.find(x=>x.id===dragId); if(dr2&&dr2.date!==ds) moveRdv(dr2,ds,dr2.heure); setDragId(null); } }} style={{minHeight:44,borderRadius:9,padding:"4px 2px",cursor:"pointer",textAlign:"center",background:isSel?C.navy:isToday?"#EFF6FF":C.white,border:`1px solid ${dragId?C.blue:isSel?C.navy:isToday?C.blue:C.border}`,borderStyle:dragId?"dashed":"solid",transition:"all 0.15s"}}>
                <div style={{fontSize:11,fontWeight:isToday||isSel?800:400,color:isSel?C.white:isToday?C.blue:C.text,marginBottom:2}}>{d}</div>
                {dr.slice(0,2).map((r,i)=>{
                  const a=getU(r.assigneA);
                  return <div key={i} style={{width:"80%",height:3,borderRadius:99,background:a?.color||C.blue,margin:"1px auto"}}/>;
                })}
                {dr.length>2&&<div style={{fontSize:7,color:isSel?"rgba(255,255,255,0.7)":C.muted,fontWeight:700}}>+{dr.length-2}</div>}
              </div>
            );
          })}
        </div>
        {/* RDV du jour sélectionné */}
        {selDay&&<div>
          <div style={{fontSize:12,fontWeight:800,color:C.navy,marginBottom:8}}>📅 {fmtDate(selDay)} — {rdvsForDay(selDay).length} RDV</div>
          {rdvsForDay(selDay).length===0?<div style={{background:C.white,borderRadius:12,padding:16,textAlign:"center",color:C.muted,fontSize:13,border:`1px solid ${C.border}`}}>Aucun RDV ce jour 🎉</div>:
          rdvsForDay(selDay).sort((a,b)=>a.heure?.localeCompare(b.heure||"")).map(r=><RdvCard key={r.id} r={r}/>)}
        </div>}
      </>}

      {/* VUE JOUR (timeline) */}
      {view==="jour"&&<>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <button onClick={()=>{const d=new Date(selDay+"T12:00:00");d.setDate(d.getDate()-1);setSelDay(d.toISOString().split("T")[0]);}} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontWeight:800,fontSize:14,color:C.navy}}>{selDay===today?"📅 Aujourd'hui":fmtDate(selDay)}</div>
            <div style={{fontSize:11,color:C.muted}}>{selRdvs.length} rendez-vous</div>
          </div>
          <button onClick={()=>{const d=new Date(selDay+"T12:00:00");d.setDate(d.getDate()+1);setSelDay(d.toISOString().split("T")[0]);}} style={{border:`1px solid ${C.border}`,background:C.white,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <input type="date" value={selDay} onChange={e=>setSelDay(e.target.value)} style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:C.white,marginBottom:12,boxSizing:"border-box"}}/>
        {/* Timeline */}
        <div style={{position:"relative",paddingLeft:48}}>
          <div style={{position:"absolute",left:20,top:0,bottom:0,width:2,background:C.border,borderRadius:99}}/>
          {selRdvs.length===0?<div style={{background:C.white,borderRadius:12,padding:20,textAlign:"center",color:C.muted,fontSize:13,border:`1px solid ${C.border}`,marginLeft:-48}}>Aucun RDV ce jour 🎉</div>:
          selRdvs.map(r=>{
            const p=getP(r.patientId);
            const a=getU(r.assigneA);
            return (
              <div key={r.id} style={{position:"relative",marginBottom:14}}>
                <div style={{position:"absolute",left:-35,top:8,width:14,height:14,borderRadius:99,background:a?.color||C.blue,border:`2px solid ${C.white}`,boxShadow:`0 0 0 2px ${a?.color||C.blue}44`}}/>
                <div {...cardHandlers(r)} style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,padding:"12px 14px",borderLeft:`3px solid ${r.couleur||a?.color||C.blue}`,cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:14,color:C.navy}}>{r.heure}{r.duree?` · ${r.duree}min`:""}</div>
                      <div style={{fontWeight:600,fontSize:13,color:C.text,marginTop:2}}>{p?`${p.prenom} ${p.nom}`:"—"}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>{r.type}{r.medecin?` · ${r.medecin}`:""}</div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <Badge text={r.statut||"Planifié"} color={r.statut==="Confirmé"?C.green:C.amber} small/>
                      <button data-stop onClick={(e)=>{e.stopPropagation();setMenu(r);}} style={{border:"none",background:"none",cursor:"pointer",color:C.muted,fontSize:14}}>⋮</button>
                    </div>
                  </div>
                  {r.notes&&<div style={{fontSize:11,color:C.muted,marginTop:6,fontStyle:"italic"}}>💬 {r.notes}</div>}
                  {/* Actions rapides */}
                  <div style={{display:"flex",gap:6,marginTop:8}}>
                    {p?.tel&&<a data-stop href={waLink(p.tel,"")} target="_blank" rel="noreferrer" style={{fontSize:10,background:"#25D366"+"18",color:"#25D366",padding:"3px 8px",borderRadius:6,fontWeight:700,textDecoration:"none"}}>📲 WhatsApp</a>}
                    {p?.tel&&<a data-stop href={telLink(p.tel)} style={{fontSize:10,background:C.green+"18",color:C.green,padding:"3px 8px",borderRadius:6,fontWeight:700,textDecoration:"none"}}>📞 Appeler</a>}
                    {p?.email&&<a data-stop href={mailLink(p.email,`Rendez-vous Clinic Nobel ${r.date} ${r.heure}`,"")} style={{fontSize:10,background:C.blue+"18",color:C.blue,padding:"3px 8px",borderRadius:6,fontWeight:700,textDecoration:"none"}}>📧 Email</a>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </>}

      {/* Plannings spéciaux (admin) */}
      {user.role==="admin"&&view==="liste"&&<div style={{marginTop:16}}>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>PLANNINGS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {["Dr Anvar Ahmedov","Dr Azar Zeynalov","Dr Akin Unal","Dr Elif Öztürk","Dr VSC Dental"].map(medecin=>{
            const mRdvs=rdvs.filter(r=>r.medecin===medecin&&r.date>=today);
            return (
              <div key={medecin} style={{background:C.white,borderRadius:12,padding:12,border:`1px solid ${C.border}`}}>
                <div style={{fontWeight:700,fontSize:11,color:C.text,marginBottom:4}}>{medecin.replace("Dr ","Dr ")}</div>
                <div style={{fontSize:18,fontWeight:800,color:C.blue}}>{mRdvs.length}</div>
                <div style={{fontSize:9,color:C.muted}}>RDV à venir</div>
              </div>
            );
          })}
        </div>
      </div>}

      {/* Fenêtres d'interaction */}
      {detail&&<ModalDetailRdv r={detail} patient={getP(detail.patientId)} taches={taches} finances={finances} user={user}
        onClose={()=>setDetail(null)} onEdit={openEdit} onDuplicate={duplicateRdv} onDelete={(id)=>{setDetail(null);onDelete(id);}}
        onMove={(r)=>setMoving(r)} onCancelRdv={cancelRdv} onGenerateTask={generateTask} onOpenPatient={(pid)=>{setDetail(null);onOpenPatient&&onOpenPatient(pid);}}/>}
      {menu&&<RdvActionSheet r={menu} patient={getP(menu.patientId)} user={user} onClose={()=>setMenu(null)}
        onEdit={openEdit} onMove={(r)=>setMoving(r)} onDuplicate={duplicateRdv} onGenerateTask={generateTask}
        onOpenPatient={(pid)=>onOpenPatient&&onOpenPatient(pid)} onCancelRdv={cancelRdv} onDelete={(id)=>onDelete(id)}/>}
      {moving&&<MoveRdvSheet r={moving} onClose={()=>setMoving(null)} onConfirm={(d,h)=>moveRdv(moving,d,h)}/>}
    </div>
  );
}

// COMPOSANTS GRAPHIQUES (SVG pur — aucune librairie externe)
// ════════════════════════════════════════════════════════════════════════════
const CHART_PALETTE = ["#0B1F3A","#C9A84C","#16A34A","#1D73C9","#7C3AED","#D97706","#0891B2","#DC2777","#0D9488","#65A30D","#9333EA","#E11D48","#2563EB","#CA8A04"];

function Donut({segments, size=168, thickness=22, center, sub, onClick, activeLabel}) {
  const total = segments.reduce((a,s)=>a+(Number(s.value)||0),0);
  const r = (size - thickness) / 2, cx = size/2, cy = size/2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  const segs = segments.filter(s=>Number(s.value)>0);
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,maxWidth:"100%",display:"block"}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.bg} strokeWidth={thickness}/>
      {total>0 && segs.map((s,i)=>{
        const len = s.value/total*circ;
        const node = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color}
            strokeWidth={activeLabel===s.label ? thickness+5 : thickness}
            strokeDasharray={`${len} ${circ-len}`} strokeDashoffset={-offset}
            transform={`rotate(-90 ${cx} ${cy})`} className="donut-seg"
            onClick={onClick?()=>onClick(s):undefined} style={{cursor:onClick?"pointer":"default"}}>
            <title>{s.label}</title>
          </circle>
        );
        offset += len;
        return node;
      })}
      {center!==undefined && <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central" fontSize={size*0.19} fontWeight="800" fill={C.text}>{center}</text>}
      {sub && <text x={cx} y={cy+size*0.16} textAnchor="middle" fontSize={size*0.072} fill={C.muted}>{sub}</text>}
    </svg>
  );
}

function ChartCard({title, icon, segments, fmtVal, onSlice, active, center, sub}) {
  const total = segments.reduce((a,s)=>a+(Number(s.value)||0),0);
  const top = [...segments].filter(s=>Number(s.value)>0).sort((a,b)=>b.value-a.value);
  return (
    <div style={{background:C.white,borderRadius:16,border:`1px solid ${C.border}`,padding:16}} className="card-enter">
      <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:12,display:"flex",alignItems:"center",gap:7}}>
        <span>{icon}</span>{title}
      </div>
      <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{flexShrink:0,margin:"0 auto"}}>
          <Donut segments={segments} onClick={onSlice} activeLabel={active}
            center={center!==undefined?center:total} sub={sub!==undefined?sub:"total"}/>
        </div>
        <div style={{flex:1,minWidth:160,display:"flex",flexDirection:"column",gap:7}}>
          {top.length===0 && <div style={{fontSize:12,color:C.muted}}>Aucune donnée</div>}
          {top.map((s,i)=>{
            const pct = total ? Math.round(s.value/total*100) : 0;
            return (
              <div key={i} onClick={onSlice?()=>onSlice(s):undefined}
                style={{display:"flex",alignItems:"center",gap:9,cursor:onSlice?"pointer":"default",
                  padding:"4px 6px",borderRadius:8,background:active===s.label?s.color+"14":"transparent"}}>
                <span style={{width:11,height:11,borderRadius:3,background:s.color,flexShrink:0}}/>
                <span style={{flex:1,minWidth:0,fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</span>
                <span style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{fmtVal?fmtVal(s):s.value}</span>
                <span style={{fontSize:11,fontWeight:800,color:s.color,width:38,textAlign:"right"}}>{pct}%</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function MiniBars({data, color, fmt}) {
  const max = Math.max(...data.map(d=>d.value), 1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:5,height:140,padding:"8px 2px 0"}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,minWidth:0,height:"100%",justifyContent:"flex-end"}}>
          <div style={{fontSize:8,fontWeight:700,color:C.text,whiteSpace:"nowrap"}}>{d.value>0?(d.value>=1000?Math.round(d.value/1000)+"k":d.value):""}</div>
          <div title={fmt?fmt(d.value):d.value} style={{width:"86%",height:`${Math.max(2,Math.round(d.value/max*100))}%`,background:`linear-gradient(180deg,${color},${color}bb)`,borderRadius:"5px 5px 0 0",transition:"height .5s ease"}}/>
          <div style={{fontSize:8,color:C.muted,whiteSpace:"nowrap"}}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}

function Podium({rows, fmtEur}) {
  const medals = ["🥇","🥈","🥉"];
  const order = [1,0,2]; // 2e, 1er, 3e (visuel podium)
  const heights = [88,120,70];
  const present = rows.slice(0,3);
  return (
    <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:10}}>
      {order.map((idx,pos)=>{
        const r = present[idx];
        if(!r) return <div key={pos} style={{flex:1,maxWidth:120}}/>;
        const rank = idx; // 0=or
        return (
          <div key={pos} style={{flex:1,maxWidth:120,display:"flex",flexDirection:"column",alignItems:"center"}}>
            <Avatar p={r.u} color={r.u.color||CHART_PALETTE[idx]} size={40}/>
            <div style={{fontSize:11,fontWeight:800,color:C.text,marginTop:5,textAlign:"center",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{r.u.prenom}</div>
            <div style={{fontSize:11,fontWeight:800,color:C.green}}>{fmtEur(r.ca)}</div>
            <div style={{fontSize:9,color:C.muted}}>{r.nb} vente{r.nb>1?"s":""}</div>
            <div style={{width:"100%",height:heights[rank===0?1:rank===1?0:2],background:`linear-gradient(180deg,${(r.u.color||CHART_PALETTE[idx])}cc,${(r.u.color||CHART_PALETTE[idx])}88)`,borderRadius:"10px 10px 0 0",marginTop:8,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:6,fontSize:22}}>{medals[rank]}</div>
          </div>
        );
      })}
    </div>
  );
}

// FINANCES — TABLEAU DE BORD PREMIUM
// ════════════════════════════════════════════════════════════════════════════
function Finances({user, finances, patients, onAdd, onDelete, onUpdate}) {
  const [tab, setTab] = useState("dashboard");
  const [period, setPeriod] = useState("12m");
  const [fUser, setFUser] = useState("tous");
  const [fPays, setFPays] = useState("tous");
  const [fInterv, setFInterv] = useState("tous");
  const [fMedecin, setFMedecin] = useState("tous");
  const [fHopital, setFHopital] = useState("tous");
  const [drill, setDrill] = useState(null); // {dim,key,label}
  const [objectif, setObjectif] = useState(()=>{ try{ return Number(cfgStore.load("objectif_mensuel"))||50000; }catch(e){ return 50000; } });

  const eur = (n)=> (Math.round(Number(n)||0)).toLocaleString("fr-FR")+" €";
  const getP = id => patients.find(p=>String(p.id)===String(id));
  const today = todayStr();

  // ── Période ───────────────────────────────────────────────────────────────
  const cutoff = (()=>{
    const d=new Date(); 
    if(period==="today") return today;
    if(period==="7j"){ d.setDate(d.getDate()-7); }
    else if(period==="30j"){ d.setDate(d.getDate()-30); }
    else if(period==="3m"){ d.setMonth(d.getMonth()-3); }
    else if(period==="6m"){ d.setMonth(d.getMonth()-6); }
    else if(period==="12m"){ d.setMonth(d.getMonth()-12); }
    else return null;
    return d.toISOString().slice(0,10);
  })();
  const inPeriod = (date)=> !cutoff ? true : (period==="today" ? date===today : (date||"")>=cutoff);

  // ── Filtres dimensionnels (patient) ─────────────────────────────────────────
  const matchDims = (p)=>{
    if(!p) return false;
    if(fPays!=="tous" && (p.pays||"—")!==fPays) return false;
    if(fMedecin!=="tous" && patientMedecin(p)!==fMedecin) return false;
    if(fHopital!=="tous" && (p.hopital||"—")!==fHopital) return false;
    if(fInterv!=="tous" && opBucket(p)!==fInterv) return false;
    return true;
  };
  const matchUserP = (p)=> fUser==="tous" || p.assigneA===fUser || p.creePar===fUser;

  const opBucket = (p)=>{
    const s = (opsArray(p).join(" ")+" "+(p.procedure||"")).toLowerCase();
    if(/rhino/.test(s)) return "Rhinoplastie";
    if(/bbl|fessier|lipofilling/.test(s)) return "BBL";
    if(/liposuc|vaser/.test(s)) return "Liposuccion";
    if(/abdomino/.test(s)) return "Abdominoplastie";
    if(/lifting|facelift|fox/.test(s)) return "Lifting visage";
    if(/greffe|capillaire|dhi|fue|barbe/.test(s)) return "Greffe capillaire";
    if(/dent|dental|hollywood|couronne|facette/.test(s)) return "Dentaire";
    return (p.procedure||opsArray(p).length) ? "Autres" : "Aucune";
  };

  // Patients filtrés (dimensions + utilisateur)
  const pat = patients.filter(p=> matchDims(p) && matchUserP(p));
  const patIds = new Set(pat.map(p=>String(p.id)));

  // Finances filtrées (période + utilisateur + patient dans dims)
  const fin = finances.filter(f=>{
    if(!inPeriod(f.date||"")) return false;
    if(fUser!=="tous" && f.creePar!==fUser) return false;
    if((fPays!=="tous"||fMedecin!=="tous"||fHopital!=="tous"||fInterv!=="tous")){
      if(!patIds.has(String(f.patientId))) return false;
    }
    return true;
  });
  const done = fin.filter(f=>f.statut==="Complété");

  // ── KPIs ────────────────────────────────────────────────────────────────────
  const thisWeek=(()=>{const d=new Date();d.setDate(d.getDate()-(d.getDay()||7)+1);return d.toISOString().slice(0,10);})();
  const ca = (from)=> finances.filter(f=>f.statut==="Complété"&&(from?(f.date||"")>=from:true)).reduce((a,f)=>a+Number(f.montant||0),0);
  const caToday = finances.filter(f=>f.statut==="Complété"&&f.date===today).reduce((a,f)=>a+Number(f.montant||0),0);
  const caWeek = ca(thisWeek), caMonth = ca(today.slice(0,7)+"-01"), caYear = ca(today.slice(0,4)+"-01-01");
  const totalEncaisse = done.reduce((a,f)=>a+Number(f.montant||0),0);
  const enAttente = fin.filter(f=>f.statut==="En attente").reduce((a,f)=>a+Number(f.montant||0),0);
  const acomptesRecus = done.filter(f=>f.type==="Acompte").reduce((a,f)=>a+Number(f.montant||0),0);
  const nAcompte = done.filter(f=>f.type==="Acompte").length;
  const acompteMoyen = nAcompte ? Math.round(acomptesRecus/nAcompte) : 0;
  const budgets = pat.filter(p=>Number(p.budget)>0);
  const panierMoyen = budgets.length ? Math.round(budgets.reduce((a,p)=>a+Number(p.budget),0)/budgets.length) : 0;
  const totalBudget = budgets.reduce((a,p)=>a+Number(p.budget||0),0);
  const resteEncaisser = Math.max(0, totalBudget - totalEncaisse);
  const objPct = objectif ? Math.min(100, Math.round(caMonth/objectif*100)) : 0;

  // ── Donut : ventes par utilisateur ──────────────────────────────────────────
  const ventesUser = USERS.map((u,i)=>({
    label:`${u.prenom} ${u.nom}`.trim(), uid:u.id, color:u.color||CHART_PALETTE[i%CHART_PALETTE.length],
    value: done.filter(f=>f.creePar===u.id).reduce((a,f)=>a+Number(f.montant||0),0),
    nb: done.filter(f=>f.creePar===u.id).length
  })).filter(s=>s.value>0);

  // ── Donut : paiements ────────────────────────────────────────────────────────
  const paiements = [
    {label:"Acomptes reçus", value:acomptesRecus, color:C.gold},
    {label:"Paiements complets", value:done.filter(f=>f.type!=="Acompte"&&f.type!=="Remboursement").reduce((a,f)=>a+Number(f.montant||0),0), color:C.green},
    {label:"En attente", value:enAttente, color:C.amber},
    {label:"Reste à encaisser", value:resteEncaisser, color:C.muted},
  ];

  // ── Donut : patients par stade ───────────────────────────────────────────────
  const STADES = ["Prospect","Devis envoyé","Acompte reçu","Confirmé","Arrivé à Istanbul","Post-opératoire","Clôturé ✓"];
  const parStade = STADES.map((st,i)=>({label:st, key:st, color:CHART_PALETTE[i%CHART_PALETTE.length],
    value: pat.filter(p=>(p.stade||"Prospect")===st).length})).filter(s=>s.value>0);

  // ── Donut : opérations ───────────────────────────────────────────────────────
  const OPS = ["Rhinoplastie","BBL","Liposuccion","Abdominoplastie","Lifting visage","Greffe capillaire","Dentaire","Autres"];
  const parOp = OPS.map((op,i)=>{
    const ps = pat.filter(p=>opBucket(p)===op);
    return {label:op, key:op, color:CHART_PALETTE[i%CHART_PALETTE.length], value:ps.length,
      ca: ps.reduce((a,p)=>a+Number(p.budget||0),0)};
  }).filter(s=>s.value>0);

  // ── Donut : pays ─────────────────────────────────────────────────────────────
  const paysMap = {};
  pat.forEach(p=>{ const k=p.pays||"—"; paysMap[k]=(paysMap[k]||0)+1; });
  const parPays = Object.keys(paysMap).map((k,i)=>({label:k,key:k,value:paysMap[k],color:CHART_PALETTE[i%CHART_PALETTE.length]})).sort((a,b)=>b.value-a.value);

  // ── Donut : sources ──────────────────────────────────────────────────────────
  const srcMap = {};
  pat.forEach(p=>{ const k=p.source||"—"; srcMap[k]=(srcMap[k]||0)+1; });
  const parSource = Object.keys(srcMap).map((k,i)=>({label:k,key:k,value:srcMap[k],color:CHART_PALETTE[i%CHART_PALETTE.length]})).sort((a,b)=>b.value-a.value);

  // ── Évolution CA (12 mois) ───────────────────────────────────────────────────
  const evol = Array.from({length:12},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-11+i);
    const key=d.toISOString().slice(0,7);
    const moisCourt=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"][d.getMonth()];
    return {label:moisCourt, value: finances.filter(f=>f.statut==="Complété"&&(f.date||"").startsWith(key)).reduce((a,f)=>a+Number(f.montant||0),0)};
  });

  // ── Podium / classement commerciaux ──────────────────────────────────────────
  const classement = USERS.map(u=>{
    const ventes = done.filter(f=>f.creePar===u.id);
    const caU = ventes.reduce((a,f)=>a+Number(f.montant||0),0);
    const patsU = pat.filter(p=>p.assigneA===u.id||p.creePar===u.id);
    const confirmes = patsU.filter(p=>["Confirmé","Arrivé à Istanbul","Post-opératoire","Clôturé ✓"].includes(p.stade)).length;
    return {u, ca:caU, nb:ventes.length, panier: ventes.length?Math.round(caU/ventes.length):0,
      conv: patsU.length?Math.round(confirmes/patsU.length*100):0};
  }).filter(r=>r.ca>0||r.nb>0).sort((a,b)=>b.ca-a.ca);

  // ── Options de filtres ───────────────────────────────────────────────────────
  const paysOpts = Array.from(new Set(patients.map(p=>p.pays).filter(Boolean)));
  const hopitalOpts = Array.from(new Set(patients.map(p=>p.hopital).filter(Boolean)));
  const medecinOpts = Array.from(new Set(patients.map(p=>patientMedecin(p)).filter(Boolean)));

  // ── Drill-down : liste correspondante ────────────────────────────────────────
  const drillList = (()=>{
    if(!drill) return null;
    if(drill.dim==="user") return {kind:"fin", items: done.filter(f=>f.creePar===drill.key)};
    if(drill.dim==="paiement") return {kind:"fin", items: fin.filter(f=>{
      if(drill.key==="Acomptes reçus") return f.statut==="Complété"&&f.type==="Acompte";
      if(drill.key==="Paiements complets") return f.statut==="Complété"&&f.type!=="Acompte"&&f.type!=="Remboursement";
      if(drill.key==="En attente") return f.statut==="En attente";
      return false;
    })};
    if(drill.dim==="stade") return {kind:"pat", items: pat.filter(p=>(p.stade||"Prospect")===drill.key)};
    if(drill.dim==="op") return {kind:"pat", items: pat.filter(p=>opBucket(p)===drill.key)};
    if(drill.dim==="pays") return {kind:"pat", items: pat.filter(p=>(p.pays||"—")===drill.key)};
    if(drill.dim==="source") return {kind:"pat", items: pat.filter(p=>(p.source||"—")===drill.key)};
    return null;
  })();

  // ── Export ───────────────────────────────────────────────────────────────────
  const exportCSV = ()=>{
    const rows = [["Date","Patient","Type","Montant","Statut","Devise","Créé par"]];
    fin.forEach(f=>{ const p=getP(f.patientId); rows.push([f.date||"", p?`${p.prenom} ${p.nom}`:"", f.type||"", f.montant||"", f.statut||"", f.methode||"€", (USERS.find(u=>u.id===f.creePar)||{}).prenom||f.creePar||""]); });
    const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    try{
      const blob = new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob); const a=document.createElement("a");
      a.href=url; a.download=`finances-clinic-nobel-${today}.csv`; a.click(); URL.revokeObjectURL(url);
    }catch(e){ alert("Export impossible sur cet appareil."); }
  };

  const periods = [["today","Aujourd'hui"],["7j","7 j"],["30j","30 j"],["3m","3 mois"],["6m","6 mois"],["12m","12 mois"],["tout","Tout"]];
  const sel = {padding:"8px 10px",border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:12,background:C.white,color:C.text,fontWeight:600,maxWidth:"100%"};
  const KPI = ({label,value,color=C.navy,icon,sub})=>(
    <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,padding:"12px 14px",minWidth:0}}>
      <div style={{fontSize:11,color:C.muted,fontWeight:700,display:"flex",alignItems:"center",gap:5}}>{icon&&<span>{icon}</span>}{label}</div>
      <div style={{fontSize:18,fontWeight:800,color,marginTop:4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{value}</div>
      {sub&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>{sub}</div>}
    </div>
  );

  return (
    <div style={{maxWidth:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{fontSize:22,fontWeight:800,color:C.text}}>💰 Finances</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={exportCSV} style={{padding:"8px 12px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",fontWeight:700,fontSize:12,color:C.text}}>⬇️ CSV</button>
          <button onClick={()=>window.print()} style={{padding:"8px 12px",border:`1px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",fontWeight:700,fontSize:12,color:C.text}}>🖨️ PDF</button>
          {can(user,"finances","add")&&<button onClick={onAdd} style={{padding:"8px 14px",border:"none",borderRadius:10,background:C.navy,color:C.white,cursor:"pointer",fontWeight:800,fontSize:12}}>+ Transaction</button>}
        </div>
      </div>

      {/* Onglets */}
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto"}}>
        {[["dashboard","📊 Tableau de bord"],["transactions","💳 Transactions"]].map(([id,lb])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,whiteSpace:"nowrap",
            background:tab===id?C.navy:C.white,color:tab===id?C.white:C.muted,boxShadow:tab===id?"none":`inset 0 0 0 1px ${C.border}`}}>{lb}</button>
        ))}
      </div>

      {/* Filtres */}
      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
        {periods.map(([id,lb])=>(
          <button key={id} onClick={()=>setPeriod(id)} style={{padding:"6px 12px",borderRadius:99,border:"none",cursor:"pointer",fontWeight:700,fontSize:11,whiteSpace:"nowrap",
            background:period===id?C.gold:C.white,color:period===id?C.navy:C.muted,boxShadow:period===id?"none":`inset 0 0 0 1px ${C.border}`}}>{lb}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <select value={fUser} onChange={e=>setFUser(e.target.value)} style={sel}><option value="tous">👤 Tous utilisateurs</option>{USERS.map(u=><option key={u.id} value={u.id}>{u.prenom} {u.nom}</option>)}</select>
        <select value={fPays} onChange={e=>setFPays(e.target.value)} style={sel}><option value="tous">🌍 Tous pays</option>{paysOpts.map(p=><option key={p} value={p}>{p}</option>)}</select>
        <select value={fInterv} onChange={e=>setFInterv(e.target.value)} style={sel}><option value="tous">🔪 Toutes interventions</option>{OPS.map(o=><option key={o} value={o}>{o}</option>)}</select>

function Analyses({patients, finances}) {
  const byProc = PROCEDURES.map(p=>({name:p,n:patients.filter(x=>opsArray(x).includes(p)).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n).slice(0,6);
  const bySrc = SOURCES.map(s=>({name:s,n:patients.filter(x=>x.source===s).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const taux = patients.length?Math.round((patients.filter(p=>p.stade==="Clôturé ✓").length/patients.length)*100):0;
  const bMoy = patients.filter(p=>p.budget).length?Math.round(patients.filter(p=>p.budget).reduce((a,p)=>a+Number(p.budget),0)/patients.filter(p=>p.budget).length):0;
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        {[
          {icon:"📈",label:"Conversion",value:`${taux}%`,color:C.green},
          {icon:"💶",label:"Budget moyen",value:fmtEur(bMoy),color:C.blue},
          {icon:"🌍",label:"Pays",value:[...new Set(patients.map(p=>p.pays))].filter(Boolean).length,color:C.purple},
          {icon:"⭐",label:"Satisfaction",value:"98%",color:C.amber},
        ].map(s=>(
          <Card key={s.label} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:10,background:s.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{s.icon}</div>
            <div><div style={{fontSize:18,fontWeight:800,color:C.text}}>{s.value}</div><div style={{fontSize:11,color:C.muted}}>{s.label}</div></div>
          </Card>
        ))}
      </div>
      <Card>
        <SecTitle icon="🏥">Top procédures</SecTitle>
        {byProc.length===0?<div style={{color:C.muted,fontSize:13}}>Aucune donnée.</div>:byProc.map(x=>(
          <div key={x.name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:3}}><span>{x.name}</span><span style={{fontWeight:700,color:C.text}}>{x.n}</span></div>
            <div style={{background:C.bg,borderRadius:99,height:6}}><div style={{background:C.blue,borderRadius:99,height:6,width:`${patients.length?(x.n/patients.length)*100:0}%`}}/></div>
          </div>
        ))}
      </Card>
      <Card>
        <SecTitle icon="📊">Canaux d'acquisition</SecTitle>
        {bySrc.length===0?<div style={{color:C.muted,fontSize:13}}>Aucune donnée.</div>:bySrc.map(x=>(
          <div key={x.name} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:3}}><span>{x.name}</span><span style={{fontWeight:700,color:C.text}}>{x.n}</span></div>
            <div style={{background:C.bg,borderRadius:99,height:6}}><div style={{background:C.purple,borderRadius:99,height:6,width:`${patients.length?(x.n/patients.length)*100:0}%`}}/></div>
          </div>
        ))}
      </Card>
    </div>
  );
}

function OperationsPicker({value, onChange, onClose}) {
  const [sel,setSel] = useState(Array.isArray(value)?value:[]);
  const [q,setQ] = useState("");
  const [cat,setCat] = useState("Toutes");
  const toggle = (op) => setSel(s=> s.includes(op) ? s.filter(x=>x!==op) : [...s,op]);
  const cats = ["Toutes", ...OP_CATEGORIES];
  const sug = suggestForOps(sel);
  const inp = {width:"100%",padding:"11px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:14,outline:"none",background:"#F8FAFC",boxSizing:"border-box",color:C.text};

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.7)",zIndex:1300,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div onClick={e=>e.stopPropagation()} className="slide-up" style={{background:C.bg,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,maxHeight:"94vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px rgba(0,0,0,0.25)"}}>
        {/* Header fixe */}
        <div style={{padding:"8px 18px 10px",flexShrink:0,borderBottom:`1px solid ${C.border}`}}>
          <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:"4px auto 12px"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:16,fontWeight:800,color:C.text}}>🏥 Opérations souhaitées</div>
            <button onClick={onClose} style={{border:"none",background:C.border,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:13}}>✕</button>
          </div>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Rechercher une opération…" style={{...inp,background:C.white,marginBottom:10}}/>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
            {cats.map(c=>(
              <button key={c} onClick={()=>setCat(c)} style={{padding:"6px 12px",borderRadius:99,border:`1.5px solid ${cat===c?(c==="Toutes"?C.navy:opCatColor(c)):C.border}`,background:cat===c?(c==="Toutes"?C.navy:opCatColor(c))+"12":C.white,color:cat===c?(c==="Toutes"?C.navy:opCatColor(c)):C.muted,fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                {c==="Toutes"?"Toutes":`${opCatIcon(c)} ${c}`}
              </button>
            ))}
          </div>
        </div>

        {/* Liste groupée (zone scrollable) */}
        <div style={{flex:1,overflowY:"auto",padding:"12px 16px",minHeight:0}}>
          {OP_CATEGORIES.filter(c=>cat==="Toutes"||cat===c).map(c=>{
            const ops = OPERATIONS[c].filter(op=>!q||op.toLowerCase().includes(q.toLowerCase()));
            if(!ops.length) return null;
            return (
              <div key={c} style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontSize:11,fontWeight:800,color:opCatColor(c),textTransform:"uppercase",letterSpacing:"0.04em"}}>{opCatIcon(c)} {c}</span>
                  <div style={{flex:1,height:1,background:C.border}}/>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {ops.map(op=>{
                    const on = sel.includes(op);
                    return (
                      <button key={op} onClick={()=>toggle(op)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",border:`1.5px solid ${on?opCatColor(c):C.border}`,borderRadius:10,cursor:"pointer",background:on?opCatColor(c)+"0e":C.white,textAlign:"left",transition:"all 0.12s"}}>
                        <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${on?opCatColor(c):C.border}`,background:on?opCatColor(c):C.white,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {on&&<span style={{color:C.white,fontSize:12,fontWeight:800}}>✓</span>}
                        </div>
                        <span style={{fontSize:13,color:C.text,fontWeight:on?700:500}}>{op}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Footer fixe */}
        <div style={{padding:"12px 16px calc(12px + env(safe-area-inset-bottom))",borderTop:`1px solid ${C.border}`,flexShrink:0,background:C.white}}>
          {sel.length>0&&<div style={{fontSize:11,color:C.muted,marginBottom:8}}>
            <b style={{color:C.text}}>{sel.length} opération(s)</b> : {sel.join(" + ")}
            {sug&&sug.hopital&&<span> · 💡 <b style={{color:opCatColor(sug.categorie)}}>{sug.hopital}</b></span>}
          </div>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setSel([])} style={{flex:1,padding:12,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted,fontSize:13}}>Tout effacer</button>
            <button onClick={()=>{onChange(sel);onClose();}} style={{flex:2,padding:12,border:"none",borderRadius:12,background:C.navy,color:C.white,cursor:"pointer",fontWeight:800,fontSize:14}}>✅ Valider ({sel.length})</button>
          </div>
        </div>
      </div>
    </div>
  );
}
