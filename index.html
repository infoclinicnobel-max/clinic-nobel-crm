          <h2 style={{margin:0,fontSize:17,fontWeight:800,color:C.text}}>Modifier le patient</h2>
          <button onClick={onClose} style={{border:"none",background:C.border,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>✕</button>
        </div>
        <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:10}}>IDENTITÉ</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={lbl}>Prénom *</label><input style={inp} {...inpProps} value={f.prenom} onChange={e=>ch("prenom",e.target.value)}/></div>
            <div><label style={lbl}>Nom *</label><input style={inp} {...inpProps} value={f.nom} onChange={e=>ch("nom",e.target.value)}/></div>
          </div>
          <div style={{marginBottom:10}}><label style={lbl}>Email</label><input style={inp} {...inpProps} type="email" value={f.email||""} onChange={e=>ch("email",e.target.value)}/></div>
          <div style={{marginBottom:10}}><label style={lbl}>Téléphone</label><input style={inp} {...inpProps} value={f.tel||""} onChange={e=>ch("tel",e.target.value)}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={lbl}>Pays</label><select style={inp} value={f.pays||"France"} onChange={e=>ch("pays",e.target.value)}>{PAYS.map(p=><option key={p}>{p}</option>)}</select></div>
            <div><label style={lbl}>Ville</label><input style={inp} {...inpProps} value={f.ville||""} onChange={e=>ch("ville",e.target.value)}/></div>
          </div>
        </div>
        <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:10}}>PROCÉDURE</div>
          <div style={{marginBottom:10}}>
            <label style={lbl}>Opérations souhaitées</label>
            <button onClick={()=>setPickerOpen(true)} style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,background:C.white,cursor:"pointer",textAlign:"left",minHeight:44,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",boxSizing:"border-box"}}>
              {f.procedures&&f.procedures.length ? f.procedures.map(op=>(
                <span key={op} style={{background:opCatColor(opCategory(op))+"15",color:opCatColor(opCategory(op)),border:`1px solid ${opCatColor(opCategory(op))}33`,padding:"2px 9px",borderRadius:99,fontSize:11,fontWeight:700}}>{op}</span>
              )) : <span style={{color:C.muted,fontSize:13}}>Sélectionner une ou plusieurs opérations…</span>}
            </button>
            {f.procedures&&f.procedures.length>0&&(()=>{const sug=suggestForOps(f.procedures);return sug&&sug.hopital?<div style={{marginTop:6,fontSize:11,color:C.muted}}>💡 Conseillé : <b style={{color:opCatColor(sug.categorie)}}>{sug.hopital}</b>{sug.medecins.length?` · ${sug.medecins.join(", ")}`:""}</div>:null;})()}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={lbl}>Statut</label><select style={inp} value={f.stade} onChange={e=>ch("stade",e.target.value)}>{STAGES.map(s=><option key={s}>{s}</option>)}</select></div>
            <div><label style={lbl}>Source</label><select style={inp} value={f.source||SOURCES[0]} onChange={e=>ch("source",e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={lbl}>Budget (€)</label><input style={inp} {...inpProps} type="number" value={f.budget||""} onChange={e=>ch("budget",e.target.value)}/></div>
            <div><label style={lbl}>Date arrivée</label><input style={inp} {...inpProps} type="date" value={f.dateArrivee||""} onChange={e=>ch("dateArrivee",e.target.value)}/></div>
          </div>
        </div>
        <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:10}}>NOTES</div>
          <textarea style={{...inp,minHeight:70,resize:"vertical"}} value={f.notes||""} onChange={e=>ch("notes",e.target.value)} placeholder="Notes supplémentaires…"/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:12,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted}}>Annuler</button>
          <button onClick={handleSave} disabled={saving} style={{flex:2,padding:12,border:"none",borderRadius:12,background:saving?"#94a3b8":user.color,color:C.white,cursor:saving?"not-allowed":"pointer",fontWeight:800,fontSize:14}}>
            {saving?"💾 Sauvegarde…":"✅ Enregistrer"}
          </button>
        </div>
      </div>
      {pickerOpen&&<OperationsPicker value={f.procedures} onChange={applyOps} onClose={()=>setPickerOpen(false)}/>}
    </div>
  );

  // Mode création — Assistant 5 étapes
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.7)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div style={{background:C.bg,borderRadius:"24px 24px 0 0",width:"100%",maxHeight:"95vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(11,31,58,0.3)"}}>
        {/* Header de l'assistant */}
        <div style={{background:`linear-gradient(135deg,${C.navy},#1a3a5c)`,borderRadius:"24px 24px 0 0",padding:"20px 20px 16px",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Nouveau patient · Étape {step+1}/{STEPS.length}</div>
              <div style={{color:C.white,fontSize:18,fontWeight:800,marginTop:2}}>{STEPS[step].icon} {STEPS[step].title}</div>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginTop:1}}>{STEPS[step].desc}</div>
            </div>
            <button onClick={onClose} style={{border:"none",background:"rgba(255,255,255,0.15)",color:C.white,width:34,height:34,borderRadius:10,cursor:"pointer",fontSize:14}}>✕</button>
          </div>
          {/* Barre de progression */}
          <div style={{display:"flex",gap:3}}>
            {STEPS.map((_,i)=>(
              <div key={i} style={{flex:1,height:3,borderRadius:99,background:i<=step?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.2)",transition:"background 0.3s"}}/>
            ))}
          </div>
        </div>

        <div style={{padding:"20px 20px 28px"}}>
          {/* ÉTAPE 0 — Identité */}
          {step===0&&<div>
            <div style={{background:C.white,borderRadius:16,padding:16,marginBottom:12}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div>
                  <label style={lbl}>Prénom *</label>
                  <input style={inp} {...inpProps} value={f.prenom} onChange={e=>ch("prenom",e.target.value)} placeholder="Jean" autoFocus/>
                </div>
                <div>
                  <label style={lbl}>Nom *</label>
                  <input style={inp} {...inpProps} value={f.nom} onChange={e=>ch("nom",e.target.value)} placeholder="Dupont"/>
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <label style={lbl}>Sexe</label>
                <div style={{display:"flex",gap:8}}>
                  {["Homme","Femme","Non précisé"].map(s=>(
                    <button key={s} onClick={()=>ch("sexe",s)} style={{flex:1,padding:"9px",border:`1.5px solid ${f.sexe===s?C.navy:C.border}`,borderRadius:10,cursor:"pointer",fontWeight:f.sexe===s?700:400,background:f.sexe===s?C.navy+"08":C.white,color:f.sexe===s?C.navy:C.muted,fontSize:12,transition:"all 0.15s"}}>
                      {s==="Homme"?"👨":s==="Femme"?"👩":"🧑"} {s}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            <div style={{background:C.white,borderRadius:16,padding:16}}>
              <div style={{marginBottom:12}}>
                <label style={lbl}>Source / Canal d'acquisition</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {SOURCES.map(s=>{
                    const icons={"Instagram":"📸","Snapchat":"👻","TikTok":"🎵","Google":"🔍","Bouche à oreille":"👥","WhatsApp":"💬","Site web":"🌐","Autre":"📌"};
                    return (
                      <button key={s} onClick={()=>ch("source",s)} style={{padding:"9px 8px",border:`1.5px solid ${f.source===s?C.purple:C.border}`,borderRadius:10,cursor:"pointer",fontWeight:f.source===s?700:400,background:f.source===s?C.purple+"08":C.white,color:f.source===s?C.purple:C.muted,fontSize:11,textAlign:"left",display:"flex",alignItems:"center",gap:6,transition:"all 0.15s"}}>
                        <span style={{fontSize:14}}>{icons[s]||"📌"}</span>{s}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>}

          {/* ÉTAPE 1 — Contact */}
          {step===1&&<div>
            <div style={{background:C.white,borderRadius:16,padding:16,marginBottom:12}}>
              <div style={{marginBottom:12}}>
                <label style={lbl}>📧 Email</label>
                <input style={inp} {...inpProps} type="email" value={f.email||""} onChange={e=>ch("email",e.target.value)} placeholder="jean.dupont@email.com"/>
              </div>
              <div style={{marginBottom:12}}>
                <label style={lbl}>📱 Téléphone / WhatsApp</label>
                <input style={inp} {...inpProps} value={f.tel||""} onChange={e=>ch("tel",e.target.value)} placeholder="+33 6 00 00 00 00"/>
              </div>
            </div>
            <div style={{background:C.white,borderRadius:16,padding:16}}>
              <div style={{marginBottom:12}}>
                <label style={lbl}>🌍 Pays</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {["France","Belgique","Maroc","Canada","Suisse","Algérie","Tunisie","Autre"].map(p=>(
                    <button key={p} onClick={()=>ch("pays",p)} style={{padding:"9px",border:`1.5px solid ${f.pays===p?C.blue:C.border}`,borderRadius:10,cursor:"pointer",fontWeight:f.pays===p?700:400,background:f.pays===p?C.blue+"08":C.white,color:f.pays===p?C.blue:C.muted,fontSize:12,transition:"all 0.15s"}}>
                      {p}
                    </button>
                  ))}
                </div>
                {!["France","Belgique","Maroc","Canada","Suisse","Algérie","Tunisie"].includes(f.pays)&&(
                  <input style={{...inp,marginTop:8}} {...inpProps} value={f.pays||""} onChange={e=>ch("pays",e.target.value)} placeholder="Préciser le pays…"/>
                )}
              </div>
              <div>
                <label style={lbl}>🏙️ Ville</label>
                <input style={inp} {...inpProps} value={f.ville||""} onChange={e=>ch("ville",e.target.value)} placeholder="Paris"/>
              </div>
            </div>
          </div>}

          {/* ÉTAPE 2 — Procédure */}
          {step===2&&<div>
            <div style={{background:C.white,borderRadius:16,padding:16,marginBottom:12}}>
              <label style={lbl}>🏥 Opérations souhaitées</label>
              <button onClick={()=>setPickerOpen(true)} style={{width:"100%",padding:"12px 14px",border:`1.5px solid ${f.procedures&&f.procedures.length?C.navy:C.border}`,borderRadius:10,background:C.white,cursor:"pointer",textAlign:"left",minHeight:48,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",boxSizing:"border-box"}}>
                {f.procedures&&f.procedures.length ? f.procedures.map(op=>(
                  <span key={op} style={{background:opCatColor(opCategory(op))+"15",color:opCatColor(opCategory(op)),border:`1px solid ${opCatColor(opCategory(op))}33`,padding:"3px 10px",borderRadius:99,fontSize:12,fontWeight:700}}>{op}</span>
                )) : <span style={{color:C.muted,fontSize:14}}>➕ Choisir une ou plusieurs opérations…</span>}
              </button>
              <div style={{fontSize:11,color:C.muted,marginTop:8}}>Vous pouvez combiner plusieurs interventions (ex. Rhinoplastie + Blépharoplastie).</div>
              {f.procedures&&f.procedures.length>0&&(()=>{const sug=suggestForOps(f.procedures);return sug&&sug.hopital?<div style={{marginTop:8,padding:"8px 10px",background:opCatColor(sug.categorie)+"0c",borderRadius:8,fontSize:12,color:C.text}}>💡 Établissement conseillé : <b style={{color:opCatColor(sug.categorie)}}>{sug.hopital}</b>{sug.medecins.length?<span> · {sug.medecins.join(", ")}</span>:null}</div>:null;})()}
            </div>
            <div style={{background:C.white,borderRadius:16,padding:16,marginBottom:12}}>
              <label style={lbl}>🏥 Hôpital / clinique</label>
              <select style={inp} value={f.hopital||""} onChange={e=>ch("hopital",e.target.value)}>
                <option value="">Non défini</option>
                {HOPITAUX_NOMS.map(h=><option key={h}>{h}</option>)}
              </select>
            </div>
            <div style={{background:C.white,borderRadius:16,padding:16}}>
              <div style={{marginBottom:12}}>
                <label style={lbl}>🩺 Médecin souhaité</label>
                <select style={inp} value={f.medecin||""} onChange={e=>{const m=e.target.value;const h=getHopitalForMedecin(m);setF(x=>({...x,medecin:m,hopital:h||x.hopital||""}));}}>
                  <option value="">Pas encore défini</option>
                  {MEDECINS.map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div>
                <label style={lbl}>✈️ Date d'arrivée prévue</label>
                <input style={inp} {...inpProps} type="date" value={f.dateArrivee||""} onChange={e=>ch("dateArrivee",e.target.value)}/>
              </div>
            </div>
          </div>}

          {/* ÉTAPE 3 — Finance */}
          {step===3&&<div>
            <div style={{background:C.white,borderRadius:16,padding:16,marginBottom:12}}>
              <div style={{marginBottom:12}}>
                <label style={lbl}>💶 Budget estimé</label>
                <div style={{position:"relative"}}>
                  <input style={{...inp,paddingRight:50}} {...inpProps} type="number" value={f.budget||""} onChange={e=>ch("budget",e.target.value)} placeholder="5000"/>
                  <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",fontSize:18,fontWeight:700,color:C.muted}}>€</span>
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <label style={lbl}>📊 Priorité commerciale</label>
                <div style={{display:"flex",gap:8}}>
                  {[{v:"Haute",c:C.red,ic:"🔴"},{v:"Normale",c:C.amber,ic:"🟡"},{v:"Basse",c:C.green,ic:"🟢"}].map(p=>(
                    <button key={p.v} onClick={()=>ch("priorite",p.v)} style={{flex:1,padding:"10px",border:`1.5px solid ${f.priorite===p.v?p.c:C.border}`,borderRadius:10,cursor:"pointer",fontWeight:f.priorite===p.v?700:400,background:f.priorite===p.v?p.c+"12":C.white,color:f.priorite===p.v?p.c:C.muted,fontSize:12,transition:"all 0.15s"}}>
                      {p.ic} {p.v}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label style={lbl}>📋 Statut initial</label>
                <select style={inp} value={f.stade} onChange={e=>ch("stade",e.target.value)}>
                  {STAGES.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            {user.role==="admin"&&<div style={{background:C.white,borderRadius:16,padding:16}}>
              <label style={lbl}>👤 Assigner à</label>
              <div style={{display:"flex",gap:8}}>
                {USERS.map(u=>(
                  <button key={u.id} onClick={()=>ch("assigneA",u.id)} style={{flex:1,padding:"10px 6px",border:`1.5px solid ${f.assigneA===u.id?u.color:C.border}`,borderRadius:10,cursor:"pointer",fontWeight:f.assigneA===u.id?700:400,background:f.assigneA===u.id?u.color+"12":C.white,color:f.assigneA===u.id?u.color:C.muted,fontSize:11,transition:"all 0.15s",textAlign:"center"}}>
                    <div style={{fontSize:18,marginBottom:3}}>{u.prenom[0]}</div>
                    {u.prenom}
                  </button>
                ))}
              </div>
            </div>}
          </div>}

          {/* ÉTAPE 4 — Résumé */}
          {step===4&&<div>
            {/* Carte résumé style premium */}
            <div style={{background:`linear-gradient(135deg,${C.navy},#1a3a5c)`,borderRadius:18,padding:"20px",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                <div style={{width:54,height:54,borderRadius:14,background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,color:C.white}}>{f.prenom?.[0]||"?"}{f.nom?.[0]||"?"}</div>
                <div>
                  <div style={{color:C.white,fontSize:18,fontWeight:800}}>{f.prenom} {f.nom}</div>
                  <div style={{color:"rgba(255,255,255,0.6)",fontSize:13,marginTop:2}}>{f.procedure}</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[
                  {ic:"🌍",l:f.pays||"—"},
                  {ic:"📱",l:f.tel||"—"},
                  {ic:"💶",l:f.budget?`${f.budget} €`:"—"},
                  {ic:"📊",l:f.source||"—"},
                ].map((s,i)=>(
                  <div key={i} style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"8px 10px",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:14}}>{s.ic}</span>
                    <span style={{color:"rgba(255,255,255,0.8)",fontSize:12,fontWeight:500}}>{s.l}</span>
                  </div>
                ))}
              </div>
            </div>
            {/* Notes finales */}
            <div style={{background:C.white,borderRadius:16,padding:16,marginBottom:14}}>
              <label style={lbl}>📝 Notes & informations complémentaires</label>
              <textarea style={{...inp,minHeight:80,resize:"vertical"}} value={f.notes||""} onChange={e=>ch("notes",e.target.value)} placeholder="Souhaits particuliers, précisions médicales, langue préférée…"/>
            </div>
            {/* Résumé en liste */}
            <div style={{background:C.white,borderRadius:16,padding:16}}>
              <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:10}}>📋 RÉCAPITULATIF</div>
              {[
                ["👤","Nom complet",`${f.prenom} ${f.nom}`],
                ["📧","Email",f.email||"—"],
                ["📱","Téléphone",f.tel||"—"],
                ["🌍","Pays / Ville",`${f.pays||"—"}${f.ville?", "+f.ville:""}`],
                ["🏥","Procédure",f.procedure],
                ["📊","Source",f.source||"—"],
                ["💶","Budget",f.budget?`${f.budget} €`:"—"],
                ["✈️","Date arrivée",f.dateArrivee||"—"],
                ["📈","Statut",f.stade],
                ["🩺","Médecin",f.medecin||"Non défini"],
              ].map(([ic,lb,vl])=>(
                <div key={lb} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:`1px solid ${C.bg}`}}>
                  <span style={{width:20,textAlign:"center",fontSize:13}}>{ic}</span>
                  <span style={{fontSize:12,color:C.muted,flex:"0 0 100px"}}>{lb}</span>
                  <span style={{fontSize:12,color:C.text,fontWeight:600,flex:1}}>{vl}</span>
                </div>
              ))}
            </div>
          </div>}

          {/* Navigation */}
          <div style={{display:"flex",gap:10,marginTop:20}}>
            {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:"13px",border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted,fontSize:14}}>← Retour</button>}
            {step<4?(
              <button onClick={()=>canNext()&&setStep(s=>s+1)} style={{flex:2,padding:"13px",border:"none",borderRadius:12,background:canNext()?C.navy:"#94a3b8",color:C.white,cursor:canNext()?"pointer":"not-allowed",fontWeight:800,fontSize:14,transition:"background 0.2s"}}>
                Suivant → {STEPS[step+1]?.icon}
              </button>
            ):(
              <button onClick={handleSave} disabled={saving} style={{flex:2,padding:"13px",border:"none",borderRadius:12,background:saving?"#94a3b8":C.green,color:C.white,cursor:saving?"not-allowed":"pointer",fontWeight:800,fontSize:15,transition:"background 0.2s"}}>
                {saving?"💾 Création…":"✅ Créer le dossier patient"}
              </button>
            )}
          </div>
        </div>
      </div>
      {pickerOpen&&<OperationsPicker value={f.procedures} onChange={applyOps} onClose={()=>setPickerOpen(false)}/>}
    </div>
  );
}

function ModalRdv({user, patients, rdv, onSave, onClose, taches, setTaches, onDelete, onDuplicate, onOpenPatient}) {
  const MEDECINS = ["Dr Anvar Ahmedov","Dr Azar Zeynalov","Dr Akin Unal","Dr Elif Öztürk","Dr VSC Dental"];
  const HOPITAUX = ["Avrasya Hospital","Scala Clinic","VSC Fişekhane Dental"];
  const isEdit = !!rdv;
  const [f,setF] = useState(rdv ? {
    priorite:"Normale", coordinatrice:"", couleur:"", rappel:"", notifications:true, salle:"", duree:"60",
    ...rdv,
    date: normalizeDate(rdv.date) || todayStr(),
    heure: normalizeHeure(rdv.heure) || "10:00",
  } : {patientId:"",type:"Consultation vidéo",date:todayStr(),heure:"10:00",medecin:"",hopital:"",salle:"",duree:"60",statut:"Confirmé",priorite:"Normale",coordinatrice:"",couleur:"",rappel:"1j",notifications:true,notes:"",assigneA:user.id,creerTache:false,creerRappel:true});
  const [saving,setSaving] = useState(false);
  const ch = (k,v) => setF(x=>({...x,[k]:v}));
  const inp = {width:"100%",padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,outline:"none",background:"#F8FAFC",boxSizing:"border-box",color:C.text};
  const lbl = {fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:5};

  const handleSave = async () => {
    if(!f.patientId||!f.date||!f.heure){alert("Patient, date et heure obligatoires !");return;}
    // Validation stricte de la date avant sauvegarde
    if(!normalizeDate(f.date)){alert("Date invalide, veuillez choisir une date correcte.");return;}
    setSaving(true);
    // Historique des modifications (édition uniquement)
    const payload = isEdit ? {...f, historique: buildHistGeneric(rdv, f, user, RDV_FIELD_LABELS)} : f;
    await onSave(payload);
    // Créer une tâche de rappel automatique (seulement à la création)
    if(!isEdit && f.creerRappel && setTaches){
      const p=patients.find(x=>x.id===f.patientId);

      setTaches&&setTaches(ts=>{const nt=[...ts,rappel];cache.save("taches",nt);return nt;});
      try{await api.post("taches","add",rappel);}catch(e){}
    }
    setSaving(false);
  };
  const genTask = () => {
    if(!setTaches) return;
    const p=patients.find(x=>x.id===f.patientId);
    const t={id:uid(),titre:`Suivi RDV — ${p?`${p.prenom} ${p.nom}`:""}`.trim(),description:`Suite au RDV ${f.type||""} du ${f.date} à ${f.heure}`,patientId:f.patientId||"",rdvId:f.id||"",medecin:f.medecin||"",hopital:f.hopital||"",assigneA:f.assigneA||user.id,priorite:"Normale",statut:"En cours",echeance:f.date,heure:f.heure,couleur:"",categorie:"Suivi patient",creePar:user.id,cree:todayStr(),historique:JSON.stringify([])};
    setTaches(ts=>{const nt=[...ts,t];cache.save("taches",nt);return nt;});
    try{api.post("taches","add",t);}catch(e){}
    alert("✅ Tâche de suivi créée.");
  };

  const selectedPatient=patients.find(p=>p.id===f.patientId);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(11,31,58,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:12,backdropFilter:"blur(4px)"}}>

          </div>
        </div>

        <div style={{padding:"16px 18px 24px"}}>

            <select style={inp} value={f.patientId} onChange={e=>ch("patientId",e.target.value)}>

              <Avatar p={selectedPatient} size={28}/>
              <div>
                <div style={{fontWeight:700,fontSize:12,color:C.text}}>{selectedPatient.prenom} {selectedPatient.nom}</div>
                <div style={{fontSize:10,color:C.muted}}>{selectedPatient.procedure} · {selectedPatient.pays}</div>
              </div>
            </div>}
          </div>

          {/* Type & Statut */}
          <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10}}>
            <div style={{marginBottom:10}}>
              <label style={lbl}>Type de rendez-vous</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {["Consultation vidéo","Pré-opératoire","Opération","Suivi post-op","Contrôle","Urgence"].map(t=>(
                  <button key={t} onClick={()=>ch("type",t)} style={{padding:"8px 6px",border:`1.5px solid ${f.type===t?C.blue:C.border}`,borderRadius:8,cursor:"pointer",fontWeight:f.type===t?700:400,background:f.type===t?C.blue+"0e":C.white,color:f.type===t?C.blue:C.muted,fontSize:11,transition:"all 0.15s"}}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label style={lbl}>Statut</label>
              <div style={{display:"flex",gap:6}}>
                {[{v:"Confirmé",c:C.green},{v:"Planifié",c:C.amber},{v:"Annulé",c:C.red}].map(s=>(
                  <button key={s.v} onClick={()=>ch("statut",s.v)} style={{flex:1,padding:"8px",border:`1.5px solid ${f.statut===s.v?s.c:C.border}`,borderRadius:8,cursor:"pointer",fontWeight:f.statut===s.v?700:400,background:f.statut===s.v?s.c+"12":C.white,color:f.statut===s.v?s.c:C.muted,fontSize:11,transition:"all 0.15s"}}>

              <div><label style={lbl}>⏰ Heure</label><input style={inp} type="time" value={f.heure} onChange={e=>ch("heure",e.target.value)}/></div>

          </div>

          {/* Automatisations */}
          <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:10}}>⚡ AUTOMATISATIONS</div>
            {[{k:"creerRappel",l:"📋 Créer une tâche de rappel automatique"},{k:"creerTache",l:"✅ Créer tâche post-RDV pour le coordinateur"}].map(opt=>(
              <label key={opt.k} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",cursor:"pointer",borderBottom:`1px solid ${C.bg}`}}>
                <div onClick={()=>ch(opt.k,!f[opt.k])} style={{width:22,height:22,borderRadius:6,border:`2px solid ${f[opt.k]?C.blue:C.border}`,background:f[opt.k]?C.blue:C.white,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",flexShrink:0}}>

              </label>
            ))}

            {selectedPatient&&<div style={{marginTop:10,display:"flex",gap:8}}>

              {selectedPatient.email&&<a href={`mailto:${selectedPatient.email}?subject=Confirmation RDV Clinic Nobel&body=Bonjour ${selectedPatient.prenom},%0A%0AVotre rendez-vous est confirmé le ${f.date} à ${f.heure}.%0AType: ${f.type}%0AMédecin: ${f.medecin||"à définir"}%0A%0AClinic Nobel Istanbul`} style={{flex:1,padding:"8px",background:C.blue+"12",color:C.blue,border:`1px solid ${C.blue}33`,borderRadius:8,fontSize:11,fontWeight:700,textDecoration:"none",textAlign:"center"}}>📧 Email</a>}
            </div>}
          </div>

          {/* Actions (édition) */}
          {isEdit&&<div style={{background:C.white,borderRadius:14,padding:14,marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>⚡ Actions</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {[
                selectedPatient?.tel&&{ic:"📲",l:"WhatsApp",href:waLink(selectedPatient.tel,`Bonjour ${selectedPatient.prenom}, votre RDV est prévu le ${f.date} à ${f.heure}. Clinic Nobel Istanbul.`),c:"#25D366"},

                {ic:"📆",l:"Google",href:googleCalUrl(f,selectedPatient),c:C.navy},
                selectedPatient&&onOpenPatient&&{ic:"👤",l:"Fiche",fn:()=>{onClose();onOpenPatient(f.patientId);}},
                setTaches&&{ic:"✅",l:"Tâche",fn:genTask,c:C.green},

                  <span style={{fontSize:17}}>{a.ic}</span><span style={{fontSize:10,fontWeight:700,color:a.c||C.text}}>{a.l}</span>

                <button key={i} onClick={a.fn} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"9px 4px",borderRadius:10,border:`1px solid ${C.border}`,background:C.white,cursor:"pointer"}}>
                  <span style={{fontSize:17}}>{a.ic}</span><span style={{fontSize:10,fontWeight:700,color:a.c||C.text}}>{a.l}</span>
                </button>
              ))}
            </div>
          </div>}

          <div style={{display:"flex",gap:10}}>
            <button onClick={onClose} style={{flex:1,padding:12,border:`1px solid ${C.border}`,borderRadius:12,background:C.white,cursor:"pointer",fontWeight:700,color:C.muted}}>Annuler</button>
            <button onClick={handleSave} disabled={saving} style={{flex:2,padding:12,border:"none",borderRadius:12,background:saving?"#94a3b8":C.blue,color:C.white,cursor:saving?"not-allowed":"pointer",fontWeight:800,fontSize:14}}>
              {saving?"💾 Sauvegarde…":isEdit?"✅ Enregistrer les modifications":"✅ Créer le rendez-vous"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

        <div style={{display:"flex",gap:10}}>
